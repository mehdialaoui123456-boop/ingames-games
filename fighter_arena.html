<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>معركة الأبطال</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    background: #1a0a1f;
    color: #fff;
    touch-action: none;
    position: fixed;
    inset: 0;
  }
  #game { position: absolute; inset: 0; overflow: hidden; background: #1a0a1f; }
  canvas#scene { position: absolute; inset: 0; display: block; }

  /* ── HUD ── */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 14px;
    z-index: 10;
    pointer-events: none;
  }
  .top-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
  }
  .bar-wrap {
    flex: 1;
    background: rgba(0,0,0,0.55);
    border-radius: 999px;
    padding: 3px;
    height: 22px;
    position: relative;
  }
  .bar-wrap .label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    z-index: 2;
  }
  .bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.25s ease-out;
  }
  .bar-fill.player { background: linear-gradient(90deg, #43e97b, #38f9d7); }
  .bar-fill.enemy  { background: linear-gradient(90deg, #ff3d8b, #ff6b00); }

  .stats-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .pill {
    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 800;
    display: flex; align-items: center; gap: 5px;
  }

  /* Wave announcement */
  .wave-banner {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    background: linear-gradient(135deg, #FFD93D, #FF9F45);
    color: #1a0a1f;
    padding: 18px 38px;
    border-radius: 18px;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 1px;
    opacity: 0;
    transition: transform 0.4s cubic-bezier(.5,1.6,.6,1), opacity 0.3s;
    pointer-events: none;
    z-index: 50;
    box-shadow: 0 8px 24px rgba(255,217,61,0.4);
    text-align: center;
  }
  .wave-banner.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* Controls */
  .controls {
    position: absolute;
    bottom: 14px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 18px;
    z-index: 8;
    pointer-events: none;
  }
  .ctrl-group { display: flex; gap: 10px; pointer-events: auto; }
  .btn-c {
    width: 62px; height: 62px;
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    border: 2px solid rgba(255,255,255,0.30);
    color: #fff;
    font-size: 18px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 60ms, background 60ms;
    backdrop-filter: blur(4px);
  }
  .btn-c.active { transform: scale(0.92); background: rgba(255,255,255,0.28); }
  .btn-c.punch  { background: linear-gradient(135deg, #ff3d8b, #c1185f); border-color: rgba(255,255,255,0.4); }
  .btn-c.kick   { background: linear-gradient(135deg, #ff9f45, #ff6b00); border-color: rgba(255,255,255,0.4); }
  .btn-c.block  { background: linear-gradient(135deg, #4d96ff, #2c5fcc); border-color: rgba(255,255,255,0.4); }

  /* Overlays */
  .overlay {
    position: absolute; inset: 0;
    background: rgba(15,5,25,0.88);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100;
    text-align: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }
  .overlay h1 { font-size: 34px; margin-bottom: 12px; }
  .overlay p { font-size: 16px; margin-bottom: 22px; opacity: 0.85; line-height: 1.6; max-width: 280px; }
  .stat-row { display: flex; gap: 26px; margin-bottom: 22px; }
  .stat { text-align: center; }
  .stat-label { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 800; color: #FFD93D; }
  .big-score { font-size: 60px; font-weight: 900; margin: 6px 0 20px; color: #FFD93D; text-shadow: 0 4px 14px rgba(0,0,0,0.5); }
  .btn {
    background: linear-gradient(135deg, #ff3d8b, #ff6b00);
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 19px;
    font-weight: 900;
    padding: 14px 42px;
    border-radius: 999px;
    box-shadow: 0 6px 0 #aa1a4a, 0 8px 18px rgba(255,61,139,0.4);
    transition: transform 80ms, box-shadow 80ms;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #aa1a4a; }
  .hint { font-size: 13px; opacity: 0.7; margin-top: 14px; }
  .key-hint { display: flex; gap: 14px; margin-bottom: 16px; font-size: 14px; opacity: 0.9; }
  .key-hint .k { background: rgba(255,255,255,0.12); padding: 4px 10px; border-radius: 6px; font-weight: 700; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="game">
  <canvas id="scene" width="400" height="800"></canvas>

  <div id="hud">
    <div class="top-row">
      <div class="bar-wrap">
        <div class="bar-fill player" id="playerHp" style="width:100%"></div>
        <div class="label">أنت</div>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill enemy" id="enemyHp" style="width:100%"></div>
        <div class="label" id="enemyLabel">العدو ١</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="pill">🌊 موجة <span id="wave">1</span></div>
      <div class="pill">⭐ <span id="score">0</span></div>
    </div>
  </div>

  <div class="wave-banner" id="waveBanner">الموجة ١</div>

  <div class="controls">
    <div class="ctrl-group">
      <div class="btn-c" id="rightBtn">▶</div>
      <div class="btn-c" id="leftBtn">◀</div>
    </div>
    <div class="ctrl-group">
      <div class="btn-c block" id="blockBtn">🛡️</div>
      <div class="btn-c kick" id="kickBtn">🦵</div>
      <div class="btn-c punch" id="punchBtn">👊</div>
    </div>
  </div>

  <div id="start" class="overlay">
    <h1>⚔️ معركة الأبطال</h1>
    <p>هزم أعداء متتالين<br>كل موجة أصعب من سابقتها</p>
    <div class="key-hint">
      <div><span class="k">◀ ▶</span> الحركة</div>
      <div><span class="k">👊</span> لكمة</div>
      <div><span class="k">🦵</span> ركلة</div>
      <div><span class="k">🛡️</span> صدّ</div>
    </div>
    <button class="btn" id="startBtn">ابدأ المعركة</button>
    <div class="hint">صدّ الهجوم لتقليل الضرر إلى ربعه!</div>
  </div>

  <div id="end" class="overlay hidden">
    <h1 id="endTitle">انتهت المعركة!</h1>
    <div class="stat-row">
      <div class="stat">
        <div class="stat-label">الموجات</div>
        <div class="stat-value" id="finalWave">1</div>
      </div>
      <div class="stat">
        <div class="stat-label">أعداء</div>
        <div class="stat-value" id="finalKills">0</div>
      </div>
    </div>
    <div class="big-score" id="finalScore">0</div>
    <button class="btn" id="restartBtn">معركة جديدة</button>
  </div>
</div>

<script>
(function () {
  // ── DOM ────────────────────────────────────────────────────────────
  const game        = document.getElementById('game');
  const canvas      = document.getElementById('scene');
  const ctx         = canvas.getContext('2d');
  const playerHpEl  = document.getElementById('playerHp');
  const enemyHpEl   = document.getElementById('enemyHp');
  const enemyLabel  = document.getElementById('enemyLabel');
  const waveEl      = document.getElementById('wave');
  const scoreEl     = document.getElementById('score');
  const waveBanner  = document.getElementById('waveBanner');
  const startView   = document.getElementById('start');
  const endView     = document.getElementById('end');
  const startBtn    = document.getElementById('startBtn');
  const restartBtn  = document.getElementById('restartBtn');
  const leftBtn     = document.getElementById('leftBtn');
  const rightBtn    = document.getElementById('rightBtn');
  const punchBtn    = document.getElementById('punchBtn');
  const kickBtn     = document.getElementById('kickBtn');
  const blockBtn    = document.getElementById('blockBtn');
  const finalScore  = document.getElementById('finalScore');
  const finalWave   = document.getElementById('finalWave');
  const finalKills  = document.getElementById('finalKills');
  const endTitle    = document.getElementById('endTitle');

  // ── State ──────────────────────────────────────────────────────────
  let W = 400, H = 800;
  let groundY = 580;
  let player = null;
  let enemy  = null;
  let particles = [];
  let hitTexts = [];
  let wave = 1;
  let score = 0;
  let kills = 0;
  let running = false;
  let lastTime = 0;
  let rafId = null;

  // Input
  let inputLeft = false, inputRight = false, inputBlock = false;

  // ── Sizing ─────────────────────────────────────────────────────────
  function measure() {
    const rect = game.getBoundingClientRect();
    const w = Math.max(280, Math.floor(rect.width  || game.clientWidth  || window.innerWidth  || 360));
    const h = Math.max(420, Math.floor(rect.height || game.clientHeight || window.innerHeight || 640));
    if (w === W && h === H) return false;
    W = w; H = h;
    canvas.width  = W;
    canvas.height = H;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    groundY = Math.floor(H * 0.78);
    if (player) player.y = groundY - player.h;
    if (enemy)  enemy.y  = groundY - enemy.h;
    return true;
  }
  if (window.ResizeObserver) {
    new ResizeObserver(() => { if (measure()) draw(); }).observe(game);
  }
  window.addEventListener('resize', measure);
  window.addEventListener('orientationchange', () => setTimeout(() => { measure(); draw(); }, 100));

  // ── Buttons ────────────────────────────────────────────────────────
  function bindButton(el, fn) {
    el.addEventListener('click', fn);
    el.addEventListener('touchend', (e) => { e.preventDefault(); fn(); }, { passive: false });
  }
  bindButton(startBtn, startGame);
  bindButton(restartBtn, startGame);

  function bindHold(el, onPress, onRelease) {
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      el.classList.add('active');
      onPress();
    }, { passive: false });
    el.addEventListener('touchend', (e) => {
      e.preventDefault();
      el.classList.remove('active');
      if (onRelease) onRelease();
    }, { passive: false });
    el.addEventListener('touchcancel', () => {
      el.classList.remove('active');
      if (onRelease) onRelease();
    });
    el.addEventListener('mousedown', () => { el.classList.add('active'); onPress(); });
    el.addEventListener('mouseup',   () => { el.classList.remove('active'); if (onRelease) onRelease(); });
    el.addEventListener('mouseleave',() => { el.classList.remove('active'); if (onRelease) onRelease(); });
  }
  bindHold(leftBtn,  () => inputLeft  = true, () => inputLeft  = false);
  bindHold(rightBtn, () => inputRight = true, () => inputRight = false);
  bindHold(blockBtn, () => inputBlock = true, () => inputBlock = false);
  bindHold(punchBtn, () => playerAttack('punch'));
  bindHold(kickBtn,  () => playerAttack('kick'));

  // ── Fighter factory ────────────────────────────────────────────────
  function makeFighter(opts) {
    return {
      x: opts.x, y: opts.y,
      w: 50, h: 110,
      vx: 0, vy: 0,
      hp: opts.hp, maxHp: opts.hp,
      facing: opts.facing,            // 1 = right, -1 = left
      color: opts.color,
      accentColor: opts.accentColor,
      // Action state
      action: 'idle',                 // idle | punch | kick | hit | block
      actionTimer: 0,
      attackHit: false,
      blockTimer: 0,                  // how long has block been held
      // Animation
      walkPhase: 0,
      stunTimer: 0,                   // can't act when stunned
      // AI specifics
      isAI: opts.isAI || false,
      aiTimer: 0,
      aiSpeed: opts.aiSpeed || 90,
      attackDmg: opts.attackDmg || { punch: 8, kick: 12 },
      attackRange: 78,
      // Speed
      speed: opts.speed || 130,
    };
  }

  // ── Wave setup ─────────────────────────────────────────────────────
  function setupWave(n) {
    waveEl.textContent = n;
    enemyLabel.textContent = 'العدو ' + toArabicNum(n);

    // Enemy gets tougher and slightly faster each wave
    const hp     = 60 + (n - 1) * 22;
    const speed  = Math.min(180, 75 + (n - 1) * 8);
    const punch  = Math.min(18, 7 + (n - 1) * 1.5);
    const kick   = Math.min(26, 11 + (n - 1) * 2);
    const aiAggr = Math.min(0.95, 0.55 + (n - 1) * 0.05);

    // Different palette per "type" cycle
    const palettes = [
      { color: '#ff3d8b', accent: '#ff6b00' },
      { color: '#9b5de5', accent: '#FFD93D' },
      { color: '#43e97b', accent: '#1a9b50' },
      { color: '#4d96ff', accent: '#1a5fcc' },
    ];
    const p = palettes[(n - 1) % palettes.length];

    enemy = makeFighter({
      x: W * 0.72,
      y: groundY - 110,
      hp,
      facing: -1,
      color: p.color,
      accentColor: p.accent,
      isAI: true,
      aiSpeed: speed,
      attackDmg: { punch, kick },
      speed,
    });
    enemy.aggression = aiAggr;
    enemy.aiTimer = 0.6;

    showWaveBanner('الموجة ' + toArabicNum(n));
  }

  function toArabicNum(n) {
    const digits = '٠١٢٣٤٥٦٧٨٩';
    return String(n).split('').map(c => digits[+c] ?? c).join('');
  }

  function showWaveBanner(text) {
    waveBanner.textContent = text;
    waveBanner.classList.add('show');
    setTimeout(() => waveBanner.classList.remove('show'), 1600);
  }

  // ── Combat ─────────────────────────────────────────────────────────
  function startAttack(f, type) {
    if (f.action !== 'idle' || f.stunTimer > 0) return;
    f.action = type;
    f.actionTimer = type === 'punch' ? 0.32 : 0.42;
    f.attackHit = false;
  }

  function playerAttack(type) {
    if (!running || !player) return;
    if (inputBlock) return; // can't attack while blocking
    startAttack(player, type);
  }

  function applyHit(attacker, defender, type) {
    const baseDmg = attacker.attackDmg[type];
    let dmg = baseDmg;

    // Defender blocking?
    const isBlocking = (defender === player && inputBlock && player.action === 'idle');
    if (isBlocking) {
      dmg = Math.max(1, Math.floor(baseDmg * 0.25));
      defender.action = 'block';
      defender.actionTimer = 0.2;
      // Tiny pushback only
      defender.vx = attacker.facing * 100;
    } else {
      defender.action = 'hit';
      defender.actionTimer = 0.28;
      defender.stunTimer = 0.28;
      // Knockback
      defender.vx = attacker.facing * (type === 'kick' ? 280 : 180);
    }

    defender.hp -= dmg;
    if (defender.hp < 0) defender.hp = 0;

    // FX
    spawnHitParticles(
      attacker.x + (attacker.facing > 0 ? attacker.w * 0.9 : attacker.w * 0.1),
      attacker.y + 40,
      isBlocking ? '#4d96ff' : (type === 'kick' ? '#ff9f45' : '#ff3d8b')
    );
    hitTexts.push({
      x: defender.x + defender.w / 2,
      y: defender.y + 20,
      text: '-' + dmg,
      life: 0.7, maxLife: 0.7,
      color: isBlocking ? '#4d96ff' : '#fff',
    });

    if (defender === player) {
      updatePlayerHpBar();
      if (defender.hp <= 0) gameOver();
    } else {
      updateEnemyHpBar();
      if (defender.hp <= 0) enemyDefeated();
    }
  }

  function checkAttackContact(attacker, defender) {
    if (attacker.action !== 'punch' && attacker.action !== 'kick') return;
    if (attacker.attackHit) return;
    // Hit window — middle of the animation
    const progress = 1 - attacker.actionTimer / (attacker.action === 'punch' ? 0.32 : 0.42);
    if (progress < 0.25 || progress > 0.7) return;

    // Range check (facing-aware)
    const ax = attacker.x + attacker.w / 2 + attacker.facing * (attacker.attackRange * 0.6);
    const ay = attacker.y + 50;
    const dxCx = defender.x + defender.w / 2;
    const dyCy = defender.y + defender.h / 2;
    const dx = ax - dxCx;
    const dy = ay - dyCy;
    if (Math.abs(dx) < attacker.attackRange / 1.5 && Math.abs(dy) < 60) {
      attacker.attackHit = true;
      applyHit(attacker, defender, attacker.action);
    }
  }

  function enemyDefeated() {
    score += 100 + wave * 25;
    kills++;
    scoreEl.textContent = score;
    spawnExplosion(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, enemy.color);
    enemy.action = 'defeated';
    setTimeout(() => {
      wave++;
      // Heal player a little between waves
      player.hp = Math.min(player.maxHp, player.hp + 15);
      updatePlayerHpBar();
      setupWave(wave);
    }, 1100);
  }

  function gameOver() {
    running = false;
    spawnExplosion(player.x + player.w / 2, player.y + player.h / 2, player.color);
    endTitle.textContent = 'هُزمت!';
    setTimeout(() => {
      finalScore.textContent = score;
      finalWave.textContent  = toArabicNum(wave);
      finalKills.textContent = toArabicNum(kills);
      endView.classList.remove('hidden');
    }, 900);
  }

  // ── AI ─────────────────────────────────────────────────────────────
  function updateAI(e, dt) {
    if (e.action === 'defeated' || e.hp <= 0) return;
    if (e.stunTimer > 0) return;
    if (e.action !== 'idle') return;

    e.aiTimer -= dt;
    const dx = player.x - e.x;
    const dist = Math.abs(dx);
    e.facing = dx > 0 ? 1 : -1;

    // Close in
    if (dist > 70) {
      e.vx = e.facing * e.aiSpeed;
    } else {
      e.vx = 0;
      if (e.aiTimer <= 0) {
        // Attack chance
        if (Math.random() < e.aggression) {
          startAttack(e, Math.random() < 0.6 ? 'punch' : 'kick');
        }
        e.aiTimer = 0.5 + Math.random() * 0.8;
      }
    }
  }

  // ── Particles ──────────────────────────────────────────────────────
  function spawnHitParticles(x, y, color) {
    for (let i = 0; i < 10; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 100 + Math.random() * 180;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        life: 0.4, maxLife: 0.4,
        size: 3 + Math.random() * 3,
        color,
      });
    }
  }
  function spawnExplosion(x, y, color) {
    for (let i = 0; i < 30; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 100 + Math.random() * 280;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 100,
        life: 0.9, maxLife: 0.9,
        size: 3 + Math.random() * 4,
        color: Math.random() < 0.5 ? color : '#FFD93D',
      });
    }
  }

  // ── Game loop ──────────────────────────────────────────────────────
  function startGame() {
    measure();
    player = makeFighter({
      x: W * 0.22,
      y: groundY - 110,
      hp: 100,
      facing: 1,
      color: '#43e97b',
      accentColor: '#FFD93D',
      speed: 160,
      attackDmg: { punch: 14, kick: 22 },
    });
    particles = [];
    hitTexts = [];
    score = 0;
    kills = 0;
    wave = 1;
    running = true;
    scoreEl.textContent = '0';
    updatePlayerHpBar();
    setupWave(1);
    updateEnemyHpBar();
    startView.classList.add('hidden');
    endView.classList.add('hidden');

    lastTime = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function loop(now) {
    if (!running && particles.length === 0 && hitTexts.length === 0) { rafId = null; return; }
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function update(dt) {
    if (running) {
      // Player input → movement
      if (player.action === 'idle' && player.stunTimer <= 0) {
        if (inputBlock) {
          player.vx = 0;
        } else {
          const dir = (inputLeft ? -1 : 0) + (inputRight ? 1 : 0);
          player.vx = dir * player.speed;
          if (dir !== 0) player.facing = dir;
        }
      } else if (player.action !== 'hit') {
        player.vx *= 0.6;
      }
      // Always face the enemy by default
      if (enemy && enemy.hp > 0 && player.action === 'idle' && !inputLeft && !inputRight) {
        player.facing = (enemy.x > player.x) ? 1 : -1;
      }

      // AI
      if (enemy) updateAI(enemy, dt);
    }

    // Physics + animation timers for both fighters
    [player, enemy].forEach(f => {
      if (!f) return;
      // Knockback decay
      f.vx *= Math.pow(0.001, dt);
      f.x += f.vx * dt;
      // Walk phase
      if (Math.abs(f.vx) > 30 && f.action === 'idle') f.walkPhase += dt * 8;
      else f.walkPhase *= 0.9;
      // Action timer
      if (f.actionTimer > 0) {
        f.actionTimer -= dt;
        if (f.actionTimer <= 0 && f.action !== 'defeated') {
          f.action = 'idle';
        }
      }
      // Stun
      if (f.stunTimer > 0) f.stunTimer -= dt;
      // Bounds
      const margin = 10;
      if (f.x < margin) f.x = margin;
      if (f.x > W - f.w - margin) f.x = W - f.w - margin;
    });

    // Attack contact (only check during the active windows)
    if (player && enemy && enemy.hp > 0 && player.hp > 0) {
      checkAttackContact(player, enemy);
      checkAttackContact(enemy, player);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 480 * dt;
      p.vx *= 0.95;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Hit texts float up
    for (let i = hitTexts.length - 1; i >= 0; i--) {
      const t = hitTexts[i];
      t.y -= 50 * dt;
      t.life -= dt;
      if (t.life <= 0) hitTexts.splice(i, 1);
    }
  }

  function updatePlayerHpBar() {
    if (!player) return;
    playerHpEl.style.width = Math.max(0, (player.hp / player.maxHp) * 100) + '%';
  }
  function updateEnemyHpBar() {
    if (!enemy) return;
    enemyHpEl.style.width = Math.max(0, (enemy.hp / enemy.maxHp) * 100) + '%';
  }

  // ── Drawing ────────────────────────────────────────────────────────
  function draw() {
    // Background: dark arena with floor
    const skyGrad = ctx.createLinearGradient(0, 0, 0, groundY);
    skyGrad.addColorStop(0, '#2a0d3d');
    skyGrad.addColorStop(1, '#5a1d65');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, groundY);

    // Distant lights
    for (let i = 0; i < 8; i++) {
      const lx = (i + 0.5) * (W / 8);
      const lr = 24 + Math.sin(i + performance.now() / 1200) * 4;
      const grd = ctx.createRadialGradient(lx, 60, 0, lx, 60, lr);
      grd.addColorStop(0, 'rgba(255,200,255,0.5)');
      grd.addColorStop(1, 'rgba(255,200,255,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(lx, 60, lr, 0, Math.PI * 2);
      ctx.fill();
    }

    // Arena floor
    const floorGrad = ctx.createLinearGradient(0, groundY, 0, H);
    floorGrad.addColorStop(0, '#1a0a1f');
    floorGrad.addColorStop(1, '#0a0512');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, groundY, W, H - groundY);

    // Floor line glow
    ctx.fillStyle = '#ff3d8b';
    ctx.fillRect(0, groundY - 1, W, 1);
    const glow = ctx.createLinearGradient(0, groundY - 18, 0, groundY);
    glow.addColorStop(0, 'rgba(255,61,139,0)');
    glow.addColorStop(1, 'rgba(255,61,139,0.18)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, groundY - 18, W, 18);

    // Fighters (back-to-front: smaller draws first if needed; here just order them)
    if (enemy && enemy.action !== 'defeated') drawFighter(enemy);
    if (player) drawFighter(player);

    // Particles
    for (const p of particles) {
      const a = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // Floating damage numbers
    for (const t of hitTexts) {
      const a = Math.max(0, t.life / t.maxLife);
      ctx.globalAlpha = a;
      ctx.fillStyle = t.color;
      ctx.font = 'bold 22px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.strokeStyle = 'rgba(0,0,0,0.8)';
      ctx.lineWidth = 3;
      ctx.strokeText(t.text, t.x, t.y);
      ctx.fillText(t.text, t.x, t.y);
    }
    ctx.globalAlpha = 1;
  }

  function drawFighter(f) {
    ctx.save();
    ctx.translate(f.x + f.w / 2, f.y);
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    ctx.ellipse(0, f.h + 4, f.w * 0.6, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Mirror for facing direction
    ctx.scale(f.facing, 1);

    // Body geometry
    const bodyW = 28, bodyH = 46;
    const headR = 16;
    const headY = headR + 4;

    // Legs (animated walk) — hide the front leg during a kick
    const legSwing = Math.sin(f.walkPhase) * 12;
    const kickingNow = f.action === 'kick';
    ctx.fillStyle = f.color;
    // Back leg always drawn
    ctx.fillRect(-10, headY + headR / 2 + bodyH, 9, 30 + legSwing);
    // Front leg only when not kicking
    if (!kickingNow) {
      ctx.fillRect( 1, headY + headR / 2 + bodyH, 9, 30 - legSwing);
    }
    // Feet
    ctx.fillStyle = '#1a0a1f';
    ctx.fillRect(-12, headY + headR / 2 + bodyH + 26 + legSwing, 13, 6);
    if (!kickingNow) {
      ctx.fillRect( -1, headY + headR / 2 + bodyH + 26 - legSwing, 13, 6);
    }

    // Torso
    const torsoGrad = ctx.createLinearGradient(-bodyW / 2, 0, bodyW / 2, 0);
    torsoGrad.addColorStop(0, f.color);
    torsoGrad.addColorStop(1, shade(f.color, -0.25));
    ctx.fillStyle = torsoGrad;
    roundRect(ctx, -bodyW / 2, headY + headR / 2 - 4, bodyW, bodyH, 8);
    ctx.fill();
    // Belt
    ctx.fillStyle = f.accentColor;
    ctx.fillRect(-bodyW / 2, headY + headR / 2 + bodyH - 12, bodyW, 6);

    // Arms — animation based on action
    let armBackAngle = -0.4 + Math.sin(f.walkPhase) * 0.4;
    let armFrontAngle = 0.4 - Math.sin(f.walkPhase) * 0.4;
    let armFrontX = bodyW / 2 - 2;
    let armFrontExtend = 0;

    if (f.action === 'punch') {
      const prog = 1 - f.actionTimer / 0.32;
      const ext = Math.sin(prog * Math.PI);
      armFrontExtend = ext * 36;
      armFrontAngle = -0.1;
    } else if (f.action === 'kick') {
      armFrontAngle = -0.6;
    } else if (f.action === 'block') {
      armFrontAngle = -1.2;
      armBackAngle  = -1.1;
    } else if (f.action === 'hit') {
      armFrontAngle = 0.9;
      armBackAngle  = 0.7;
    }

    // Back arm
    drawArm(-bodyW / 2 + 2, headY + headR / 2 + 4, armBackAngle, 0, shade(f.color, -0.2));
    // Front arm
    drawArm(armFrontX, headY + headR / 2 + 4, armFrontAngle, armFrontExtend, f.color);

    // Extended kick leg — drawn from the hip, rotating forward
    if (f.action === 'kick') {
      const prog = 1 - f.actionTimer / 0.42;
      // Ease in-out so the kick snaps out and back smoothly
      const ext = Math.sin(prog * Math.PI);
      // Pivot at the hip (just below the torso)
      const hipX = 4;
      const hipY = headY + headR / 2 + bodyH + 2;
      ctx.save();
      ctx.translate(hipX, hipY);
      // Start angle pointing down (PI/2), rotate up to horizontal (0)
      // Negative direction in canvas coords = up. Forward = +X (after facing flip).
      const angle = Math.PI / 2 - ext * (Math.PI / 2 + 0.15);
      ctx.rotate(angle);
      const legLen = 40 + ext * 8;
      // Thigh + shin (slightly tapered)
      ctx.fillStyle = f.color;
      ctx.fillRect(-5, 0, 10, legLen);
      // Knee highlight
      ctx.fillStyle = shade(f.color, -0.25);
      ctx.fillRect(-5, legLen / 2 - 1, 10, 2);
      // Foot at the end (perpendicular to the leg)
      ctx.fillStyle = '#1a0a1f';
      ctx.fillRect(-3, legLen - 3, 14, 7);
      // Motion line behind the foot
      if (ext > 0.4) {
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, legLen - 14);
        ctx.lineTo(0, legLen - 26);
        ctx.stroke();
      }
      ctx.restore();
    }

    // Head
    ctx.fillStyle = shade(f.color, 0.15);
    ctx.beginPath();
    ctx.arc(0, headY, headR, 0, Math.PI * 2);
    ctx.fill();
    // Mask / band
    ctx.fillStyle = f.accentColor;
    ctx.fillRect(-headR, headY - 5, headR * 2, 5);
    // Eye
    ctx.fillStyle = '#fff';
    ctx.fillRect(5, headY - 1, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(6, headY, 2, 2);

    // Block shield indicator
    if (f.action === 'block') {
      ctx.strokeStyle = 'rgba(77, 150, 255, 0.85)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(bodyW / 2 + 6, headY + headR / 2 + 14, 22, -1.2, 1.2);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawArm(originX, originY, angle, extension, color) {
    ctx.save();
    ctx.translate(originX, originY);
    ctx.rotate(angle);
    ctx.fillStyle = color;
    const len = 22 + extension;
    ctx.fillRect(0, -4, len, 8);
    // Fist
    ctx.fillStyle = shade(color, 0.2);
    ctx.beginPath();
    ctx.arc(len + 2, 0, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y,     x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x,     y + h, r);
    ctx.arcTo(x,     y + h, x,     y,     r);
    ctx.arcTo(x,     y,     x + w, y,     r);
    ctx.closePath();
  }

  function shade(hex, amount) {
    // amount positive = lighter, negative = darker
    if (hex.startsWith('rgb')) return hex;
    const c = hex.replace('#', '');
    const r = parseInt(c.substr(0, 2), 16);
    const g = parseInt(c.substr(2, 2), 16);
    const b = parseInt(c.substr(4, 2), 16);
    const adj = v => Math.max(0, Math.min(255, Math.round(v + 255 * amount)));
    return `rgb(${adj(r)}, ${adj(g)}, ${adj(b)})`;
  }

  // ── Init ───────────────────────────────────────────────────────────
  measure();
  draw();
  [50, 200, 500, 1500].forEach(t => setTimeout(() => { measure(); draw(); }, t));
})();
</script>
</body>
