<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>منظار الصيد</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    color: #fff;
    touch-action: none;
    position: fixed;
    inset: 0;
  }

  #stage {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: linear-gradient(to bottom, #3a4a3a 0%, #5a6b4a 60%, #6a7a55 100%);
    cursor: crosshair;
  }
  canvas#scene {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    filter: saturate(0.7) brightness(0.85);
  }

  /* Scope system - moves with drag */
  .scope-sys {
    position: absolute;
    width: 78%;
    aspect-ratio: 1 / 1;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .scope-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    box-shadow:
      0 0 0 9999px rgba(0,0,0,0.92),
      inset 0 0 10px rgba(0,0,0,0.6);
    border: 3px solid #0d1a0d;
  }
  .cross-h, .cross-v { position: absolute; background: rgba(0,0,0,0.85); }
  .cross-h { left: 6%; right: 6%; top: 50%; height: 2px; transform: translateY(-50%); }
  .cross-v { top: 6%; bottom: 6%; left: 50%; width: 2px; transform: translateX(-50%); }
  .scale {
    position: absolute;
    top: 14%; bottom: 14%;
    left: 50%;
    transform: translateX(-50%);
    width: 26px;
    color: rgba(0,0,0,0.75);
    font-family: ui-monospace, "Courier New", monospace;
    font-size: 9px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
  }
  .center-cross {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 26px; height: 26px;
  }
  .center-cross::before, .center-cross::after {
    content: '';
    position: absolute;
    background: #22ff44;
    box-shadow: 0 0 6px #22ff44;
  }
  .center-cross::before { top: 50%; left: 0; right: 0; height: 2px; transform: translateY(-50%); }
  .center-cross::after  { left: 50%; top: 0; bottom: 0; width: 2px; transform: translateX(-50%); }

  /* HUD --------------------------------------------------------------- */
  .hud {
    position: absolute;
    top: 14px; left: 14px; right: 14px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    z-index: 5;
  }
  .pill {
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 800;
    display: flex; align-items: center; gap: 6px;
  }
  .combo {
    position: absolute;
    top: 56px; left: 50%;
    transform: translateX(-50%);
    color: #ffcc00;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 1px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
  }
  .combo.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  /* Controls (bottom row) -------------------------------------------- */
  .controls {
    position: absolute;
    bottom: 16px;
    left: 16px; right: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 6;
  }
  .reload {
    background: #1a1a1a;
    color: #fff;
    border: 3px solid #22ff44;
    border-radius: 12px;
    padding: 14px 22px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 1px;
    box-shadow: 0 0 10px rgba(34,255,68,0.4);
  }
  .shoot {
    background: radial-gradient(circle at 35% 35%, #ff5050, #cc0000);
    color: #fff;
    border: 4px solid #ff1a1a;
    border-radius: 50%;
    width: 86px; height: 86px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 1px;
    box-shadow: 0 0 18px rgba(255,40,40,0.7), inset 0 -6px 12px rgba(0,0,0,0.3);
  }
  .reload:active, .shoot:active { transform: scale(0.94); }

  /* Flash + hit FX --------------------------------------------------- */
  .flash {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.85);
    pointer-events: none;
    opacity: 0;
    z-index: 4;
    transition: opacity 0.12s ease-out;
  }
  .hitmark {
    position: absolute;
    color: #ff3030;
    font-size: 26px;
    font-weight: 900;
    pointer-events: none;
    z-index: 7;
    transform: translate(-50%, -50%);
    text-shadow: 0 0 6px #000;
    transition: transform 0.5s ease-out, opacity 0.5s ease-out;
  }

  /* Overlays --------------------------------------------------------- */
  .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.78);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100;
    text-align: center;
    padding: 24px;
    backdrop-filter: blur(3px);
  }
  .overlay h1 { font-size: 34px; margin-bottom: 12px; }
  .overlay p { font-size: 16px; margin-bottom: 24px; opacity: 0.85; line-height: 1.6; max-width: 280px; }
  .big-score { font-size: 64px; font-weight: 900; margin: 6px 0 22px; color: #FFD93D; text-shadow: 0 4px 12px rgba(0,0,0,0.5); }
  .btn {
    background: #22ff44;
    color: #003311;
    border: none;
    font-family: inherit;
    font-size: 19px;
    font-weight: 900;
    padding: 14px 42px;
    border-radius: 999px;
    box-shadow: 0 6px 0 #0a8822;
    transition: transform 80ms, box-shadow 80ms;
    letter-spacing: 0.5px;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #0a8822; }
  .hint { font-size: 13px; opacity: 0.7; margin-top: 16px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="scene" width="400" height="800"></canvas>
  <div class="flash" id="flash"></div>

  <div class="scope-sys" id="scopeSys">
    <div class="scope-ring"></div>
    <div class="cross-h"></div>
    <div class="cross-v"></div>
    <div class="scale">
      <span>10</span><span>5</span><span>0</span><span>5</span><span>10</span>
    </div>
    <div class="center-cross"></div>
  </div>

  <div class="hud">
    <div class="pill">🎯 <span id="ammo">10</span>/10</div>
    <div class="pill">⏱️ <span id="time">45</span></div>
    <div class="pill">⭐ <span id="score">0</span></div>
  </div>
  <div class="combo" id="combo">سلسلة ×2</div>

  <div class="controls">
    <button class="reload" id="reload">إعادة التعبئة</button>
    <button class="shoot" id="shoot">إطلاق</button>
  </div>

  <!-- Start screen -->
  <div id="start" class="overlay">
    <h1>🎯 منظار الصيد</h1>
    <p>اسحب لتحريك المنظار<br>اضغط على زر الإطلاق<br>دمّر الأهداف قبل نفاد الوقت</p>
    <button class="btn" id="startBtn">ابدأ اللعب</button>
    <div class="hint">٤٥ ثانية — ١٠ طلقات قابلة لإعادة التعبئة</div>
  </div>

  <!-- End screen -->
  <div id="end" class="overlay hidden">
    <h1>انتهى الوقت!</h1>
    <p>نقاطك:</p>
    <div class="big-score" id="finalScore">0</div>
    <button class="btn" id="restartBtn">العب مرة أخرى</button>
  </div>
</div>

<script>
(function () {
  // ── DOM ────────────────────────────────────────────────────────────
  const stage      = document.getElementById('stage');
  const canvas     = document.getElementById('scene');
  const ctx        = canvas.getContext('2d');
  const scopeSys   = document.getElementById('scopeSys');
  const ammoEl     = document.getElementById('ammo');
  const timeEl     = document.getElementById('time');
  const scoreEl    = document.getElementById('score');
  const finalEl    = document.getElementById('finalScore');
  const flashEl    = document.getElementById('flash');
  const comboEl    = document.getElementById('combo');
  const reloadBtn  = document.getElementById('reload');
  const shootBtn   = document.getElementById('shoot');
  const startView  = document.getElementById('start');
  const endView    = document.getElementById('end');
  const startBtn   = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');

  // ── State ──────────────────────────────────────────────────────────
  let W = 400, H = 800;
  let ammo = 10, score = 0, combo = 0, timeLeft = 45;
  let lastHitTime = 0;
  let animals = [];
  let trees = [];
  let running = false;
  let lastTime = 0;
  let spawnTimer = 0;
  let timerInterval = null;
  let rafId = null;
  let scopeOffsetX = 0, scopeOffsetY = 0;
  let dragging = false;
  let dragStartX = 0, dragStartY = 0;
  let scopeStartX = 0, scopeStartY = 0;

  // ── Sizing ─────────────────────────────────────────────────────────
  function measure() {
    const rect = stage.getBoundingClientRect();
    const w = Math.max(240, Math.floor(rect.width  || stage.clientWidth  || window.innerWidth  || 360));
    const h = Math.max(360, Math.floor(rect.height || stage.clientHeight || window.innerHeight || 640));
    if (w === W && h === H) return;
    W = w; H = h;
    canvas.width  = W;
    canvas.height = H;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    initTrees();
  }
  if (window.ResizeObserver) {
    new ResizeObserver(() => measure()).observe(stage);
  }
  window.addEventListener('resize', measure);
  window.addEventListener('orientationchange', () => setTimeout(measure, 100));

  // ── Buttons ────────────────────────────────────────────────────────
  function bindButton(el, fn) {
    el.addEventListener('click', fn);
    el.addEventListener('touchend', (e) => { e.preventDefault(); fn(); }, { passive: false });
  }
  bindButton(startBtn,   startGame);
  bindButton(restartBtn, startGame);
  bindButton(shootBtn,   fire);
  bindButton(reloadBtn,  reload);

  // ── Scene generation ───────────────────────────────────────────────
  function initTrees() {
    trees = [];
    for (let i = 0; i < 6; i++) {
      trees.push({
        x: Math.random() * W,
        y: H * 0.35 + Math.random() * 40,
        scale: 0.5 + Math.random() * 0.3,
        depth: 0.6,
      });
    }
    for (let i = 0; i < 5; i++) {
      trees.push({
        x: (i + 0.5) * (W / 5) + (Math.random() - 0.5) * 40,
        y: H * 0.42 + Math.random() * 30,
        scale: 1 + Math.random() * 0.4,
        depth: 1,
      });
    }
    trees.sort((a, b) => a.depth - b.depth);
  }

  function drawTree(t) {
    const trunkW = 18 * t.scale;
    const trunkH = 120 * t.scale;
    const crownR = 60 * t.scale;
    ctx.fillStyle = t.depth < 0.8 ? '#5a4a30' : '#4a3a20';
    ctx.fillRect(t.x - trunkW / 2, t.y, trunkW, trunkH);
    ctx.beginPath();
    ctx.fillStyle = t.depth < 0.8 ? '#3a5a35' : '#2a4a25';
    ctx.arc(t.x, t.y, crownR, 0, Math.PI * 2);
    ctx.fill();
  }

  function spawnAnimal() {
    const fromLeft = Math.random() < 0.5;
    const lane = Math.random() < 0.5 ? 0 : 1;
    const y = lane === 0 ? H * 0.52 : H * 0.58;
    animals.push({
      x: fromLeft ? -80 : W + 80,
      y: y,
      vx: (fromLeft ? 1 : -1) * (60 + Math.random() * 60), // px / sec
      size: 32 + Math.random() * 10,
      alive: true,
      flip: !fromLeft,
    });
  }

  function drawAnimal(a) {
    ctx.save();
    ctx.translate(a.x, a.y);
    if (a.flip) ctx.scale(-1, 1);
    const s = a.size;

    // Body (woolly bumps)
    ctx.fillStyle = '#f5f1e6';
    const bumps = [
      [-s * 0.6, 0, s * 0.35],
      [-s * 0.2, -s * 0.15, s * 0.40],
      [s * 0.2,  -s * 0.15, s * 0.40],
      [s * 0.55, 0, s * 0.32],
      [0, s * 0.05, s * 0.40],
    ];
    for (const [bx, by, br] of bumps) {
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fill();
    }

    // Head
    ctx.fillStyle = '#3a3028';
    ctx.beginPath();
    ctx.ellipse(s * 0.85, -s * 0.05, s * 0.28, s * 0.32, 0, 0, Math.PI * 2);
    ctx.fill();
    // Ear
    ctx.beginPath();
    ctx.ellipse(s * 0.75, -s * 0.30, s * 0.08, s * 0.14, -0.4, 0, Math.PI * 2);
    ctx.fill();
    // Legs
    ctx.fillStyle = '#2a2018';
    const legW = s * 0.10;
    ctx.fillRect(-s * 0.45, s * 0.35, legW, s * 0.40);
    ctx.fillRect(-s * 0.15, s * 0.35, legW, s * 0.40);
    ctx.fillRect( s * 0.15, s * 0.35, legW, s * 0.40);
    ctx.fillRect( s * 0.45, s * 0.35, legW, s * 0.40);
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s * 0.95, -s * 0.10, s * 0.04, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawScene() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(60,80,55,0.6)';
    ctx.fillRect(0, H * 0.6, W, H * 0.4);
    trees.forEach(drawTree);
    animals.forEach(a => { if (a.alive) drawAnimal(a); });
  }

  // ── Aim ────────────────────────────────────────────────────────────
  function getAimCanvasPoint() {
    const cx = W / 2 + scopeOffsetX;
    const cy = H / 2 + scopeOffsetY;
    return { x: cx, y: cy };
  }
  function updateScopeTransform() {
    scopeSys.style.transform = `translate(calc(-50% + ${scopeOffsetX}px), calc(-50% + ${scopeOffsetY}px))`;
  }

  // ── Fire ───────────────────────────────────────────────────────────
  function fire() {
    if (!running) return;
    if (ammo <= 0) return;
    ammo--;
    updateHUD();

    flashEl.style.opacity = '0.85';
    setTimeout(() => { flashEl.style.opacity = '0'; }, 80);

    const aim = getAimCanvasPoint();
    let hit = null;
    for (const a of animals) {
      if (!a.alive) continue;
      const dx = a.x - aim.x;
      const dy = a.y - aim.y;
      if (Math.abs(dx) < a.size * 1.2 && Math.abs(dy) < a.size * 0.9) {
        hit = a;
        break;
      }
    }
    if (hit) {
      hit.alive = false;
      const now = performance.now();
      if (now - lastHitTime < 1500) combo++; else combo = 1;
      lastHitTime = now;
      const points = 10 * Math.max(1, combo);
      score += points;
      showCombo();
      showHitMark(points);
    } else {
      combo = 0;
      hideCombo();
    }
    updateHUD();
  }

  function showHitMark(points) {
    const stageRect = stage.getBoundingClientRect();
    const mark = document.createElement('div');
    mark.className = 'hitmark';
    mark.textContent = '+' + points;
    // Render in stage coordinates (CSS px). Use scope offset directly.
    mark.style.left = (stageRect.width  / 2 + scopeOffsetX) + 'px';
    mark.style.top  = (stageRect.height / 2 + scopeOffsetY) + 'px';
    mark.style.opacity = '1';
    stage.appendChild(mark);
    requestAnimationFrame(() => {
      mark.style.transform = 'translate(-50%, -80%) scale(1.2)';
      mark.style.opacity = '0';
    });
    setTimeout(() => mark.remove(), 600);
  }

  function showCombo() {
    if (combo < 2) return;
    comboEl.textContent = 'سلسلة ×' + combo;
    comboEl.classList.add('show');
  }
  function hideCombo() { comboEl.classList.remove('show'); }

  function reload() {
    if (!running) return;
    if (ammo === 10) return;
    setTimeout(() => { ammo = 10; updateHUD(); }, 400);
  }

  function updateHUD() {
    ammoEl.textContent  = ammo;
    scoreEl.textContent = score;
    timeEl.textContent  = timeLeft;
  }

  // ── Drag-to-aim ────────────────────────────────────────────────────
  function getPoint(e) {
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }
  function onDown(e) {
    if (!running) return;
    if (e.target.closest('button')) return;
    dragging = true;
    const p = getPoint(e);
    dragStartX = p.x; dragStartY = p.y;
    scopeStartX = scopeOffsetX; scopeStartY = scopeOffsetY;
  }
  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = getPoint(e);
    const stageRect = stage.getBoundingClientRect();
    scopeOffsetX = scopeStartX + (p.x - dragStartX);
    scopeOffsetY = scopeStartY + (p.y - dragStartY);
    const maxX = stageRect.width  * 0.32;
    const maxY = stageRect.height * 0.30;
    scopeOffsetX = Math.max(-maxX, Math.min(maxX, scopeOffsetX));
    scopeOffsetY = Math.max(-maxY, Math.min(maxY, scopeOffsetY));
    updateScopeTransform();
  }
  function onUp() { dragging = false; }

  // Bind input to the stage (not window) so it stays inside the WebView
  stage.addEventListener('mousedown', onDown);
  stage.addEventListener('touchstart', onDown, { passive: false });
  stage.addEventListener('mousemove', onMove);
  stage.addEventListener('touchmove', onMove, { passive: false });
  stage.addEventListener('mouseup', onUp);
  stage.addEventListener('touchend', onUp);

  // ── Game loop ──────────────────────────────────────────────────────
  function loop(now) {
    if (!running) { rafId = null; return; }
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;

    // Spawn
    spawnTimer += dt;
    if (spawnTimer > 1.1) {
      spawnAnimal();
      spawnTimer = 0;
    }

    // Update animals (pixels per second now, not per frame)
    for (const a of animals) {
      a.x += a.vx * dt;
    }
    animals = animals.filter(a => a.alive && a.x > -120 && a.x < W + 120);

    // Decay combo if no recent hit
    if (combo > 0 && performance.now() - lastHitTime > 1800) {
      combo = 0;
      hideCombo();
    }

    drawScene();
    rafId = requestAnimationFrame(loop);
  }

  // ── Start / End ────────────────────────────────────────────────────
  function startGame() {
    measure();
    ammo = 10; score = 0; combo = 0; timeLeft = 45;
    animals = []; spawnTimer = 0;
    scopeOffsetX = 0; scopeOffsetY = 0;
    updateScopeTransform();
    running = true;
    updateHUD();
    hideCombo();
    startView.classList.add('hidden');
    endView.classList.add('hidden');

    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      timeEl.textContent = timeLeft;
      if (timeLeft <= 0) endGame();
    }, 1000);

    lastTime = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function endGame() {
    running = false;
    clearInterval(timerInterval);
    timerInterval = null;
    finalEl.textContent = score;
    endView.classList.remove('hidden');
  }

  // ── Init ───────────────────────────────────────────────────────────
  measure();
  drawScene(); // draw something so start screen has scenery behind it
  [50, 200, 500, 1500].forEach(t => setTimeout(() => { measure(); drawScene(); }, t));
})();
</script>
</body>
</html>
