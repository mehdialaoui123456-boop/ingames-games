<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>برج الحلزون</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
html,body{width:100%;height:100%;overflow:hidden;}
body{touch-action:none;position:fixed;inset:0;background:#070b14;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.3s ease,transform 0.3s ease;}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(12px);}
#start-screen{background:radial-gradient(ellipse 80% 55% at 50% 30%,#0a1f3a 0%,#070b14 70%);}
.title{font-size:clamp(40px,11vw,62px);font-weight:900;text-align:center;line-height:1.05;margin-bottom:8px;background:linear-gradient(135deg,#f5c842,#4fc3f7,#00e5b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 22px rgba(79,195,247,0.45));}
.sub{color:rgba(255,255,255,0.4);font-size:clamp(13px,3.5vw,16px);margin-bottom:32px;}
.box{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:18px 26px;max-width:290px;width:88%;margin-bottom:32px;backdrop-filter:blur(12px);}
.box p{color:rgba(255,255,255,0.75);font-size:clamp(13px,3.5vw,15px);line-height:1.9;text-align:center;}
.box span{color:#f5c842;font-weight:700;}
.btn{border:none;border-radius:999px;padding:15px 52px;cursor:pointer;font-weight:800;font-size:clamp(16px,4.5vw,19px);min-width:180px;text-align:center;transition:transform 0.12s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.12s;}
.gold{background:linear-gradient(135deg,#f5c842,#ffaa00);color:#070b14;box-shadow:0 6px 0 #a07000,0 0 28px rgba(245,200,66,0.4);}
.gold:active{transform:translateY(3px);box-shadow:0 3px 0 #a07000;}
.blue{background:linear-gradient(135deg,#4fc3f7,#0097d4);color:#fff;box-shadow:0 6px 0 #005f90,0 0 28px rgba(79,195,247,0.4);}
.blue:active{transform:translateY(3px);box-shadow:0 3px 0 #005f90;}
#game-screen{background:#070b14;}
#hud{position:absolute;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;pointer-events:none;}
.pill{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:999px;padding:6px 16px;font-size:clamp(13px,3.5vw,16px);color:#fff;font-weight:700;display:flex;align-items:center;gap:6px;font-variant-numeric:lining-nums;}
.pill .lbl{color:rgba(255,255,255,0.45);font-weight:400;font-size:0.82em;}
#sv{color:#f5c842;text-shadow:0 0 10px rgba(245,200,66,0.6);font-variant-numeric:lining-nums;}
.heart{font-size:15px;transition:transform 0.2s,opacity 0.2s;}
.heart.gone{opacity:0.18;transform:scale(0.65);}
#cw{position:absolute;inset:0;}
#gc{display:block;}
#lf{position:absolute;inset:0;pointer-events:none;z-index:60;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;}
#lf.show{opacity:1;}
#lt{background:rgba(79,195,247,0.15);border:1px solid rgba(79,195,247,0.4);border-radius:20px;padding:12px 28px;color:#4fc3f7;font-size:clamp(17px,5vw,22px);font-weight:800;text-shadow:0 0 16px rgba(79,195,247,0.8);backdrop-filter:blur(8px);}
.pt{position:absolute;border-radius:50%;pointer-events:none;z-index:55;animation:po 0.55s ease-out forwards;}
@keyframes po{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
#end-screen{background:radial-gradient(ellipse 80% 55% at 50% 35%,#0a1a30 0%,#070b14 70%);}
.etitle{font-size:clamp(24px,7vw,36px);font-weight:900;color:#ff6b6b;text-shadow:0 0 20px rgba(255,107,107,0.5);margin-bottom:6px;}
.esub{color:rgba(255,255,255,0.35);font-size:clamp(12px,3.5vw,15px);margin-bottom:22px;}
.sbig{font-size:clamp(64px,20vw,96px);font-weight:900;line-height:1;font-variant-numeric:lining-nums;background:linear-gradient(135deg,#f5c842,#ffaa00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 24px rgba(245,200,66,0.5));margin-bottom:4px;}
.slbl{color:rgba(255,255,255,0.35);font-size:clamp(12px,3.5vw,15px);margin-bottom:24px;}
.stars{display:flex;gap:10px;justify-content:center;margin-bottom:28px;}
.star svg{width:44px;height:44px;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),filter 0.4s;}
.star.on svg{filter:drop-shadow(0 0 10px rgba(245,200,66,0.9));transform:scale(1.2);}
.best{color:rgba(255,255,255,0.3);font-size:clamp(12px,3vw,14px);margin-top:14px;font-variant-numeric:lining-nums;}
</style>
</head>
<body>

<div id="start-screen" class="screen">
  <div class="title">برج<br>الحلزون</div>
  <div class="sub">لعبة الانعكاسات السريعة</div>
  <div class="box"><p>
    <span>اسحب يميناً أو يساراً</span> لتدوير البرج<br>
    دع الكرة تسقط عبر <span>الفجوة</span><br>
    تجنب الحلقات <span>الحمراء</span> أو تخسر حياة
  </p></div>
  <button class="btn gold" id="btn-start">ابدأ اللعبة</button>
</div>

<div id="game-screen" class="screen hidden">
  <div id="hud">
    <div class="pill"><span class="lbl">النقاط</span><span id="sv">0</span></div>
    <div class="pill">
      <span class="heart" id="h0">❤️</span>
      <span class="heart" id="h1">❤️</span>
      <span class="heart" id="h2">❤️</span>
    </div>
  </div>
  <div id="cw"><canvas id="gc"></canvas></div>
  <div id="lf"><div id="lt">مستوى جديد! 🚀</div></div>
</div>

<div id="end-screen" class="screen hidden">
  <div class="etitle">انتهت اللعبة</div>
  <div class="esub">أحسنت المحاولة!</div>
  <div class="sbig" id="es">0</div>
  <div class="slbl">نقطة</div>
  <div class="stars" id="sr"></div>
  <button class="btn blue" id="btn-replay">العب مرة أخرى</button>
  <div class="best" id="bl"></div>
</div>

<script>
(function(){
'use strict';

/* ══════════════════════════════
   AUDIO
══════════════════════════════ */
let AC=null;
function getAC(){try{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}catch(e){return null;}}
function sPop(){try{const c=getAC();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(700,c.currentTime);o.frequency.exponentialRampToValueAtTime(1100,c.currentTime+0.08);g.gain.setValueAtTime(0.22,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.12);o.start();o.stop(c.currentTime+0.13);}catch(e){}}
function sBuzz(){try{const c=getAC();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(110,c.currentTime);o.frequency.exponentialRampToValueAtTime(55,c.currentTime+0.28);g.gain.setValueAtTime(0.28,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.start();o.stop(c.currentTime+0.32);}catch(e){}}
function sLvl(){try{const c=getAC();if(!c)return;[440,554,659,880].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;const t=c.currentTime+i*0.08;g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);o.start(t);o.stop(t+0.2);});}catch(e){}}
function sOver(){try{const c=getAC();if(!c)return;[440,330,220,165].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;const t=c.currentTime+i*0.13;g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);o.start(t);o.stop(t+0.24);});}catch(e){}}

/* ══════════════════════════════
   CANVAS / RESIZE
══════════════════════════════ */
const canvas=document.getElementById('gc');
const C=canvas.getContext('2d');
const cw=document.getElementById('cw');
let W=0,H=0;
function resize(){W=cw.clientWidth||window.innerWidth;H=cw.clientHeight||window.innerHeight;canvas.width=W;canvas.height=H;}
resize();window.addEventListener('resize',resize);window.addEventListener('orientationchange',()=>setTimeout(resize,150));
setTimeout(resize,100);setTimeout(resize,500);

/* ══════════════════════════════
   SCREENS
══════════════════════════════ */
const SCR={start:document.getElementById('start-screen'),game:document.getElementById('game-screen'),end:document.getElementById('end-screen')};
function show(n){Object.entries(SCR).forEach(([k,el])=>el.classList.toggle('hidden',k!==n));}

/* ══════════════════════════════
   GAME MODEL

   The tower is a cylinder viewed from slightly above.
   We draw it as a series of FLAT RINGS — each ring is
   a horizontal ellipse band with a gap.

   KEY INSIGHT for simple, reliable collision:
   ─────────────────────────────────────────────
   The ball falls straight down the CENTER of the cylinder.
   Each ring has a GAP defined by two pixel X positions: gapL and gapR.
   These are the left and right edges of the opening on the ring.

   gapL and gapR depend on:
     • ring.gapCenter  — angle (0..2π) where gap center is
     • ring.gapHalfArc — half-width of gap in radians
     • tower rotation  — added to gapCenter each frame

   gapL = cx + cos(gapCenter - gapHalfArc) * ringXR
   gapR = cx + cos(gapCenter + gapHalfArc) * ringXR

   BUT: this only works when the gap faces front/back.
   When the gap is on the SIDE (cos≈0), the gap is narrow in screen X —
   which is correct! A gap on the side of a cylinder looks narrow from the front.

   Ball passes if:  ball.x is BETWEEN gapL and gapR
   i.e.  gapL < ball.x < gapR  (when gap faces front, wide)
   or    gapR < ball.x < gapL  (when gap wraps, handle accordingly)

   Actually cleaner: use the GAP ANGLE directly.
   Ball is always at angle 90° (π/2) or 270° (3π/2) from center of ellipse
   (because it's at x=cx, which is at angle 90° of a circle).

   So: gap passes ball if the angle π/2 lies inside [gapCenter-gapHalfArc, gapCenter+gapHalfArc]
   after adding towerRot.

   This is ONE comparison. Totally reliable.
══════════════════════════════ */

let score=0,lives=3,diff=1,lastDiffScore=0;
let best=0;
try{best=parseInt(localStorage.getItem('hxb3')||'0',10)||0;}catch(e){}
let running=false,rafId=null;

// Tower rotation: accumulated from swipe
let towerRot=0;   // actual drawn rotation
let rotVel=0;     // velocity for momentum

// Ball
const ball={y:0,vy:0};

// Camera
let camY=0;

// Rings array
let rings=[];

/* ── sizes (functions so they recompute after resize) ── */
const XR=()=>Math.min(W,H)*0.30;   // ellipse x-radius
const YR=()=>XR()*0.20;            // ellipse y-radius (flat top)
const RH=()=>Math.min(W,H)*0.052;  // ring height (thickness)
const RS=()=>RH()*2.8;             // ring vertical spacing
const BR=()=>Math.min(W,H)*0.040;  // ball radius
const GAP_ARC=()=>Math.PI*(0.68-diff*0.03);  // gap half-arc shrinks with difficulty; starts ~62° each side = 124° total gap

/* ── colours ── */
const SAFE=['#4fc3f7','#00e5b0','#a78bfa','#60a5fa','#2dd4bf'];
const DANG=['#ff6b6b','#ff4444'];

/* ── ring factory ── */
function mkRing(wy){
  const danger=Math.random()<(0.1+diff*0.035);
  return {
    wy,                                    // world Y of ring top
    ga: Math.random()*Math.PI*2,          // gap center angle (world, before towerRot)
    col: danger?DANG[0]:SAFE[Math.floor(Math.random()*SAFE.length)],
    danger,
    alive: true,
    alpha: 1.0,
    scored: false
  };
}

function initRings(){
  rings=[];
  const sp=RS();
  for(let i=1;i<=14;i++) rings.push(mkRing(sp*i));
}

/* ══════════════════════════════
   THE GAP CHECK — single clean function
   Returns true if the gap faces the ball (ball can fall through)
══════════════════════════════ */
const BALL_ANGLE = Math.PI/2;  // ball is always at 90° (bottom of ellipse = screen center x)

function norm(a){return((a%(Math.PI*2))+Math.PI*2)%(Math.PI*2);}

function ballInGap(ring){
  // Gap center in screen space = ring.ga + towerRot
  const gc = norm(ring.ga + towerRot);
  const ha = GAP_ARC();  // half-arc of gap
  // Angle difference between ball entry point and gap center
  let diff2 = norm(BALL_ANGLE - gc);
  if(diff2 > Math.PI) diff2 = Math.PI*2 - diff2;  // shortest arc
  return diff2 <= ha;
}

/* ══════════════════════════════
   INPUT — swipe to spin tower
══════════════════════════════ */
let dragX=null;
const SENS=0.006;

function touchStart(e){
  e.preventDefault();
  getAC();
  if(!running)return;
  dragX=e.touches[0].clientX;
}
function touchMove(e){
  e.preventDefault();
  if(!running||dragX===null)return;
  const dx=e.touches[0].clientX-dragX;
  rotVel+=dx*SENS;
  dragX=e.touches[0].clientX;
}
function touchEnd(e){e.preventDefault();dragX=null;}
function mouseDown(e){if(!running)return;dragX=e.clientX;}
function mouseMove(e){if(!running||dragX===null)return;const dx=e.clientX-dragX;rotVel+=dx*SENS;dragX=e.clientX;}
function mouseUp(){dragX=null;}

canvas.addEventListener('touchstart',touchStart,{passive:false});
canvas.addEventListener('touchmove',touchMove,{passive:false});
canvas.addEventListener('touchend',touchEnd,{passive:false});
canvas.addEventListener('mousedown',mouseDown);
window.addEventListener('mousemove',mouseMove);
window.addEventListener('mouseup',mouseUp);

/* ══════════════════════════════
   PARTICLES
══════════════════════════════ */
function burst(sx,sy,col,n){
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='pt';
    const s=4+Math.random()*7;
    const a=Math.random()*Math.PI*2,d=20+Math.random()*50;
    p.style.cssText=`width:${s}px;height:${s}px;background:${col};left:${sx}px;top:${sy}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;`;
    document.getElementById('game-screen').appendChild(p);
    setTimeout(()=>p.remove(),600);
  }
}

/* ══════════════════════════════
   LEVEL FLASH
══════════════════════════════ */
let lfTO=null;
function lvlFlash(){const e=document.getElementById('lf');e.classList.add('show');clearTimeout(lfTO);lfTO=setTimeout(()=>e.classList.remove('show'),1400);}

/* ══════════════════════════════
   HUD
══════════════════════════════ */
function hud(){
  document.getElementById('sv').textContent=score.toLocaleString('en-US');
  [0,1,2].forEach(i=>document.getElementById('h'+i).classList.toggle('gone',i>=lives));
}

/* ══════════════════════════════
   DRAW
══════════════════════════════ */
function drawBG(){
  const g=C.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#070b14');g.addColorStop(1,'#0d1b2a');
  C.fillStyle=g;C.fillRect(0,0,W,H);

  // vertical dashed guide line down the center — player aims ball here
  C.save();
  C.setLineDash([6,10]);
  C.strokeStyle='rgba(255,255,255,0.10)';
  C.lineWidth=1.5;
  C.beginPath();C.moveTo(W/2,0);C.lineTo(W/2,H);C.stroke();
  C.setLineDash([]);
  C.restore();
}

function drawRing(r){
  const sy=r.wy-camY;
  if(sy<-RH()*5||sy>H+RH()*5)return;

  const xr=XR(),yr=YR(),rh=RH();
  const ha=GAP_ARC();
  const gc=norm(r.ga+towerRot);   // gap center angle in screen space

  // The gap spans [gc-ha .. gc+ha]
  // The solid arc goes from (gc+ha) around to (gc-ha) the long way
  const gapEnd  = gc+ha;          // solid starts here
  const solidSize = Math.PI*2 - ha*2;
  const steps=72;
  const da=solidSize/steps;

  C.save();
  C.globalAlpha=r.alpha;

  // ── 1. SOLID RING BODY ──
  C.beginPath();
  for(let i=0;i<=steps;i++){
    const a=gapEnd+da*i;
    const px=W/2+Math.cos(a)*xr;
    const py=sy+Math.sin(a)*yr;
    i===0?C.moveTo(px,py):C.lineTo(px,py);
  }
  for(let i=steps;i>=0;i--){
    const a=gapEnd+da*i;
    const px=W/2+Math.cos(a)*xr;
    const py=sy+rh+Math.sin(a)*yr*0.55;
    C.lineTo(px,py);
  }
  C.closePath();
  const grad=C.createLinearGradient(W/2-xr,sy,W/2+xr,sy+rh);
  grad.addColorStop(0,r.col+'ff');
  grad.addColorStop(1,r.col+'bb');
  C.fillStyle=grad;
  C.fill();

  // ── 2. TOP-FACE SHINE STRIP ──
  C.globalAlpha=r.alpha*0.28;
  C.beginPath();
  for(let i=0;i<=steps;i++){
    const a=gapEnd+da*i;
    const px=W/2+Math.cos(a)*xr;
    const py=sy+Math.sin(a)*yr;
    i===0?C.moveTo(px,py):C.lineTo(px,py);
  }
  for(let i=steps;i>=0;i--){
    const a=gapEnd+da*i;
    const px=W/2+Math.cos(a)*(xr-6);
    const py=sy+rh*0.38+Math.sin(a)*yr;
    C.lineTo(px,py);
  }
  C.closePath();
  C.fillStyle='rgba(255,255,255,1)';
  C.fill();

  // ── 3. GAP — bright glowing opening ──
  // Draw the gap area as a lit-up arch so it's crystal clear
  C.globalAlpha=r.alpha;
  const gapSteps=28;
  const gda=(ha*2)/gapSteps;

  // Gap "floor" — a bright inner ellipse arc showing the inside of the tube
  C.beginPath();
  for(let i=0;i<=gapSteps;i++){
    const a=(gc-ha)+gda*i;
    const px=W/2+Math.cos(a)*xr;
    const py=sy+Math.sin(a)*yr;
    i===0?C.moveTo(px,py):C.lineTo(px,py);
  }
  for(let i=gapSteps;i>=0;i--){
    const a=(gc-ha)+gda*i;
    const px=W/2+Math.cos(a)*xr;
    const py=sy+rh+Math.sin(a)*yr*0.55;
    C.lineTo(px,py);
  }
  C.closePath();
  // Fill gap with dark interior + bright edge so it reads as a hole
  const gi=C.createLinearGradient(W/2-xr,sy,W/2+xr,sy+rh);
  gi.addColorStop(0,'rgba(255,255,255,0.18)');
  gi.addColorStop(0.4,'rgba(10,15,30,0.95)');
  gi.addColorStop(1,'rgba(10,15,30,0.98)');
  C.fillStyle=gi;
  C.fill();

  // Gap edge highlight — bright rim on both sides of the opening
  C.globalAlpha=r.alpha*0.9;
  C.shadowColor=r.danger?'#ff6b6b':'#ffffff';
  C.shadowBlur=8;
  C.strokeStyle=r.danger?'rgba(255,107,107,0.9)':'rgba(255,255,255,0.85)';
  C.lineWidth=2.5;
  // left edge of gap
  const lx1=W/2+Math.cos(gc-ha)*xr, ly1=sy+Math.sin(gc-ha)*yr;
  const lx2=W/2+Math.cos(gc-ha)*xr, ly2=sy+rh+Math.sin(gc-ha)*yr*0.55;
  C.beginPath();C.moveTo(lx1,ly1);C.lineTo(lx2,ly2);C.stroke();
  // right edge of gap
  const rx1=W/2+Math.cos(gc+ha)*xr, ry1=sy+Math.sin(gc+ha)*yr;
  const rx2=W/2+Math.cos(gc+ha)*xr, ry2=sy+rh+Math.sin(gc+ha)*yr*0.55;
  C.beginPath();C.moveTo(rx1,ry1);C.lineTo(rx2,ry2);C.stroke();
  C.shadowBlur=0;

  // ── 4. GAP OPEN INDICATOR — downward arrow inside the gap ──
  // Only draw when gap is near facing-front (visible and useful)
  // Arrow position: gap center projected onto screen
  const gapCX=W/2+Math.cos(gc)*xr*0.0; // gap center is always at x=W/2 when gc=PI/2
  // Show indicator at gap center screen position
  const indicX=W/2+Math.cos(gc)*(xr*0.55);
  const indicY=sy+rh*0.5+Math.sin(gc)*yr*0.4;
  // Only show arrow when gap is somewhat facing forward (near visible)
  const facing=Math.abs(Math.cos(gc));  // 0=side, 1=front/back
  if(facing<0.7){
    C.globalAlpha=r.alpha*(0.7-facing)*1.4;
    C.fillStyle=r.danger?'#ff6b6b':'rgba(255,255,255,0.9)';
    C.shadowColor=r.danger?'#ff4444':'rgba(255,255,255,0.8)';
    C.shadowBlur=6;
    // small down-arrow ▼
    const ax=indicX, ay=indicY, as2=rh*0.28;
    C.beginPath();
    C.moveTo(ax,ay+as2);
    C.lineTo(ax-as2,ay-as2*0.5);
    C.lineTo(ax+as2,ay-as2*0.5);
    C.closePath();
    C.fill();
    C.shadowBlur=0;
  }

  // ── 5. DANGER RING pulse glow ──
  if(r.danger){
    C.globalAlpha=r.alpha*0.55;
    C.shadowColor='#ff4444';
    C.shadowBlur=20;
    C.strokeStyle='#ff6b6b';
    C.lineWidth=3;
    C.beginPath();
    for(let i=0;i<=steps;i++){
      const a=gapEnd+da*i;
      const px=W/2+Math.cos(a)*xr;
      const py=sy+rh*0.5+Math.sin(a)*yr*0.5;
      i===0?C.moveTo(px,py):C.lineTo(px,py);
    }
    C.stroke();
    C.shadowBlur=0;
  }

  C.restore();

  // ── 6. GAP ALIGNMENT BEAM — vertical dotted line from gap to ball ──
  // When gap is facing front (ball can fall), show a green beam
  if(r.alive && !r.scored){
    const open=ballInGap(r);
    const gapScreenX=W/2; // ball is always at W/2, gap "faces" ball when open
    const ballScreenY=ball.y-camY;
    if(open && ballScreenY < sy){
      C.save();
      C.globalAlpha=0.22*r.alpha;
      C.setLineDash([4,8]);
      C.strokeStyle='#00e5b0';
      C.lineWidth=2;
      C.beginPath();C.moveTo(W/2,ballScreenY+BR());C.lineTo(W/2,sy);C.stroke();
      C.setLineDash([]);
      C.restore();
    }
  }
}

function drawBall(){
  const sy=ball.y-camY;
  const br=BR();
  C.save();
  // glow
  const g=C.createRadialGradient(W/2,sy,0,W/2,sy,br*3);
  g.addColorStop(0,'rgba(245,200,66,0.32)');g.addColorStop(1,'rgba(245,200,66,0)');
  C.beginPath();C.arc(W/2,sy,br*3,0,Math.PI*2);C.fillStyle=g;C.fill();
  // body
  const b=C.createRadialGradient(W/2-br*0.3,sy-br*0.3,br*0.05,W/2,sy,br);
  b.addColorStop(0,'#fffbe0');b.addColorStop(0.35,'#f5c842');b.addColorStop(1,'#b36000');
  C.beginPath();C.arc(W/2,sy,br,0,Math.PI*2);C.fillStyle=b;C.fill();
  // specular
  C.beginPath();C.arc(W/2-br*0.27,sy-br*0.28,br*0.27,0,Math.PI*2);C.fillStyle='rgba(255,255,255,0.7)';C.fill();
  C.restore();
}

/* ══════════════════════════════
   GAME LOOP
══════════════════════════════ */
let lastT=0;
const GRAV=()=>0.20+diff*0.04;
const MAXVY=()=>13+diff*1.5;

function loop(ts){
  if(!running)return;
  const dt=Math.min(ts-lastT,50);lastT=ts;

  // ── rotation with momentum + damping ──
  towerRot+=rotVel*(dt/16);
  rotVel*=Math.pow(0.88,dt/16);  // friction

  // ── ball physics ──
  ball.vy=Math.min(ball.vy+GRAV()*(dt/16),MAXVY());
  ball.y+=ball.vy*(dt/16);

  // ── camera ──
  const tc=ball.y-H*0.25;
  camY+=(tc-camY)*0.12;

  // ── ring management ──
  rings.sort((a,b)=>a.wy-b.wy);
  // generate ahead
  if(rings.length>0){
    while(rings[rings.length-1].wy < camY+H+RS()*5)
      rings.push(mkRing(rings[rings.length-1].wy+RS()));
  }
  // remove behind + faded
  rings=rings.filter(r=>r.wy>camY-RH()*8);
  // fade dying
  rings.forEach(r=>{if(!r.alive)r.alpha=Math.max(0,r.alpha-0.08);});
  rings=rings.filter(r=>r.alpha>0);

  // ── COLLISION ──
  // Find the single nearest alive ring the ball is about to hit or sitting on
  const br=BR(),rh=RH();
  let nearest=null;
  for(let i=0;i<rings.length;i++){
    const r=rings[i];
    if(!r.alive)continue;
    // ring top is still below the ball bottom — it's ahead
    if(r.wy > ball.y+br) continue;
    // ring bottom is above the ball top — ball has passed it
    if(r.wy+rh < ball.y-br) continue;
    // this ring overlaps the ball vertically
    nearest=r;
    break;
  }

  if(nearest && !nearest.scored){
    const open=ballInGap(nearest);
    if(open){
      // ── PASS THROUGH ──
      nearest.scored=true;
      nearest.alive=false;
      score++;
      hud();
      sPop();
      burst(W/2,nearest.wy-camY,nearest.col,8);
      checkDiff();
    } else {
      // ── BLOCKED ──
      if(nearest.danger){
        // punch through danger ring, lose life
        nearest.scored=true;
        nearest.alive=false;
        lives--;
        hud();
        sBuzz();
        burst(W/2,nearest.wy-camY,nearest.col,6);
        ball.vy=Math.max(ball.vy*0.3,4);
        if(lives<=0){endGame();return;}
      } else {
        // sit on top of safe ring
        ball.y=nearest.wy-br;
        ball.vy=0;
      }
    }
  }

  // ── DRAW ──
  C.clearRect(0,0,W,H);
  drawBG();
  rings.slice().sort((a,b)=>a.wy-b.wy).forEach(drawRing);
  drawBall();

  rafId=requestAnimationFrame(loop);
}

/* ══════════════════════════════
   DIFFICULTY
══════════════════════════════ */
function checkDiff(){
  const t=6+diff*2;
  if(score-lastDiffScore>=t&&diff<7){diff++;lastDiffScore=score;lvlFlash();sLvl();}
}

/* ══════════════════════════════
   FLOW
══════════════════════════════ */
function startGame(){
  score=0;lives=3;diff=1;lastDiffScore=0;
  towerRot=0;rotVel=0;
  ball.y=RS()*0.4;ball.vy=0;
  camY=0;
  hud();
  initRings();
  document.getElementById('lf').classList.remove('show');
  show('game');
  running=true;
  lastT=performance.now();
  rafId=requestAnimationFrame(loop);
}

function endGame(){
  running=false;cancelAnimationFrame(rafId);
  sOver();
  try{if(score>best){best=score;localStorage.setItem('hxb3',String(best));}}catch(e){}
  document.getElementById('es').textContent=score.toLocaleString('en-US');
  const s=score>=30?3:score>=12?2:score>=4?1:0;
  const sr=document.getElementById('sr');sr.innerHTML='';
  for(let i=0;i<3;i++){
    const on=i<s;const d=document.createElement('div');d.className='star'+(on?' on':'');
    d.innerHTML=`<svg viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="${on?'#f5c842':'#1e2a3a'}" stroke="${on?'#c07a00':'#2e4060'}" stroke-width="1.5"/></svg>`;
    sr.appendChild(d);
    if(on)setTimeout(()=>d.querySelector('svg').style.transform='scale(1.25) rotate(-8deg)',i*160+200);
  }
  document.getElementById('bl').textContent=best>0?'أفضل نتيجة: '+best.toLocaleString('en-US'):'';
  setTimeout(()=>show('end'),300);
}

/* ══════════════════════════════
   BUTTONS
══════════════════════════════ */
function addBtn(id,fn){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();getAC();fn();},{passive:false});
  el.addEventListener('mousedown',e=>{e.preventDefault();fn();});
}
addBtn('btn-start',startGame);
addBtn('btn-replay',startGame);

})();
</script>
