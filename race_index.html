<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>سباق الخريف</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --p1:#ff5436; --p2:#37a9ff; --gold:#ffc24b; --ink:#f4ecdd; --bg:#1a1410;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Cairo',system-ui,sans-serif;background:var(--bg);color:var(--ink);height:100dvh;position:relative;touch-action:none}
  #c3d{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;display:block}

  /* top HUD */
  #hud{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 14px 0;pointer-events:none}
  .tag{font-family:'Oswald',sans-serif;font-weight:700;font-size:.8rem;padding:5px 12px;border-radius:12px;background:rgba(0,0,0,.4);backdrop-filter:blur(4px)}
  .tag.p1{color:var(--p1)} .tag.p2{color:var(--p2)}
  #spd{font-family:'Oswald',sans-serif;font-size:1.1rem;color:var(--gold);text-align:center;background:rgba(0,0,0,.4);padding:4px 14px;border-radius:12px;backdrop-filter:blur(4px)}
  #spd small{font-size:.6rem;color:rgba(255,255,255,.5);display:block;letter-spacing:1px}

  /* progress bar */
  #prog{position:absolute;top:60px;left:14px;right:14px;z-index:10;height:8px;border-radius:99px;background:rgba(0,0,0,.4);overflow:visible}
  #prog .me,#prog .op{position:absolute;top:50%;width:18px;height:18px;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.5);transition:left .15s linear;font-size:11px;display:flex;align-items:center;justify-content:center}
  #prog .me{background:var(--p1);z-index:2}
  #prog .op{background:var(--p2);z-index:1}
  #prog .flag{position:absolute;right:-2px;top:50%;transform:translateY(-50%);font-size:14px}

  /* countdown */
  #count{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;pointer-events:none}
  #count.show{display:flex}
  #countN{font-family:'Oswald',sans-serif;font-weight:700;font-size:6rem;color:var(--gold);text-shadow:0 4px 20px rgba(0,0,0,.6);animation:cnt .9s ease}
  @keyframes cnt{0%{transform:scale(2);opacity:0}30%{transform:scale(1);opacity:1}100%{transform:scale(.7);opacity:0}}

  /* controls */
  #controls{position:absolute;bottom:0;left:0;right:0;z-index:20;display:flex;justify-content:space-between;align-items:flex-end;padding:0 20px calc(24px + env(safe-area-inset-bottom));pointer-events:none;direction:ltr}

  /* steering: force LTR so the left arrow is physically on the left */
  .steer{display:flex;gap:14px;pointer-events:auto;direction:ltr}
  .skey{width:78px;height:78px;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.05));
    border:1.5px solid rgba(255,255,255,.25);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;
    color:#fff;box-shadow:0 6px 16px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.25);transition:.08s}
  .skey svg{width:34px;height:34px}
  .skey:active,.skey.on{background:rgba(255,194,75,.35);border-color:var(--gold);transform:scale(.92)}

  /* pedals: tall, angled, car-pedal feel */
  .pedals{display:flex;gap:14px;pointer-events:auto;align-items:flex-end}
  .pedal{width:72px;height:108px;border-radius:16px 16px 14px 14px;position:relative;display:flex;align-items:flex-end;justify-content:center;
    padding-bottom:12px;box-shadow:0 8px 18px rgba(0,0,0,.45),inset 0 2px 0 rgba(255,255,255,.18);transition:.08s;
    border:1.5px solid rgba(255,255,255,.18)}
  .pedal::before{content:'';position:absolute;top:8px;left:9px;right:9px;height:34px;border-radius:9px;background:repeating-linear-gradient(0deg,rgba(255,255,255,.18) 0 4px,transparent 4px 9px)}
  .pedal .plabel{font-family:'Oswald',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.5px;color:#fff;z-index:1;text-shadow:0 1px 2px rgba(0,0,0,.5)}
  .pedal.gas{height:122px;background:linear-gradient(180deg,#3ee08f,#1f9a5a)}
  .pedal.brk{background:linear-gradient(180deg,#ff6b6b,#c0392b)}
  .pedal:active,.pedal.on{transform:translateY(5px) scaleY(.94);filter:brightness(1.2);box-shadow:0 3px 8px rgba(0,0,0,.4),inset 0 2px 0 rgba(255,255,255,.18)}

  /* overlay */
  #ov{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,8,5,.92);text-align:center;padding:30px}
  #ov.hide{display:none}
  #ov .emo{font-size:3.6rem;margin-bottom:10px}
  #ov h1{font-family:'Oswald',sans-serif;font-size:1.9rem;font-weight:700;margin-bottom:8px;color:var(--gold)}
  #ov p{font-size:.92rem;color:rgba(255,255,255,.6);margin-bottom:18px;line-height:1.6}
  .spinner{width:34px;height:34px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:sp 1s linear infinite;margin-bottom:16px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .btn{background:linear-gradient(180deg,var(--gold),#c8862a);color:#2a1606;border:none;padding:14px 42px;border-radius:16px;font-size:1rem;font-weight:900;font-family:'Cairo',sans-serif;box-shadow:0 8px 20px rgba(255,194,75,.35)}
  .btn:active{transform:translateY(2px)}
  #hint{position:absolute;bottom:120px;left:0;right:0;text-align:center;font-size:.74rem;color:rgba(255,255,255,.5);z-index:15;pointer-events:none;font-weight:700}
</style>
</head>
<body>
  <canvas id="c3d"></canvas>
  <div id="hitflash" style="position:fixed;inset:0;z-index:25;background:rgba(255,60,60,.0);pointer-events:none;transition:background .1s"></div>

  <div id="hud">
    <div class="tag p1" id="tagMe">أنت</div>
    <div id="spd"><small>السرعة</small><span id="spdN">0</span></div>
    <div class="tag p2" id="tagOp">الخصم</div>
  </div>

  <div id="prog">
    <div class="flag">🏁</div>
    <div class="op" id="progOp">🚗</div>
    <div class="me" id="progMe">🏎️</div>
  </div>

  <div id="hint" style="display:none"></div>

  <div id="count"><div id="countN">3</div></div>

  <div id="controls">
    <div class="steer">
      <div class="skey" id="steerLeft"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="skey" id="steerRight"><svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
    <div class="pedals">
      <div class="pedal brk" id="brake"><span class="plabel">فرامل</span></div>
      <div class="pedal gas" id="gas"><span class="plabel">بنزين</span></div>

  <div id="ov">
    <div class="spinner" id="ovSpin"></div>
    <div class="emo" id="ovEmo" style="display:none"></div>
    <h1 id="ovTitle">جارٍ الاتصال...</h1>
    <p id="ovMsg">بانتظار خصمك للانضمام...</p>
    <button class="btn" id="ovBtn" style="display:none">سباق جديد</button>
  </div>

<script>
(function(){
"use strict";

/* ════════════════════════════════════════════════════════════════
   سباق الخريف — 2-player racing. Uses the supplied Car.obj model
   (loaded via OBJ/MTL loaders) on a procedural autumn track.
   Netcode: Firebase. Each car is simulated locally on its OWN device;
   each player broadcasts their car's position/heading/progress, and the
   opponent's car is smoothly interpolated. First to the finish wins.
   IMPORTANT: host Car.obj and Car.mtl in the SAME folder as this file.
   ════════════════════════════════════════════════════════════════ */

const params  = new URLSearchParams(window.location.search);
const ROOM_ID = params.get('room');
const MY_IDX  = parseInt(params.get('player') || '0', 10);
const IS_MP   = !!ROOM_ID;

const _fbConfig = {
  apiKey:"AIzaSyD3w3nzf89A7HYjtCsNkQjvVaCJqes0Jzs",
  authDomain:"ingames-9c93b.firebaseapp.com",
  databaseURL:"https://ingames-9c93b-default-rtdb.firebaseio.com",
  projectId:"ingames-9c93b",
  storageBucket:"ingames-9c93b.firebasestorage.app",
  messagingSenderId:"711825788462",
  appId:"1:711825788462:web:bf1e4a59d4d18a543f59bf"
};

// ── Track / race config ──
const TRACK_LEN   = 5000;   // metres of track to the finish (long race)
const LANE_W      = 9;      // half-width the car can move left/right
const MAX_SPEED   = 62;     // units/sec
const ACCEL       = 26;
const BRAKE       = 48;
const FRICTION    = 14;
const STEER       = 7;      // lateral speed
const SEG         = 6;      // track segment length for curve generation

// ── State ──
let me = { z:0, x:0, speed:0, heading:0, prog:0, finished:false, finishT:0, hitCool:0 };
let op = { z:0, x:0, speed:0, prog:0, finished:false, render:{x:0,z:0} };
let raceOn=false, started=false, _started=false, countdownDone=false;
let myColor = MY_IDX===0 ? 0xff5436 : 0x37a9ff;
let opColor = MY_IDX===0 ? 0x37a9ff : 0xff5436;

// ── Obstacles (deterministic — identical for both players) ──
// Each: {z, x, w} placed down the straight road. Hitting one slows the car.
const OBST_HALF = 1.8;          // obstacle half-width for collision
const HIT_SLOW  = 0.35;         // speed kept after a hit (35%)
let obstacles=[];
function buildObstacles(){
  obstacles=[];
  // pseudo-random but fixed layout so both players face the same challenge
  let seed=20250531;
  const rnd=()=>{ seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff; };
  for(let z=90; z<TRACK_LEN-60; z+=Math.round(55+rnd()*40)){
    const lanes=[-6,-3,0,3,6];
    const x=lanes[Math.floor(rnd()*lanes.length)];
    obstacles.push({ z, x, mesh:null });
    // occasionally a second obstacle in the same band, different lane
    if(rnd()>0.6){ let x2; do{ x2=lanes[Math.floor(rnd()*lanes.length)]; }while(x2===x);
      obstacles.push({ z:z+10, x:x2, mesh:null }); }
  }
}

// Straight track. curveAt is always 0 (road runs straight down +Z), which
// removes the camera-swing glitches that came from following a bending curve.
function buildCurve(){ /* straight track — nothing to build */ }
function curveAt(z){ return 0; }
function curveTangent(z){ return 0; }

// ── DOM ──
const ovEl=document.getElementById('ov');
const spdN=document.getElementById('spdN');
const progMe=document.getElementById('progMe'), progOp=document.getElementById('progOp');

/* ════════════ THREE scene ════════════ */
let renderer,scene,camera,carMe,carOp,roadMesh,roadGeo;
let treePool=[];
function buildScene(){
  const cv=document.getElementById('c3d');
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:false,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(devicePixelRatio,1.5)); // cap for mobile perf
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0xc9a06a);   // misty autumn haze
  // tighter fog = we can cull/draw less distance
  scene.fog=new THREE.Fog(0xc9a06a, 50, 180);

  camera=new THREE.PerspectiveCamera(62,1,0.1,260);
  resize();

  scene.add(new THREE.HemisphereLight(0xfff0d8, 0x6b4a2a, 1.15));
  const sun=new THREE.DirectionalLight(0xffd9a0,1.0); sun.position.set(30,60,20); scene.add(sun);

  // ground plane (autumn earth)
  const ground=new THREE.Mesh(new THREE.PlaneGeometry(600,TRACK_LEN+600),
    new THREE.MeshStandardMaterial({color:0x6e4a28,roughness:1}));
  ground.rotation.x=-Math.PI/2; ground.position.z=TRACK_LEN/2; ground.position.y=-0.05; scene.add(ground);

  // road ribbon: build a strip mesh following the curve
  buildRoad();

  // Roadside trees via InstancedMesh — ONE draw call for all trunks and ONE
  // for all leaves, instead of hundreds of meshes (this was the main lag).
  buildTrees();

  // Obstacles: hazard barriers down the road (instanced → cheap).
  buildObstacleMeshes();

  // finish gate
  const gate=new THREE.Group();
  for(const sx of [-1,1]){ const p=new THREE.Mesh(new THREE.BoxGeometry(1,8,1),
    new THREE.MeshStandardMaterial({color:0xeeeeee})); p.position.set(sx*(LANE_W+1),4,0); gate.add(p); }
  const bar=new THREE.Mesh(new THREE.BoxGeometry((LANE_W+1)*2,1.4,1),
    new THREE.MeshStandardMaterial({color:0x222222})); bar.position.y=7.5; gate.add(bar);
  gate.position.set(curveAt(TRACK_LEN),0,TRACK_LEN); scene.add(gate);

  loadCars();
  addEventListener('resize',resize);
  addEventListener('orientationchange',()=>setTimeout(resize,120));
  // mobile WebViews sometimes report a stale size at load; re-fit after layout settles
  setTimeout(resize,60); setTimeout(resize,300); setTimeout(resize,800);
  requestAnimationFrame(loop);
}
function resize(){
  const cv=document.getElementById('c3d');
  // use the actual painted size of the canvas element (handles narrow phone
  // viewports and WebView chrome better than raw innerWidth/innerHeight)
  const w=cv.clientWidth||innerWidth, h=cv.clientHeight||innerHeight;
  renderer.setSize(w,h,false);
  if(camera){ camera.aspect=w/h; camera.updateProjectionMatrix(); }
}

function buildRoad(){
  const verts=[], idx=[]; let vi=0;
  for(let z=0; z<=TRACK_LEN+100; z+=SEG){
    const cx=curveAt(z);
    verts.push(cx-LANE_W-1.5, 0.02, z); verts.push(cx+LANE_W+1.5, 0.02, z);
    if(z>0){ idx.push(vi-2,vi-1,vi, vi-1,vi+1,vi); }
    vi+=2;
  }
  roadGeo=new THREE.BufferGeometry();
  roadGeo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  roadGeo.setIndex(idx); roadGeo.computeVertexNormals();
  roadMesh=new THREE.Mesh(roadGeo,new THREE.MeshStandardMaterial({color:0x2b2b30,roughness:.9}));
  scene.add(roadMesh);
  // dashed centre line — ONE merged geometry instead of ~130 meshes
  const dv=[], di=[]; let dvi=0;
  for(let z=4; z<TRACK_LEN; z+=12){
    const cx=curveAt(z);
    const x0=cx-0.2, x1=cx+0.2, z0=z-2, z1=z+2, y=0.05;
    dv.push(x0,y,z0, x1,y,z0, x0,y,z1, x1,y,z1);
    di.push(dvi,dvi+1,dvi+2, dvi+1,dvi+3,dvi+2); dvi+=4;
  }
  const dGeo=new THREE.BufferGeometry();
  dGeo.setAttribute('position',new THREE.Float32BufferAttribute(dv,3)); dGeo.setIndex(di);
  scene.add(new THREE.Mesh(dGeo,new THREE.MeshBasicMaterial({color:0xe8d8a0})));
}

// Instanced roadside trees: 1 draw call for trunks, 1 for leaves.
function buildTrees(){
  const positions=[];
  for(let z=24; z<TRACK_LEN; z+=20){
    for(const side of [-1,1]){
      const cx=curveAt(z)+side*(LANE_W+7+ (z%13));
      const s=0.8+((z*7)%10)/14;
      positions.push({x:cx,z,s,leaf:[0xd8772a,0xc0392b,0xe0a32e,0x8a5a1e][(z+ (side>0?1:0))%4]});
    }
  }
  const N=positions.length;
  const trunkGeo=new THREE.CylinderGeometry(0.5,0.7,4,6);
  const leafGeo=new THREE.ConeGeometry(3.0,6,7);
  const trunkMat=new THREE.MeshStandardMaterial({color:0x4a3320,roughness:1});
  const leafMat=new THREE.MeshStandardMaterial({roughness:1,vertexColors:true});
  const trunks=new THREE.InstancedMesh(trunkGeo,trunkMat,N);
  const leaves=new THREE.InstancedMesh(leafGeo,leafMat,N);
  const m=new THREE.Matrix4(), col=new THREE.Color();
  positions.forEach((p,i)=>{
    m.makeScale(p.s,p.s,p.s); m.setPosition(p.x,2*p.s,p.z); trunks.setMatrixAt(i,m);
    m.makeScale(p.s,p.s,p.s); m.setPosition(p.x,6*p.s,p.z); leaves.setMatrixAt(i,m);
    leaves.setColorAt(i,col.setHex(p.leaf));
  });
  trunks.instanceMatrix.needsUpdate=true; leaves.instanceMatrix.needsUpdate=true;
  if(leaves.instanceColor) leaves.instanceColor.needsUpdate=true;
  scene.add(trunks); scene.add(leaves);
}

// Hazard barriers: striped blocks the cars must dodge. Instanced = 1 draw call.
function buildObstacleMeshes(){
  if(!obstacles.length) buildObstacles();
  const N=obstacles.length;
  const geo=new THREE.BoxGeometry(OBST_HALF*2, 1.6, 1.6);
  const mat=new THREE.MeshStandardMaterial({color:0xffb030,roughness:.7,emissive:0x3a2200});
  const inst=new THREE.InstancedMesh(geo,mat,N);
  const m=new THREE.Matrix4();
  obstacles.forEach((o,i)=>{ m.makeTranslation(o.x, 0.8, o.z); inst.setMatrixAt(i,m); });
  inst.instanceMatrix.needsUpdate=true;
  scene.add(inst);
  // a thin red top stripe row for visibility (single instanced mesh)
  const topGeo=new THREE.BoxGeometry(OBST_HALF*2, 0.4, 1.6);
  const topMat=new THREE.MeshStandardMaterial({color:0xc0392b});
  const top=new THREE.InstancedMesh(topGeo,topMat,N);
  obstacles.forEach((o,i)=>{ m.makeTranslation(o.x, 1.8, o.z); top.setMatrixAt(i,m); });
  top.instanceMatrix.needsUpdate=true; scene.add(top);
}

// placeholder cars (shown until OBJ loads, and as fallback if it fails)
function placeholderCar(color){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(2,1,4.4),
    new THREE.MeshStandardMaterial({color,roughness:.5,metalness:.3})); body.position.y=.8; g.add(body);
  const cab=new THREE.Mesh(new THREE.BoxGeometry(1.7,.8,2),
    new THREE.MeshStandardMaterial({color:0x222228})); cab.position.set(0,1.5,-.2); g.add(cab);
  for(const sx of [-1,1]) for(const sz of [-1.4,1.4]){
    const w=new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,.4,12),
      new THREE.MeshStandardMaterial({color:0x111})); w.rotation.z=Math.PI/2; w.position.set(sx*1.05,.5,sz); g.add(w);
  }
  return g;
}

function loadCars(){
  // start with placeholders so the race can begin instantly
  carMe=placeholderCar(myColor); scene.add(carMe);
  carOp=placeholderCar(opColor); scene.add(carOp);
  // try to load the real model and swap it in
  try{
    const mtl=new THREE.MTLLoader();
    mtl.load('Car.mtl', (materials)=>{
      materials.preload();
      const obj=new THREE.OBJLoader(); obj.setMaterials(materials);
      obj.load('Car.obj', (root)=>{
        // normalise: model length on Z (~4.66), sits on ground already
        root.scale.setScalar(1.0);
        swapCar('me', root, myColor);
      }, undefined, ()=>{/* keep placeholder */});
    }, undefined, ()=>{/* MTL failed: try OBJ alone */
      new THREE.OBJLoader().load('Car.obj',(root)=>{ swapCar('me',root,myColor); },undefined,()=>{});
    });
  }catch(e){ /* loaders missing → keep placeholders */ }
}
function swapCar(which, root, color){
  // clone for both players, tint the Body material per player
  const mk=(tint)=>{
    const c=root.clone(true);
    c.traverse(n=>{ if(n.isMesh){ n.material=n.material.clone();
      // tint the main body; leave wheels/glass/black trims
      if(n.material.name==='Body' || /body/i.test(n.material.name)) n.material.color.setHex(tint);
    }});
    return c;
  };
  const newMe=mk(myColor), newOp=mk(opColor);
  if(carMe){scene.remove(carMe);} if(carOp){scene.remove(carOp);}
  carMe=newMe; carOp=newOp; scene.add(carMe); scene.add(carOp);
}

/* ════════════ controls ════════════ */
const input={gas:false,brake:false,left:false,right:false};
function bind(id,key){ const el=document.getElementById(id);
  const on=e=>{e.preventDefault();input[key]=true;el.classList.add('on');};
  const off=e=>{e.preventDefault();input[key]=false;el.classList.remove('on');};
  el.addEventListener('touchstart',on,{passive:false}); el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off); el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off);
}
bind('gas','gas'); bind('brake','brake'); bind('steerLeft','right'); bind('steerRight','left');
addEventListener('keydown',e=>{ if(e.code==='ArrowUp')input.gas=true; if(e.code==='ArrowDown')input.brake=true; if(e.code==='ArrowLeft')input.left=true; if(e.code==='ArrowRight')input.right=true; });
addEventListener('keyup',e=>{ if(e.code==='ArrowUp')input.gas=false; if(e.code==='ArrowDown')input.brake=false; if(e.code==='ArrowLeft')input.left=false; if(e.code==='ArrowRight')input.right=false; });

/* ════════════ sim + render loop ════════════ */
let last=performance.now(), netAccum=0;
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now(), dt=Math.min(.05,(now-last)/1000); last=now;

  // keep the canvas matched to its container (covers WebViews that don't fire
  // resize events when the surface size changes)
  const cv=renderer.domElement;
  if(cv.width!==Math.floor(cv.clientWidth*renderer.getPixelRatio()) ||
     cv.height!==Math.floor(cv.clientHeight*renderer.getPixelRatio())){
    if(cv.clientWidth>0 && cv.clientHeight>0) resize();
  }

  if(raceOn && !me.finished){
    // speed
    if(input.gas) me.speed += ACCEL*dt;
    else me.speed -= FRICTION*dt;
    if(input.brake) me.speed -= BRAKE*dt;
    me.speed=Math.max(0,Math.min(MAX_SPEED,me.speed));
    // steer (only when moving)
    const steerAmt = STEER * (me.speed/MAX_SPEED + 0.2);
    if(input.left)  me.x -= steerAmt*dt* (input.gas?6:3);
    if(input.right) me.x += steerAmt*dt* (input.gas?6:3);
    me.x=Math.max(-LANE_W,Math.min(LANE_W,me.x));
    // advance
    me.z += me.speed*dt;
    me.prog = Math.min(1, me.z/TRACK_LEN);

    // obstacle collision — if our car overlaps a barrier, slow hard + flash
    if(me.hitCool>0) me.hitCool-=dt;
    else {
      for(const o of obstacles){
        if(Math.abs(o.z-me.z)<2.2 && Math.abs(o.x-me.x)<(OBST_HALF+1.0)){
          me.speed*=HIT_SLOW; me.hitCool=0.8;
          flashHit();
          break;
        }
      }
    }

    // heading visual tilt from steering
    me.heading = (input.left?-0.12:input.right?0.12:0);
    if(me.z>=TRACK_LEN){ me.finished=true; me.finishT=Date.now(); onIFinished(); }
  }

  // place my car (world x = lane offset + track curve), facing along the turn
  if(carMe){
    const wx=curveAt(me.z)+me.x;
    carMe.position.set(wx, 0, me.z);
    const tang=curveTangent(me.z);               // track bend direction here
    const yaw=Math.PI + Math.atan(tang) + me.heading*0.4;
    carMe.rotation.set(0, yaw, -me.heading*0.4); // bank into the steer
  }
  // opponent car: smooth toward last known net position, also facing the turn
  if(carOp){
    const targX=curveAt(op.z)+op.x;
    op.render.x += (targX - op.render.x)*Math.min(1,dt*8);
    if(op.render.z===0) op.render.z=op.z;
    op.render.z += (op.z - op.render.z)*Math.min(1,dt*8);
    carOp.position.set(op.render.x, 0, op.render.z);
    carOp.rotation.set(0, Math.PI + Math.atan(curveTangent(op.render.z)), 0);
  }

  // chase camera behind my car. Straight track, so a simple follow. Looking
  // closer/lower lifts the car higher in the frame, clear of the bottom pedals.
  if(carMe){
    const back=13;
    camera.position.set(me.x*0.5, 9, me.z-back);
    camera.lookAt(me.x*0.4, 0.4, me.z+4);
  }

  // HUD
  spdN.textContent=Math.round(me.speed*4);
  progMe.style.left=(4+me.prog*92)+'%';
  progOp.style.left=(4+op.prog*92)+'%';

  // network: broadcast my position ~12/sec
  netAccum+=dt;
  if(IS_MP && raceOn && netAccum>0.08){ netAccum=0; sendPos(); }

  renderer.render(scene,camera);
}

/* ════════════ race flow ════════════ */
function startCountdown(){
  document.getElementById('count').classList.add('show');
  const el=document.getElementById('countN'); let n=3;
  el.textContent=n;
  const iv=setInterval(()=>{
    n--;
    if(n===0){ el.textContent='انطلق!'; el.style.animation='none'; void el.offsetWidth; el.style.animation='cnt .9s ease'; }
    else if(n<0){ clearInterval(iv); document.getElementById('count').classList.remove('show'); raceOn=true; }
    else { el.textContent=n; el.style.animation='none'; void el.offsetWidth; el.style.animation='cnt .9s ease'; }
  },900);
}

function onIFinished(){
  sendPos(); // final position
  if(IS_MP) sendEvent({type:'FINISH', t:me.finishT});
  checkResult();
}
function checkResult(){
  if(!me.finished) return;
  // if opponent already finished, compare; else I finished first → likely win
  setTimeout(()=>{
    let title, emo;
    if(op.finished){
      const iWon = me.finishT <= op.finishT;
      title=iWon?'فزت بالسباق! 🏆':'وصلت ثانياً'; emo=iWon?'🏆':'🏁';
    } else {
      title='أنهيت السباق!'; emo='🏁';
    }
    showOverlay({emo,title,msg:'',btn:'سباق جديد'});
    if(IS_MP && typeof FlutterBridge!=='undefined'){ try{FlutterBridge.postMessage('gameOver');}catch(e){} }
  }, op.finished?100:400);
}

/* ════════════ netcode ════════════ */
let _db=null,_roomRef=null,_connectedAt=0;
function sendPos(){ if(!_roomRef) return;
  _roomRef.child('pos/'+MY_IDX).set({ z:me.z, x:me.x, spd:me.speed, prog:me.prog, fin:me.finished, from:MY_IDX, ts:Date.now() });
}
function sendEvent(ev){ if(_roomRef) _roomRef.child('ev').set({...ev,from:MY_IDX,ts:Date.now()}); }

async function initFirebase(){
  if(!IS_MP){ // solo time-trial
    hideOverlay(); startCountdown(); return;
  }
  try{
    const app=firebase.initializeApp(_fbConfig);
    await firebase.auth(app).signInAnonymously();
    _db=firebase.database(app);
    _roomRef=_db.ref('rooms/'+ROOM_ID+'/race');
    _connectedAt=Date.now();

    _roomRef.child('players/'+MY_IDX).set(true);
    try{ _roomRef.child('players/'+MY_IDX).onDisconnect().remove(); }catch(e){}

    // opponent position
    _roomRef.child('pos/'+(1-MY_IDX)).on('value',snap=>{
      const p=snap.val(); if(!p) return;
      op.z=p.z; op.x=p.x; op.speed=p.spd||0; op.prog=p.prog||0;
      if(p.fin && !op.finished){ op.finished=true; op.finishT=p.ts; }
    });
    // events (finish, start, rematch)
    _roomRef.child('ev').on('value',snap=>{
      const ev=snap.val(); if(!ev||ev.from===MY_IDX) return;
      if(!ev.ts||ev.ts<_connectedAt) return;
      if(ev.type==='FINISH'){ if(!op.finished){op.finished=true;op.finishT=ev.t;} checkResult(); }
      if(ev.type==='GO'){ if(!started){started=true; hideHint(); startCountdown();} }
      if(ev.type==='REMATCH'){ doRematch(); }
      if(ev.type==='REMATCH_REQ' && MY_IDX===0){ sendEvent({type:'REMATCH'}); doRematch(); }
    });

    _roomRef.child('players').on('value',snap=>{
      const count=Object.keys(snap.val()||{}).length;
      if(count>=2 && !_started){
        _started=true; _roomRef.child('players').off('value');
        hideOverlay();
        // Both players use the SAME fixed track (built at boot), so no seed
        // exchange is needed — the host just starts the synchronized countdown.
        if(MY_IDX===0){ sendEvent({type:'GO'}); started=true; startCountdown(); }
        else { showHint('بانتظار بدء السباق...'); }
      }
    });
  }catch(e){ console.error(e); showOverlay({emo:'⚠️',title:'تعذّر الاتصال',msg:'حاول مرة أخرى'}); }
}

/* overlay */
function showOverlay(o){
  document.getElementById('ovSpin').style.display=o.spin?'block':'none';
  const e=document.getElementById('ovEmo'); e.style.display=o.emo?'block':'none'; e.textContent=o.emo||'';
  document.getElementById('ovTitle').textContent=o.title||'';
  document.getElementById('ovMsg').textContent=o.msg||'';
  const b=document.getElementById('ovBtn'); b.style.display=o.btn?'inline-block':'none'; b.textContent=o.btn||'';
  ovEl.classList.remove('hide');
}
function hideOverlay(){ ovEl.classList.add('hide'); }
function showHint(t){ const h=document.getElementById('hint'); h.style.display='block'; h.textContent=t; }
function hideHint(){ document.getElementById('hint').style.display='none'; }
function flashHit(){
  const f=document.getElementById('hitflash');
  f.style.background='rgba(255,60,60,.35)';
  setTimeout(()=>{ f.style.background='rgba(255,60,60,0)'; },110);
}

document.getElementById('ovBtn').addEventListener('click',()=>{
  if(IS_MP){
    if(MY_IDX===0){ sendEvent({type:'REMATCH'}); doRematch(); }
    else { showOverlay({spin:true,title:'بانتظار المضيف...'}); sendEvent({type:'REMATCH_REQ'}); }
  } else { doRematch(); }
});
function doRematch(){
  me={z:0,x:0,speed:0,heading:0,prog:0,finished:false,finishT:0,hitCool:0};
  op={z:0,x:0,speed:0,prog:0,finished:false,render:{x:0,z:0}};
  raceOn=false;
  hideOverlay(); hideHint();
  startCountdown();
}

/* ── boot ──
   Build the curve FIRST (default seed) so the scene's road/trees use it,
   then build the scene, then connect. The host re-seeds on match start;
   for the prototype the visual track stays the default layout but the
   race distance/finish is identical, so it stays fair.                     */
buildCurve();
buildObstacles();
buildScene();
initFirebase();

})();
</script>
