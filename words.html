<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>كلمات المناظر</title>
<style>
/* ── System Arabic fonts only — zero network requests ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1f3c;font-family:'Noto Kufi Arabic','Segoe UI',Tahoma,Arial,sans-serif;direction:rtl}

#root{
  width:100vw;height:100vh;
  display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(170deg,#1a4a7a 0%,#0d2a52 40%,#071830 100%);
  overflow:hidden;
  position:relative;
}

/* ── Stars BG (pure CSS, no JS) ── */
#root::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle,rgba(255,255,255,0.6) 1px,transparent 1px),
    radial-gradient(circle,rgba(255,255,255,0.3) 1px,transparent 1px);
  background-size:60px 60px,100px 100px;
  background-position:0 0,30px 30px;
  opacity:0.18;pointer-events:none;
}

/* ── Header ── */
#hdr{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px 4px;
  flex-shrink:0;
}
.badge{
  background:rgba(0,0,0,0.35);border-radius:16px;
  padding:4px 10px;color:#fff;font-size:13px;font-weight:700;
  display:flex;align-items:center;gap:4px;
}
.badge .v{color:#ffd700}

/* ── Title ── */
#ttl{
  color:#fff;font-size:clamp(18px,5vw,26px);font-weight:900;
  letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,0.4);
  flex-shrink:0;margin-bottom:2px;
}

/* ── Progress ── */
#prog-wrap{width:55%;height:5px;background:rgba(255,255,255,0.15);border-radius:10px;overflow:hidden;flex-shrink:0;margin-bottom:4px}
#prog-fill{height:100%;background:#ffd700;border-radius:10px;transition:width .4s}

/* ── Answer row ── */
#ans-row{
  display:flex;gap:6px;justify-content:center;
  flex-shrink:0;margin-bottom:6px;
  min-height:48px;align-items:center;
}
.slot{
  width:44px;height:44px;border-radius:10px;
  background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;color:#fff;
  transition:all .2s;
}
.slot.filled{background:#5b21b6;border-color:#a78bfa;transform:scale(1.05)}
.slot.ok{background:#16a34a;border-color:#4ade80;animation:pop .35s cubic-bezier(.34,1.56,.64,1)}
.slot.bad{background:#dc2626;border-color:#f87171;animation:shake .35s}
@keyframes pop{0%{transform:scale(.8)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ── Found words ── */
#found-row{
  display:flex;flex-wrap:wrap;gap:4px;justify-content:center;
  max-width:96%;flex-shrink:0;min-height:24px;
}
.fw-tag{
  background:rgba(255,255,255,0.15);border-radius:12px;
  padding:2px 10px;color:#a5f3fc;font-size:12px;font-weight:700;
}

/* ── Wheel ── */
#wheel-wrap{
  position:relative;
  flex:1;display:flex;align-items:center;justify-content:center;
  min-height:0;
}
#wheel{
  position:relative;
  /* size set by JS based on available space */
}
#wbg{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);
  border:1.5px solid rgba(255,255,255,0.15);
}
#wsvg{position:absolute;inset:0;pointer-events:none}
#wcenter{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.7);font-size:20px;cursor:pointer;
  z-index:5;
}
.lbtn{
  position:absolute;border-radius:50%;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#1e1b4b;cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,0.3);
  border:2.5px solid rgba(255,255,255,0.8);
  transition:transform .12s,background .12s;
  z-index:3;user-select:none;
}
.lbtn.on{background:#7c3aed;color:#fff;border-color:#c4b5fd;transform:scale(1.12)}

/* ── Controls ── */
#ctrls{
  display:flex;gap:12px;justify-content:center;
  flex-shrink:0;padding:6px 0 10px;
}
.ctrl-btn{
  background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.18);
  border-radius:50%;width:52px;height:52px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;font-size:10px;font-weight:700;cursor:pointer;gap:1px;
}
.ctrl-btn .ic{font-size:18px}
.ctrl-btn.hint-c .ic{color:#fbbf24}
.ctrl-btn.hint-c .cost{color:#f87171;font-size:9px}

/* ── Toast ── */
#toast{
  position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(10,10,20,0.9);color:#fff;border-radius:20px;
  padding:7px 18px;font-size:13px;font-weight:700;
  opacity:0;pointer-events:none;transition:all .25s;z-index:50;
  white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Level complete ── */
#lc{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#lc.on{display:flex}
#lc h2{color:#ffd700;font-size:30px;font-weight:900;text-shadow:0 0 20px #ffd700}
#lc .stars{font-size:40px}
#lc-btn{
  background:#7c3aed;color:#fff;border:none;border-radius:20px;
  padding:12px 36px;font-size:17px;font-weight:900;cursor:pointer;
  font-family:inherit;
}
</style>
</head>
<body>
<div id="root">
  <div id="hdr">
    <div class="badge"><span>🪙</span><span class="v" id="coins">100</span></div>
    <div class="badge"><span>🐱</span><span>مستوى <span id="lvlnum">1</span></span></div>
  </div>

  <div id="ttl">كلمات المناظر</div>
  <div id="prog-wrap"><div id="prog-fill" style="width:0%"></div></div>

  <div id="ans-row"></div>
  <div id="found-row"></div>

  <div id="wheel-wrap">
    <div id="wheel">
      <div id="wbg"></div>
      <svg id="wsvg"></svg>
      <div id="wcenter">✓</div>
    </div>
  </div>

  <div id="ctrls">
    <div class="ctrl-btn hint-c" onclick="useHint()">
      <span class="ic">💡</span><span>تلميح</span><span class="cost">-100</span>
    </div>
    <div class="ctrl-btn" onclick="clearSel()">
      <span class="ic">↺</span><span>مسح</span>
    </div>
    <div class="ctrl-btn" onclick="shuffleWheel()">
      <span class="ic">🔀</span><span>خلط</span>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="lc">
  <div class="stars">⭐⭐⭐</div>
  <h2>أحسنت! 🎉</h2>
  <button id="lc-btn" onclick="nextLevel()">المستوى التالي ←</button>
</div>

<script>
const LEVELS=[
  {letters:['ب','ا','ب'],words:['باب']},
  {letters:['ق','م','ر'],words:['قمر','مرق']},
  {letters:['ب','ي','ت'],words:['بيت']},
  {letters:['ش','م','س'],words:['شمس']},
  {letters:['ن','و','ر'],words:['نور']},
  {letters:['ك','ت','ا','ب'],words:['كتاب','كتب','تاب']},
  {letters:['ح','ل','م'],words:['حلم','ملح','لحم']},
  {letters:['ف','ر','ح'],words:['فرح','حرف']},
  {letters:['ع','ل','م'],words:['علم','لمع']},
  {letters:['س','ل','م'],words:['سلم','ملس','لمس']},
  {letters:['د','ر','س'],words:['درس','سرد']},
  {letters:['م','ل','ك'],words:['ملك','لكم','كلم']},
];

let lvl=0,coins=100,sel=[],found=new Set(),LD=null;
let wheelSize=200;

function calcWheelSize(){
  const wrap=document.getElementById('wheel-wrap');
  const h=wrap.offsetHeight;
  const w=wrap.offsetWidth;
  wheelSize=Math.min(w,h)*0.88;
  if(wheelSize<140)wheelSize=140;
  if(wheelSize>280)wheelSize=280;
}

function initLvl(){
  LD=LEVELS[lvl%LEVELS.length];
  sel=[];found.clear();
  document.getElementById('lvlnum').textContent=lvl+1;
  document.getElementById('coins').textContent=coins;
  document.getElementById('found-row').innerHTML='';
  document.getElementById('lc').classList.remove('on');
  calcWheelSize();
  buildAnsRow();
  buildWheel();
  updateProg();
}

function buildAnsRow(){
  const row=document.getElementById('ans-row');
  row.innerHTML='';
  const maxL=Math.max(...LD.words.map(w=>w.length));
  for(let i=0;i<maxL;i++){
    const s=document.createElement('div');
    s.className='slot';s.id='s'+i;
    row.appendChild(s);
  }
  updateSlots();
}

function updateSlots(){
  const maxL=Math.max(...LD.words.map(w=>w.length));
  for(let i=0;i<maxL;i++){
    const s=document.getElementById('s'+i);
    if(!s)continue;
    if(i<sel.length){s.textContent=LD.letters[sel[i]];s.className='slot filled';}
    else{s.textContent='';s.className='slot';}
  }
}

function buildWheel(){
  const wheel=document.getElementById('wheel');
  const sz=wheelSize;
  wheel.style.width=sz+'px';wheel.style.height=sz+'px';
  document.getElementById('wsvg').setAttribute('viewBox',`0 0 ${sz} ${sz}`);
  document.getElementById('wsvg').setAttribute('width',sz);
  document.getElementById('wsvg').setAttribute('height',sz);
  wheel.querySelectorAll('.lbtn').forEach(e=>e.remove());

  const n=LD.letters.length;
  const cx=sz/2,cy=sz/2,r=sz*0.34;
  const btnSz=sz*0.2;

  LD.letters.forEach((lt,i)=>{
    const ang=(2*Math.PI*i/n)-Math.PI/2;
    const x=cx+r*Math.cos(ang);
    const y=cy+r*Math.sin(ang);
    const btn=document.createElement('div');
    btn.className='lbtn';btn.id='lb'+i;btn.textContent=lt;
    btn.style.cssText=`width:${btnSz}px;height:${btnSz}px;left:${x-btnSz/2}px;top:${y-btnSz/2}px;font-size:${btnSz*0.4}px`;
    btn.addEventListener('click',()=>onLetter(i));
    wheel.appendChild(btn);
  });
}

function onLetter(i){
  if(sel.includes(i)){
    if(sel[sel.length-1]===i){sel.pop();document.getElementById('lb'+i).classList.remove('on');}
    updateSlots();drawLines();return;
  }
  sel.push(i);
  document.getElementById('lb'+i).classList.add('on');
  updateSlots();drawLines();
  if(sel.length>=LD.letters.length)setTimeout(checkWord,180);
}

function drawLines(){
  const svg=document.getElementById('wsvg');
  svg.innerHTML='';
  if(sel.length<2)return;
  const sz=wheelSize,n=LD.letters.length;
  const cx=sz/2,cy=sz/2,r=sz*0.34;
  function pos(i){
    const a=(2*Math.PI*i/n)-Math.PI/2;
    return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};
  }
  const p0=pos(sel[0]);
  let d=`M${p0.x},${p0.y}`;
  for(let i=1;i<sel.length;i++){const p=pos(sel[i]);d+=` L${p.x},${p.y}`;}
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',d);path.setAttribute('stroke','rgba(255,255,255,0.65)');
  path.setAttribute('stroke-width','2.5');path.setAttribute('fill','none');
  path.setAttribute('stroke-linecap','round');
  svg.appendChild(path);
}

function clearSel(){
  sel.forEach(i=>document.getElementById('lb'+i)?.classList.remove('on'));
  sel=[];updateSlots();document.getElementById('wsvg').innerHTML='';
}

function checkWord(){
  const word=sel.map(i=>LD.letters[i]).join('');
  if(LD.words.includes(word)&&!found.has(word)){
    found.add(word);
    markSlots('ok',word);coins+=word.length*5;
    document.getElementById('coins').textContent=coins;
    updateProg();
    setTimeout(()=>{
      clearSel();
      addTag(word);
      if(found.size>=LD.words.length)setTimeout(()=>document.getElementById('lc').classList.add('on'),400);
    },500);
    showToast('ممتاز! 🎉');
  } else if(found.has(word)){
    showToast('وجدتها من قبل ✓');setTimeout(clearSel,350);
  } else{
    markSlots('bad','');showToast('حاول مجدداً 🤔');setTimeout(clearSel,450);
  }
}

function markSlots(cls,word){
  const maxL=Math.max(...LD.words.map(w=>w.length));
  for(let i=0;i<maxL;i++){
    const s=document.getElementById('s'+i);if(!s)continue;
    if(word&&i<word.length){s.className='slot '+cls;s.textContent=word[i];}
    else if(cls==='bad'&&i<sel.length){s.className='slot '+cls;}
    else{s.className='slot';s.textContent='';}
  }
}

function addTag(w){
  const t=document.createElement('div');t.className='fw-tag';t.textContent=w;
  document.getElementById('found-row').appendChild(t);
}

function updateProg(){
  const pct=LD?(found.size/LD.words.length)*100:0;
  document.getElementById('prog-fill').style.width=pct+'%';
}

function useHint(){
  if(coins<100){showToast('عملات غير كافية');return;}
  const u=LD.words.filter(w=>!found.has(w));
  if(!u.length){showToast('وجدت كل الكلمات!');return;}
  const first=u[0][0],idx=LD.letters.indexOf(first);
  coins-=100;document.getElementById('coins').textContent=coins;
  if(idx>=0){
    const b=document.getElementById('lb'+idx);
    if(b){b.style.background='#fbbf24';b.style.color='#000';
      setTimeout(()=>{b.style.background='';b.style.color='';},1000);}
  }
  showToast(`تلميح: تبدأ بـ "${first}"`);
}

function shuffleWheel(){
  const btns=document.querySelectorAll('.lbtn');
  const lts=[...LD.letters].sort(()=>Math.random()-.5);
  btns.forEach((b,i)=>b.textContent=lts[i]);
  clearSel();showToast('تم الخلط 🔀');
}

function nextLevel(){lvl++;initLvl();}

let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),1400);
}

document.getElementById('wcenter').addEventListener('click',()=>{if(sel.length>=2)checkWord();});
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key===' '){e.preventDefault();if(sel.length>=2)checkWord();}
  if(e.key==='Escape')clearSel();
});

window.addEventListener('resize',()=>{calcWheelSize();buildWheel();});
initLvl();
</script>
</body>
</html>
