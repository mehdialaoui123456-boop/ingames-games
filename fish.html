<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>القط يصطاد</title>
<style>
/* ── No Google Fonts: system Arabic stack ── */
:root {
  --water-top: #5bc8f5;
  --water-mid: #2d9fc9;
  --water-deep: #1a6b9a;
  --water-abyss: #0a2d4a;
  --gold: #f5c842;
  --gem: #60c8f0;
  --star: #f5a623;
  --fire: #ff6b35;
  --ui-bg: rgba(30,45,60,0.88);
  --ui-border: rgba(255,255,255,0.15);
  --btn-blue: #2979ff;
  --font: -apple-system, 'Segoe UI', Tahoma, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0a1a2e;
  touch-action: none;
}

/* ── Full-viewport game wrapper ── */
#game-wrap {
  position: fixed;
  inset: 0;
  overflow: hidden;
  font-family: var(--font);
}

/* ===== OCEAN ===== */
#ocean {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    var(--water-top) 0%,
    var(--water-mid) 35%,
    var(--water-deep) 65%,
    var(--water-abyss) 100%
  );
  overflow: hidden;
}

/* Fewer bubbles, CSS-only, will-change removed for WebView perf */
.bubble {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
  animation: bubbleRise linear infinite;
  pointer-events: none;
}
@keyframes bubbleRise {
  0%   { transform: translateY(0)    scale(1);   opacity: 0.5; }
  100% { transform: translateY(-110vh) scale(1.3); opacity: 0; }
}

/* ===== SURFACE / BOAT ===== */
#surface {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 13vh;
  background: linear-gradient(180deg, #a8d8ea 0%, #5bc8f5 100%);
  border-bottom: 2px solid rgba(255,255,255,0.3);
}

#boat {
  position: absolute;
  top: 1vh;
  left: 50%;
  transform: translateX(-50%);
  width: min(80px, 20vw);
  text-align: center;
  animation: boatRock 3s ease-in-out infinite;
}
@keyframes boatRock {
  0%,100% { transform: translateX(-50%) rotate(-2deg); }
  50%      { transform: translateX(-50%) rotate(2deg); }
}

/* ===== FISHING LINE ===== */
#fishing-line-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 5;
}

/* ===== HOOK ===== */
#hook {
  position: absolute;
  width: 22px; height: 22px;
  left: 50%;
  top: 12vh;
  transform: translateX(-50%);
  z-index: 10;
  cursor: pointer;
  transition: top 0.04s linear;
}

/* ===== FISH ===== */
.fish {
  position: absolute;
  cursor: pointer;
  z-index: 8;
  animation: fishSwim linear infinite;
  user-select: none;
}
.fish-body {
  font-size: clamp(24px, 6vw, 34px);
  display: block;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
}
@keyframes fishSwim {
  0%   { transform: translateX(-10vw); }
  100% { transform: translateX(110vw); }
}

/* ===== HUD ===== */
#hud {
  position: absolute;
  top: 1vh; left: 2vw;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 20;
}
.hud-stat {
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 10px;
  padding: 3px 8px;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: clamp(11px, 3vw, 14px);
  font-weight: 700;
  color: white;
  min-width: 60px;
}
.hud-stat .icon { font-size: clamp(13px, 3.5vw, 16px); }
.hud-gold { color: var(--gold); }
.hud-gem  { color: var(--gem); }
.hud-star { color: var(--star); }
.hud-fire { color: var(--fire); }

#shop-btn {
  position: absolute;
  top: 1vh; right: 2vw;
  z-index: 20;
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 12px;
  padding: 5px 12px;
  color: white;
  font-family: var(--font);
  font-size: clamp(11px, 3vw, 14px);
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ===== ZONES PANEL ===== */
#zones-panel {
  position: absolute;
  top: 20vh; right: 0;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 3px;
  width: min(140px, 38vw);
}
.zone-btn {
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 10px 0 0 10px;
  padding: 6px 8px;
  color: white;
  font-family: var(--font);
  font-size: clamp(10px, 2.8vw, 13px);
  font-weight: 700;
  cursor: pointer;
  text-align: right;
  transition: background 0.2s;
}
.zone-btn.active  { background: rgba(41,121,255,0.7); border-color: var(--btn-blue); }
.zone-btn.locked  { opacity: 0.75; cursor: not-allowed; }
.zone-cost        { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; font-size: 9px; opacity: 0.85; }
.zone-cost span   { display: flex; align-items: center; gap: 1px; }

/* ===== DEPTH METER ===== */
#depth-meter {
  position: absolute;
  right: min(142px, 40vw);
  top: 13vh;
  bottom: 18vh;
  width: 5px;
  z-index: 15;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
}
#depth-fill {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg, #2979ff, #60c8f0);
  border-radius: 3px;
  transition: height 0.3s;
}
#depth-label {
  position: absolute;
  right: min(150px, 42vw);
  bottom: 5px;
  z-index: 15;
  color: rgba(255,255,255,0.7);
  font-size: 10px; font-weight: 700;
  white-space: nowrap;
}

/* ===== STATUS BOX ===== */
#status-box {
  position: absolute;
  bottom: 18vh; left: 2vw;
  z-index: 20;
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 12px;
  padding: 6px 12px;
  color: white;
  font-size: clamp(11px, 3vw, 13px);
  line-height: 1.7;
}

/* ===== RETURN BTN ===== */
#return-btn {
  position: absolute;
  bottom: 10vh; left: 2vw;
  z-index: 20;
  background: var(--btn-blue);
  border: none;
  border-radius: 14px;
  padding: 9px 18px;
  color: white;
  font-family: var(--font);
  font-size: clamp(12px, 3.5vw, 15px);
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 14px rgba(41,121,255,0.5);
  -webkit-appearance: none;
}

/* ===== CATCH POPUP ===== */
#catch-popup {
  position: absolute;
  z-index: 50;
  background: rgba(10,20,40,0.94);
  border: 2px solid var(--gold);
  border-radius: 20px;
  padding: 14px 22px;
  color: white;
  text-align: center;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(0);
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
  min-width: min(180px, 60vw);
}
#catch-popup.show { transform: translate(-50%, -50%) scale(1); pointer-events: all; }
#catch-popup .fish-display { font-size: clamp(36px, 12vw, 52px); }
#catch-popup .fish-name  { font-size: clamp(14px, 4vw, 18px); font-weight: 900; margin: 4px 0; }
#catch-popup .fish-value { font-size: clamp(11px, 3vw, 14px); color: var(--gold); }
#catch-popup .fish-depth { font-size: clamp(10px, 2.5vw, 12px); color: rgba(255,255,255,0.6); }
#catch-popup-close {
  margin-top: 10px;
  background: var(--btn-blue);
  border: none; border-radius: 10px;
  padding: 6px 20px;
  color: white; font-family: var(--font);
  font-size: clamp(12px, 3vw, 14px);
  font-weight: 700; cursor: pointer;
}

/* ===== SHOP OVERLAY ===== */
#shop-overlay {
  position: absolute; inset: 0; z-index: 100;
  background: rgba(5,15,30,0.97);
  display: none;
  flex-direction: column;
  padding: 14px;
  gap: 8px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#shop-overlay.open { display: flex; }
#shop-title { color: white; font-size: clamp(16px,5vw,22px); font-weight: 900; text-align: center; margin-bottom: 4px; }
.shop-item {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 12px; color: white;
}
.shop-item .item-icon { font-size: clamp(24px,7vw,32px); }
.shop-item .item-info { flex: 1; }
.shop-item .item-name { font-size: clamp(12px,3.5vw,15px); font-weight: 700; }
.shop-item .item-desc { font-size: clamp(9px,2.5vw,11px); opacity: 0.65; margin-top: 2px; }
.shop-item .item-cost {
  background: rgba(245,200,66,0.2);
  border: 1px solid var(--gold);
  border-radius: 8px; padding: 4px 8px;
  font-size: clamp(11px,3vw,13px); font-weight: 700;
  color: var(--gold); cursor: pointer; white-space: nowrap;
}
.shop-item .item-cost.owned { color: #66bb6a; border-color: #66bb6a; background: rgba(102,187,106,0.15); cursor: default; }
#shop-close {
  background: rgba(255,255,255,0.1); border: none; border-radius: 12px;
  padding: 10px; color: white; font-family: var(--font);
  font-size: clamp(13px,3.5vw,15px); font-weight: 700; cursor: pointer; margin-top: 4px;
}

/* ===== TOAST ===== */
#toast {
  position: absolute;
  bottom: 6vh; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(20,30,50,0.94);
  color: white; border-radius: 20px;
  padding: 7px 18px;
  font-size: clamp(11px,3vw,13px); font-weight: 700;
  z-index: 200; opacity: 0;
  transition: all 0.3s; pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== FLOAT TEXT ===== */
.float-text {
  position: absolute; color: var(--gold);
  font-size: clamp(13px,4vw,16px); font-weight: 900;
  z-index: 60; pointer-events: none;
  animation: floatUp 1.2s forwards;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-50px); }
}
</style>
</head>
<body>
<div id="game-wrap">
  <div id="ocean">
    <div style="position:absolute;inset:0;background:repeating-linear-gradient(60deg,transparent,transparent 40px,rgba(255,255,255,0.02) 40px,rgba(255,255,255,0.02) 41px)"></div>
    <div class="depth-line" style="position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,0.06);top:30%"></div>
    <div class="depth-line" style="position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,0.06);top:55%"></div>
    <div class="depth-line" style="position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,0.06);top:78%"></div>
  </div>

  <div id="surface">
    <div id="boat">
      <svg width="80" height="55" viewBox="0 0 80 55" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 35 Q40 45 72 35 L65 48 Q40 54 15 48 Z" fill="#8B6914" stroke="#5a4008" stroke-width="1.5"/>
        <rect x="18" y="22" width="44" height="14" rx="4" fill="#a07820"/>
        <ellipse cx="40" cy="20" rx="12" ry="10" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
        <ellipse cx="40" cy="26" rx="8" ry="6" fill="#f5f5f5"/>
        <polygon points="30,14 27,8 33,13" fill="#f5f5f5"/>
        <polygon points="50,14 53,8 47,13" fill="#f5f5f5"/>
        <ellipse cx="35" cy="18" rx="2.5" ry="3" fill="#1a1a2e"/>
        <ellipse cx="45" cy="18" rx="2.5" ry="3" fill="#1a1a2e"/>
        <path d="M37 23 Q40 25 43 23" stroke="#e88" stroke-width="1.2" fill="none"/>
        <line x1="40" y1="30" x2="40" y2="60" stroke="#8B6914" stroke-width="2.5"/>
      </svg>
    </div>
  </div>

  <svg id="fishing-line-svg"><line id="fline" x1="50%" y1="0" x2="50%" y2="12vh" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/></svg>

  <div id="hook">
    <svg width="22" height="22" viewBox="0 0 22 22">
      <path d="M11 2 Q18 2 18 10 Q18 18 11 18 Q8 18 8 15" stroke="silver" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <line x1="8" y1="15" x2="6" y2="20" stroke="silver" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-stat"><span class="icon">💰</span><span class="hud-gold" id="stat-gold">475</span></div>
    <div class="hud-stat"><span class="icon">💎</span><span class="hud-gem"  id="stat-gem">0</span></div>
    <div class="hud-stat"><span class="icon">⭐</span><span class="hud-star" id="stat-star">0</span></div>
    <div class="hud-stat"><span class="icon">🔥</span><span class="hud-fire" id="stat-fire">0</span></div>
  </div>
  <button id="shop-btn" onclick="openShop()">🛒 المتجر</button>

  <div id="zones-panel"></div>

  <div id="depth-meter"><div id="depth-fill"></div></div>
  <div id="depth-label">0م</div>

  <div id="status-box">
    <div>🔽 أقصى عمق: <span id="stat-depth">0</span>م</div>
    <div>🐟 سمك مصيد: <span id="stat-caught">0</span></div>
  </div>

  <button id="return-btn" onclick="returnToBoat()">⬆ العودة</button>

  <div id="catch-popup">
    <div class="fish-display" id="popup-icon">🐟</div>
    <div class="fish-name"  id="popup-name">سمكة</div>
    <div class="fish-value" id="popup-value">+10 💰</div>
    <div class="fish-depth" id="popup-depth">عمق: 50م</div>
    <button id="catch-popup-close" onclick="closePopup()">حسناً ✓</button>
  </div>

  <div id="toast"></div>

  <div id="shop-overlay">
    <div id="shop-title">🛒 المتجر</div>
    <div id="shop-items"></div>
    <button id="shop-close" onclick="closeShop()">✕ إغلاق</button>
  </div>
</div>

<script>
// ─── Game Data ───
const ZONES = [
  { id:'ocean', name:'المحيط العميق', emoji:'🌊', unlocked:true,  cost:{},                          maxDepth:600,  waterBg:'linear-gradient(180deg,#5bc8f5 0%,#2d9fc9 40%,#1a6b9a 100%)' },
  { id:'abyss', name:'الهاوية',       emoji:'🕳️', unlocked:false, cost:{gold:50000},                maxDepth:2000, waterBg:'linear-gradient(180deg,#1a6b9a 0%,#0d3d6b 40%,#061a30 100%)' },
  { id:'inf',   name:'اللانهاية',     emoji:'♾️', unlocked:false, cost:{gold:100000,gem:50},         maxDepth:9999, waterBg:'linear-gradient(180deg,#061a30 0%,#030d1a 100%)' },
  { id:'lava',  name:'بحيرة الحمم',   emoji:'🌋', unlocked:false, cost:{gold:250000,gem:100,star:500}, maxDepth:5000, waterBg:'linear-gradient(180deg,#5c1a00 0%,#2a0800 100%)' },
];

const FISH_DB = [
  { zone:'ocean', emoji:'🐟', name:'سمكة صغيرة', min:0,   max:100, gold:8,   gem:0, star:0, fire:0, w:40 },
  { zone:'ocean', emoji:'🐠', name:'سمكة ملونة', min:20,  max:200, gold:15,  gem:0, star:0, fire:0, w:30 },
  { zone:'ocean', emoji:'🐡', name:'سمكة نافخة', min:50,  max:300, gold:25,  gem:0, star:0, fire:0, w:20 },
  { zone:'ocean', emoji:'🦈', name:'قرش صغير',   min:100, max:400, gold:60,  gem:1, star:0, fire:0, w:8  },
  { zone:'ocean', emoji:'🐙', name:'أخطبوط',     min:150, max:500, gold:80,  gem:2, star:0, fire:0, w:5  },
  { zone:'ocean', emoji:'🐳', name:'حوت',         min:200, max:600, gold:200, gem:5, star:1, fire:0, w:2  },
  { zone:'abyss', emoji:'🦑', name:'حبار عملاق', min:300, max:1000,gold:150, gem:8, star:2, fire:0, w:15 },
  { zone:'abyss', emoji:'🐬', name:'دولفين',      min:400, max:1500,gold:300, gem:12,star:3, fire:0, w:8  },
  { zone:'abyss', emoji:'🦐', name:'جمبري نادر', min:500, max:2000,gold:500, gem:20,star:5, fire:1, w:3  },
  { zone:'lava',  emoji:'🐉', name:'تنين البحر', min:0,   max:5000,gold:1000,gem:50,star:20,fire:10,w:5  },
];

const SHOP_ITEMS = [
  { id:'rod1',  name:'صنارة محسّنة', desc:'تصطاد أسرع بـ25%',        icon:'🎣', cost:{gold:500} },
  { id:'rod2',  name:'صنارة ذهبية',  desc:'تصطاد أسرع بـ50%',        icon:'✨', cost:{gold:2000} },
  { id:'bait1', name:'طُعم خاص',     desc:'يجذب أسماكاً أندر',       icon:'🪱', cost:{gold:300} },
  { id:'tank',  name:'خزان أكبر',    desc:'سعة أكبر بـ×2',           icon:'🪣', cost:{gold:1500} },
  { id:'depth', name:'معدات الغوص',  desc:'زيادة الحد الأقصى للعمق', icon:'🤿', cost:{gold:1000} },
];

// ─── State ───
let state = {
  gold:475, gem:0, star:0, fire:0,
  currentZone:0, hookY:0, hookDepth:0,
  maxDepthReached:0, fishCaught:0,
  descending:false, ascending:false,
  speed:2, ownedItems:new Set(),
  zoneLocked:[false,true,true,true], popupOpen:false,
};

let fishEntities = [];
let animFrame, holdInterval;

// ─── Responsive dimensions (recalc on resize) ───
let GW, GH, SURFACE_H, OCEAN_H, HOOK_START_Y, MAX_HOOK_Y;

function calcDims() {
  const wrap = document.getElementById('game-wrap');
  GW = wrap.clientWidth;
  GH = wrap.clientHeight;
  SURFACE_H  = Math.round(GH * 0.13);
  OCEAN_H    = GH - SURFACE_H;
  HOOK_START_Y = Math.round(GH * 0.12);
  MAX_HOOK_Y   = GH - Math.round(GH * 0.08);
  if (!state.hookY) state.hookY = HOOK_START_Y;
}

// ─── Init ───
function init() {
  calcDims();
  state.hookY = HOOK_START_Y;
  buildZones();
  buildShop();
  spawnBubbles();
  spawnFishLoop();
  renderHUD();
  updateDepthDisplay();
  startGameLoop();

  // Touch / mouse hold to move hook
  const wrap = document.getElementById('game-wrap');
  wrap.addEventListener('mousedown', onPointerDown);
  wrap.addEventListener('touchstart', onTouchDown, {passive:true});
  document.addEventListener('mouseup',  () => clearInterval(holdInterval));
  document.addEventListener('touchend', () => clearInterval(holdInterval));
  window.addEventListener('resize', () => { calcDims(); updateFishingLine(); });

  // Keyboard
  document.addEventListener('keydown', e => { if(e.key==='ArrowDown') state.descending=true; if(e.key==='ArrowUp') state.ascending=true; });
  document.addEventListener('keyup',   e => { if(e.key==='ArrowDown') state.descending=false; if(e.key==='ArrowUp') state.ascending=false; });
}

function onPointerDown(e) {
  if (e.target.closest('button,.zone-btn,#shop-btn,#home-btn,#catch-popup-close,#shop-close')) return;
  const rect = document.getElementById('game-wrap').getBoundingClientRect();
  const cy = e.clientY - rect.top;
  const dir = cy > state.hookY ? 1 : -1;
  clearInterval(holdInterval);
  holdInterval = setInterval(() => moveHook(dir * 3), 16);
}
function onTouchDown(e) {
  if (e.target.closest('button,.zone-btn,#shop-btn,#home-btn,#catch-popup-close,#shop-close')) return;
  const rect = document.getElementById('game-wrap').getBoundingClientRect();
  const cy = e.touches[0].clientY - rect.top;
  const dir = cy > state.hookY ? 1 : -1;
  clearInterval(holdInterval);
  holdInterval = setInterval(() => moveHook(dir * 3), 16);
}

// ─── Zones ───
function buildZones() {
  const panel = document.getElementById('zones-panel');
  panel.innerHTML = '';
  ZONES.forEach((z, i) => {
    const btn = document.createElement('div');
    btn.className = 'zone-btn' + (i===state.currentZone?' active':'') + (state.zoneLocked[i]?' locked':'');
    let costsHtml = '';
    if (state.zoneLocked[i]) {
      const c = z.cost;
      if(c.gold) costsHtml += `<span>💰${fmtNum(c.gold)}</span>`;
      if(c.gem)  costsHtml += `<span>💎${fmtNum(c.gem)}</span>`;
      if(c.star) costsHtml += `<span>⭐${fmtNum(c.star)}</span>`;
    }
    btn.innerHTML = `<div>${state.zoneLocked[i]?'🔒 ':''}${z.emoji} ${z.name}</div>${state.zoneLocked[i]?`<div class="zone-cost">${costsHtml}</div>`:''}`;
    btn.addEventListener('click', () => selectZone(i));
    panel.appendChild(btn);
  });
}

function selectZone(i) {
  if (state.zoneLocked[i]) {
    const c = ZONES[i].cost;
    if ((c.gold||0)<=state.gold && (c.gem||0)<=state.gem && (c.star||0)<=state.star) {
      state.gold-=(c.gold||0); state.gem-=(c.gem||0); state.star-=(c.star||0);
      state.zoneLocked[i]=false; showToast(`🎉 تم فتح ${ZONES[i].name}!`); buildZones(); renderHUD();
    } else { showToast('⛔ لا تملك الموارد الكافية'); }
    return;
  }
  state.currentZone=i; returnToBoat();
  document.querySelectorAll('.zone-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.getElementById('ocean').style.background=ZONES[i].waterBg;
  spawnFishLoop(); showToast(`🌊 انتقلت إلى ${ZONES[i].name}`);
}

// ─── Game loop ───
function startGameLoop() {
  function loop() {
    if (state.descending && !state.popupOpen) moveHook(1);
    if (state.ascending  && !state.popupOpen) moveHook(-1);
    checkFishCollision();
    updateFishingLine();
    animFrame = requestAnimationFrame(loop);
  }
  loop();
}

function moveHook(delta) {
  state.hookY = Math.max(HOOK_START_Y, Math.min(MAX_HOOK_Y, state.hookY + delta * state.speed));
  state.hookDepth = Math.round(((state.hookY - HOOK_START_Y) / (MAX_HOOK_Y - HOOK_START_Y)) * ZONES[state.currentZone].maxDepth);
  state.maxDepthReached = Math.max(state.maxDepthReached, state.hookDepth);
  document.getElementById('hook').style.top = state.hookY + 'px';
  updateDepthDisplay();
}

function updateFishingLine() {
  const hook = document.getElementById('hook');
  const line = document.getElementById('fline');
  const wrap = document.getElementById('game-wrap').getBoundingClientRect();
  const hRect = hook.getBoundingClientRect();
  const hx = hRect.left - wrap.left + 11;
  const hy = hRect.top  - wrap.top  + 5;
  line.setAttribute('x2', hx);
  line.setAttribute('y2', hy);
}

function updateDepthDisplay() {
  document.getElementById('stat-depth').textContent = state.hookDepth;
  document.getElementById('stat-caught').textContent = state.fishCaught;
  document.getElementById('depth-label').textContent = state.hookDepth + 'م';
  const pct = Math.min(100, (state.hookDepth / ZONES[state.currentZone].maxDepth) * 100);
  document.getElementById('depth-fill').style.height = pct + '%';
}

function returnToBoat() {
  state.descending = false; state.ascending = false;
  clearInterval(holdInterval);
  const anim = setInterval(() => {
    if (state.hookY <= HOOK_START_Y + 2) { state.hookY = HOOK_START_Y; clearInterval(anim); }
    moveHook(-4);
  }, 16);
}

// ─── Fish ───
function spawnFish() {
  const ocean = document.getElementById('ocean');
  const pool = FISH_DB.filter(f => f.zone === ZONES[state.currentZone].id);
  const allFish = pool.length ? pool : FISH_DB.slice(0,5);
  const total = allFish.reduce((s,f)=>s+f.w,0);
  let r = Math.random() * total, fish = allFish[0];
  for (const f of allFish) { r -= f.w; if(r<=0){fish=f; break;} }

  const minY = SURFACE_H + (fish.min / ZONES[state.currentZone].maxDepth) * OCEAN_H;
  const maxY = SURFACE_H + (Math.min(fish.max, ZONES[state.currentZone].maxDepth) / ZONES[state.currentZone].maxDepth) * OCEAN_H;
  const y = Math.min(GH - 40, minY + Math.random() * (maxY - minY));

  const el = document.createElement('div');
  el.className = 'fish';
  const goLeft = Math.random() > 0.5;
  const duration = 7 + Math.random() * 8;
  const size = 0.8 + Math.random() * 0.7;

  el.style.cssText = `top:${y}px; left:${goLeft?'100%':'-60px'}; animation: fishSwim ${duration}s linear infinite; transform: scaleX(${goLeft?-1:1}) scale(${size});`;
  el.innerHTML = `<span class="fish-body">${fish.emoji}</span>`;
  el.addEventListener('click', () => catchFish(fish, el, y));
  ocean.appendChild(el);
  fishEntities.push({ el, fish, y });

  setTimeout(() => { el.remove(); fishEntities = fishEntities.filter(f=>f.el!==el); }, duration * 3000);
}

function spawnFishLoop() {
  document.querySelectorAll('.fish').forEach(e=>e.remove());
  fishEntities = [];
  spawnFish(); spawnFish(); spawnFish();
  if (window._fishInterval) clearInterval(window._fishInterval);
  window._fishInterval = setInterval(spawnFish, 2500);
}

function checkFishCollision() {
  if (state.popupOpen) return;
  const hook = document.getElementById('hook');
  const wrap = document.getElementById('game-wrap').getBoundingClientRect();
  const hRect = hook.getBoundingClientRect();
  const hx = hRect.left - wrap.left + 11;
  const hy = hRect.top  - wrap.top  + 11;

  fishEntities.forEach(({el, fish, y}) => {
    const fRect = el.getBoundingClientRect();
    const fx = fRect.left - wrap.left + fRect.width  / 2;
    const fy = fRect.top  - wrap.top  + fRect.height / 2;
    if (Math.hypot(hx-fx, hy-fy) < 38) catchFish(fish, el, fy);
  });
}

function catchFish(fish, el, fy) {
  if (state.popupOpen) return;
  if (state.hookDepth < fish.min * 0.5) { showToast('السمكة هربت! 🐟💨'); return; }
  state.popupOpen = true;
  state.gold += fish.gold; state.gem += fish.gem; state.star += fish.star; state.fire += fish.fire; state.fishCaught++;
  spawnFloatText(`+${fish.gold}💰`, el);
  el.remove(); fishEntities = fishEntities.filter(f=>f.el!==el);
  document.getElementById('popup-icon').textContent  = fish.emoji;
  document.getElementById('popup-name').textContent  = fish.name;
  document.getElementById('popup-value').textContent = `+${fish.gold} 💰${fish.gem?'  +'+fish.gem+' 💎':''}${fish.star?'  +'+fish.star+' ⭐':''}`;
  document.getElementById('popup-depth').textContent = `عمق: ${state.hookDepth}م`;
  document.getElementById('catch-popup').classList.add('show');
  renderHUD(); updateDepthDisplay();
}

function closePopup() { document.getElementById('catch-popup').classList.remove('show'); state.popupOpen = false; }

function spawnFloatText(txt, el) {
  const wrap = document.getElementById('game-wrap');
  const rect = el.getBoundingClientRect();
  const wRect = wrap.getBoundingClientRect();
  const div = document.createElement('div');
  div.className = 'float-text'; div.textContent = txt;
  div.style.left = (rect.left - wRect.left + 10) + 'px';
  div.style.top  = (rect.top  - wRect.top  - 10) + 'px';
  wrap.appendChild(div);
  setTimeout(() => div.remove(), 1200);
}

// ─── HUD ───
function renderHUD() {
  document.getElementById('stat-gold').textContent = fmtNum(state.gold);
  document.getElementById('stat-gem').textContent  = fmtNum(state.gem);
  document.getElementById('stat-star').textContent = fmtNum(state.star);
  document.getElementById('stat-fire').textContent = fmtNum(state.fire);
}

// ─── Shop ───
function buildShop() {
  const c = document.getElementById('shop-items');
  c.innerHTML = '';
  SHOP_ITEMS.forEach(item => {
    const owned = state.ownedItems.has(item.id);
    const div = document.createElement('div');
    div.className = 'shop-item';
    let cost = '';
    if(item.cost.gold) cost += `💰${fmtNum(item.cost.gold)} `;
    if(item.cost.gem)  cost += `💎${fmtNum(item.cost.gem)}`;
    div.innerHTML = `<div class="item-icon">${item.icon}</div><div class="item-info"><div class="item-name">${item.name}</div><div class="item-desc">${item.desc}</div></div><div class="item-cost ${owned?'owned':''}" onclick="buyItem('${item.id}')">${owned?'✓ مملوك':cost}</div>`;
    c.appendChild(div);
  });
}

function openShop()  { document.getElementById('shop-overlay').classList.add('open'); buildShop(); }
function closeShop() { document.getElementById('shop-overlay').classList.remove('open'); }

function buyItem(id) {
  if (state.ownedItems.has(id)) return;
  const item = SHOP_ITEMS.find(i=>i.id===id);
  if (!item) return;
  if ((item.cost.gold||0)>state.gold || (item.cost.gem||0)>state.gem) { showToast('⛔ لا تملك الموارد الكافية'); return; }
  state.gold -= (item.cost.gold||0); state.gem -= (item.cost.gem||0);
  state.ownedItems.add(id);
  if(id==='rod1') state.speed *= 1.25;
  if(id==='rod2') state.speed *= 1.5;
  showToast(`✅ تم شراء ${item.name}!`);
  renderHUD(); buildShop();
}

// ─── Bubbles (fewer = better WebView perf) ───
function spawnBubbles() {
  const ocean = document.getElementById('ocean');
  setInterval(() => {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 4 + Math.random() * 8;
    b.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:0;animation-duration:${5+Math.random()*7}s;animation-delay:${Math.random()*2}s`;
    ocean.appendChild(b);
    setTimeout(() => b.remove(), 12000);
  }, 800); // doubled interval vs original
}

// ─── Helpers ───
function fmtNum(n) {
  if(n>=1000000) return (n/1000000).toFixed(1)+'م';
  if(n>=1000)    return (n/1000).toFixed(1)+'ك';
  return n.toString();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

init();
</script>
