<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>القط يصطاد</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Kufi Arabic','Segoe UI',Tahoma,Arial,sans-serif;direction:rtl}

#root{
  width:100vw;height:100vh;overflow:hidden;
  position:relative;display:flex;flex-direction:column;
  background:linear-gradient(180deg,#87ceeb 0%,#5bc8f5 25%,#2d9fc9 55%,#1a6b9a 80%,#0a3d6b 100%);
}

/* ── Surface strip ── */
#surface{
  position:absolute;top:0;left:0;right:0;height:13%;
  background:linear-gradient(180deg,#a8d8ea 0%,#5bc8f5 100%);
  border-bottom:2px solid rgba(255,255,255,0.4);z-index:4;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:2px;
}

/* ── Cat + boat SVG ── */
#boat-wrap{
  position:relative;width:80px;
  animation:rock 3s ease-in-out infinite;
}
@keyframes rock{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}

/* ── HUD ── */
#hud{
  position:absolute;top:6px;left:8px;
  display:flex;flex-direction:column;gap:4px;z-index:10;
}
.hbadge{
  background:rgba(20,35,55,0.8);border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;padding:3px 9px;
  display:flex;align-items:center;gap:5px;
  font-size:13px;font-weight:700;color:#fff;min-width:64px;
}
.hbadge .v{transition:color .3s}
.hbadge.g .v{color:#ffd700}
.hbadge.gm .v{color:#60c8f0}
.hbadge.st .v{color:#ffa500}
.hbadge.fr .v{color:#ff6b35}

#shop-btn{
  position:absolute;top:6px;right:8px;z-index:10;
  background:rgba(20,35,55,0.8);border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;padding:4px 12px;color:#fff;
  font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;
}

/* ── Zones panel ── */
#zones{
  position:absolute;right:0;top:16%;z-index:10;
  display:flex;flex-direction:column;gap:3px;
}
.zbtn{
  background:rgba(20,35,55,0.82);border:1px solid rgba(255,255,255,0.15);
  border-radius:10px 0 0 10px;padding:5px 8px 5px 10px;
  color:#fff;font-family:inherit;font-size:10px;font-weight:700;
  cursor:pointer;text-align:right;min-width:120px;transition:background .2s;
}
.zbtn.active{background:rgba(41,121,255,0.75);border-color:#4a90ff}
.zbtn.locked{opacity:.72}
.zbtn .zname{font-size:11px}
.zcost{display:flex;gap:4px;flex-wrap:wrap;font-size:9px;opacity:.8;margin-top:1px}

/* ── Depth bar (right side) ── */
#depth-track{
  position:absolute;right:122px;top:14%;bottom:18%;
  width:5px;background:rgba(255,255,255,0.12);border-radius:3px;z-index:8;
}
#depth-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0,#2979ff,#60c8f0);border-radius:3px;transition:height .2s}
#depth-lbl{
  position:absolute;right:128px;bottom:18%;z-index:8;
  color:rgba(255,255,255,.7);font-size:10px;font-weight:700;white-space:nowrap;
}

/* ── Ocean canvas ── */
#cvs{
  position:absolute;left:0;top:13%;right:0;bottom:18%;
  width:100%;
}

/* ── Hook ── */
#hook{
  position:absolute;left:50%;transform:translateX(-50%);
  width:18px;height:18px;z-index:7;pointer-events:none;
  transition:top .04s linear;
}

/* ── Fishing line ── */
#fsvg{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:6;overflow:visible;
}

/* ── Fish sprites ── */
.fish{
  position:absolute;z-index:5;cursor:pointer;
  animation:swim linear infinite;font-size:28px;
  pointer-events:auto;
}
@keyframes swim{0%{transform:translateX(-60px)}100%{transform:translateX(calc(100vw + 60px))}}

/* ── Bottom controls ── */
#controls{
  position:absolute;left:0;right:0;bottom:0;height:18%;
  background:rgba(10,20,35,0.85);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;gap:8px;z-index:10;
}
#status-box{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,.12);
  border-radius:10px;padding:5px 10px;color:#fff;font-size:11px;line-height:1.6;flex:1;
}
#ret-btn{
  background:#2979ff;border:none;border-radius:12px;
  padding:8px 14px;color:#fff;font-family:inherit;font-size:11px;font-weight:700;
  cursor:pointer;white-space:nowrap;box-shadow:0 3px 10px rgba(41,121,255,.4);
}

/* Descend / Ascend tap zones */
#tap-down,#tap-up{
  position:absolute;left:0;right:130px;z-index:6;
  cursor:pointer;
}
#tap-down{top:13%;height:43%}
#tap-up{top:56%;height:29%}

/* ── Catch popup ── */
#popup{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(0);
  background:rgba(8,18,36,0.94);border:2px solid #ffd700;border-radius:18px;
  padding:14px 22px;color:#fff;text-align:center;z-index:30;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);min-width:160px;
}
#popup.on{transform:translate(-50%,-50%) scale(1)}
#popup .pi{font-size:44px}
#popup .pn{font-size:16px;font-weight:900;margin:4px 0}
#popup .pv{font-size:12px;color:#ffd700}
#popup .pd{font-size:11px;color:rgba(255,255,255,.55)}
#popup-ok{
  margin-top:8px;background:#2979ff;border:none;border-radius:8px;
  padding:6px 20px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
}

/* ── Shop overlay ── */
#shop{
  position:absolute;inset:0;background:rgba(4,12,25,0.97);z-index:40;
  display:none;flex-direction:column;padding:12px;gap:8px;overflow-y:auto;
}
#shop.on{display:flex}
#shop-title{color:#fff;font-size:18px;font-weight:900;text-align:center}
.sitem{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:12px;color:#fff;
}
.sitem .sicon{font-size:28px}
.sitem .sinfo{flex:1}
.sitem .sname{font-size:13px;font-weight:700}
.sitem .sdesc{font-size:10px;opacity:.6;margin-top:1px}
.sbuy{
  background:rgba(245,200,66,.2);border:1px solid #ffd700;border-radius:8px;
  padding:4px 10px;font-size:12px;font-weight:700;color:#ffd700;cursor:pointer;white-space:nowrap;
}
.sbuy.owned{color:#4ade80;border-color:#4ade80;background:rgba(74,222,128,.15);cursor:default}
#shop-close{
  background:rgba(255,255,255,.1);border:none;border-radius:10px;
  padding:9px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
}

/* ── Toast ── */
#toast{
  position:absolute;bottom:22%;left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(10,20,35,.9);color:#fff;border-radius:18px;
  padding:6px 16px;font-size:12px;font-weight:700;z-index:35;
  opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Float text ── */
.ft{position:absolute;color:#ffd700;font-size:14px;font-weight:900;z-index:20;pointer-events:none;animation:fup 1.1s forwards}
@keyframes fup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}

/* ── Red flash ── */
#flash{position:absolute;inset:0;background:transparent;pointer-events:none;z-index:25;transition:background .1s}
#flash.on{background:rgba(255,0,0,.35)}

/* ── Bubbles ── */
.bub{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);animation:bup linear infinite;pointer-events:none}
@keyframes bup{0%{transform:translateY(0);opacity:.6}100%{transform:translateY(-80vh);opacity:0}}
</style>
</head>
<body>
<div id="root">
  <!-- Surface -->
  <div id="surface">
    <div id="boat-wrap">
      <svg width="80" height="56" viewBox="0 0 80 56" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 36 Q40 46 72 36 L65 50 Q40 56 15 50Z" fill="#8B6914" stroke="#5a4008" stroke-width="1.2"/>
        <rect x="18" y="24" width="44" height="13" rx="4" fill="#a07820"/>
        <ellipse cx="40" cy="20" rx="12" ry="10" fill="#f5f5f0" stroke="#ddd" stroke-width="1"/>
        <ellipse cx="40" cy="27" rx="8" ry="6" fill="#f5f5f0"/>
        <polygon points="29,13 26,7 33,12" fill="#f5f5f0"/>
        <polygon points="51,13 54,7 47,12" fill="#f5f5f0"/>
        <circle cx="37" cy="19" r="1.8" fill="#222"/>
        <circle cx="43" cy="19" r="1.8" fill="#222"/>
        <line x1="40" y1="22" x2="52" y2="7" stroke="#5a3a00" stroke-width="2" stroke-linecap="round"/>
        <circle cx="52" cy="7" r="2" fill="#ffcc00"/>
      </svg>
    </div>
  </div>

  <!-- Fishing line SVG -->
  <svg id="fsvg"><line id="fline" stroke="rgba(255,255,255,0.55)" stroke-width="1.2" stroke-dasharray="4,2"/></svg>

  <!-- Hook -->
  <div id="hook">
    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 2 L9 11 Q9 17 4 17 Q1 17 1 14" stroke="silver" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hbadge g">💰<span class="v" id="hgold">475</span></div>
    <div class="hbadge gm">💎<span class="v" id="hgem">0</span></div>
    <div class="hbadge st">⭐<span class="v" id="hstar">0</span></div>
    <div class="hbadge fr">🔥<span class="v" id="hfire">0</span></div>
  </div>

  <button id="shop-btn" onclick="openShop()">🛒 المتجر</button>

  <!-- Tap zones -->
  <div id="tap-down"></div>
  <div id="tap-up"></div>

  <!-- Zones -->
  <div id="zones"></div>

  <!-- Depth -->
  <div id="depth-track"><div id="depth-fill"></div></div>
  <div id="depth-lbl">0م</div>

  <!-- Fish canvas area (fish appended here) -->
  <div id="cvs"></div>

  <!-- Bottom controls -->
  <div id="controls">
    <div id="status-box">
      <div>🔽 أقصى عمق: <span id="sdepth">0</span>م</div>
      <div>🐟 سمك مصيد: <span id="scaught">0</span></div>
    </div>
    <button id="ret-btn" onclick="returnBoat()">⬆ للقارب</button>
  </div>

  <!-- Catch popup -->
  <div id="popup">
    <div class="pi" id="pi">🐟</div>
    <div class="pn" id="pn">سمكة</div>
    <div class="pv" id="pv">+10 💰</div>
    <div class="pd" id="pd">عمق: 0م</div>
    <button id="popup-ok" onclick="closePopup()">حسناً ✓</button>
  </div>

  <!-- Shop -->
  <div id="shop">
    <div id="shop-title">🛒 المتجر</div>
    <div id="shop-items"></div>
    <button id="shop-close" onclick="closeShop()">✕ إغلاق</button>
  </div>

  <!-- Toast -->
  <div id="toast"></div>
  <!-- Flash -->
  <div id="flash"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const ZONES=[
  {id:'ocean', name:'المحيط',  e:'🌊', locked:false, cost:{},                  maxD:600 },
  {id:'abyss', name:'الهاوية', e:'🕳️', locked:true,  cost:{gold:50000},         maxD:2000},
  {id:'inf',   name:'اللانهاية',e:'♾️',locked:true,  cost:{gold:100000,gem:50}, maxD:9999},
  {id:'lava',  name:'الحمم',   e:'🌋', locked:true,  cost:{gold:250000,gem:100,star:500},maxD:5000},
];
const FISH=[
  {e:'🐟',n:'سمكة صغيرة', min:0,  max:150, gold:8,  gem:0, star:0,fire:0,w:40},
  {e:'🐠',n:'سمكة ملونة', min:20, max:250, gold:15, gem:0, star:0,fire:0,w:30},
  {e:'🐡',n:'سمكة نافخة', min:50, max:350, gold:25, gem:0, star:0,fire:0,w:20},
  {e:'🦈',n:'قرش',         min:100,max:450, gold:60, gem:1, star:0,fire:0,w:8},
  {e:'🐙',n:'أخطبوط',     min:150,max:550, gold:80, gem:2, star:0,fire:0,w:5},
  {e:'🐳',n:'حوت',          min:200,max:600, gold:200,gem:5, star:1,fire:0,w:2},
];
const SHOP=[
  {id:'r1',name:'صنارة محسّنة', desc:'سرعة +25%', icon:'🎣',cost:{gold:500}},
  {id:'r2',name:'صنارة ذهبية', desc:'سرعة +50%', icon:'✨',cost:{gold:2000}},
  {id:'b1',name:'طُعم خاص',    desc:'أسماك أندر', icon:'🪱',cost:{gold:300}},
];

const S={gold:475,gem:0,star:0,fire:0,zone:0,hookY:0,depth:0,maxD:0,caught:0,popOpen:false,owned:new Set(),zoneLocked:[false,true,true,true],speed:1.8};

let gameH=0,surfH=0,ctrlH=0,hookTopPx=0;
let fishEls=[];
let fishSpawnTimer=null;
let ascTimer=null;

// ── INIT ──────────────────────────────────────────────
function init(){
  measure();
  buildZones();
  buildShop();
  spawnBubbles();
  spawnFishLoop();
  renderHUD();
  updateLine();
  setupTaps();
  window.addEventListener('resize',()=>{measure();updateHookPos();updateLine();});
}

function measure(){
  gameH=document.getElementById('root').offsetHeight;
  surfH=document.getElementById('surface').offsetHeight;
  ctrlH=document.getElementById('controls').offsetHeight;
  hookTopPx=surfH+2;
  if(S.hookY===0)S.hookY=hookTopPx;
}

// ── ZONES ──────────────────────────────────────────────
function buildZones(){
  const panel=document.getElementById('zones');
  panel.innerHTML='';
  ZONES.forEach((z,i)=>{
    const b=document.createElement('div');
    b.className='zbtn'+(i===S.zone?' active':'')+(S.zoneLocked[i]?' locked':'');
    let cost='';
    if(S.zoneLocked[i]){
      if(z.cost.gold)cost+=`<span>💰${fmt(z.cost.gold)}</span>`;
      if(z.cost.gem)cost+=`<span>💎${fmt(z.cost.gem)}</span>`;
      if(z.cost.star)cost+=`<span>⭐${fmt(z.cost.star)}</span>`;
    }
    b.innerHTML=`<div>${S.zoneLocked[i]?'🔒 ':''}${z.e} <span class="zname">${z.name}</span></div>${S.zoneLocked[i]?`<div class="zcost">${cost}</div>`:''}`;
    b.addEventListener('click',()=>selectZone(i));
    panel.appendChild(b);
  });
}

function selectZone(i){
  if(S.zoneLocked[i]){
    const z=ZONES[i],c=z.cost;
    if((c.gold||0)<=S.gold&&(c.gem||0)<=S.gem&&(c.star||0)<=S.star){
      S.gold-=(c.gold||0);S.gem-=(c.gem||0);S.star-=(c.star||0);
      S.zoneLocked[i]=false;toast(`🎉 تم فتح ${z.name}!`);
      buildZones();renderHUD();
    }else toast('⛔ موارد غير كافية');
    return;
  }
  S.zone=i;returnBoat();buildZones();
}

// ── HOOK MOVEMENT ──────────────────────────────────────
function setupTaps(){
  let hold=null;
  const startHold=(dir)=>{
    clearInterval(hold);
    hold=setInterval(()=>moveHook(dir*4),16);
  };
  const endHold=()=>clearInterval(hold);

  document.getElementById('tap-down').addEventListener('touchstart',e=>{e.preventDefault();startHold(1);},{passive:false});
  document.getElementById('tap-down').addEventListener('mousedown',()=>startHold(1));
  document.getElementById('tap-up').addEventListener('touchstart',e=>{e.preventDefault();startHold(-1);},{passive:false});
  document.getElementById('tap-up').addEventListener('mousedown',()=>startHold(-1));
  document.addEventListener('touchend',endHold);
  document.addEventListener('mouseup',endHold);
}

function moveHook(delta){
  if(S.popOpen)return;
  const maxY=gameH-ctrlH-20;
  S.hookY=Math.max(hookTopPx,Math.min(maxY,S.hookY+delta*S.speed));
  S.depth=Math.round(((S.hookY-hookTopPx)/(gameH-ctrlH-hookTopPx-10))*ZONES[S.zone].maxD);
  S.maxD=Math.max(S.maxD,S.depth);
  updateHookPos();
  updateDepthUI();
  checkCollisions();
}

function updateHookPos(){
  const hook=document.getElementById('hook');
  hook.style.top=S.hookY+'px';
}

function updateLine(){
  const lrect=document.getElementById('root').getBoundingClientRect();
  const lineX=lrect.width/2;
  const boatY=surfH*0.85;
  const hookY=S.hookY+9;
  const line=document.getElementById('fline');
  line.setAttribute('x1',lineX);line.setAttribute('y1',boatY);
  line.setAttribute('x2',lineX);line.setAttribute('y2',hookY);
}

function updateDepthUI(){
  document.getElementById('sdepth').textContent=S.depth;
  document.getElementById('scaught').textContent=S.caught;
  document.getElementById('depth-lbl').textContent=S.depth+'م';
  const pct=Math.min(100,(S.depth/ZONES[S.zone].maxD)*100);
  document.getElementById('depth-fill').style.height=pct+'%';
  updateLine();
}

function returnBoat(){
  clearInterval(ascTimer);
  ascTimer=setInterval(()=>{
    if(S.hookY<=hookTopPx+4){S.hookY=hookTopPx;clearInterval(ascTimer);updateHookPos();updateLine();return;}
    moveHook(-6);
  },16);
}

// ── FISH ──────────────────────────────────────────────
function spawnFish(){
  const cvs=document.getElementById('cvs');
  const cvsRect=cvs.getBoundingClientRect();
  const rootH=document.getElementById('root').offsetHeight;

  // weighted random
  const total=FISH.reduce((s,f)=>s+f.w,0);
  let r=Math.random()*total,f=FISH[0];
  for(const fi of FISH){r-=fi.w;if(r<=0){f=fi;break;}}

  const cvsTop=surfH;
  const cvsH=gameH-surfH-ctrlH;
  const minY=cvsTop+(f.min/ZONES[S.zone].maxD)*cvsH;
  const maxY=cvsTop+(Math.min(f.max,ZONES[S.zone].maxD)/ZONES[S.zone].maxD)*cvsH;
  const y=minY+Math.random()*(Math.max(0,maxY-minY));

  const el=document.createElement('div');
  el.className='fish';
  el.textContent=f.e;
  const dur=7+Math.random()*7;
  const flip=Math.random()>.5;
  el.style.cssText=`top:${y}px;left:${flip?'100%':'-50px'};animation-duration:${dur}s;transform:scaleX(${flip?-1:1});font-size:clamp(22px,6vw,32px)`;
  el.addEventListener('click',()=>catchFish(f,el,y));
  document.getElementById('root').appendChild(el);
  fishEls.push({el,f,y});
  setTimeout(()=>{el.remove();fishEls=fishEls.filter(x=>x.el!==el);},dur*1000*2.5);
}

function spawnFishLoop(){
  document.querySelectorAll('.fish').forEach(e=>e.remove());fishEls=[];
  clearInterval(fishSpawnTimer);
  spawnFish();spawnFish();spawnFish();
  fishSpawnTimer=setInterval(spawnFish,3000);
}

// ── COLLISION (touch hook) ──────────────────────────────
function checkCollisions(){
  if(S.popOpen)return;
  const rootRect=document.getElementById('root').getBoundingClientRect();
  const hx=rootRect.width/2;
  const hy=S.hookY+9;
  for(const {el,f,y} of fishEls){
    const r=el.getBoundingClientRect();
    const fx=r.left-rootRect.left+r.width/2;
    const fy=r.top-rootRect.top+r.height/2;
    if(Math.hypot(hx-fx,hy-fy)<34){catchFish(f,el,fy);return;}
  }
}

function catchFish(f,el,fy){
  if(S.popOpen)return;
  if(S.depth<f.min*0.4){toast('السمكة هربت! 💨');return;}
  S.popOpen=true;
  S.gold+=f.gold;S.gem+=f.gem;S.star+=f.star;S.fire+=f.fire;S.caught++;

  // float text
  const ft=document.createElement('div');ft.className='ft';
  ft.textContent=`+${f.gold}💰`;
  const rootRect=document.getElementById('root').getBoundingClientRect();
  const r2=el.getBoundingClientRect();
  ft.style.left=(r2.left-rootRect.left+10)+'px';
  ft.style.top=(r2.top-rootRect.top-10)+'px';
  document.getElementById('root').appendChild(ft);
  setTimeout(()=>ft.remove(),1200);

  el.remove();fishEls=fishEls.filter(x=>x.el!==el);

  document.getElementById('pi').textContent=f.e;
  document.getElementById('pn').textContent=f.n;
  document.getElementById('pv').textContent=`+${f.gold} 💰${f.gem?'  +'+f.gem+' 💎':''}`;
  document.getElementById('pd').textContent=`عمق: ${S.depth}م`;
  document.getElementById('popup').classList.add('on');
  renderHUD();updateDepthUI();
}

function closePopup(){
  document.getElementById('popup').classList.remove('on');
  S.popOpen=false;
}

// ── HUD ──────────────────────────────────────────────
function renderHUD(){
  document.getElementById('hgold').textContent=fmt(S.gold);
  document.getElementById('hgem').textContent=fmt(S.gem);
  document.getElementById('hstar').textContent=fmt(S.star);
  document.getElementById('hfire').textContent=fmt(S.fire);
  document.getElementById('coins').textContent=fmt(S.gold);
}

// ── SHOP ──────────────────────────────────────────────
function buildShop(){
  const c=document.getElementById('shop-items');c.innerHTML='';
  SHOP.forEach(item=>{
    const owned=S.owned.has(item.id);
    const div=document.createElement('div');div.className='sitem';
    let cs='';if(item.cost.gold)cs+=`💰${fmt(item.cost.gold)}`;
    div.innerHTML=`<div class="sicon">${item.icon}</div><div class="sinfo"><div class="sname">${item.name}</div><div class="sdesc">${item.desc}</div></div><div class="sbuy ${owned?'owned':''}" onclick="buyItem('${item.id}')">${owned?'✓ مملوك':cs}</div>`;
    c.appendChild(div);
  });
}
function openShop(){document.getElementById('shop').classList.add('on');buildShop();}
function closeShop(){document.getElementById('shop').classList.remove('on');}
function buyItem(id){
  if(S.owned.has(id))return;
  const item=SHOP.find(i=>i.id===id);
  if(!item)return;
  if((item.cost.gold||0)>S.gold){toast('⛔ عملات غير كافية');return;}
  S.gold-=(item.cost.gold||0);S.owned.add(id);
  if(id==='r1')S.speed*=1.25;if(id==='r2')S.speed*=1.5;
  toast(`✅ تم شراء ${item.name}!`);renderHUD();buildShop();
}

// ── BUBBLES ──────────────────────────────────────────────
function spawnBubbles(){
  setInterval(()=>{
    const b=document.createElement('div');b.className='bub';
    const sz=4+Math.random()*8;
    b.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${gameH-ctrlH}px;animation-duration:${5+Math.random()*5}s`;
    document.getElementById('root').appendChild(b);
    setTimeout(()=>b.remove(),10000);
  },800);
}

// ── UTILS ──────────────────────────────────────────────
function fmt(n){if(n>=1000000)return(n/1000000).toFixed(1)+'م';if(n>=1000)return(n/1000).toFixed(1)+'ك';return String(n);}
let toastT;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2000);
}

// ── START ──────────────────────────────────────────────
init();

// Periodic collision check (for when user holds button)
setInterval(()=>{if(!S.popOpen)checkCollisions();updateLine();},80);
</script>
</body>
</html>
