<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#10243f">
<title>صيد الكلمات</title>
<!-- Firebase SDK (compat) — online multiplayer (InGames contract) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
/* ── System Arabic fonts only — zero network requests (WebView-friendly) ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{
  width:100%;height:100%;overflow:hidden;background:#0a1a30;
  font-family:'Noto Kufi Arabic','Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;
  overscroll-behavior:none;touch-action:none;color:#fff;
}
#root{
  width:100vw;height:100vh;height:100dvh;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(165deg,#1d4e89 0%,#143a6b 38%,#0d2548 72%,#091a33 100%);
  padding-top:env(safe-area-inset-top);
}
/* glow blobs */
.blob{position:absolute;border-radius:50%;filter:blur(46px);opacity:.32;pointer-events:none;will-change:transform;animation:float 16s ease-in-out infinite}
.b1{width:200px;height:200px;background:#3b82f6;top:-50px;right:-40px}
.b2{width:170px;height:170px;background:#8b5cf6;bottom:6%;left:-40px;animation-delay:-6s}
.b3{width:130px;height:130px;background:#06b6d4;top:42%;right:55%;animation-delay:-11s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(18px,26px) scale(1.12)}66%{transform:translate(-14px,14px) scale(.94)}}

/* ── Header: two players ── */
#hdr{width:100%;display:flex;align-items:flex-start;justify-content:space-between;
  padding:9px 12px 2px;gap:8px;flex-shrink:0;z-index:3}
.pcard{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.pcard.me{flex-direction:row}
.pcard.opp{flex-direction:row-reverse;text-align:left}
.av{width:42px;height:42px;border-radius:50%;flex-shrink:0;position:relative;
  display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:900;
  border:2.5px solid rgba(255,255,255,.5);box-shadow:0 3px 9px rgba(0,0,0,.35)}
.av.turnglow{box-shadow:0 0 0 2px #fff,0 0 16px 3px var(--glow,#34d399)}
.pmeta{min-width:0}
.pname{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:96px;opacity:.96}
.pscore{font-size:24px;font-weight:900;line-height:1.05;text-shadow:0 2px 6px rgba(0,0,0,.4)}
.pcard.opp .pmeta{text-align:left}
.pscore.bump{animation:scoreBump .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes scoreBump{0%{transform:scale(1)}45%{transform:scale(1.35)}100%{transform:scale(1)}}
#vs{align-self:center;font-size:13px;font-weight:900;color:rgba(255,255,255,.55);padding-top:8px}

/* ── Round banner + timer ── */
#bar{width:100%;display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;z-index:3;margin-top:2px}
#status{font-size:15px;font-weight:800;letter-spacing:.4px;min-height:20px;color:#ffe08a;
  text-shadow:0 1px 5px rgba(0,0,0,.4);transition:opacity .2s}
#timerWrap{width:78%;height:9px;background:rgba(255,255,255,.13);border-radius:10px;overflow:hidden;position:relative}
#timerFill{position:absolute;inset:0;transform-origin:right center;
  background:linear-gradient(90deg,#34d399,#22d3ee);transition:transform .25s linear,background .4s}
#timerFill.warn{background:linear-gradient(90deg,#fbbf24,#f97316)}
#timerFill.danger{background:linear-gradient(90deg,#f87171,#ef4444)}
#roundLbl{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;
  font-size:0}
#subbar{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:700;color:rgba(255,255,255,.55)}

/* ── Current traced word ── */
#cur{height:46px;display:flex;align-items:center;justify-content:center;gap:5px;flex-shrink:0;z-index:3;
  margin-top:3px;min-height:46px}
.curtile{min-width:30px;height:38px;padding:0 7px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:21px;font-weight:900;background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.3);
  animation:curIn .18s cubic-bezier(.34,1.56,.64,1)}
@keyframes curIn{0%{transform:scale(.4) translateY(8px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
#cur.good .curtile{background:rgba(52,211,153,.32);border-color:#34d399}
#cur.dup .curtile{background:rgba(148,163,184,.3);border-color:#94a3b8}
#curWrap{position:relative}
#wordPts{position:absolute;top:-2px;right:50%;transform:translateX(50%);font-size:13px;font-weight:900;color:#34d399;opacity:0}

/* ── Board ── */
#boardWrap{flex:1;width:100%;display:flex;align-items:center;justify-content:center;min-height:0;z-index:2;padding:4px 0}
#board{position:relative;touch-action:none}
#link{position:absolute;inset:0;z-index:1;pointer-events:none}
.tile{position:absolute;border-radius:50%;background:linear-gradient(160deg,#ffffff,#eef3fb);
  display:flex;align-items:center;justify-content:center;color:#13294a;font-weight:900;z-index:2;
  box-shadow:0 4px 9px rgba(0,0,0,.28),inset 0 -3px 0 rgba(0,0,0,.06);
  transition:transform .1s,background .12s,color .12s,box-shadow .12s;will-change:transform}
.tile.sel{background:linear-gradient(160deg,#5eead4,#22d3ee);color:#06303a;transform:scale(1.1);
  box-shadow:0 0 0 3px rgba(255,255,255,.7),0 6px 16px rgba(34,211,238,.5)}
.tile.good{background:linear-gradient(160deg,#86efac,#34d399);color:#063b25;
  box-shadow:0 0 0 3px rgba(255,255,255,.8),0 6px 18px rgba(52,211,153,.6)}
.tile.dup{background:linear-gradient(160deg,#cbd5e1,#94a3b8);color:#0f1c33}
.tile.pop{animation:tpop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes tpop{0%{transform:scale(1)}50%{transform:scale(1.22)}100%{transform:scale(1)}}

/* ── Found words (mine) ── */
#found{width:96%;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;align-content:flex-start;
  flex-shrink:0;min-height:30px;max-height:64px;overflow:hidden;z-index:3;padding:2px 0 4px}
.ftag{background:rgba(255,255,255,.14);border-radius:11px;padding:3px 10px;font-size:13px;font-weight:800;
  color:#a5f3fc;border:1px solid rgba(255,255,255,.08);animation:tagIn .32s cubic-bezier(.34,1.56,.64,1)}
.ftag.big{color:#ffe082;background:rgba(255,215,0,.16);border-color:rgba(255,215,0,.35)}
@keyframes tagIn{0%{opacity:0;transform:scale(.4) translateY(8px)}100%{opacity:1;transform:scale(1)}}

/* ── Footer controls ── */
#foot{flex-shrink:0;display:flex;gap:14px;justify-content:center;align-items:center;padding:4px 0 calc(10px + env(safe-area-inset-bottom));z-index:3}
.fbtn{background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.16);border-radius:50%;
  width:50px;height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;font-size:9px;font-weight:700;gap:1px;cursor:pointer;transition:transform .1s}
.fbtn:active{transform:scale(.9)}
.fbtn .ic{font-size:18px}

/* ── FX canvas ── */
#fx{position:fixed;inset:0;pointer-events:none;z-index:60}
/* ── Toast ── */
#toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%) translateY(12px);
  background:rgba(8,12,22,.94);border-radius:18px;padding:8px 20px;font-size:14px;font-weight:800;
  opacity:0;pointer-events:none;transition:all .24s;z-index:70;white-space:nowrap;border:1px solid rgba(255,255,255,.1)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
/* ── floating +pts ── */
.fly{position:fixed;z-index:72;font-size:20px;font-weight:900;color:#34d399;text-shadow:0 2px 8px rgba(0,0,0,.6);pointer-events:none;will-change:transform,opacity}

/* ── Overlays ── */
.overlay{position:fixed;inset:0;background:rgba(5,10,20,.86);z-index:100;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center}
.overlay.on{display:flex;animation:fade .3s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.spinner{width:46px;height:46px;border:4px solid rgba(255,255,255,.2);border-top-color:#34d399;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.big-btn{background:linear-gradient(135deg,#22d3ee,#3b82f6);color:#fff;border:none;border-radius:18px;
  padding:14px 40px;font-size:18px;font-weight:900;cursor:pointer;font-family:inherit;
  box-shadow:0 8px 22px rgba(59,130,246,.5);transition:transform .1s}
.big-btn:active{transform:scale(.95)}
.big-btn.alt{background:linear-gradient(135deg,#34d399,#10b981);box-shadow:0 8px 22px rgba(16,185,129,.5)}
#waitTitle{font-size:22px;font-weight:900}
#waitMsg{font-size:14px;color:rgba(255,255,255,.7);max-width:300px;line-height:1.5}

/* round summary */
#rs h2{font-size:30px;font-weight:900;color:#ffe08a;text-shadow:0 0 18px rgba(255,224,138,.5)}
.rs-scores{display:flex;gap:26px;align-items:center}
.rs-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.rs-col .n{font-size:13px;font-weight:800;opacity:.8;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rs-col .s{font-size:40px;font-weight:900}
.rs-col .d{font-size:13px;font-weight:800}
.rs-col .d.up{color:#34d399}
.rs-sep{font-size:24px;font-weight:900;opacity:.5}
#rsMissed{font-size:13px;color:rgba(255,255,255,.65);max-width:320px;line-height:1.7}
#rsMissed b{color:#a5f3fc}

/* final */
#fnEmoji{font-size:64px;animation:tpop .6s cubic-bezier(.34,1.56,.64,1)}
#fnTitle{font-size:32px;font-weight:900}
#fnTitle.win{color:#34d399;text-shadow:0 0 22px rgba(52,211,153,.6)}
#fnTitle.lose{color:#f87171}
#fnTitle.tie{color:#fbbf24}
.fn-scores{display:flex;gap:30px}
</style>
</head>
<body>
<div id="root">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>

  <!-- header -->
  <div id="hdr">
    <div class="pcard me">
      <div class="av" id="meAv" style="--glow:#34d399">😀</div>
      <div class="pmeta"><div class="pname" id="meName">أنت</div><div class="pscore" id="meScore">0</div></div>
    </div>
    <div id="vs">VS</div>
    <div class="pcard opp">
      <div class="av" id="opAv" style="--glow:#f472b6">🤖</div>
      <div class="pmeta"><div class="pname" id="opName">الخصم</div><div class="pscore" id="opScore">0</div></div>
    </div>
  </div>

  <!-- round + timer -->
  <div id="bar">
    <div id="status">استعد…</div>
    <div id="timerWrap"><div id="timerFill"></div></div>
    <div id="subbar"><span>الحد الأدنى: 3 أحرف</span><span>•</span><span id="roundText">الجولة 1/3</span></div>
  </div>

  <!-- current word -->
  <div id="cur"></div>

  <!-- board -->
  <div id="boardWrap">
    <div id="board"><canvas id="link"></canvas></div>
  </div>

  <!-- found words -->
  <div id="found"></div>

  <!-- footer -->
  <div id="foot">
    <div class="fbtn" id="clearBtn"><span class="ic">↺</span><span>مسح</span></div>
    <div class="fbtn" id="muteBtn" onclick="toggleMute()"><span class="ic" id="muteIc">🔊</span><span>الصوت</span></div>
  </div>
</div>

<canvas id="fx"></canvas>
<div id="toast"></div>

<!-- waiting / connect overlay -->
<div class="overlay" id="wait">
  <div class="spinner" id="waitSpin"></div>
  <div id="waitTitle">جارٍ الاتصال…</div>
  <div id="waitMsg">بانتظار الخصم…</div>
</div>

<!-- round summary -->
<div class="overlay" id="rs">
  <h2 id="rsTitle">انتهت الجولة</h2>
  <div class="rs-scores">
    <div class="rs-col"><span class="n" id="rsMeName">أنت</span><span class="s" id="rsMeScore">0</span><span class="d up" id="rsMeDelta">+0</span></div>
    <div class="rs-sep">—</div>
    <div class="rs-col"><span class="n" id="rsOpName">الخصم</span><span class="s" id="rsOpScore">0</span><span class="d" id="rsOpDelta">+0</span></div>
  </div>
  <div id="rsMissed"></div>
  <div id="rsWaitMsg" style="font-size:13px;color:rgba(255,255,255,.6)">الجولة التالية تبدأ…</div>
</div>

<!-- final -->
<div class="overlay" id="final">
  <div id="fnEmoji">🏆</div>
  <div id="fnTitle" class="win">فزت!</div>
  <div class="fn-scores">
    <div class="rs-col"><span class="n" id="fnMeName">أنت</span><span class="s" id="fnMeScore" style="color:#34d399">0</span></div>
    <div class="rs-sep">—</div>
    <div class="rs-col"><span class="n" id="fnOpName">الخصم</span><span class="s" id="fnOpScore">0</span></div>
  </div>
  <button class="big-btn alt" id="againBtn">العب مرة أخرى ↻</button>
</div>

   so every game differs (no memorising). Online multiplayer uses
   the InGames Firebase contract; falls back to vs-bot offline.
   ============================================================ */

function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

/* ---------- grid generation + solving ---------- */
const NEI = (()=>{ // precompute 8-neighbours per cell index
  const n=[]; for(let i=0;i<CELLS;i++){ const r=(i/SIZE)|0,c=i%SIZE,a=[];
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){ if(!dr&&!dc)continue;
      const rr=r+dr,cc=c+dc; if(rr>=0&&rr<SIZE&&cc>=0&&cc<SIZE) a.push(rr*SIZE+cc); }
    n.push(a); } return n;
})();

function solveGrid(cells){
  const res = new Map();                 // word -> path (array of cell idx)
  const seen = new Uint8Array(CELLS);
  const path = [];
  function dfs(idx,node,str){
    const nbs = NEI[idx];
    for(let k=0;k<nbs.length;k++){
      const nb = nbs[k]; if(seen[nb]) continue;
      const child = node.ch[cells[nb]]; if(!child) continue;
      const s = str + cells[nb];
      seen[nb]=1; path.push(nb);
      if(child.end && s.length>=MIN_LEN && !res.has(s)) res.set(s, path.slice());
      if(s.length<MAX_LEN) dfs(nb,child,s);
      path.pop(); seen[nb]=0;
    }
  }
  for(let i=0;i<CELLS;i++){
    const child = TRIE.ch[cells[i]]; if(!child) continue;
    seen[i]=1; path.push(i);
    dfs(i,child,cells[i]);
    path.pop(); seen[i]=0;
  }
  return res;                            // Map(word -> path)
}

/* place a word along a random 8-connected simple path (fallback enrichment) */
function plantWord(cells, rng, word){
  const order=[]; for(let i=0;i<CELLS;i++) order.push(i);
  for(let i=order.length-1;i>0;i--){ const j=(rng()*(i+1))|0; [order[i],order[j]]=[order[j],order[i]]; }
  const used = new Uint8Array(CELLS);
  const out  = [];
  function walk(idx,pos){
    used[idx]=1; out.push(idx);
    if(pos===word.length-1) return true;
    const nbs = NEI[idx].slice();
    for(let i=nbs.length-1;i>0;i--){ const j=(rng()*(i+1))|0; [nbs[i],nbs[j]]=[nbs[j],nbs[i]]; }
    for(const nb of nbs){ if(!used[nb] && walk(nb,pos+1)) return true; }
    used[idx]=0; out.pop(); return false;
  }
  for(const start of order){ used.fill(0); out.length=0; if(walk(start,0)){
    out.forEach((ci,i)=> cells[ci]=word[i]); return true; } }
  return false;
}

function makeGrid(rng){
  let best=null, bestScore=-1;
  for(let attempt=0; attempt<70; attempt++){
    const cells=[]; for(let i=0;i<CELLS;i++) cells.push(WTABLE[(rng()*WTABLE.length)|0]);
    const words = solveGrid(cells);
    let long=0; for(const w of words.keys()) if(w.length>=4) long++;
    const score = words.size + long*3;
    if(words.size>=12 && long>=3) return {cells, words};
    if(score>bestScore){ bestScore=score; best={cells, words}; }
  }
  // enrichment fallback: plant a couple of bank words into the best grid
  const bankArr=[...BANK];
  const cells = best.cells.slice();
  for(let t=0;t<3;t++){ const w=bankArr[(rng()*bankArr.length)|0]; if(w.length<=5) plantWord(cells,rng,w); }
  return {cells, words: solveGrid(cells)};
}

let AC=null;
function audio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function beep(freq,dur,type,vol,when){
  if(muted)return; const ctx=audio(); if(!ctx)return;
  const t=ctx.currentTime+(when||0); const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(vol||.16,t+.02);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+dur+.02);
}
function sfxTap(n){ beep(380+Math.min(n,9)*42,.08,'triangle',.1); }
function sfxGood(){ [523,659,784].forEach((f,i)=>beep(f,.16,'sine',.15,i*.06)); }
function sfxBig(){ [659,784,988,1175].forEach((f,i)=>beep(f,.15,'triangle',.15,i*.05)); }
function sfxBad(){ beep(170,.16,'sawtooth',.11); }
function sfxWin(){ [523,659,784,1047,784,1047,1319].forEach((f,i)=>beep(f,.2,'sine',.17,i*.09)); }

/* ============================================================
   LAYOUT + RENDER
   ============================================================ */
function layout(){
  const wrap=$('boardWrap');
  const S=Math.min(wrap.clientWidth, wrap.clientHeight)-4;
  geom.S=S; geom.pad=S*0.035; geom.cell=(S-2*geom.pad)/SIZE; geom.tile=geom.cell*0.84;
  boardEl.style.width=S+'px'; boardEl.style.height=S+'px';
  const DPR=Math.min(window.devicePixelRatio||1,2);
  linkCv.width=S*DPR; linkCv.height=S*DPR; linkCv.style.width=S+'px'; linkCv.style.height=S+'px';
  linkCtx.setTransform(DPR,0,0,DPR,0,0);
  geom.cx=[]; geom.cy=[];
  for(let i=0;i<CELLS;i++){ const r=(i/SIZE)|0,c=i%SIZE;
    geom.cx[i]=geom.pad+geom.cell*c+geom.cell/2; geom.cy[i]=geom.pad+geom.cell*r+geom.cell/2; }
  positionTiles(); drawLinks();
}
function positionTiles(){
  const t=geom.tile;
  for(let i=0;i<CELLS;i++){
    const el=tiles[i]; if(!el) continue;
    el.style.width=t+'px'; el.style.height=t+'px';
    el.style.left=(geom.cx[i]-t/2)+'px'; el.style.top=(geom.cy[i]-t/2)+'px';
    el.style.fontSize=(t*0.5)+'px';
  }
}
let tiles=[];
function buildTiles(cells){
  tiles.forEach(e=>e.remove()); tiles=[];
  for(let i=0;i<CELLS;i++){
    const el=document.createElement('div'); el.className='tile'; el.textContent=cells[i];
    el.dataset.i=i; boardEl.appendChild(el); tiles[i]=el;
  }
  positionTiles(); drawLinks();
}
function drawLinks(){
  const ctx=linkCtx; ctx.clearRect(0,0,geom.S,geom.S);
  // static adjacency graph (faint) — only right/down/diagonals to avoid dupes
  ctx.lineWidth=Math.max(1.5,geom.cell*0.03); ctx.strokeStyle='rgba(255,255,255,.13)'; ctx.lineCap='round';
  ctx.beginPath();
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){ const i=r*SIZE+c;
    const link=(rr,cc)=>{ if(rr<SIZE&&cc>=0&&cc<SIZE){ const j=rr*SIZE+cc; ctx.moveTo(geom.cx[i],geom.cy[i]); ctx.lineTo(geom.cx[j],geom.cy[j]); } };
    link(r,c+1); link(r+1,c); link(r+1,c+1); link(r+1,c-1);
  }
  ctx.stroke();
  // active trace
  if(sel.length){
    const valid=isCurValid();
    ctx.lineJoin='round'; ctx.lineCap='round';
    ctx.lineWidth=Math.max(6,geom.cell*0.14);
    ctx.strokeStyle=valid?'rgba(52,211,153,.95)':'rgba(94,234,212,.95)';
    ctx.shadowColor=valid?'rgba(52,211,153,.9)':'rgba(34,211,238,.8)'; ctx.shadowBlur=14;
    ctx.beginPath(); ctx.moveTo(geom.cx[sel[0]],geom.cy[sel[0]]);
    for(let k=1;k<sel.length;k++) ctx.lineTo(geom.cx[sel[k]],geom.cy[sel[k]]);
    if(dragging&&pointerXY) ctx.lineTo(pointerXY.x,pointerXY.y);
    ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle=valid?'#34d399':'#5eead4';
    for(const i of sel){ ctx.beginPath(); ctx.arc(geom.cx[i],geom.cy[i],geom.cell*0.07,0,7); ctx.fill(); }
  }
}

/* ---------- current-word display ---------- */
function curStr(){ let s=''; for(const i of sel) s+=tiles[i].textContent; return s; }
function isCurValid(){ const s=curStr(); return s.length>=MIN_LEN && BANK.has(s) && !myFound.has(s); }
function isCurDup(){ const s=curStr(); return BANK.has(s) && myFound.has(s); }
function renderCur(){
  curEl.innerHTML=''; curEl.className='';
  if(isCurValid()) curEl.classList.add('good'); else if(isCurDup()) curEl.classList.add('dup');
  for(const i of sel){ const d=document.createElement('div'); d.className='curtile'; d.textContent=tiles[i].textContent; curEl.appendChild(d); }
  // tile state classes
  for(let i=0;i<CELLS;i++){ const el=tiles[i]; if(!el) continue;
    el.classList.toggle('sel', sel.includes(i) && !isCurValid() && !isCurDup());
    el.classList.toggle('good', sel.includes(i) && isCurValid());
    el.classList.toggle('dup', sel.includes(i) && isCurDup());
  }
}

/* ============================================================
   INPUT (drag-trace with adjacency enforcement)
   ============================================================ */
function cellAt(x,y){
  const c=Math.floor((x-geom.pad)/geom.cell), r=Math.floor((y-geom.pad)/geom.cell);
  if(r<0||r>=SIZE||c<0||c>=SIZE) return -1;
  const i=r*SIZE+c, dx=x-geom.cx[i], dy=y-geom.cy[i];
  return (dx*dx+dy*dy <= (geom.tile*0.56)**2) ? i : -1;
}
function adj(a,b){ const r1=(a/SIZE)|0,c1=a%SIZE,r2=(b/SIZE)|0,c2=b%SIZE; return Math.abs(r1-r2)<=1&&Math.abs(c1-c2)<=1&&a!==b; }
function localPt(e){ const rect=boardEl.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return {x:t.clientX-rect.left,y:t.clientY-rect.top}; }
function pushSel(i){ sel.push(i); sfxTap(sel.length); buzz(6); }
function tryExtend(i){
  if(i<0) return;
  if(sel.length && sel[sel.length-2]===i){ // backtrack
    sel.pop(); buzz(5); renderCur(); drawLinks(); return;
  }
  if(sel.includes(i)) return;
  if(sel.length===0 || adj(sel[sel.length-1],i)){ pushSel(i); renderCur(); drawLinks(); }
}
function onDown(e){
  if(!playing) return;
  audio();
  const p=localPt(e); const i=cellAt(p.x,p.y); if(i<0) return;
  e.preventDefault(); dragging=true; dragMoved=false;
  clearSel(); pushSel(i); pointerXY=p; renderCur(); drawLinks();
}
function onMove(e){
  if(!dragging) return; e.preventDefault();
  const p=localPt(e); pointerXY=p; const i=cellAt(p.x,p.y);
  if(i>=0 && i!==sel[sel.length-1]){ const before=sel.length; tryExtend(i); if(sel.length!==before) dragMoved=true; }
  drawLinks();
}
function onUp(){
  if(!dragging) return; dragging=false; pointerXY=null;
  submitWord(); drawLinks();
}
function clearSel(){ sel=[]; renderCur(); drawLinks(); }

/* ============================================================
   WORD SUBMISSION + SCORING
   ============================================================ */
function wordPoints(len){ const t=[0,0,0,10,25,50,90,140,200]; return t[Math.min(len,8)]; }
function submitWord(){
  const s=curStr();
  if(s.length<MIN_LEN){ clearSel(); return; }
  if(myFound.has(s)){ flashTiles('dup'); toast('وجدتها سابقاً ✓'); setTimeout(clearSel,260); return; }
  if(!BANK.has(s)){ sfxBad(); buzz(40); flashTiles('bad'); toast('ليست كلمة 🤔'); setTimeout(clearSel,300); return; }
  // valid!
  myFound.add(s);
  const pts=wordPoints(s.length);
  addMyScore(pts);
  sfxGood(); buzz([8,26,8]);
  if(s.length>=5){ sfxBig(); spawnConfetti(.5); }
  flyPoints(pts, s.length>=5);
  flashTiles('pop');
  addFoundTag(s, s.length>=5);
  toast(`+${pts}  ${s.length>=6?'🔥':s.length>=5?'⭐':'🎉'}`);
  setTimeout(clearSel,180);
}
function flashTiles(kind){
  for(const i of sel){ const el=tiles[i]; if(!el) continue;
    if(kind==='pop'){ el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
  }
  if(kind==='bad'||kind==='dup'){ /* visual handled by cur class already */ }
}
function addFoundTag(w,big){
  const t=document.createElement('div'); t.className='ftag'+(big?' big':''); t.textContent=w;
  foundEl.appendChild(t); foundEl.scrollTop=foundEl.scrollHeight;
}
function addMyScore(p){
  myScore+=p; const el=$('meScore'); el.textContent=myScore;
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
  if(IS_MP && _roomRef) _roomRef.child('scores/'+MY_IDX).set(myScore);
}
function setOpScore(v){
  if(v===opScore) return; const up=v>opScore; opScore=v;
  const el=$('opScore'); el.textContent=opScore;
  if(up){ el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');

}
function pulseAvatar(id){ const a=$(id); a.classList.add('turnglow'); setTimeout(()=>a.classList.remove('turnglow'),600); }

/* ============================================================
   ROUND / MATCH FLOW
   ============================================================ */
function generateGrids(seed){
  const rng=mulberry32(seed>>>0 || 1);
  grids=[]; for(let r=0;r<ROUNDS;r++) grids.push(makeGrid(rng));
}
function beginRound(round, startTs){
  curRound=round; curWords=grids[round].words; playing=true;
  myFound=new Set(); sel=[]; foundEl.innerHTML='';
  myRoundStart=myScore; opRoundStart=opScore;
  buildTiles(grids[round].cells);
  renderCur();
  $('roundText').textContent=`الجولة ${arNum(round+1)}/${arNum(ROUNDS)}`;
  setStatus(`الجولة ${arNum(round+1)} بدأت!`, true);
  hideOverlays();
  timerEnd = startTs + ROUND_DUR*1000;
  runTimer();
  if(!IS_MP) scheduleBot(round);
}
function runTimer(){
  cancelAnimationFrame(timerRAF);
  let lastSec=999;
  const tick=()=>{
    const now=mpNow();
    const remain=Math.max(0, timerEnd-now);
    const frac=remain/(ROUND_DUR*1000);
    const fill=$('timerFill');
    fill.style.transform=`scaleX(${frac})`;
    fill.className=''; if(frac<0.17) fill.classList.add('danger'); else if(frac<0.4) fill.classList.add('warn');
    const sec=Math.ceil(remain/1000);
    if(sec<=5 && sec!==lastSec && sec>0 && playing){ sfxTick(); lastSec=sec; }
    if(remain<=0){ onRoundTimeUp(); return; }
    timerRAF=requestAnimationFrame(tick);
  };
  tick();
}
function onRoundTimeUp(){
  if(!playing) return;
  playing=false; clearSel(); clearBot();
  buzz(60);
  // snapshot round deltas
  showRoundSummary();
  if(IS_MP){
    if(IS_HOST){
      if(curRound < ROUNDS-1) _roomRef.child('ctrl').set({round:curRound+1, startTs:firebase.database.ServerValue.TIMESTAMP, phase:'play'});
      else _roomRef.child('ctrl').set({phase:'final', ts:Date.now()});
    }
    // non-host waits for ctrl
  }else{
    setTimeout(()=>{
      if(curRound < ROUNDS-1) beginRound(curRound+1, performance.now()+0);
      else showFinal();
    }, 3200);
  }
}
function showRoundSummary(){
  const myD=myScore-myRoundStart, opD=opScore-opRoundStart;
  $('rsTitle').textContent=`انتهت الجولة ${arNum(curRound+1)}`;
  $('rsMeName').textContent=MY_NAME; $('rsOpName').textContent=OPP_NAME;
  $('rsMeScore').textContent=myScore; $('rsOpScore').textContent=opScore;
  $('rsMeDelta').textContent='+'+myD; $('rsMeDelta').className='d up';
  $('rsOpDelta').textContent='+'+opD; $('rsOpDelta').className='d'+(opD>0?' up':'');
  // best missed word
  let missed=''; if(curWords){
    let bestW=''; for(const w of curWords.keys()){ if(!myFound.has(w) && w.length>bestW.length) bestW=w; }
    if(bestW) missed=`أطول كلمة فاتتك: <b>${bestW}</b>`;
  }
  $('rsMissed').innerHTML=missed;
  $('rsWaitMsg').textContent = (IS_MP && !IS_HOST && curRound<ROUNDS-1) ? 'بانتظار الجولة التالية…'
        : (curRound<ROUNDS-1 ? 'الجولة التالية تبدأ…' : 'النتيجة النهائية…');
  $('rs').classList.add('on');
  beep(523,.12,'sine',.13); beep(659,.12,'sine',.13,.1);
}
function showFinal(){
  playing=false; clearBot(); hideOverlays();
  const fn=$('final'); const t=$('fnTitle'); const em=$('fnEmoji');
  $('fnMeName').textContent=MY_NAME; $('fnOpName').textContent=OPP_NAME;
  $('fnMeScore').textContent=myScore; $('fnOpScore').textContent=opScore;
  if(myScore>opScore){ t.textContent='فزت! 🎉'; t.className='win'; em.textContent='🏆'; sfxWin(); spawnConfetti(1); buzz([10,40,10,40,10,80]); }
  else if(myScore<opScore){ t.textContent='خسرت'; t.className='lose'; em.textContent='😔'; sfxBad(); }
  else { t.textContent='تعادل'; t.className='tie'; em.textContent='🤝'; sfxBig(); }

function hideOverlays(){ $('rs').classList.remove('on'); $('final').classList.remove('on'); $('wait').classList.remove('on'); }
function setStatus(txt,flash){ statusEl.textContent=txt; if(flash){ statusEl.style.opacity='0'; requestAnimationFrame(()=>{ statusEl.style.opacity='1'; }); } }
function arNum(n){ return String(n); }   /* western digits */
function mpNow(){ return IS_MP ? Date.now() : performance.now(); }

/* ============================================================
   BOT (offline opponent)
   ============================================================ */
function clearBot(){ botTimers.forEach(t=>clearTimeout(t)); botTimers=[]; }
function scheduleBot(round){
  clearBot();
  const words=[...grids[round].words.keys()];
  // pick a competitive subset (skew shorter; cap score)
  words.sort((a,b)=>a.length-b.length);
  const pool=words.slice(); // bot may know all; we throttle count
  const target = 5 + ((Math.random()*5)|0);   // 5..9 words
  const picks=[];
  const seenLen={};
  while(picks.length<target && pool.length){
    const idx=(Math.random()*Math.min(pool.length,14))|0; // bias toward shorter (front)
    const w=pool.splice(idx,1)[0];
    seenLen[w.length]=(seenLen[w.length]||0)+1;
    if(w.length>=6 && Math.random()<0.6) continue; // rarely grabs the longest
    picks.push(w);
  }
  picks.forEach(w=>{
    const at = 2500 + Math.random()*(ROUND_DUR*1000-5000);
    botTimers.push(setTimeout(()=>{
      if(!playing) return;
      setOpScore(opScore + wordPoints(w.length));
    }, at));
  });
}

/* ============================================================
   FX — confetti + flying points + toast
   ============================================================ */
const fx=$('fx'), fxc=fx.getContext('2d'); let parts=[], rafOn=false;
const COLORS=['#34d399','#22d3ee','#3b82f6','#a78bfa','#f472b6','#fbbf24','#a5f3fc'];
function sizeFx(){ fx.width=innerWidth; fx.height=innerHeight; }
function spawnConfetti(intensity){
  const count=Math.round(46*intensity); const ox=innerWidth/2, oy=innerHeight*0.42;
  for(let i=0;i<count;i++) parts.push({x:ox,y:oy,vx:(Math.random()-.5)*9,vy:Math.random()*-11-3,
    g:.32+Math.random()*.12,s:5+Math.random()*6,c:COLORS[(Math.random()*COLORS.length)|0],
    r:Math.random()*6.28,vr:(Math.random()-.5)*.3,life:1});
  if(parts.length>280) parts=parts.slice(-280);
  if(!rafOn){ rafOn=true; requestAnimationFrame(stepFx); }
}
function stepFx(){
  fxc.clearRect(0,0,fx.width,fx.height);
  for(let i=parts.length-1;i>=0;i--){ const p=parts[i];
    p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; p.life-=.008;
    if(p.y>fx.height+20||p.life<=0){ parts.splice(i,1); continue; }
    fxc.save(); fxc.translate(p.x,p.y); fxc.rotate(p.r); fxc.globalAlpha=Math.max(0,Math.min(1,p.life));
    fxc.fillStyle=p.c; fxc.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); fxc.restore();
  }
  if(parts.length){ requestAnimationFrame(stepFx); } else { rafOn=false; fxc.clearRect(0,0,fx.width,fx.height); }
}
function flyPoints(pts,big){
  const el=document.createElement('div'); el.className='fly'; el.textContent='+'+pts;
  if(big){ el.style.color='#ffe082'; el.style.fontSize='26px'; }
  const sx=innerWidth/2, sy=innerHeight*0.5; el.style.left=sx+'px'; el.style.top=sy+'px';
  document.body.appendChild(el);
  const tgt=$('meScore').getBoundingClientRect();
  const dx=(tgt.left+tgt.width/2)-sx, dy=(tgt.top+tgt.height/2)-sy;
  el.animate([{transform:'translate(0,0) scale(1)',opacity:1},
    {transform:`translate(${dx*.4}px,${dy*.3-26}px) scale(1.25)`,opacity:1,offset:.4},
    {transform:`translate(${dx}px,${dy}px) scale(.5)`,opacity:0}],
    {duration:850,easing:'cubic-bezier(.4,0,.2,1)'}).onfinish=()=>el.remove();
}
let toastT; function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'),1200); }

/* ---------- avatars ---------- */
function avatarFor(name,el,emojiFallback){
  const ch=(name||'').trim()[0];
  const hue=(()=>{ let h=0; for(const c of (name||'x')) h=(h*31+c.charCodeAt(0))%360; return h; })();
  el.style.background=`linear-gradient(135deg,hsl(${hue},70%,55%),hsl(${(hue+40)%360},70%,45%))`;
  el.textContent = ch && /[؀-ۿa-zA-Z]/.test(ch) ? ch : emojiFallback;
}

/* ============================================================
   ONLINE MULTIPLAYER (InGames contract)
   ============================================================ */
function showWaitFail(msg){
  if(_watchdog){ clearTimeout(_watchdog); _watchdog=null; }
  $('waitSpin').style.display='none';
  $('waitTitle').textContent='تعذر الاتصال';
  $('waitMsg').innerHTML=msg+'<br><br>';
  if(!$('soloEscape')){
    const b=document.createElement('button'); b.id='soloEscape'; b.className='big-btn alt'; b.style.marginTop='8px';
    b.textContent='🤖 اللعب ضد الكمبيوتر'; b.onclick=()=>{ hideOverlays(); startSolo(); };
    $('wait').appendChild(b);
  }
}
async function initMP(){
  $('wait').classList.add('on');
  const stage=m=>{ $('waitTitle').textContent=m; };
  _watchdog=setTimeout(()=>showWaitFail('انتهت المهلة. تحقّق من الاتصال.'),8000);
  try{
    if(typeof firebase==='undefined') throw new Error('تعذّر تحميل Firebase — قد تكون الشبكة محجوبة.');
    stage('تهيئة الاتصال'); const app=firebase.initializeApp(_fbConfig);
    stage('تسجيل الدخول'); const _auth=firebase.auth(app);
    try{ await _auth.setPersistence(firebase.auth.Auth.Persistence.NONE); }catch(_){}
    const _cred=await Promise.race([ _auth.signInAnonymously(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('انتهت مهلة تسجيل الدخول')),7000)) ]);
    const MY_UID=(_cred&&_cred.user&&_cred.user.uid)||('u'+Date.now()+Math.random());
    stage('فتح الغرفة'); _db=firebase.database(app);
    _roomRef=_db.ref('rooms/'+ROOM_ID+'/'+GAME_KEY); _connectedAt=Date.now();
    stage('الانضمام للغرفة');
    const seatRef=_roomRef.child('seats');
    const claim=await seatRef.transaction(seats=>{ seats=seats||{};
      if(seats['0']===MY_UID){ return seats; } if(seats['1']===MY_UID){ return seats; }
      const hint=(MY_IDX===1)?1:0;
      if(seats[String(hint)]==null){ seats[String(hint)]=MY_UID; return seats; }
      const other=String(1-hint); if(seats[other]==null){ seats[other]=MY_UID; return seats; } return; });
    if(!claim.committed||!claim.snapshot.exists()) throw new Error('الغرفة ممتلئة.');
    const seats=claim.snapshot.val()||{}; MY_IDX=(seats['0']===MY_UID)?0:1; IS_HOST=(MY_IDX===0);
    seatRef.child(String(MY_IDX)).onDisconnect().remove();
    await _roomRef.child('players/'+MY_IDX).set(true);
    _roomRef.child('players/'+MY_IDX).onDisconnect().remove();
    if(_watchdog){ clearTimeout(_watchdog); _watchdog=null; }
    stage('بانتظار الخصم'); $('waitMsg').textContent='بانتظار الخصم للانضمام…';
    seatRef.on('value',snap=>{ const s=snap.val()||{}, count=(s['0']?1:0)+(s['1']?1:0);
      if(count>=2 && !_bothPresent){ _bothPresent=true; seatRef.off('value'); onBothPresent(); }
      else if(count<2){ $('waitMsg').textContent='بانتظار الخصم… ('+count+'/2)'; } });
  }catch(e){ console.error(e); showWaitFail((e&&e.message)||'خطأ غير معروف'); }
}
function onBothPresent(){
  // host seeds the match (once)
  _roomRef.child('match').transaction(cur=> cur || { seed:(Math.random()*1e9|0)+1, ts:Date.now() });
  _roomRef.child('match').on('value',s=>{ const m=s.val(); if(m && m.seed!==_lastSeed){ _lastSeed=m.seed; startMatch(m); } });
  _roomRef.child('ctrl').on('value',s=>{ const c=s.val(); if(c) onCtrl(c); });
  _roomRef.child('scores/'+(1-MY_IDX)).on('value',s=> setOpScore(s.val()||0));
  _roomRef.child('rematch').on('value',s=>{ const v=s.val(); if(v && v.ts>_connectedAt && IS_HOST) hostRematch(); });
}
function startMatch(m){
  matchStarted=true; hideOverlays();
  $('againBtn').textContent='العب مرة أخرى ↻';
  myScore=0; opScore=0; $('meScore').textContent='0'; $('opScore').textContent='0';
  curRound=-1; playing=false;
  generateGrids(m.seed);
  if(IS_HOST) _roomRef.child('ctrl').set({round:0, startTs:firebase.database.ServerValue.TIMESTAMP, phase:'play'});
}
function onCtrl(c){
  if(c.phase==='final'){ showFinal(); return; }
  if(c.phase==='play' && typeof c.startTs==='number'){
    if(c.round!==curRound || !playing){ beginRound(c.round, c.startTs); }
  }
}
function hostRematch(){
  _roomRef.child('scores/0').set(0); _roomRef.child('scores/1').set(0);
  _roomRef.child('match').set({ seed:(Math.random()*1e9|0)+1, ts:Date.now() });
}

/* ============================================================
   SOLO
   ============================================================ */
function startSolo(){
  matchStarted=true; hideOverlays();
  myScore=0; opScore=0; $('meScore').textContent='0'; $('opScore').textContent='0';
  generateGrids((Math.random()*1e9|0)+1);
  beginRound(0, performance.now());
}

/* ============================================================
   BOOT
   ============================================================ */
function bindInput(){
  boardEl.addEventListener('pointerdown',onDown);
  boardEl.addEventListener('pointermove',onMove);
  window.addEventListener('pointerup',onUp);
  window.addEventListener('pointercancel',onUp);
  if(!window.PointerEvent){
    boardEl.addEventListener('touchstart',onDown,{passive:false});
    boardEl.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('touchend',onUp);
  }
  $('clearBtn').addEventListener('click',clearSel);
  $('againBtn').addEventListener('click',()=>{
    if(IS_MP){
      if(IS_HOST){ hostRematch(); }
      else if(_roomRef){ _roomRef.child('rematch').set({from:MY_IDX,ts:Date.now()}); $('againBtn').textContent='بانتظار المضيف…'; }
    } else { startSolo(); }
  });
}
function setNames(){
  $('meName').textContent=MY_NAME; $('opName').textContent=OPP_NAME;
  $('fnMeName').textContent=MY_NAME; $('fnOpName').textContent=OPP_NAME;
  avatarFor(MY_NAME,$('meAv'),'😀'); avatarFor(OPP_NAME,$('opAv'),IS_MP?'🙂':'🤖');
}
let _rt; window.addEventListener('resize',()=>{ clearTimeout(_rt); _rt=setTimeout(()=>{ sizeFx(); layout(); },120); });
window.addEventListener('orientationchange',()=>setTimeout(layout,250));
document.addEventListener('visibilitychange',()=>{ if(!document.hidden && playing) runTimer(); });

sizeFx(); setNames(); layout(); bindInput();

if(params.get('demo')){
  // quick QA: jump into a solo round immediately
  startSolo();
}else if(IS_MP){
  initMP();
}else{
  // offline: show a brief start, then play vs bot
  $('wait').classList.add('on'); $('waitSpin').style.display='none';
  $('waitTitle').textContent='صيد الكلمات';
  $('waitMsg').textContent='ارسم الكلمات بربط الأحرف المتجاورة. اجمع أكبر عدد من النقاط في ٣ جولات!';
  if(!$('soloStart')){
    const b=document.createElement('button'); b.id='soloStart'; b.className='big-btn'; b.style.marginTop='6px';
    b.textContent='ابدأ اللعب ▶'; b.onclick=()=>{ audio(); hideOverlays(); startSolo(); };
    $('wait').appendChild(b);
  }
}
</script>
