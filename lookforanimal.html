<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ابحث عن الحيوان</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#b87ecf;font-family:'Noto Kufi Arabic','Segoe UI',Tahoma,Arial,sans-serif;direction:rtl}

#root{
  width:100vw;height:100vh;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(135deg,#d4a8e8 0%,#b078cb 50%,#8a50aa 100%);
  padding:8px;gap:6px;
}

/* ── Title ── */
#ttl{color:#fff;font-size:clamp(16px,5vw,22px);font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,0.3);flex-shrink:0}

/* ── Scorebar ── */
#scorebar{display:flex;gap:8px;flex-shrink:0}
.sp{
  background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);
  border-radius:16px;padding:3px 12px;color:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;gap:4px;
}

/* ── Temp bar ── */
#tempbar{
  background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);
  border-radius:30px;padding:5px 10px;
  display:flex;gap:12px;align-items:center;justify-content:center;
  width:100%;flex-shrink:0;
}
.ti{display:flex;align-items:center;gap:3px;color:#fff;font-size:11px;font-weight:700;opacity:.65;transition:all .25s}
.ti.on{opacity:1;transform:scale(1.18)}

/* ── Grid ── */
#grid-wrap{
  background:rgba(160,100,190,0.4);border:1px solid rgba(255,255,255,0.3);
  border-radius:14px;padding:7px;width:100%;
  flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#grid{
  display:grid;
  /* columns set by JS */
  gap:3px;width:100%;
}
.cell{
  border-radius:8px;
  background:rgba(200,150,220,0.4);border:1px solid rgba(255,255,255,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;
  transition:background .15s,transform .1s;
  position:relative;aspect-ratio:1;
}
.cell:active{transform:scale(.93)}
.cell.on-fire{background:linear-gradient(135deg,#ff9800,#ff5722)!important;box-shadow:0 0 12px rgba(255,100,0,.6)}
.cell.hot{background:linear-gradient(135deg,#ff6b6b,#ee3333)!important;box-shadow:0 0 8px rgba(255,50,50,.4)}
.cell.warm{background:linear-gradient(135deg,#c084e0,#9b59b6)!important}
.cell.cold{background:linear-gradient(135deg,#81d4fa,#4fc3f7)!important}
.cell.ice{background:linear-gradient(135deg,#b3e5fc,#29b6f6)!important}
.cell.found{background:linear-gradient(135deg,#66ff88,#22cc55)!important;box-shadow:0 0 16px rgba(34,204,85,.7);animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
.clue{position:absolute;top:1px;left:2px;font-size:10px;opacity:.75;pointer-events:none}
@keyframes pop{0%{transform:scale(.5)}60%{transform:scale(1.2)}100%{transform:scale(1)}}

/* ── Temp indicator ── */
#temp-ind{
  color:#fff;font-size:clamp(12px,3.5vw,16px);font-weight:900;
  text-align:center;min-height:22px;text-shadow:0 1px 6px rgba(0,0,0,.3);
  flex-shrink:0;
}

/* ── Status ── */
#status{
  background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);
  border-radius:12px;padding:8px 12px;width:100%;text-align:center;
  color:#fff;flex-shrink:0;
}
#st-title{font-size:clamp(13px,4vw,17px);font-weight:900}
#st-sub{font-size:11px;opacity:.85;margin-top:2px}

/* ── Next btn ── */
#next-btn{
  background:#2979ff;border:none;border-radius:12px;padding:10px 0;width:100%;
  color:#fff;font-family:inherit;font-size:clamp(13px,4vw,16px);font-weight:900;
  cursor:pointer;display:none;flex-shrink:0;
  box-shadow:0 4px 14px rgba(41,121,255,.4);
}
#next-btn.on{display:block}

/* ── Confetti ── */
.conf{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:99;animation:fall linear forwards}
@keyframes fall{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(110vh) rotate(540deg)}}
</style>
</head>
<body>
<div id="root">
  <div id="ttl">🔍 ابحث عن الحيوان</div>

  <div id="scorebar">
    <div class="sp">🏆 <span id="sc">0</span></div>
    <div class="sp">🎮 جولة <span id="rnd">1</span></div>
    <div class="sp">👆 <span id="taps">0</span> نقرة</div>
  </div>

  <div id="tempbar">
    <div class="ti" id="t-fire">🔥 ناري!</div>
    <div class="ti" id="t-hot">🌶️ حار</div>
    <div class="ti" id="t-warm">💜 دافئ</div>
    <div class="ti" id="t-cold">🥶 بارد</div>
  </div>

  <div id="grid-wrap"><div id="grid"></div></div>

  <div id="temp-ind">انقر على أي خلية للبدء!</div>

  <div id="status">
    <div id="st-title">🐾 ابحث عن الحيوان المخفي!</div>
    <div id="st-sub">استخدم درجة الحرارة كدليل</div>
  </div>

  <button id="next-btn" onclick="nextRound()">الحيوان التالي ←</button>
</div>

<script>
const ANIMALS=[
  {e:'🦁',n:'أسد'},{e:'🐘',n:'فيل'},{e:'🦒',n:'زرافة'},{e:'🐯',n:'نمر'},
  {e:'🦊',n:'ثعلب'},{e:'🐼',n:'باندا'},{e:'🦋',n:'فراشة'},{e:'🐸',n:'ضفدع'},
  {e:'🦜',n:'ببغاء'},{e:'🦔',n:'قنفذ'},{e:'🐢',n:'سلحفاة'},{e:'🦭',n:'فقمة'},
  {e:'🐊',n:'تمساح'},{e:'🦚',n:'طاووس'},{e:'🦀',n:'سرطان'},{e:'🐡',n:'نافخة'},
  {e:'🦎',n:'سحلية'},{e:'🐺',n:'ذئب'},{e:'🦝',n:'راكون'},{e:'🐻',n:'دب'},
  {e:'🦙',n:'لاما'},{e:'🦅',n:'نسر'},{e:'🐓',n:'ديك'},{e:'🦩',n:'نحام'},
  {e:'🐬',n:'دولفين'},
];
const CLUES={fire:'🔥',hot:'🌶️',warm:'💜',cold:'🥶',ice:'❄️'};
const TLABELS={
  fire:'🔥 ناري! أنت قريب جداً!',
  hot:'🌶️ حار جداً! اقترب أكثر!',
  warm:'💜 دافئ.. في الاتجاه الصحيح',
  cold:'🥶 بارد.. ابتعدت',
  ice:'❄️ جليدي! ابعد ما يكون!',
};

const COLS=5,ROWS=5,TOTAL=COLS*ROWS;

let S={target:0,animal:null,taps:0,found:false,score:0,round:1,used:new Set(),history:[]};

function initRound(){
  if(S.used.size>=ANIMALS.length)S.used.clear();
  let a;do{a=ANIMALS[Math.floor(Math.random()*ANIMALS.length)];}while(S.used.has(a.e));
  S.used.add(a.e);S.animal=a;
  S.target=Math.floor(Math.random()*TOTAL);
  S.taps=0;S.found=false;S.history=[];

  buildGrid();
  document.getElementById('st-title').textContent=`🐾 ابحث عن الـ ${a.n}!`;
  document.getElementById('st-sub').textContent='استخدم درجة الحرارة كدليل';
  document.getElementById('temp-ind').textContent='انقر على أي خلية للبدء!';
  document.getElementById('next-btn').classList.remove('on');
  document.getElementById('rnd').textContent=S.round;
  document.getElementById('taps').textContent='0';
  ['t-fire','t-hot','t-warm','t-cold'].forEach(id=>document.getElementById(id).classList.remove('on'));
}

function buildGrid(){
  const grid=document.getElementById('grid');
  // Calculate cell size to fit container
  const wrap=document.getElementById('grid-wrap');
  const avail=Math.min(wrap.offsetWidth-14,wrap.offsetHeight-14);
  const cellSz=Math.floor(avail/COLS)-3;
  grid.style.gridTemplateColumns=`repeat(${COLS},1fr)`;
  grid.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const c=document.createElement('div');
    c.className='cell';c.dataset.i=i;
    c.style.fontSize=Math.max(14,cellSz*0.42)+'px';
    c.addEventListener('click',()=>onCell(i));
    grid.appendChild(c);
  }
}

function onCell(i){
  if(S.found)return;
  if(S.history.find(h=>h.i===i))return;
  S.taps++;
  document.getElementById('taps').textContent=S.taps;
  const cell=document.querySelector(`.cell[data-i="${i}"]`);

  if(i===S.target){win(cell);return;}

  const dist=getDist(i,S.target);
  const temp=getTemp(dist);
  S.history.push({i,temp});
  cell.classList.add(temp);
  const clue=document.createElement('span');clue.className='clue';clue.textContent=CLUES[temp];
  cell.appendChild(clue);
  document.getElementById('temp-ind').textContent=TLABELS[temp];
  setTempBar(temp);
}

function win(cell){
  S.found=true;
  cell.classList.add('found');cell.textContent=S.animal.e;
  const pts=Math.max(10,100-(S.taps-1)*10);
  S.score+=pts;
  document.getElementById('sc').textContent=S.score;
  document.getElementById('temp-ind').textContent='🎉 وجدته!';
  document.getElementById('st-title').textContent=`وجدت الـ ${S.animal.n}! ${S.animal.e}`;
  document.getElementById('st-sub').textContent=`${S.taps} نقرة — +${pts} نقطة!`;
  document.getElementById('next-btn').classList.add('on');
  setTempBar('fire');
  confetti();
}

function nextRound(){S.round++;initRound();}

function getDist(a,b){
  const ar=Math.floor(a/COLS),ac=a%COLS,br=Math.floor(b/COLS),bc=b%COLS;
  return Math.abs(ar-br)+Math.abs(ac-bc);
}
function getTemp(d){
  if(d<=1)return'fire';if(d===2)return'hot';if(d===3)return'warm';if(d<=5)return'cold';return'ice';
}
function setTempBar(temp){
  const map={fire:'t-fire',hot:'t-hot',warm:'t-warm',cold:'t-cold',ice:'t-cold'};
  ['t-fire','t-hot','t-warm','t-cold'].forEach(id=>document.getElementById(id).classList.remove('on'));
  const el=document.getElementById(map[temp]);if(el)el.classList.add('on');
}

function confetti(){
  const colors=['#ff6b35','#f5c842','#66ff88','#80d8ff','#ff80ab'];
  for(let i=0;i<25;i++){
    const el=document.createElement('div');el.className='conf';
    el.style.cssText=`left:${20+Math.random()*60}%;top:${Math.random()*15}%;background:${colors[i%colors.length]};animation-duration:${1.5+Math.random()*1.5}s;animation-delay:${Math.random()*0.4}s`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),3000);
  }
}

window.addEventListener('resize',()=>{if(!S.found)buildGrid();});
initRound();
</script>
</body>
</html>
