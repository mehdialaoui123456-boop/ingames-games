<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>لعبة البالونات</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 50%, #FFE4B5 100%);
    touch-action: none;
    position: fixed;
    inset: 0;
  }

  #game { position: absolute; inset: 0; overflow: hidden; }

  /* HUD ----------------------------------------------------------------- */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 10;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(0,0,0,0.30), rgba(0,0,0,0));
  }
  .pill {
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 18px;
    font-weight: 700;
    min-width: 90px;
    text-align: center;
  }

  /* Balloons ------------------------------------------------------------ */
  .balloon {
    position: absolute;
    width: 80px;
    height: 96px;
    border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
    box-shadow: inset -10px -14px 18px rgba(0,0,0,0.25),
                inset 8px 8px 14px rgba(255,255,255,0.4);
    will-change: transform;
    cursor: pointer;
    /* Bigger invisible hit area around the balloon for easier tapping */
  }
  .balloon::before {
    /* invisible larger hit area */
    content: "";
    position: absolute;
    inset: -16px;
  }
  .balloon::after {
    content: "";
    position: absolute;
    left: 50%; bottom: -14px;
    width: 2px; height: 16px;
    background: rgba(0,0,0,0.4);
    transform: translateX(-50%);
  }
  .balloon.pop {
    transition: transform 200ms ease-out, opacity 200ms ease-out;
    transform: scale(1.7) !important;
    opacity: 0;
    pointer-events: none;
  }

  /* Floating +1 --------------------------------------------------------- */
  .score-float {
    position: absolute;
    color: #fff;
    font-weight: 800;
    font-size: 24px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    pointer-events: none;
    transition: transform 700ms ease-out, opacity 700ms ease-out;
  }

  /* Overlays ------------------------------------------------------------ */
  .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100;
    color: #fff;
    text-align: center;
    padding: 24px;
  }
  .overlay h1 { font-size: 34px; margin-bottom: 10px; }
  .overlay p  { font-size: 17px; margin-bottom: 22px; opacity: 0.9; line-height: 1.5; }
  .big-score { font-size: 64px; font-weight: 800; margin: 6px 0 22px; color: #FFD93D; }
  .btn {
    background: #FF6B6B;
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 19px;
    font-weight: 700;
    padding: 14px 38px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 0 #C44;
    transition: transform 80ms, box-shadow 80ms;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #C44; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="game">
  <div id="hud">
    <div class="pill">⏱️ <span id="time">30</span></div>
    <div class="pill">🎯 <span id="score">0</span></div>
  </div>

  <div id="start" class="overlay">
    <h1>🎈 لعبة البالونات</h1>
    <p>اضغط على البالونات لتفجيرها<br>قبل أن ينفد الوقت!</p>
    <button class="btn" id="startBtn">ابدأ اللعب</button>
  </div>

  <div id="end" class="overlay hidden">
    <h1>انتهى الوقت!</h1>
    <p>نقاطك:</p>
    <div class="big-score" id="finalScore">0</div>
    <button class="btn" id="restartBtn">العب مرة أخرى</button>
  </div>
</div>

<script>
(function () {
  // ── State ────────────────────────────────────────────────────────────
  const colors = ['#FF6B6B', '#FFD93D', '#6BCB77', '#4D96FF', '#FF9F45', '#C780FA', '#FF6FB5'];
  const game        = document.getElementById('game');
  const timeEl      = document.getElementById('time');
  const scoreEl     = document.getElementById('score');
  const finalEl     = document.getElementById('finalScore');
  const startView   = document.getElementById('start');
  const endView     = document.getElementById('end');
  const startBtn    = document.getElementById('startBtn');
  const restartBtn  = document.getElementById('restartBtn');

  let W = 0, H = 0;
  let balloons = [];
  let score = 0;
  let timeLeft = 30;
  let running = false;
  let lastSpawn = 0;
  let lastTime = 0;
  let timerInterval = null;
  let rafId = null;

  // ── Sizing ───────────────────────────────────────────────────────────
  function measure() {
    W = game.clientWidth  || window.innerWidth;
    H = game.clientHeight || window.innerHeight;
  }
  window.addEventListener('resize', measure);
  window.addEventListener('orientationchange', () => setTimeout(measure, 100));

  // ── Button bindings (both click and touchstart, important for WebView) ─
  function bindButton(el, fn) {
    el.addEventListener('click', fn);
    el.addEventListener('touchend', (e) => { e.preventDefault(); fn(); }, { passive: false });
  }
  bindButton(startBtn, startGame);
  bindButton(restartBtn, startGame);

  // ── Game loop ────────────────────────────────────────────────────────
  function startGame() {
    measure();
    // Reset
    balloons.forEach(b => b.el.remove());
    balloons = [];
    document.querySelectorAll('.score-float').forEach(el => el.remove());
    score = 0; timeLeft = 30; running = true; lastSpawn = 0;
    scoreEl.textContent = '0';
    timeEl.textContent  = '30';
    startView.classList.add('hidden');
    endView.classList.add('hidden');

    // Countdown
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      timeEl.textContent = timeLeft;
      if (timeLeft <= 0) endGame();
    }, 1000);

    // Animation loop
    lastTime = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function endGame() {
    running = false;
    clearInterval(timerInterval);
    timerInterval = null;
    finalEl.textContent = score;
    endView.classList.remove('hidden');
  }

  function loop(now) {
    if (!running) return;
    const dt = Math.min(50, now - lastTime) / 1000; // seconds, clamped
    lastTime = now;

    // Spawn cadence
    if (now - lastSpawn > 600) {
      spawnBalloon();
      lastSpawn = now;
    }

    // Update balloons
    for (let i = balloons.length - 1; i >= 0; i--) {
      const b = balloons[i];
      b.y -= b.speed * dt;
      b.x += b.drift * dt;
      b.el.style.transform = `translate(${b.x}px, ${b.y}px)`;
      if (b.y < -120) {
        b.el.remove();
        balloons.splice(i, 1);
      }
    }

    rafId = requestAnimationFrame(loop);
  }

  function spawnBalloon() {
    const el = document.createElement('div');
    el.className = 'balloon';
    const color = colors[Math.floor(Math.random() * colors.length)];
    el.style.background = `radial-gradient(circle at 30% 30%, ${lighten(color, 0.35)}, ${color})`;

    const size = 70 + Math.random() * 30;
    el.style.width  = size + 'px';
    el.style.height = (size * 1.2) + 'px';

    const startX = 20 + Math.random() * (W - size - 40);
    const startY = H + 20;
    const speed  = 80 + Math.random() * 80;          // px/sec upward
    const drift  = (Math.random() - 0.5) * 40;       // px/sec horizontal

    const obj = { el, x: startX, y: startY, speed, drift };
    el.style.transform = `translate(${startX}px, ${startY}px)`;

    // Tap handler (touchstart for instant response on mobile)
    const pop = (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      if (el.classList.contains('pop')) return;
      el.classList.add('pop');
      score++;
      scoreEl.textContent = score;

      // Get tap location for the +1 float
      let x, y;
      if (ev.touches && ev.touches[0]) {
        x = ev.touches[0].clientX; y = ev.touches[0].clientY;
      } else if (ev.changedTouches && ev.changedTouches[0]) {
        x = ev.changedTouches[0].clientX; y = ev.changedTouches[0].clientY;
      } else {
        x = ev.clientX; y = ev.clientY;
      }
      showFloatScore(x, y);

      setTimeout(() => {
        el.remove();
        const idx = balloons.indexOf(obj);
        if (idx >= 0) balloons.splice(idx, 1);
      }, 220);
    };
    el.addEventListener('touchstart', pop, { passive: false });
    el.addEventListener('mousedown', pop);

    game.appendChild(el);
    balloons.push(obj);
  }

  function showFloatScore(x, y) {
    const s = document.createElement('div');
    s.className = 'score-float';
    s.textContent = '+1';
    s.style.left = (x - 10) + 'px';
    s.style.top  = (y - 20) + 'px';
    s.style.transform = 'translateY(0)';
    s.style.opacity = '1';
    game.appendChild(s);
    // Trigger transition next frame
    requestAnimationFrame(() => {
      s.style.transform = 'translateY(-50px)';
      s.style.opacity = '0';
    });
    setTimeout(() => s.remove(), 700);
  }

  function lighten(hex, amount) {
    const c = hex.replace('#', '');
    const r = parseInt(c.substr(0, 2), 16);
    const g = parseInt(c.substr(2, 2), 16);
    const b = parseInt(c.substr(4, 2), 16);
    const ll = v => Math.min(255, Math.round(v + (255 - v) * amount));
    return `rgb(${ll(r)}, ${ll(g)}, ${ll(b)})`;
  }

  // Initial measurement — try a few times in case WebView reports 0
  measure();
  setTimeout(measure, 100);
  setTimeout(measure, 500);
})();
</script>
</body>
</html>
