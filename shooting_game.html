<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>لعبة الرماية</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Always fill the full viewport ──
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); player.x = canvas.width / 2; player.y = canvas.height - 80; });

// Short aliases
let W = () => canvas.width;
let H = () => canvas.height;

// ── State ──
let state = 'start';
let score = 0, lives = 3, frame = 0;
let animId;

// ── Player ──
const player = { x: 0, y: 0, w: 40, h: 40, speed: 6 };
let dragging = false, dragStartX = 0, playerStartX = 0;

// ── Bullets ──
let bullets = [];
const BULLET_SPEED = 14, BULLET_W = 5, BULLET_H = 18;
let bulletCooldown = 0, BULLET_RATE = 14;

// ── Enemies ──
let enemies = [];
const ENEMY_RADIUS = 26;
let enemySpeed = 1.4, spawnRate = 70;

// ── Explosions ──
let explosions = [];

// ── Stars (generated once, reused) ──
let stars = [];
function buildStars() {
  stars = Array.from({length: 55}, () => ({
    x: Math.random() * W(),
    y: Math.random() * H(),
    r: Math.random() * 1.5 + 0.3,
    speed: Math.random() * 0.5 + 0.2,
  }));
}
buildStars();

// ── Init player position ──
player.x = W() / 2;
player.y = H() - 80;

// ─────────────────────────────────────────────
//  Input — no passive: false (Flutter WebView compat)
// ─────────────────────────────────────────────
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  if (state === 'start' || state === 'gameover') { startGame(); return; }
  dragging = true;
  dragStartX  = t.clientX;
  playerStartX = player.x;
}, false);

canvas.addEventListener('touchmove', e => {
  if (!dragging || state !== 'playing') return;
  const t = e.touches[0];
  const dx = t.clientX - dragStartX;
  player.x = Math.max(player.w / 2, Math.min(W() - player.w / 2, playerStartX + dx));
}, false);

canvas.addEventListener('touchend', () => { dragging = false; }, false);

// Mouse (desktop preview)
canvas.addEventListener('mousedown', e => {
  if (state === 'start' || state === 'gameover') { startGame(); return; }
  dragging = true; dragStartX = e.clientX; playerStartX = player.x;
});
canvas.addEventListener('mousemove', e => {
  if (!dragging || state !== 'playing') return;
  const dx = e.clientX - dragStartX;
  player.x = Math.max(player.w/2, Math.min(W()-player.w/2, playerStartX + dx));
});
canvas.addEventListener('mouseup', () => { dragging = false; });

// ─────────────────────────────────────────────
//  Game logic
// ─────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; frame = 0;
  bullets = []; enemies = []; explosions = [];
  player.x = W() / 2; player.y = H() - 80;
  enemySpeed = 1.4; spawnRate = 70;
  state = 'playing';
}

function spawnEnemy() {
  const x = ENEMY_RADIUS + Math.random() * (W() - ENEMY_RADIUS * 2);
  enemies.push({ x, y: -ENEMY_RADIUS, r: ENEMY_RADIUS });
}

function fireBullet() {
  bullets.push({ x: player.x, y: player.y - player.h / 2, w: BULLET_W, h: BULLET_H });
}

function addExplosion(x, y) {
  for (let i = 0; i < 10; i++) {
    explosions.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      life: 1,
      decay: 0.06 + Math.random() * 0.04,
    });
  }
}

function rectCircleOverlap(rx, ry, rw, rh, cx, cy, cr) {
  const nx = Math.max(rx, Math.min(cx, rx + rw));
  const ny = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nx, dy = cy - ny;
  return dx * dx + dy * dy < cr * cr;
}

function update() {
  frame++;

  // Difficulty ramp
  if (frame % 400 === 0) {
    enemySpeed = Math.min(enemySpeed + 0.3, 6);
    spawnRate  = Math.max(spawnRate - 5, 28);
  }

  if (frame % spawnRate === 0) spawnEnemy();

  // Auto fire
  bulletCooldown--;
  if (bulletCooldown <= 0) { fireBullet(); bulletCooldown = BULLET_RATE; }

  // Move bullets
  bullets = bullets.filter(b => b.y + b.h > 0);
  bullets.forEach(b => b.y -= BULLET_SPEED);

  // Move enemies
  enemies.forEach(e => e.y += enemySpeed);

  // Bullet ↔ enemy collisions
  bullets = bullets.filter(b => {
    let hit = false;
    enemies = enemies.filter(e => {
      if (!hit && rectCircleOverlap(b.x - b.w/2, b.y, b.w, b.h, e.x, e.y, e.r)) {
        hit = true; score++; addExplosion(e.x, e.y); return false;
      }
      return true;
    });
    return !hit;
  });

  // Enemy reaches bottom
  enemies = enemies.filter(e => {
    if (e.y - e.r > H()) {
      lives--;
      addExplosion(e.x, H() - 20);
      if (lives <= 0) { state = 'gameover'; cancelAnimationFrame(animId); }
      return false;
    }
    return true;
  });

  // Update explosions
  explosions.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= p.decay; });
  explosions = explosions.filter(p => p.life > 0);

  // Move stars
  stars.forEach(s => { s.y += s.speed; if (s.y > H()) { s.y = 0; s.x = Math.random() * W(); } });
}

// ─────────────────────────────────────────────
//  Draw
// ─────────────────────────────────────────────
function drawStars() {
  ctx.fillStyle = '#fff';
  stars.forEach(s => {
    ctx.globalAlpha = 0.4 + s.r * 0.2;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  const x = player.x, y = player.y, w = player.w, h = player.h;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x, y - h/2);
  ctx.lineTo(x + w/2, y + h/2);
  ctx.lineTo(x - w/2, y + h/2);
  ctx.closePath();
  ctx.stroke();
  // Thruster flicker
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x - 8, y + h/2);
  ctx.lineTo(x, y + h/2 + 10 + Math.random() * 6);
  ctx.lineTo(x + 8, y + h/2);
  ctx.stroke();
}

function drawBullets() {
  ctx.fillStyle = '#fff';
  bullets.forEach(b => ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h));
}

function drawEnemies() {
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  enemies.forEach(e => {
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.stroke();
  });
}

function drawExplosions() {
  explosions.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawHUD() {
  const fs = Math.max(18, Math.min(28, W() * 0.07));
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fs}px monospace`;
  ctx.textAlign = 'right';
  ctx.fillText(score, W() - 24, fs + 16);

  ctx.textAlign = 'left';
  const heartSize = Math.max(9, Math.min(13, W() * 0.033));
  for (let i = 0; i < 3; i++) {
    ctx.strokeStyle = i < lives ? '#fff' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.8;
    drawHeart(24 + i * (heartSize * 2.8), fs + 18, heartSize);
  }
}

function drawHeart(cx, cy, size) {
  ctx.save(); ctx.translate(cx, cy);
  ctx.beginPath();
  ctx.moveTo(0, size * 0.3);
  ctx.bezierCurveTo(-size, -size * 0.3, -size, size * 0.5, 0, size);
  ctx.bezierCurveTo( size,  size * 0.5,  size, -size * 0.3, 0, size * 0.3);
  ctx.stroke();
  ctx.restore();
}

function drawStart() {
  drawStars();
  const cx = W() / 2, cy = H() / 2;
  const titleFs = Math.max(22, Math.min(36, W() * 0.09));
  const subFs   = Math.max(13, Math.min(18, W() * 0.045));

  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.font = `bold ${titleFs}px monospace`;
  ctx.fillText('لعبة الرماية', cx, cy - 80);

  ctx.font = `${subFs}px monospace`;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('حرّك المدفع يميناً ويساراً', cx, cy - 30);
  ctx.fillText('أسقط الأعداء قبل أن يصلوا للأسفل', cx, cy);

  const btnW = Math.min(160, W() * 0.42);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.strokeRect(cx - btnW/2, cy + 40, btnW, 52);
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.max(16,Math.min(22,W()*0.055))}px monospace`;
  ctx.fillText('ابدأ', cx, cy + 74);
}

function drawGameOver() {
  drawStars();
  const cx = W() / 2, cy = H() / 2;
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.font = `bold ${Math.max(24,Math.min(38,W()*0.09))}px monospace`;
  ctx.fillText('انتهت اللعبة', cx, cy - 80);
  ctx.font = `${Math.max(16,Math.min(26,W()*0.065))}px monospace`;
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillText('النقاط: ' + score, cx, cy - 30);

  const btnW = Math.min(180, W() * 0.46);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.strokeRect(cx - btnW/2, cy + 30, btnW, 52);
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.max(14,Math.min(20,W()*0.05))}px monospace`;
  ctx.fillText('العب مجدداً', cx, cy + 64);
}

function draw() {
  ctx.clearRect(0, 0, W(), H());
  if (state === 'start')    { drawStart();    return; }
  if (state === 'gameover') { drawGameOver(); return; }
  drawStars();
  drawBullets();
  drawEnemies();
  drawExplosions();
  drawPlayer();
  drawHUD();
}

// ─────────────────────────────────────────────
//  Loop
// ─────────────────────────────────────────────
function loop() {
  if (state === 'playing') update();
  draw();
  animId = requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
