<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>حُماة الحديقة</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    touch-action:none; position:fixed; inset:0;
    font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    background:#6fb33a; color:#23380f;
  }
  #game { position:fixed; inset:0; overflow:hidden; }
  canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* ---------- full-screen menu / end screens ---------- */
  .screen { position:absolute; inset:0; z-index:30;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px; gap:16px;
    background:linear-gradient(180deg,#bfe9ff 0%,#d9f7c4 45%,#9bd86a 100%); }
  .hidden { display:none !important; }
  h1 { font-size:11vw; font-weight:900; color:#2f8f2f;
       text-shadow:0 3px 0 #1f6a1f, 0 6px 14px rgba(0,0,0,.18); line-height:1.05; }
  .sub { font-size:4.4vw; font-weight:700; color:#3a6020; }
  .emoji-big { font-size:18vw; line-height:1; filter:drop-shadow(0 6px 8px rgba(0,0,0,.25)); }
  .card { background:rgba(255,255,255,0.82); border-radius:26px; padding:18px 22px; max-width:480px;
    box-shadow:0 12px 30px rgba(40,80,20,0.22); }
  .howto { font-size:4.3vw; line-height:1.8; color:#3a6020; font-weight:600; }
  .btn { font-family:inherit; font-size:6vw; font-weight:900; color:#fff;
    background:linear-gradient(180deg,#54c24a,#3a9a32);
    border:none; border-radius:999px; padding:16px 40px; min-width:60px; min-height:60px;
    box-shadow:0 6px 0 #2c7a26, 0 10px 18px rgba(0,0,0,.18); cursor:pointer; position:relative; }
  .btn:active { transform:translateY(3px); box-shadow:0 3px 0 #2c7a26; }
  .btn.alt { background:linear-gradient(180deg,#e6b54a,#cf9a26); box-shadow:0 6px 0 #a87c14,0 10px 18px rgba(0,0,0,.18); }
  .btn.alt:active { box-shadow:0 3px 0 #a87c14; }
  .btnRow { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }

  /* ---------- level select ---------- */
  #levelGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px;
    width:100%; max-width:430px; }
  .lvl { background:rgba(255,255,255,0.9); border-radius:20px; padding:14px 6px;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    box-shadow:0 6px 0 #cdd9bd; cursor:pointer; position:relative; }
  .lvl .n { font-size:8vw; font-weight:900; color:#3a9a32; }
  .lvl .t { font-size:3.2vw; font-weight:700; color:#5a7a3a; }
  .lvl.locked { opacity:.55; }
  .lvl.locked .n { color:#9aa78c; }
  .lvl .lock { position:absolute; top:6px; left:8px; font-size:4.6vw; }
  .lvl:active:not(.locked) { transform:translateY(3px); box-shadow:0 3px 0 #cdd9bd; }
  .star { color:#f1b32a; font-size:3.4vw; letter-spacing:1px; }

  /* ---------- in-game HUD ---------- */
  #hud { position:absolute; top:8px; left:8px; right:8px; display:flex;
    align-items:flex-start; justify-content:space-between; gap:8px;
    pointer-events:none; z-index:20; }
  #sunBox { background:linear-gradient(180deg,#fff7d6,#ffe79a);
    border:3px solid #e3b94a; border-radius:14px; padding:4px 12px 4px 8px;
    display:flex; align-items:center; gap:6px; box-shadow:0 4px 10px rgba(0,0,0,.18);
    min-width:78px; justify-content:center; }
  #sunBox .si { font-size:6.4vw; line-height:1; }
  #sunVal { font-size:6vw; font-weight:900; color:#6b4a12; }
  #waveBox { flex:1; max-width:60%; margin-top:2px; }
  #waveLabel { font-size:3.5vw; font-weight:800; color:#fff; text-align:center;
    text-shadow:0 1px 2px rgba(0,0,0,.55); margin-bottom:3px; }
  #waveBar { position:relative; height:12px; border-radius:999px;
    background:rgba(0,0,0,.45); overflow:hidden; box-shadow:inset 0 1px 2px rgba(0,0,0,.4); }
  #waveFill { position:absolute; inset:0 100% 0 0; width:0%;
    background:linear-gradient(90deg,#7ed957,#f1d34a,#e8602f); border-radius:999px;
    transition:width .15s linear; }
  #waveFlag { position:absolute; top:-7px; left:-2px; font-size:4vw; }

  /* ---------- bottom seed shop ---------- */
  #shop { position:absolute; left:0; right:0; bottom:0; z-index:22;
    display:flex; gap:6px; justify-content:center; align-items:flex-end;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(94,62,32,.0),rgba(72,46,22,.55)); }
  .seed { width:60px; background:linear-gradient(180deg,#fff4d8,#f3dca2);
    border:3px solid #b98a3e; border-radius:12px; padding:4px 2px 3px;
    display:flex; flex-direction:column; align-items:center; position:relative;
    overflow:hidden; box-shadow:0 4px 8px rgba(0,0,0,.25); }
  .seed canvas { width:46px; height:40px; display:block; }
  .seed .cost { font-size:3.4vw; font-weight:900; color:#7a5410; line-height:1; margin-top:1px; }
  .seed.sel { border-color:#fff; box-shadow:0 0 0 3px #54c24a, 0 4px 8px rgba(0,0,0,.3); }
  .seed.broke { filter:grayscale(.6) brightness(.85); }
  .seed .cool { position:absolute; left:0; right:0; top:0; height:0%;
    background:rgba(20,30,10,.6); pointer-events:none; }
  .seed::after { content:""; position:absolute; inset:-8px; } /* larger hit area */

  #sound { position:absolute; top:50px; left:8px; z-index:25;
    background:rgba(0,0,0,0.45); color:#fff; border:none; border-radius:999px;
    width:42px; height:42px; font-size:20px; }

  /* center banner (huge wave / level cleared) */
  #banner { position:absolute; left:0; right:0; top:34%; z-index:24; text-align:center;
    pointer-events:none; opacity:0; }
  #banner span { display:inline-block; font-size:9vw; font-weight:900; color:#ffec84;
    text-shadow:0 3px 0 #a5402a, 0 6px 16px rgba(0,0,0,.4); }
  @keyframes bannerPop { 0%{opacity:0; transform:scale(.5);} 15%{opacity:1; transform:scale(1.08);}
    80%{opacity:1; transform:scale(1);} 100%{opacity:0; transform:scale(1.05);} }
  #banner.show { animation:bannerPop 2s ease forwards; }
</style>
</head>
<body>
<div id="game">
  <canvas id="cv"></canvas>

  <!-- intro -->
  <section id="startScreen" class="screen">
    <div class="emoji-big">🌻</div>
    <h1>حُماة الحديقة</h1>
    <div class="card">
      <p class="howto">
        اجمع <b>الشمس ☀️</b> ثم ازرع النباتات لصدّ زحف الزومبي 🧟<br>
        🌻 تُنتج الشمس · 🌱 الرامي يطلق · 🥜 جدار صلب<br>
        ❄️ يُبطئ · 🔁 يطلق مرتين · 🍒 ينفجر!
      </p>
    </div>
    <button id="startBtn" class="btn">ابدأ اللعب</button>
  </section>

  <!-- level select -->
  <section id="levelScreen" class="screen hidden">
    <h1 style="font-size:8vw">اختر المستوى</h1>
    <p class="sub">انتصر لتفتح المستوى التالي</p>
    <div id="levelGrid"></div>
    <button id="backHome" class="btn alt" style="font-size:5vw;padding:12px 30px">رجوع</button>
  </section>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="sunBox"><span class="si">☀️</span><span id="sunVal">75</span></div>
    <div id="waveBox">
      <div id="waveLabel">المستوى 1 · الموجة 1/5</div>
      <div id="waveBar"><div id="waveFill"></div><div id="waveFlag">🏴</div></div>
    </div>
  </div>

  <div id="shop" class="hidden"></div>
  <div id="banner"><span></span></div>

  <!-- end -->
  <section id="endScreen" class="screen hidden">
    <div class="emoji-big" id="endEmoji">🏆</div>
    <h1 id="endTitle">انتصرت!</h1>
    <div class="card"><p class="howto" id="endMsg">حديقة آمنة 🌼</p></div>
    <div class="btnRow">
      <button id="nextBtn" class="btn">المستوى التالي</button>
      <button id="menuBtn" class="btn alt">القائمة</button>
    </div>
  </section>

  <button id="sound" class="hidden">🔊</button>
</div>

<script>
(function () {
  "use strict";

  var game=document.getElementById("game");
  var cv=document.getElementById("cv"), ctx=cv.getContext("2d");
  var startScreen=document.getElementById("startScreen");
  var levelScreen=document.getElementById("levelScreen");
  var levelGrid=document.getElementById("levelGrid");
  var endScreen=document.getElementById("endScreen");
  var hud=document.getElementById("hud"), shop=document.getElementById("shop");
  var startBtn=document.getElementById("startBtn"), backHome=document.getElementById("backHome");
  var nextBtn=document.getElementById("nextBtn"), menuBtn=document.getElementById("menuBtn");
  var sunVal=document.getElementById("sunVal");
  var waveLabel=document.getElementById("waveLabel"), waveFill=document.getElementById("waveFill");
  var endEmoji=document.getElementById("endEmoji"), endTitle=document.getElementById("endTitle"), endMsg=document.getElementById("endMsg");
  var soundBtn=document.getElementById("sound");
  var banner=document.getElementById("banner"), bannerTxt=banner.querySelector("span");

  function toAr(n){ return String(n); }  // always English (Western) digits

  // ---------------- audio (tiny synth, no assets) ----------------
  var AC=null, soundOn=true;
  function audio(){ if(!AC){ try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){AC=null;} }
    if(AC&&AC.state==="suspended")AC.resume(); return AC; }
  function beep(f,d,t,v){ if(!soundOn)return; var a=audio(); if(!a)return;
    var o=a.createOscillator(),g=a.createGain(); o.type=t||"square"; o.frequency.value=f; g.gain.value=v||0.07;
    o.connect(g); g.connect(a.destination); var tt=a.currentTime; g.gain.setValueAtTime(g.gain.value,tt);
    g.gain.exponentialRampToValueAtTime(0.0001,tt+d); o.start(tt); o.stop(tt+d); }
  function noiseBurst(d,v){ if(!soundOn)return; var a=audio(); if(!a)return;
    var n=Math.floor(a.sampleRate*d),buf=a.createBuffer(1,n,a.sampleRate),dd=buf.getChannelData(0);
    for(var i=0;i<n;i++)dd[i]=(Math.random()*2-1)*(1-i/n);
    var s=a.createBufferSource(); s.buffer=buf; var g=a.createGain(); g.gain.value=v||0.12; s.connect(g); g.connect(a.destination); s.start(); }
  function sPlant(){ beep(330,0.1,"triangle",0.10); }
  function sShoot(){ beep(560,0.05,"square",0.04); setTimeout(function(){beep(700,0.05,"square",0.03);},30); }
  function sSun(){ beep(880,0.08,"triangle",0.09); setTimeout(function(){beep(1175,0.09,"triangle",0.09);},60); }
  function sChomp(){ noiseBurst(0.1,0.10); beep(130,0.1,"sawtooth",0.07); }
  function sDie(){ beep(180,0.18,"sawtooth",0.10); }
  function sWave(){ beep(294,0.14,"square",0.09); setTimeout(function(){beep(392,0.18,"square",0.09);},130); }
  function sBig(){ beep(180,0.2,"sawtooth",0.11); setTimeout(function(){beep(140,0.3,"sawtooth",0.11);},150); }
  function sBoom(){ noiseBurst(0.3,0.18); beep(90,0.3,"sawtooth",0.14); }
  function sMower(){ beep(120,0.4,"sawtooth",0.10); }
  function sWin(){ [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){beep(f,0.18,"triangle",0.1);},i*120); }); }
  function sLose(){ beep(300,0.2,"sawtooth",0.12); setTimeout(function(){beep(180,0.35,"sawtooth",0.12);},170); }

  // ---------------- dims & grid ----------------
  var W=0,H=0,DPR=1;
  var ROWS=5, COLS=6;
  var gridX=0, gridY=0, cellW=0, cellH=0, mowerX=0;
  var clouds=[];
  function measure(){
    W=game.clientWidth||window.innerWidth; H=game.clientHeight||window.innerHeight;
    DPR=Math.min(window.devicePixelRatio||1, 2);
    cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
    cv.style.width=W+"px"; cv.style.height=H+"px";
    ctx.setTransform(DPR,0,0,DPR,0,0);
    var top=64, bottom=96, leftMargin=30, rightMargin=8;
    gridX=leftMargin; gridY=top;
    cellW=(W-leftMargin-rightMargin)/COLS;
    cellH=(H-top-bottom)/ROWS;
    mowerX=gridX-13;
    if(!clouds.length){ for(var i=0;i<3;i++) clouds.push({x:Math.random()*W, y:18+Math.random()*30, s:0.7+Math.random()*0.6, v:6+Math.random()*8}); }
  }
  window.addEventListener("resize", measure);
  window.addEventListener("orientationchange", function(){ setTimeout(measure,150); });
  measure();

  // ---------------- content config ----------------
  var PLANTS = {
    sun:    { name:"دوّار الشمس", cost:50,  hp:6,  recharge:6,  kind:"producer" },
    pea:    { name:"الرامي",      cost:100, hp:6,  recharge:5,  kind:"shooter", dmg:2, rate:1.35 },
    wall:   { name:"الجدار",      cost:50,  hp:34, recharge:14, kind:"wall" },
    snow:   { name:"الثلجي",      cost:175, hp:6,  recharge:6,  kind:"shooter", dmg:2, rate:1.5, slow:true },
    repeat: { name:"المزدوج",     cost:200, hp:6,  recharge:6,  kind:"shooter", dmg:2, rate:1.35, dbl:true },
    cherry: { name:"القنبلة",     cost:150, hp:1,  recharge:25, kind:"bomb" }
  };
  var ZTYPE = {
    basic:  { hp:10, sp:1.00, gear:null },
    cone:   { hp:22, sp:1.00, gear:"cone" },
    bucket: { hp:42, sp:0.95, gear:"bucket" },
    fast:   { hp:8,  sp:1.85, gear:null, run:true },
    flag:   { hp:14, sp:1.10, gear:"flag" }
  };
  var LEVELS = [
    { name:"البداية",   waves:5, sun:75,  types:["basic"],                       plants:["sun","pea","wall"],                 speed:1.00 },
    { name:"الأقماع",   waves:6, sun:75,  types:["basic","cone"],                plants:["sun","pea","wall","cherry"],        speed:1.05 },
    { name:"العَدّاؤون", waves:7, sun:75,  types:["basic","cone","fast"],         plants:["sun","pea","wall","snow","cherry"], speed:1.10 },
    { name:"الدِّلاء",   waves:8, sun:100, types:["basic","cone","bucket","fast"],plants:["sun","pea","wall","snow","repeat","cherry"], speed:1.15 },
    { name:"الزحف",     waves:9, sun:100, types:["basic","cone","bucket","fast"],plants:["sun","pea","wall","snow","repeat","cherry"], speed:1.22 },
    { name:"الكابوس",   waves:10,sun:125, types:["basic","cone","bucket","fast"],plants:["sun","pea","wall","snow","repeat","cherry"], speed:1.32 }
  ];

  // progress (unlocked levels)
  function getProgress(){ var n=parseInt(localStorage.getItem("gardenProgress")||"1",10); return isNaN(n)?1:Math.max(1,n); }
  function setProgress(n){ try{ localStorage.setItem("gardenProgress", String(n)); }catch(e){} }

  // ---------------- state ----------------
  var running=false, paused=false;
  var curLevel=0;
  var sun=75, selected=null;
  var plants=[], zombies=[], shots=[], suns=[], fx=[];
  var mowers=[];               // per row: {state:'ready'|'run'|'gone', x}
  var cool={};                 // type -> seconds remaining recharge
  var spawnQueue=[];           // {type, t}
  var waveNum=1, wavesTotal=5, waveInit=1, betweenWaves=false, breakT=0, gameTime=0;

  function resetGame(){
    var L=LEVELS[curLevel];
    sun=L.sun; selected=null;
    plants=[]; zombies=[]; shots=[]; suns=[]; fx=[]; spawnQueue=[];
    cool={}; gameTime=0; betweenWaves=false; breakT=0;
    wavesTotal=L.waves; waveNum=1;
    mowers=[]; for(var r=0;r<ROWS;r++) mowers.push({state:"ready", x:mowerX});
    sunVal.textContent=toAr(sun);
    buildShop(L);
    startWave(1);
    updateWaveBar();
  }

  function show(el){ el.classList.remove("hidden"); }
  function hide(el){ el.classList.add("hidden"); }

  function showBanner(txt,color){
    bannerTxt.textContent=txt; if(color) bannerTxt.style.color=color; else bannerTxt.style.color="#ffec84";
    banner.classList.remove("show"); void banner.offsetWidth; banner.classList.add("show");
  }

  // ---------------- navigation ----------------
  function showHome(){ running=false; hide(hud); hide(shop); hide(soundBtn); hide(endScreen); hide(levelScreen); show(startScreen); }
  function showLevels(){
    running=false; hide(hud); hide(shop); hide(soundBtn); hide(endScreen); hide(startScreen);
    buildLevelSelect(); show(levelScreen);
  }
  function buildLevelSelect(){
    var unlocked=getProgress();
    levelGrid.innerHTML="";
    LEVELS.forEach(function(L,i){
      var locked = (i+1)>unlocked;
      var d=document.createElement("div");
      d.className="lvl"+(locked?" locked":"");
      d.innerHTML='<div class="n">'+toAr(i+1)+'</div><div class="t">'+L.name+'</div>'+
        '<div class="star">'+(locked?"":"★").repeat(0)+'</div>'+
        (locked?'<div class="lock">🔒</div>':'');
      if(!locked) bindTap(d, function(){ startLevel(i); });
      levelGrid.appendChild(d);
    });
  }
  function startLevel(i){
    curLevel=i; audio(); measure();
    hide(startScreen); hide(levelScreen); hide(endScreen);
    show(hud); show(shop); show(soundBtn);
    resetGame();
    running=true; last=0; requestAnimationFrame(loop);
  }
  function endLevel(win){
    running=false;
    hide(hud); hide(shop);
    if(win){
      var unlockedTo=curLevel+2;
      if(unlockedTo>getProgress()) setProgress(Math.min(unlockedTo, LEVELS.length));
      endEmoji.textContent="🏆"; endTitle.textContent="انتصرت!";
      endMsg.textContent="نجوت من المستوى "+toAr(curLevel+1)+" 🌼";
      var hasNext = curLevel+1 < LEVELS.length;
      nextBtn.textContent = hasNext ? "المستوى التالي" : "أعد اللعب";
      nextBtn._target = hasNext ? curLevel+1 : curLevel;
      sWin();
    } else {
      endEmoji.textContent="🧟"; endTitle.textContent="اخترق الزومبي!";
      endMsg.textContent="حاول مرة أخرى 💪";
      nextBtn.textContent="حاول مجدداً"; nextBtn._target=curLevel;
      sLose();
    }
    show(endScreen);
  }

  // ---------------- shop ----------------
  var shopItems=[];
  function buildShop(L){
    shop.innerHTML=""; shopItems=[];
    L.plants.forEach(function(type){
      var P=PLANTS[type];
      var d=document.createElement("div");
      d.className="seed"; d.setAttribute("data-plant",type);
      var c=document.createElement("canvas"); c.width=46*2; c.height=40*2; c.style.width="46px"; c.style.height="40px";
      var g=c.getContext("2d"); g.setTransform(2,0,0,2,0,0);
      drawPlant(g, type, 23, 22, 30, 0, 1);
      var cost=document.createElement("div"); cost.className="cost"; cost.textContent=toAr(P.cost);
      var cl=document.createElement("div"); cl.className="cool";
      d.appendChild(c); d.appendChild(cost); d.appendChild(cl);
      d._type=type; d._cool=cl;
      bindTap(d, function(){ selectPlant(type); });
      shop.appendChild(d); shopItems.push(d);
    });
    updateShop();
  }
  function selectPlant(type){
    if((cool[type]||0)>0) return;
    selected = (selected===type)? null : type;
    updateShop();
  }
  function updateShop(){
    shopItems.forEach(function(it){
      var t=it._type, P=PLANTS[t];
      var cd=cool[t]||0;
      if(sun<P.cost || cd>0) it.classList.add("broke"); else it.classList.remove("broke");
      if(selected===t) it.classList.add("sel"); else it.classList.remove("sel");
      it._cool.style.height = cd>0 ? Math.round(100*cd/P.recharge)+"%" : "0%";
    });
  }

  // ---------------- input ----------------
  function rectPoint(e){
    var p=(e.touches&&e.touches[0])?e.touches[0]:(e.changedTouches&&e.changedTouches[0])?e.changedTouches[0]:e;
    var r=game.getBoundingClientRect(); return { x:p.clientX-r.left, y:p.clientY-r.top };
  }
  function tapWorld(e){
    if(!running) return;
    var p=rectPoint(e);
    // collect suns first
    for(var i=suns.length-1;i>=0;i--){
      var s=suns[i];
      if(Math.abs(s.x-p.x)<30 && Math.abs(s.y-p.y)<30){
        sun+=s.val; sunVal.textContent=toAr(sun); suns.splice(i,1); sSun(); updateShop(); return;
      }
    }
    if(!selected) return;
    if(p.y < gridY || p.y > gridY+cellH*ROWS) return;
    if(p.x < gridX) return;
    var col=Math.floor((p.x-gridX)/cellW), row=Math.floor((p.y-gridY)/cellH);
    if(col<0||col>=COLS||row<0||row>=ROWS) return;
    for(var k=0;k<plants.length;k++) if(plants[k].row===row && plants[k].col===col) return;
    var P=PLANTS[selected];
    if(sun < P.cost) return;
    if((cool[selected]||0)>0) return;
    sun -= P.cost; sunVal.textContent=toAr(sun);
    cool[selected]=P.recharge;
    var px=gridX+col*cellW+cellW/2, py=gridY+row*cellH+cellH/2;
    plants.push({ row:row, col:col, type:selected, hp:P.hp, maxhp:P.hp, cd:(P.kind==="producer"?4:0.4), x:px, y:py, fuse:(P.kind==="bomb"?0.45:0), t:0 });
    sPlant();
    selected=null;   // re-pick the seed packet for each plant (PvZ-style)
    updateShop();
  }
  game.addEventListener("touchstart", function(e){
    if(e.target.closest && (e.target.closest("#shop")||e.target.closest(".btn")||e.target.closest(".lvl")||e.target.closest("#sound"))) return;
    e.preventDefault(); tapWorld(e);
  }, { passive:false });
  game.addEventListener("mousedown", function(e){
    if(e.target.closest && (e.target.closest("#shop")||e.target.closest(".btn")||e.target.closest(".lvl")||e.target.closest("#sound"))) return;
    tapWorld(e);
  });

  function bindTap(el, fn){
    var fired=false;
    el.addEventListener("touchstart", function(e){ e.preventDefault(); e.stopPropagation(); fired=true; fn(); }, { passive:false });
    el.addEventListener("mousedown", function(e){ if(fired){fired=false;return;} e.preventDefault(); e.stopPropagation(); fn(); });
  }
  bindTap(startBtn, showLevels);
  bindTap(backHome, showHome);
  bindTap(menuBtn, showLevels);
  bindTap(nextBtn, function(){ startLevel(nextBtn._target!=null?nextBtn._target:curLevel); });
  bindTap(soundBtn, function(){ soundOn=!soundOn; soundBtn.textContent=soundOn?"🔊":"🔇"; if(soundOn)audio(); });

  // ---------------- waves ----------------
  function pickType(L, n, isFinal){
    var t=L.types;
    if(t.length===1) return t[0];
    var r=Math.random();
    var pool=t.slice();
    // bias toward tougher types in later waves
    var prog=n/L.waves;
    if(prog<0.35) { if(r<0.8) return "basic"; }
    if(isFinal && Math.random()<0.4 && pool.indexOf("bucket")>=0) return "bucket";
    return pool[Math.floor(Math.random()*pool.length)];
  }
  function startWave(n){
    var L=LEVELS[curLevel];
    var isFinal = (n===L.waves);
    var count = 2 + n + Math.floor(curLevel*0.8);
    if(isFinal) count = Math.floor(count*1.7)+2;
    var gap = Math.max(0.85, 2.8 - curLevel*0.14 - n*0.08);
    var t = (n===1 ? 6 : 1.6);
    if(isFinal){ spawnQueue.push({type:"flag", t:t}); t+=1.0; showBanner("موجة ضخمة!", "#ff7a55"); sBig(); }
    else if(n>1){ sWave(); }
    for(var i=0;i<count;i++){
      spawnQueue.push({ type:pickType(L,n,isFinal), t:t });
      t += gap*(0.6+Math.random()*0.8);
    }
    waveInit = spawnQueue.length + zombies.length;
    updateWaveBar();
  }
  function updateWaveBar(){
    var within = 1 - (spawnQueue.length + zombies.length)/Math.max(1,waveInit);
    if(within<0) within=0; if(within>1) within=1;
    var fillv = (waveNum-1 + within)/wavesTotal;
    if(fillv<0)fillv=0; if(fillv>1)fillv=1;
    waveFill.style.width = (fillv*100).toFixed(1)+"%";
    waveLabel.textContent = "المستوى "+toAr(curLevel+1)+" · الموجة "+toAr(waveNum)+"/"+toAr(wavesTotal);
  }

  function spawnZombie(type){
    var Z=ZTYPE[type], L=LEVELS[curLevel];
    var row=Math.floor(Math.random()*ROWS);
    var baseSp=(cellW/5.2)*Z.sp*L.speed;
    zombies.push({ row:row, x:W+24, hp:Z.hp, maxhp:Z.hp, sp:baseSp, type:type, gear:Z.gear,
      gearHp:(Z.gear==="cone"?8:Z.gear==="bucket"?16:0), eat:0, slow:0, t:Math.random()*6 });
  }

  // ---------------- update ----------------
  function update(dt){
    gameTime+=dt;
    // recharge cooldowns
    for(var key in cool){ if(cool[key]>0){ cool[key]-=dt; if(cool[key]<0)cool[key]=0; } }

    // sky sun
    skySunTimer-=dt;
    if(skySunTimer<=0){ dropSky(); skySunTimer=7+Math.random()*3; }

    // spawn queue
    for(var q=spawnQueue.length-1;q>=0;q--){ spawnQueue[q].t-=dt; }
    // spawn the earliest ready (keep order-ish)
    for(var q2=0;q2<spawnQueue.length;q2++){
      if(spawnQueue[q2].t<=0){ spawnZombie(spawnQueue[q2].type); spawnQueue.splice(q2,1); q2--; }
    }

    // wave progression
    if(spawnQueue.length===0 && zombies.length===0 && !betweenWaves){
      if(waveNum>=wavesTotal){ endLevel(true); return; }
      betweenWaves=true; breakT=3.5;
    }
    if(betweenWaves){
      breakT-=dt;
      if(breakT<=0){ betweenWaves=false; waveNum++; startWave(waveNum); }
    }

    // plants
    for(var i=plants.length-1;i>=0;i--){
      var pl=plants[i], P=PLANTS[pl.type]; pl.t+=dt;
      if(pl.type==="cherry"){
        pl.fuse-=dt;
        if(pl.fuse<=0){ cherryBoom(pl); plants.splice(i,1); }
        continue;
      }
      pl.cd-=dt;
      if(P.kind==="producer" && pl.cd<=0){
        suns.push({ x:pl.x, y:pl.y-cellH*0.1, vy:0, life:10, val:25, ground:true, bob:0 });
        pl.cd=7; sSun();
      }
      if(P.kind==="shooter" && pl.cd<=0){
        var has=false;
        for(var z=0;z<zombies.length;z++) if(zombies[z].row===pl.row && zombies[z].x>pl.x-6){ has=true; break; }
        if(has){
          shots.push({ x:pl.x+cellW*0.28, y:pl.y-cellH*0.06, row:pl.row, sp:cellW*7, dmg:P.dmg, slow:!!P.slow });
          if(P.dbl) shots.push({ x:pl.x+cellW*0.10, y:pl.y-cellH*0.06, row:pl.row, sp:cellW*7, dmg:P.dmg, slow:!!P.slow, delay:0 });
          pl.cd=P.rate; sShoot();
        }
      }
    }

    // suns fall / bob / expire
    for(var s=suns.length-1;s>=0;s--){
      var su=suns[s];
      if(!su.ground){ su.y += su.vy*dt; if(su.target!=null && su.y>=su.target){ su.y=su.target; su.ground=true; } }
      else { su.bob=(su.bob||0)+dt; }
      su.life-=dt; if(su.life<=0) suns.splice(s,1);
    }

    // shots
    for(var sh=shots.length-1;sh>=0;sh--){
      var st=shots[sh]; st.x += st.sp*dt;
      if(st.x>W+20){ shots.splice(sh,1); continue; }
      for(var z2=0;z2<zombies.length;z2++){
        var zo=zombies[z2];
        var zy=gridY+zo.row*cellH+cellH/2;
        if(zo.row===st.row && Math.abs(zo.x-st.x)<cellW*0.34){
          damageZombie(zo, st.dmg, z2);
          if(st.slow) zo.slow=4;
          spark(st.x,st.y-cellH*0.05, st.slow?"#a6e6ff":"#bff07a");
          shots.splice(sh,1);
          break;
        }
      }
    }

    // zombies
    for(var z3=zombies.length-1;z3>=0;z3--){
      var zb=zombies[z3]; zb.t+=dt;
      if(zb.slow>0) zb.slow-=dt;
      var speedMul = zb.slow>0 ? 0.5 : 1;
      // find plant ahead in same cell
      var target=null;
      for(var p2=0;p2<plants.length;p2++){
        var pp=plants[p2];
        if(pp.type==="cherry") continue;
        if(pp.row===zb.row && zb.x-pp.x < cellW*0.42 && zb.x-pp.x > -cellW*0.2){ target=pp; break; }
      }
      if(target){
        zb.eat=(zb.eat||0)+dt;
        target.hp -= dt*2;
        if(zb.eat>0.5){ zb.eat=0; if(Math.random()<0.6) sChomp(); }
        if(target.hp<=0){ plants.splice(plants.indexOf(target),1); }
      } else {
        zb.eat=0;
        zb.x -= zb.sp*speedMul*dt;
      }
      // reached the house?
      if(zb.x <= gridX+4){
        var m=mowers[zb.row];
        if(m.state==="ready"){ m.state="run"; sMower(); }
        else if(m.state==="gone"){ endLevel(false); return; }
      }
    }

    // mowers
    for(var r=0;r<ROWS;r++){
      var m=mowers[r];
      if(m.state==="run"){
        m.x += cellW*9*dt;
        for(var zz=zombies.length-1;zz>=0;zz--){
          var zv=zombies[zz];
          if(zv.row===r && zv.x < m.x+cellW*0.5){ explode(zv.x, gridY+r*cellH+cellH/2, zv.type); zombies.splice(zz,1); }
        }
        if(m.x>W+20) m.state="gone";
      }
    }

    // fx
    for(var f=fx.length-1;f>=0;f--){ var ff=fx[f]; ff.x+=ff.vx*dt; ff.y+=ff.vy*dt; ff.vy+=320*dt; ff.life-=dt; if(ff.life<=0) fx.splice(f,1); }

    // clouds
    for(var c=0;c<clouds.length;c++){ var cl=clouds[c]; cl.x-=cl.v*dt; if(cl.x<-60) cl.x=W+40; }

    updateWaveBar();
    updateShop();
  }

  function damageZombie(zo, dmg, idx){
    if(zo.gearHp>0){ zo.gearHp-=dmg; if(zo.gearHp<=0){ zo.gear=null; zo.gearHp=0; } return; }
    zo.hp-=dmg;
    if(zo.hp<=0){ explode(zo.x, gridY+zo.row*cellH+cellH/2, zo.type); sDie(); zombies.splice(idx,1); }
  }
  function cherryBoom(pl){
    sBoom();
    for(var b=0;b<22;b++){ var a=Math.random()*6.28,v=80+Math.random()*180;
      fx.push({x:pl.x,y:pl.y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:0.55,c:b%2?"#ff7a2a":"#ffd23f",r:4}); }
    for(var z=zombies.length-1;z>=0;z--){
      var zb=zombies[z];
      var zy=gridY+zb.row*cellH+cellH/2;
      if(Math.abs(zb.x-pl.x)<cellW*1.4 && Math.abs(zy-pl.y)<cellH*1.4){
        explode(zb.x,zy,zb.type); zombies.splice(z,1);
      }
    }
  }
  function spark(x,y,c){ for(var i=0;i<5;i++){ var a=Math.random()*6.28,v=30+Math.random()*60;
    fx.push({x:x,y:y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:0.3,c:c||"#fff",r:2.5}); } }
  function explode(x,y,type){ var n=type==="bucket"?12:8;
    for(var i=0;i<n;i++){ var a=Math.random()*6.28,v=40+Math.random()*90;
      fx.push({x:x,y:y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:0.5,c:i%3===0?"#9b6b3d":"#86a35a",r:3}); } }

  var skySunTimer=6;
  function dropSky(){
    var x=gridX+cellW*0.5 + Math.random()*(cellW*(COLS-1));
    suns.push({ x:x, y:-20, vy:70, life:11, val:25, target: gridY+cellH*0.5+Math.random()*cellH*(ROWS-1), bob:0 });
  }

  // ================= DRAWING =================
  function rrect(g,x,y,w,h,r){ g.beginPath();
    g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
    g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }

  function softShadow(g,x,y,w,h){ g.fillStyle="rgba(0,0,0,0.16)";
    g.beginPath(); g.ellipse(x,y,w,h,0,0,6.2832); g.fill(); }

  // ----- plants -----
  function drawPlant(g, type, x, y, s, t, iconMode){
    if(type==="sun") drawSunflower(g,x,y,s,t);
    else if(type==="pea") drawShooter(g,x,y,s,t,"#62c23a","#4ea02c",1);
    else if(type==="snow") drawShooter(g,x,y,s,t,"#8fd6ec","#5fb4d6",1);
    else if(type==="repeat") drawShooter(g,x,y,s,t,"#62c23a","#4ea02c",2);
    else if(type==="wall") drawWall(g,x,y,s,t);
    else if(type==="cherry") drawCherry(g,x,y,s,t);
  }

  function drawSunflower(g,x,y,s,t){
    var sway=Math.sin(t*1.6)*0.06;
    g.save(); g.translate(x,y); g.rotate(sway);
    // stem
    g.strokeStyle="#3f9a2f"; g.lineWidth=s*0.12; g.lineCap="round";
    g.beginPath(); g.moveTo(0,s*0.42); g.lineTo(0,s*0.02); g.stroke();
    // leaf
    g.fillStyle="#4caa33"; g.beginPath();
    g.ellipse(-s*0.22,s*0.26,s*0.16,s*0.08,-0.5,0,6.2832); g.fill();
    // petals
    var pet=12, pr=s*0.30;
    g.fillStyle="#ffd23f";
    for(var i=0;i<pet;i++){ var a=i/pet*6.2832;
      g.save(); g.rotate(a); g.beginPath();
      g.ellipse(0,-pr,s*0.10,s*0.17,0,0,6.2832); g.fill(); g.restore();
    }
    // center
    g.fillStyle="#7a4a18"; g.beginPath(); g.arc(0,-s*0.05,s*0.22,0,6.2832); g.fill();
    g.fillStyle="#5e3712"; g.beginPath(); g.arc(0,-s*0.05,s*0.22,0,6.2832); g.lineWidth=1; g.strokeStyle="#5e3712"; g.stroke();
    g.fillStyle="#8a5a22"; g.beginPath(); g.arc(0,-s*0.05,s*0.13,0,6.2832); g.fill();
    // eyes
    g.fillStyle="#2a1c0a";
    g.beginPath(); g.arc(-s*0.06,-s*0.07,s*0.035,0,6.2832); g.arc(s*0.06,-s*0.07,s*0.035,0,6.2832); g.fill();
    // smile
    g.strokeStyle="#2a1c0a"; g.lineWidth=s*0.025; g.beginPath(); g.arc(0,-s*0.02,s*0.07,0.15,3.0); g.stroke();
    g.restore();
  }

  function drawShooter(g,x,y,s,t,light,dark,heads){
    var bob=Math.sin(t*3)* s*0.02;
    g.save(); g.translate(x,y+bob);
    // stem
    g.strokeStyle="#3f9a2f"; g.lineWidth=s*0.12; g.lineCap="round";
    g.beginPath(); g.moveTo(0,s*0.42); g.lineTo(0,s*0.05); g.stroke();
    g.fillStyle="#4caa33"; g.beginPath(); g.ellipse(s*0.18,s*0.28,s*0.15,s*0.07,0.5,0,6.2832); g.fill();
    function head(hy){
      // ball head
      var grd=g.createRadialGradient(-s*0.05,hy-s*0.05,s*0.04,0,hy,s*0.26);
      grd.addColorStop(0,light); grd.addColorStop(1,dark);
      g.fillStyle=grd; g.beginPath(); g.arc(0,hy,s*0.24,0,6.2832); g.fill();
      // snout (shooting tube) pointing +x
      g.fillStyle=dark; rrect(g,s*0.16,hy-s*0.09,s*0.22,s*0.18,s*0.06); g.fill();
      g.fillStyle="#2a1c0a"; g.beginPath(); g.arc(s*0.38,hy,s*0.055,0,6.2832); g.fill();
      // eye
      g.fillStyle="#fff"; g.beginPath(); g.arc(-s*0.04,hy-s*0.05,s*0.07,0,6.2832); g.fill();
      g.fillStyle="#2a1c0a"; g.beginPath(); g.arc(-s*0.02,hy-s*0.04,s*0.035,0,6.2832); g.fill();
    }
    if(heads===2){ head(-s*0.18); head(s*0.12); } else { head(-s*0.02); }
    g.restore();
  }

  function drawWall(g,x,y,s,t){
    g.save(); g.translate(x,y);
    var grd=g.createLinearGradient(0,-s*0.35,0,s*0.4);
    grd.addColorStop(0,"#caa05e"); grd.addColorStop(1,"#a3793c");
    g.fillStyle=grd; rrect(g,-s*0.30,-s*0.36,s*0.60,s*0.76,s*0.26); g.fill();
    g.strokeStyle="#7d5a28"; g.lineWidth=s*0.03; g.stroke();
    // eyes
    g.fillStyle="#fff"; g.beginPath(); g.arc(-s*0.11,-s*0.06,s*0.075,0,6.2832); g.arc(s*0.11,-s*0.06,s*0.075,0,6.2832); g.fill();
    g.fillStyle="#2a1c0a"; g.beginPath(); g.arc(-s*0.10,-s*0.04,s*0.035,0,6.2832); g.arc(s*0.12,-s*0.04,s*0.035,0,6.2832); g.fill();
    // mouth
    g.strokeStyle="#5e3712"; g.lineWidth=s*0.03; g.beginPath(); g.arc(0,s*0.08,s*0.10,0.2,2.94); g.stroke();
    g.restore();
  }

  function drawCherry(g,x,y,s,t){
    var pulse=1+Math.sin(t*10)*0.05;
    g.save(); g.translate(x,y); g.scale(pulse,pulse);
    g.strokeStyle="#4caa33"; g.lineWidth=s*0.05; g.lineCap="round";
    g.beginPath(); g.moveTo(-s*0.12,-s*0.05); g.lineTo(0,-s*0.30); g.moveTo(s*0.12,-s*0.05); g.lineTo(0,-s*0.30); g.stroke();
    g.fillStyle="#4caa33"; g.beginPath(); g.ellipse(s*0.06,-s*0.30,s*0.10,s*0.05,-0.6,0,6.2832); g.fill();
    function ball(cx){ var grd=g.createRadialGradient(cx-s*0.05,-s*0.02,s*0.02,cx,s*0.05,s*0.2);
      grd.addColorStop(0,"#ff6b6b"); grd.addColorStop(1,"#c1272d");
      g.fillStyle=grd; g.beginPath(); g.arc(cx,s*0.05,s*0.17,0,6.2832); g.fill();
      g.fillStyle="#fff"; g.beginPath(); g.arc(cx-s*0.04,s*0.0,s*0.04,0,6.2832); g.fill();
      g.fillStyle="#2a0a0a"; g.beginPath(); g.arc(cx-s*0.06,s*0.02,s*0.02,0,6.2832); g.arc(cx+s*0.02,s*0.02,s*0.02,0,6.2832); g.fill(); }
    ball(-s*0.12); ball(s*0.12);
    g.restore();
  }

  // ----- zombies -----
  function drawZombie(g,x,y,s,zb){
    var t=zb.t, walk=Math.sin(t*5);
    g.save(); g.translate(x,y);
    if(zb.slow>0){ g.globalAlpha=0.96; }
    var skin = zb.slow>0 ? "#86c0c8" : "#9bb06a";
    var skinD = zb.slow>0 ? "#5f969e" : "#6f854a";
    var shirt = "#5a6470";
    // legs
    g.strokeStyle=skinD; g.lineWidth=s*0.10; g.lineCap="round";
    g.beginPath(); g.moveTo(-s*0.05,s*0.16); g.lineTo(-s*0.05+walk*s*0.06,s*0.44); g.stroke();
    g.beginPath(); g.moveTo(s*0.05,s*0.16); g.lineTo(s*0.05-walk*s*0.06,s*0.44); g.stroke();
    // body / torn shirt
    g.fillStyle=shirt; rrect(g,-s*0.16,-s*0.10,s*0.32,s*0.30,s*0.06); g.fill();
    // arms forward (toward -x, the way they move)
    g.strokeStyle=skin; g.lineWidth=s*0.085;
    g.beginPath(); g.moveTo(-s*0.10,-s*0.02); g.lineTo(-s*0.34,s*0.02+walk*s*0.02); g.stroke();
    g.beginPath(); g.moveTo(-s*0.10,s*0.04); g.lineTo(-s*0.30,s*0.10-walk*s*0.02); g.stroke();
    g.fillStyle=skin; g.beginPath(); g.arc(-s*0.34,s*0.02,s*0.05,0,6.2832); g.arc(-s*0.30,s*0.10,s*0.05,0,6.2832); g.fill();
    // head
    g.fillStyle=skin; g.beginPath(); g.arc(0,-s*0.22,s*0.18,0,6.2832); g.fill();
    g.fillStyle=skinD; g.beginPath(); g.ellipse(-s*0.02,-s*0.16,s*0.10,s*0.06,0,0,6.2832); g.fill();
    // eyes
    g.fillStyle="#2a0a0a"; g.beginPath(); g.arc(-s*0.06,-s*0.24,s*0.03,0,6.2832); g.arc(s*0.06,-s*0.24,s*0.03,0,6.2832); g.fill();
    g.strokeStyle="#3a1414"; g.lineWidth=s*0.02; g.beginPath(); g.moveTo(-s*0.07,-s*0.13); g.lineTo(s*0.07,-s*0.13); g.stroke();
    // gear
    if(zb.gear==="cone"){
      g.fillStyle="#e8772a"; g.beginPath();
      g.moveTo(-s*0.14,-s*0.34); g.lineTo(s*0.14,-s*0.34); g.lineTo(0,-s*0.68); g.closePath(); g.fill();
      g.fillStyle="#fff"; g.fillRect(-s*0.12,-s*0.50,s*0.24,s*0.05);
      g.strokeStyle="#b9591a"; g.lineWidth=s*0.02; g.stroke();
    } else if(zb.gear==="bucket"){
      g.fillStyle="#9aa3ab"; rrect(g,-s*0.16,-s*0.52,s*0.32,s*0.26,s*0.04); g.fill();
      g.fillStyle="#c3cad0"; rrect(g,-s*0.16,-s*0.52,s*0.32,s*0.07,s*0.03); g.fill();
      g.strokeStyle="#6f7880"; g.lineWidth=s*0.02; rrect(g,-s*0.16,-s*0.52,s*0.32,s*0.26,s*0.04); g.stroke();
    } else if(zb.gear==="flag"){
      g.strokeStyle="#7a5230"; g.lineWidth=s*0.03; g.beginPath(); g.moveTo(s*0.18,-s*0.30); g.lineTo(s*0.18,-s*0.62); g.stroke();
      g.fillStyle="#d23b3b"; g.beginPath(); g.moveTo(s*0.18,-s*0.62); g.lineTo(s*0.42,-s*0.56); g.lineTo(s*0.18,-s*0.48); g.closePath(); g.fill();
    }
    g.globalAlpha=1;
    g.restore();
  }

  function drawMower(g,x,y,s){
    g.save(); g.translate(x,y);
    g.fillStyle="#d6453a"; rrect(g,-s*0.32,-s*0.10,s*0.64,s*0.26,s*0.06); g.fill();
    g.fillStyle="#b5352c"; rrect(g,-s*0.32,-s*0.22,s*0.30,s*0.16,s*0.05); g.fill();
    g.fillStyle="#9aa3ab"; g.beginPath(); g.arc(-s*0.16,s*0.18,s*0.12,0,6.2832); g.arc(s*0.16,s*0.18,s*0.12,0,6.2832); g.fill();
    g.fillStyle="#454b52"; g.beginPath(); g.arc(-s*0.16,s*0.18,s*0.05,0,6.2832); g.arc(s*0.16,s*0.18,s*0.05,0,6.2832); g.fill();
    g.fillStyle="#c3cad0"; g.beginPath(); g.moveTo(s*0.32,-s*0.02); g.lineTo(s*0.46,s*0.06); g.lineTo(s*0.32,s*0.12); g.closePath(); g.fill();
    g.restore();
  }

  function drawSun(g,x,y,s){
    var grd=g.createRadialGradient(x,y,s*0.1,x,y,s*0.95);
    grd.addColorStop(0,"rgba(255,245,170,0.95)"); grd.addColorStop(0.5,"rgba(255,214,80,0.55)"); grd.addColorStop(1,"rgba(255,214,80,0)");
    g.fillStyle=grd; g.beginPath(); g.arc(x,y,s*0.95,0,6.2832); g.fill();
    g.fillStyle="#ffcf3a"; g.beginPath(); g.arc(x,y,s*0.5,0,6.2832); g.fill();
    g.fillStyle="#ffe680"; g.beginPath(); g.arc(x,y,s*0.34,0,6.2832); g.fill();
  }

  // ----- background -----
  function drawBackground(){
    // sky band above lawn
    var sky=ctx.createLinearGradient(0,0,0,gridY+8);
    sky.addColorStop(0,"#9fd9ff"); sky.addColorStop(1,"#d7f3c2");
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,gridY+4);
    // clouds
    ctx.fillStyle="rgba(255,255,255,0.85)";
    for(var c=0;c<clouds.length;c++){ var cl=clouds[c], cw=26*cl.s;
      ctx.beginPath(); ctx.ellipse(cl.x,cl.y,cw,cw*0.6,0,0,6.2832);
      ctx.ellipse(cl.x+cw*0.8,cl.y+4,cw*0.7,cw*0.5,0,0,6.2832);
      ctx.ellipse(cl.x-cw*0.8,cl.y+5,cw*0.6,cw*0.45,0,0,6.2832); ctx.fill(); }
    // lawn stripes
    for(var r=0;r<ROWS;r++){
      var y=gridY+r*cellH;
      ctx.fillStyle=(r%2===0)?"#7fc63f":"#74bb37";
      ctx.fillRect(gridX,y,cellW*COLS,cellH);
    }
    // subtle cell lines
    ctx.strokeStyle="rgba(255,255,255,0.10)"; ctx.lineWidth=1;
    for(var cc=1;cc<COLS;cc++){ var lx=gridX+cc*cellW; ctx.beginPath(); ctx.moveTo(lx,gridY); ctx.lineTo(lx,gridY+cellH*ROWS); ctx.stroke(); }
    // porch (left house strip) where mowers sit
    var pg=ctx.createLinearGradient(0,gridY,0,gridY+cellH*ROWS);
    pg.addColorStop(0,"#8a5a36"); pg.addColorStop(1,"#6f4526");
    ctx.fillStyle=pg; ctx.fillRect(0,gridY,gridX,cellH*ROWS);
    ctx.fillStyle="rgba(0,0,0,0.18)"; ctx.fillRect(gridX-3,gridY,3,cellH*ROWS);
  }

  // ---------------- draw ----------------
  function draw(){
    ctx.clearRect(0,0,W,H);
    drawBackground();

    var ps=Math.min(cellW,cellH)*0.86;
    var zs=Math.min(cellW,cellH)*0.92;

    // mowers
    for(var r=0;r<ROWS;r++){
      var m=mowers[r]; if(m.state==="gone") continue;
      var my=gridY+r*cellH+cellH*0.5;
      softShadow(ctx,m.x,my+cellH*0.32,cellW*0.26,cellH*0.08);
      drawMower(ctx,m.x,my,Math.min(cellW,cellH)*0.7);
    }

    // plants (shadow then sprite)
    for(var i=0;i<plants.length;i++){
      var pl=plants[i];
      softShadow(ctx,pl.x,pl.y+cellH*0.34,cellW*0.28,cellH*0.08);
      drawPlant(ctx, pl.type, pl.x, pl.y, ps, pl.t, 0);
      if(pl.maxhp>1 && pl.hp<pl.maxhp){
        ctx.fillStyle="rgba(0,0,0,0.25)"; ctx.fillRect(pl.x-cellW*0.26, pl.y+cellH*0.30, cellW*0.52, 5);
        ctx.fillStyle="#5fd23a"; ctx.fillRect(pl.x-cellW*0.26, pl.y+cellH*0.30, cellW*0.52*Math.max(0,pl.hp)/pl.maxhp, 5);
      }
    }

    // zombies
    for(var z=0;z<zombies.length;z++){
      var zb=zombies[z]; var zy=gridY+zb.row*cellH+cellH/2;
      softShadow(ctx,zb.x,zy+cellH*0.34,cellW*0.24,cellH*0.07);
      drawZombie(ctx, zb.x, zy, zs, zb);
      if(zb.hp<zb.maxhp){
        ctx.fillStyle="rgba(0,0,0,0.25)"; ctx.fillRect(zb.x-cellW*0.22, zy-cellH*0.42, cellW*0.44, 4);
        ctx.fillStyle="#e8602f"; ctx.fillRect(zb.x-cellW*0.22, zy-cellH*0.42, cellW*0.44*Math.max(0,zb.hp)/zb.maxhp, 4);
      }
    }

    // shots
    for(var s=0;s<shots.length;s++){ var st=shots[s];
      ctx.fillStyle=st.slow?"#9be3ff":"#74d23a";
      ctx.beginPath(); ctx.arc(st.x,st.y,Math.max(5,cellW*0.10),0,6.2832); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,0.6)"; ctx.beginPath(); ctx.arc(st.x-2,st.y-2,cellW*0.035,0,6.2832); ctx.fill();
    }

    // suns
    for(var su=0;su<suns.length;su++){ var so=suns[su];
      var oy = so.ground ? Math.sin((so.bob||0)*3)*2 : 0;
      var sc=Math.min(cellW,cellH)*0.34;
      if(so.life<2){ ctx.globalAlpha=0.5+0.5*Math.abs(Math.sin(so.life*8)); }
      drawSun(ctx, so.x, so.y+oy, sc); ctx.globalAlpha=1;
    }

    // fx
    for(var f=0;f<fx.length;f++){ var ff=fx[f]; ctx.globalAlpha=Math.max(0,ff.life*2);
      ctx.fillStyle=ff.c; ctx.beginPath(); ctx.arc(ff.x,ff.y,ff.r||3,0,6.2832); ctx.fill(); }
    ctx.globalAlpha=1;
  }

  // ---------------- loop ----------------
  var last=0;
  function loop(ts){
    if(!running) return;
    if(!last) last=ts;
    var dt=(ts-last)/1000; last=ts;
    if(dt>0.05) dt=0.05;
    update(dt);
    if(running) draw();
    if(running) requestAnimationFrame(loop);
  }

  // pause when tab hidden (saves battery in webview)
  document.addEventListener("visibilitychange", function(){
    if(document.hidden){ last=0; }
  });

  // start at home
  showHome();
})();
</script>
</body>
