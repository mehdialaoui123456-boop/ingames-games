<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>حرب الشبكة</title>
<style>
:root{--c:#00ffe5;--r:#ff2244;--y:#ffd000;--p:#c04dff;--g:#22ff88}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',Tahoma,sans-serif;overscroll-behavior:none;touch-action:none;position:fixed;inset:0}
canvas{display:block;position:fixed;inset:0}
.num{font-family:'Courier New',monospace;font-variant-numeric:lining-nums}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}

/* ── Vignette ── */
#vign{position:fixed;inset:0;pointer-events:none;z-index:5;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,2,10,.5) 100%)}

/* ── Crosshair ── */
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;display:none;pointer-events:none}
.xl{position:absolute;background:var(--c);box-shadow:0 0 5px var(--c)}
.xl-t{width:2px;height:10px;top:0;left:19px}
.xl-b{width:2px;height:10px;bottom:0;left:19px}
.xl-l{width:10px;height:2px;top:19px;left:0}
.xl-r{width:10px;height:2px;top:19px;right:0}
.xl-d{width:4px;height:4px;border-radius:50%;top:18px;left:18px;background:var(--c);box-shadow:0 0 7px var(--c)}
#hm{position:absolute;top:50%;left:50%;width:30px;height:30px;transform:translate(-50%,-50%) rotate(45deg);opacity:0;transition:opacity .18s;pointer-events:none}
.hml{position:absolute;background:#fff;box-shadow:0 0 6px #fff}
.hml1{width:2px;height:8px;top:0;left:14px}.hml2{width:2px;height:8px;bottom:0;left:14px}
.hml3{width:8px;height:2px;top:14px;left:0}.hml4{width:8px;height:2px;top:14px;right:0}

/* ── HUD top ── */
.hudbox{background:rgba(2,8,16,.55);border:1px solid rgba(0,255,229,.18);border-radius:8px;padding:6px 12px;backdrop-filter:blur(2px)}
#hud-tr{position:absolute;top:calc(10px + env(safe-area-inset-top));right:calc(10px + env(safe-area-inset-right));text-align:center}
#hud-tl{position:absolute;top:calc(10px + env(safe-area-inset-top));left:calc(10px + env(safe-area-inset-left));text-align:center}
.hl{font-size:9px;letter-spacing:3px;color:rgba(0,255,229,.55);margin-bottom:1px}
.hv{font-size:clamp(17px,4.5vw,24px);font-weight:800;color:var(--c);text-shadow:0 0 10px var(--c);line-height:1.15}
#sc{font-size:clamp(17px,4.5vw,24px);font-weight:800;color:var(--y);text-shadow:0 0 10px var(--y);line-height:1.15}
#combo{font-size:11px;font-weight:800;color:#fff;background:linear-gradient(90deg,#ff7700,#ffd000);border-radius:10px;padding:1px 10px;margin-top:4px;display:none;animation:cpop .25s ease;letter-spacing:1px}
@keyframes cpop{from{transform:scale(1.6)}to{transform:scale(1)}}
#wvline{font-size:10px;color:rgba(255,255,255,.55);margin-top:3px;letter-spacing:1px}
#wvline b{color:var(--r);text-shadow:0 0 6px var(--r)}

/* ── Mute ── */
#mute{position:absolute;top:calc(64px + env(safe-area-inset-top));left:calc(10px + env(safe-area-inset-left));width:34px;height:34px;border-radius:50%;background:rgba(2,8,16,.55);border:1px solid rgba(0,255,229,.2);color:var(--c);font-size:15px;display:flex;align-items:center;justify-content:center;pointer-events:auto;cursor:pointer}

/* ── Kill feed ── */
#kf{position:absolute;top:calc(12px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;max-width:70vw;text-align:center}
.kfi{background:rgba(0,0,0,.7);border:1px solid rgba(0,255,229,.25);border-radius:12px;padding:3px 14px;font-size:11px;color:#cffffa;letter-spacing:.5px;white-space:nowrap;animation:kfin .2s ease,kfout .6s ease 1.9s forwards}
@keyframes kfin{from{opacity:0;transform:translateY(-8px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes kfout{to{opacity:0}}

/* ── Wave banner ── */
#wband{position:absolute;top:32%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none;pointer-events:none}
#wband .wb1{font-size:clamp(26px,8vw,52px);font-weight:900;letter-spacing:8px;color:#fff;text-shadow:0 0 30px var(--c),0 0 60px rgba(0,255,229,.4);animation:wbin .4s cubic-bezier(.2,1.6,.4,1)}
#wband .wb2{font-size:12px;letter-spacing:4px;color:rgba(255,255,255,.6);margin-top:6px;animation:wbin .5s ease .1s backwards}
@keyframes wbin{from{opacity:0;transform:scale(1.7)}to{opacity:1;transform:scale(1)}}

/* ── FX layer (damage numbers) ── */
#fxl{position:fixed;inset:0;pointer-events:none;z-index:8;overflow:hidden}
.dnum{position:absolute;font-weight:900;font-family:'Courier New',monospace;font-size:15px;text-shadow:0 0 8px currentColor;animation:dfly .8s ease-out forwards;transform:translate(-50%,-50%);white-space:nowrap}
@keyframes dfly{0%{opacity:1;margin-top:0}80%{opacity:1}100%{opacity:0;margin-top:-46px}}

/* ── Bars bottom ── */
#hud-bottom{position:absolute;bottom:calc(160px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none}
.brow{display:flex;align-items:center;gap:8px;width:min(210px,55vw)}
.bl{font-size:9px;letter-spacing:1px;white-space:nowrap;width:34px;text-align:left}
.hbg{height:9px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:4px;overflow:hidden;flex:1}
.hf{height:100%;border-radius:3px;transition:width .12s}
#hfhp{background:linear-gradient(90deg,#00ffe5,#00b0a0);width:100%}
#hfam{background:linear-gradient(90deg,#ffe500,#ff7700);width:100%}
#buffs{display:flex;gap:6px;min-height:18px}
.buff{font-size:10px;font-weight:700;border-radius:9px;padding:1px 9px;letter-spacing:.5px;animation:cpop .2s ease}
.buff-r{background:rgba(255,208,0,.16);border:1px solid rgba(255,208,0,.5);color:var(--y)}
.buff-s{background:rgba(51,170,255,.14);border:1px solid rgba(51,170,255,.5);color:#7cf}

/* ── Minimap ── */
#mm-wrap{position:absolute;bottom:calc(172px + env(safe-area-inset-bottom));left:calc(12px + env(safe-area-inset-left));width:92px;height:92px;background:rgba(0,4,10,.8);border:1px solid rgba(0,255,229,.22);border-radius:6px;overflow:hidden}
#mm{display:block}

/* ── Enemy count ── */
#ec{position:absolute;bottom:calc(172px + env(safe-area-inset-bottom));right:calc(12px + env(safe-area-inset-right));text-align:center;background:rgba(2,8,16,.5);border:1px solid rgba(255,50,80,.25);border-radius:8px;padding:4px 12px}
.ecn{display:block;font-size:clamp(20px,5.5vw,28px);font-weight:800;color:#ff3355;line-height:1;text-shadow:0 0 10px #ff3355}
.ecl{font-size:8px;color:rgba(255,80,80,.6);letter-spacing:3px}

/* ── Damage / shield flash ── */
#dvign{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse,transparent 35%,rgba(255,10,10,.5) 100%);opacity:0;transition:opacity .1s;z-index:6}
#svign{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse,transparent 45%,rgba(40,160,255,.4) 100%);opacity:0;transition:opacity .12s;z-index:6}

/* ── Screens ── */
.scr{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#06121e 0%,#020409 70%);overflow:hidden}
.sgrid{position:absolute;left:-40%;right:-40%;bottom:-8%;height:58%;pointer-events:none;
 background:linear-gradient(rgba(0,255,229,0),rgba(0,255,229,.1)),
  repeating-linear-gradient(90deg,rgba(0,255,229,.22) 0 1px,transparent 1px 64px),
  repeating-linear-gradient(0deg,rgba(0,255,229,.22) 0 1px,transparent 1px 64px);
 transform:perspective(420px) rotateX(63deg);transform-origin:bottom;animation:gmv 2.6s linear infinite}
@keyframes gmv{from{background-position:0 0,0 0,0 0}to{background-position:0 0,0 0,0 64px}}
.sico{font-size:46px;margin-bottom:10px;animation:spu 2.2s ease-in-out infinite;color:var(--c);text-shadow:0 0 25px var(--c);z-index:1}
@keyframes spu{0%,100%{opacity:.45;transform:scale(.92)}50%{opacity:1;transform:scale(1.05)}}
.stit{font-size:clamp(30px,8vw,58px);font-weight:900;letter-spacing:10px;color:#fff;text-shadow:0 0 35px var(--c),0 0 90px rgba(0,255,229,.35);margin-bottom:6px;z-index:1;animation:flick 5s linear infinite}
@keyframes flick{0%,90%,94%,100%{opacity:1}92%{opacity:.55}}
.ssub{font-size:11px;letter-spacing:6px;color:rgba(0,255,229,.45);margin-bottom:18px;z-index:1}
.sbest{font-size:12px;color:var(--y);background:rgba(255,208,0,.08);border:1px solid rgba(255,208,0,.3);border-radius:14px;padding:4px 18px;margin-bottom:30px;letter-spacing:1px;z-index:1}
.sbtn{position:relative;background:rgba(0,255,229,.06);border:1px solid var(--c);color:var(--c);padding:15px 56px;font-size:15px;font-weight:700;letter-spacing:7px;font-family:inherit;cursor:pointer;border-radius:4px;pointer-events:auto;margin-bottom:26px;z-index:1;animation:bpulse 1.8s ease-in-out infinite;-webkit-tap-highlight-color:transparent}
@keyframes bpulse{0%,100%{box-shadow:0 0 14px rgba(0,255,229,.18)}50%{box-shadow:0 0 34px rgba(0,255,229,.5)}}
.sbtn:active{background:rgba(0,255,229,.18);transform:scale(.97)}
.sctrl{font-size:10px;color:rgba(255,255,255,.35);line-height:2.3;text-align:center;direction:rtl;z-index:1}
.sctrl b{color:rgba(0,255,229,.7);font-weight:600}

/* ── Game Over ── */
#gover{display:none}
.got{font-size:clamp(30px,9vw,60px);font-weight:900;letter-spacing:8px;margin-bottom:6px;z-index:1}
.gnew{font-size:12px;font-weight:800;color:#000;background:linear-gradient(90deg,#ffd000,#ff7700);border-radius:14px;padding:3px 16px;letter-spacing:2px;margin-bottom:16px;animation:cpop .4s cubic-bezier(.2,1.8,.4,1);z-index:1}
.gstats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:30px;z-index:1}
.gst{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 24px;text-align:center;min-width:120px}
.gstv{font-size:22px;font-weight:800;color:#fff;font-family:'Courier New',monospace}
.gstl{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-top:2px}
.gobtn{background:rgba(0,255,229,.06);border:1px solid var(--c);color:var(--c);padding:13px 46px;font-size:13px;font-weight:700;letter-spacing:5px;font-family:inherit;cursor:pointer;border-radius:4px;pointer-events:auto;z-index:1;-webkit-tap-highlight-color:transparent}
.gobtn:active{background:rgba(0,255,229,.18)}

/* ── Mobile controls ── */
#mctrl{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;justify-content:space-between;align-items:flex-end;padding:12px 16px calc(20px + env(safe-area-inset-bottom));pointer-events:none}
#joy-wrap{position:relative;width:124px;height:124px;pointer-events:auto;touch-action:none}
#joy-ring{position:absolute;inset:0;border:2px solid rgba(0,255,229,.28);border-radius:50%;background:radial-gradient(circle,rgba(0,255,229,.07),rgba(0,255,229,.02))}
#joy-knob{position:absolute;width:46px;height:46px;background:rgba(0,255,229,.2);border:2px solid rgba(0,255,229,.55);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 14px rgba(0,255,229,.25)}
#look-pad{position:fixed;top:0;right:0;width:55%;height:calc(100% - 165px);z-index:19;pointer-events:auto;touch-action:none}
#act-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:auto}
#msl-btn{width:56px;height:56px;border-radius:50%;background:rgba(255,208,0,.12);border:2px solid rgba(255,208,0,.55);font-size:20px;display:flex;align-items:center;justify-content:center;touch-action:none;box-shadow:0 0 14px rgba(255,208,0,.2);position:relative;cursor:pointer}
#msl-btn.cd{border-color:rgba(255,208,0,.2);filter:grayscale(.8);opacity:.7}
#msl-cd{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--y);font-family:'Courier New',monospace}
#fire-btn{width:76px;height:76px;border-radius:50%;background:radial-gradient(circle,rgba(255,60,60,.25),rgba(255,60,60,.08));border:2px solid rgba(255,80,80,.6);font-size:26px;display:flex;align-items:center;justify-content:center;touch-action:none;box-shadow:0 0 18px rgba(255,60,60,.25);cursor:pointer}
#fire-btn.firing{background:radial-gradient(circle,rgba(255,60,60,.45),rgba(255,60,60,.15));box-shadow:0 0 30px rgba(255,60,60,.5);transform:scale(.94)}
</style>
</head>
<body>

<div id="vign"></div>

<div id="ui">
  <div id="xhair">
    <div class="xl xl-t"></div><div class="xl xl-b"></div>
    <div class="xl xl-l"></div><div class="xl xl-r"></div>
    <div class="xl xl-d"></div>
  </div>
  <div id="hm">
    <div class="hml hml1"></div><div class="hml hml2"></div>
    <div class="hml hml3"></div><div class="hml hml4"></div>
  </div>
  <div id="hud-tr" class="hudbox">
    <div class="hl">الصحة</div>
    <div class="hv num" id="hpv">100</div>
  </div>
  <div id="hud-tl" class="hudbox">
    <div class="hl">النقاط</div>
    <div id="sc" class="num">0000</div>
    <div id="wvline">الموجة <b class="num" id="wvn">1</b></div>
    <div id="combo"></div>
  </div>
  <div id="mute">🔊</div>
  <div id="kf"></div>
  <div id="wband"><div class="wb1" id="wb1"></div><div class="wb2" id="wb2"></div></div>
  <div id="hud-bottom">
    <div class="brow"><span class="bl" style="color:rgba(0,255,229,.6)">الصحة</span><div class="hbg"><div class="hf" id="hfhp"></div></div></div>
    <div class="brow"><span class="bl" style="color:rgba(255,229,0,.6)">الطاقة</span><div class="hbg"><div class="hf" id="hfam"></div></div></div>
  </div>
  <div id="mm-wrap"><canvas id="mm" width="92" height="92"></canvas></div>
  <div id="ec"><span class="ecn num" id="ecn">0</span><span class="ecl">عدو</span></div>
</div>

<div id="fxl"></div>
<div id="dvign"></div>
<div id="svign"></div>

<div id="start" class="scr">
  <div class="sgrid"></div>
  <div class="sico">⬡</div>
  <div class="stit">حرب الشبكة</div>
  <div class="ssub">معركة دبابات النيون</div>
  <div class="sbest" id="sbest" style="display:none"></div>
  <button class="sbtn" id="btn-start">ابدأ القتال</button>
  <div class="sctrl" id="sctrl"></div>
</div>

<div id="gover" class="scr">
  <div class="sgrid" style="opacity:.4"></div>
  <div class="got" id="got"></div>
  <div class="gnew" id="gnew" style="display:none">⭐ رقم قياسي جديد!</div>
  <div class="gstats">
    <div class="gst"><div class="gstv" id="gsc">0</div><div class="gstl">النقاط</div></div>
    <div class="gst"><div class="gstv" id="gbest">0</div><div class="gstl">أفضل نتيجة</div></div>
    <div class="gst"><div class="gstv" id="gwv">0</div><div class="gstl">الموجة</div></div>
    <div class="gst"><div class="gstv" id="gkl">0</div><div class="gstl">دبابات مدمرة</div></div>
  </div>
  <button class="gobtn" id="btn-restart">⟳ إعادة المحاولة</button>
</div>

<div id="mctrl">
  <div id="joy-wrap">
    <div id="joy-ring"></div>
    <div id="joy-knob"></div>
  </div>
  <div id="act-wrap">
    <div id="msl-btn">🚀<div id="msl-cd" style="display:none"></div></div>
    <div id="fire-btn">🔥</div>
  </div>
</div>
<div id="look-pad"></div>

<script type="importmap">{"imports":{"three":"https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

/* ══════════════════════════════════════════════════
   ENV + DOM
══════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const E = {
  hpv: $('hpv'), sc: $('sc'), wvn: $('wvn'), combo: $('combo'), ecn: $('ecn'),
  hfhp: $('hfhp'), hfam: $('hfam'), kf: $('kf'), fxl: $('fxl'),
  dvign: $('dvign'), svign: $('svign'), hm: $('hm'), xhair: $('xhair'),
  wband: $('wband'), wb1: $('wb1'), wb2: $('wb2'), buffsRow: null,
  mslBtn: $('msl-btn'), mslCd: $('msl-cd'), fireBtn: $('fire-btn'),
  mute: $('mute'), start: $('start'), gover: $('gover')
};
const mmCtx = $('mm').getContext('2d');

// Prevent pinch zoom / double-tap zoom inside the WebView
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());
document.addEventListener('contextmenu', e => e.preventDefault());

function vib(ms) { try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {} }

// localStorage can be disabled in some WebView configurations — never let it crash the game
function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

/* ══════════════════════════════════════════════════
   AUDIO — synthesized WebAudio, no assets to load
══════════════════════════════════════════════════ */
const AU = {
  ctx: null, master: null, noiseBuf: null,
  on: lsGet('wg_mute') !== '1',
  init() {
    if (this.ctx) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.27;
      this.master.connect(this.ctx.destination);
      const len = this.ctx.sampleRate * 0.7;
      this.noiseBuf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
      const d = this.noiseBuf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    } catch (e) {}
  },
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },
  tone({ f = 440, to = 0, d = 0.1, type = 'sine', v = 0.3, at = 0 }) {
    if (!this.ctx || !this.on) return;
    const t = this.ctx.currentTime + at;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(f, t);
    if (to > 0) o.frequency.exponentialRampToValueAtTime(to, t + d);
    g.gain.setValueAtTime(v, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + d);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + d + 0.02);
  },
  noise({ d = 0.2, v = 0.3, f = 1200, to = 0, at = 0 }) {
    if (!this.ctx || !this.on) return;
    const t = this.ctx.currentTime + at;
    const s = this.ctx.createBufferSource(); s.buffer = this.noiseBuf; s.loop = true;
    const fl = this.ctx.createBiquadFilter(); fl.type = 'lowpass';
    fl.frequency.setValueAtTime(f, t);
    if (to > 0) fl.frequency.exponentialRampToValueAtTime(to, t + d);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(v, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + d);
    s.connect(fl); fl.connect(g); g.connect(this.master);
    s.start(t); s.stop(t + d + 0.02);
  }
};
const sfxShoot   = () => { AU.tone({ f: 920, to: 170, d: .09, type: 'square', v: .15 }); AU.noise({ d: .05, v: .1, f: 3500, to: 800 }); };
const sfxEShoot  = () => AU.tone({ f: 380, to: 110, d: .13, type: 'sawtooth', v: .08 });
const sfxHit     = () => AU.tone({ f: 1500, to: 950, d: .045, type: 'square', v: .13 });
const sfxExpl    = big => { AU.noise({ d: big ? .6 : .32, v: big ? .5 : .28, f: 1000, to: 90 }); AU.tone({ f: 130, to: 38, d: .4, type: 'sine', v: .45 }); };
const sfxDmg     = () => { AU.tone({ f: 95, to: 48, d: .25, type: 'sine', v: .55 }); AU.noise({ d: .14, v: .18, f: 500, to: 120 }); };
const sfxShield  = () => AU.tone({ f: 1250, to: 320, d: .2, type: 'sine', v: .26 });

/* ══════════════════════════════════════════════════
   PHYSICS — spheres vs ground / AABBs / each other
══════════════════════════════════════════════════ */
const GR = -22, SUB = 2;
class Body {
  constructor({ pos, vel, mass, r, isStatic, hw, hh, hd }) {
    this.pos = pos.clone();
    this.vel = vel ? vel.clone() : new THREE.Vector3();
    this.mass = mass || 1;
    this.inv = isStatic ? 0 : 1 / (mass || 1);
    this.r = r || 0.5;
    this.isStatic = !!isStatic;
    this.isBox = hw != null;
    this.hw = hw || 0; this.hh = hh || 0; this.hd = hd || 0;
    this.restitution = 0.15;
    this.friction = 0.82;
    this.alive = true;
  }
}

function physStep(list, dt) {
  const sdt = dt / SUB;
  for (let s = 0; s < SUB; s++) {
    for (let i = 0; i < list.length; i++) {
      const b = list[i];
      if (!b.alive || b.isStatic || b.isBox) continue;
      b.vel.y += GR * sdt;
      b.pos.x += b.vel.x * sdt;
      b.pos.y += b.vel.y * sdt;
      b.pos.z += b.vel.z * sdt;
      if (b.pos.y < b.r) {
        b.pos.y = b.r;
        if (b.vel.y < -0.5) b.vel.y *= -b.restitution; else b.vel.y = 0;
        b.vel.x *= b.friction; b.vel.z *= b.friction;
      }
      // vs static boxes
      for (let j = 0; j < list.length; j++) {
        const ob = list[j];
        if (!ob.alive || !ob.isBox) continue;
        const cx = Math.max(ob.pos.x - ob.hw, Math.min(ob.pos.x + ob.hw, b.pos.x));
        const cy = Math.max(ob.pos.y - ob.hh, Math.min(ob.pos.y + ob.hh, b.pos.y));
        const cz = Math.max(ob.pos.z - ob.hd, Math.min(ob.pos.z + ob.hd, b.pos.z));
        const dx = b.pos.x - cx, dy = b.pos.y - cy, dz = b.pos.z - cz;
        const d2 = dx * dx + dy * dy + dz * dz;
        if (d2 < b.r * b.r && d2 > 1e-8) {
          const d = Math.sqrt(d2), pen = b.r - d;
          const nx = dx / d, ny = dy / d, nz = dz / d;
          b.pos.x += nx * pen; b.pos.y += ny * pen; b.pos.z += nz * pen;
          const vn = b.vel.x * nx + b.vel.y * ny + b.vel.z * nz;
          if (vn < 0) {
            b.vel.x -= (1 + b.restitution) * vn * nx;
            b.vel.y -= (1 + b.restitution) * vn * ny;
            b.vel.z -= (1 + b.restitution) * vn * nz;
          }
        }
      }
      // vs other dynamic spheres (tank separation)
      for (let j = i + 1; j < list.length; j++) {
        const o = list[j];
        if (!o.alive || o.isStatic || o.isBox) continue;
        const dx = b.pos.x - o.pos.x, dz = b.pos.z - o.pos.z;
        const rr = b.r + o.r;
        const d2 = dx * dx + dz * dz;
        if (d2 < rr * rr && d2 > 1e-8) {
          const d = Math.sqrt(d2), pen = (rr - d) * 0.5;
          const nx = dx / d, nz = dz / d;
          b.pos.x += nx * pen; b.pos.z += nz * pen;
          o.pos.x -= nx * pen; o.pos.z -= nz * pen;
        }
      }
    }
  }
}

function makeGlowTex() {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(32, 32, 0, 32, 32, 32);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.35, 'rgba(255,255,255,.4)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  x.fillStyle = g; x.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}
function makeBarTex() {
  const c = document.createElement('canvas'); c.width = c.height = 4;
  const x = c.getContext('2d'); x.fillStyle = '#fff'; x.fillRect(0, 0, 4, 4);
  return new THREE.CanvasTexture(c);
}
function buildingTex(litCol) {
  const c = document.createElement('canvas'); c.width = 64; c.height = 128;
  const x = c.getContext('2d');
  x.fillStyle = '#070d16'; x.fillRect(0, 0, 64, 128);
  for (let ry = 0; ry < 14; ry++) for (let cx = 0; cx < 5; cx++) {
    const wx = 6 + cx * 11, wy = 6 + ry * 8.6;
    if (Math.random() < 0.42) {
      x.fillStyle = Math.random() < 0.8 ? litCol : '#ff9540';
      x.globalAlpha = 0.55 + Math.random() * 0.45;
    } else {
      x.fillStyle = '#0d1622'; x.globalAlpha = 1;
    }
    x.fillRect(wx, wy, 7, 5);
  }
  x.globalAlpha = 1;
  const t = new THREE.CanvasTexture(c);
  t.anisotropy = 2;
  return t;
}

  }));

function updateDust(dt) {
  const a = dustGeo.attributes.position;
  for (let i = 0; i < a.count; i++) {
    let y = a.getY(i) + dt * (0.4 + (i % 5) * 0.12);
    if (y > 11) y = 0;
    a.setY(i, y);

  a.needsUpdate = true;
}

function makeBulletMesh(isPlayer) {
  const m = new THREE.Mesh(BULLET_GEO, isPlayer ? BULLET_MAT_P : BULLET_MAT_E);
  const s = new THREE.Sprite(isPlayer ? GLOW_SP_P : GLOW_SP_E);

}

function burst(pos, col, n, spd, opts = {}) {
  let c = 0;
  for (const p of parts) {
    if (p.active) continue;
    p.active = true; p.m.visible = true;
    p.m.position.copy(pos);
    p.m.material.color.setHex(col);
    p.m.material.opacity = 1;
    const sc = (opts.size || 1) * (0.6 + Math.random() * 1.1);
    p.m.scale.set(sc, sc, sc);
    p.v.set((Math.random() - 0.5) * spd, Math.random() * spd * 0.7 + spd * 0.18, (Math.random() - 0.5) * spd);
    p.max = p.life = (opts.life || 0.55) * (0.7 + Math.random() * 0.6);
    p.grav = opts.grav != null ? opts.grav : 20;
    if (++c >= n) break;
  }
}
function ringFx(pos, col, grow = 7, life = 0.45) {
  for (const r of rings) {
    if (r.active) continue;
    r.active = true; r.m.visible = true;
    r.m.position.set(pos.x, 0.06, pos.z);
    r.m.material.color.setHex(col);
    r.m.material.opacity = 0.9;
    r.m.scale.set(0.3, 0.3, 1);
    r.max = r.life = life; r.grow = grow;
    return;
  }
}
function updateFx(dt) {
  for (const p of parts) {
    if (!p.active) continue;
    p.life -= dt;
    if (p.life <= 0) { p.active = false; p.m.visible = false; continue; }
    p.v.y -= p.grav * dt;
    p.m.position.addScaledVector(p.v, dt);
    p.m.material.opacity = p.life / p.max;
  }
  for (const r of rings) {
    if (!r.active) continue;
    r.life -= dt;
    if (r.life <= 0) { r.active = false; r.m.visible = false; continue; }
    const t = 1 - r.life / r.max;
    const s = 0.3 + t * r.grow;
    r.m.scale.set(s, s, 1);
    r.m.material.opacity = 0.9 * (1 - t);
  }
  for (const L of fxLights) if (L.intensity > 0) L.intensity = Math.max(0, L.intensity - 26 * dt);
}

function explodeFx(pos, col, big) {
  burst(pos, col, big ? 22 : 9, big ? 17 : 12, { size: big ? 1.6 : 1 });
  if (big) burst(pos, 0xffffff, 6, 9, { size: 0.8, life: 0.3 });
  flashLight(pos, col, big ? 9 : 4);
  if (big) ringFx(pos, col, 10, 0.5);
  shakeFrom(pos, big ? 0.75 : 0.18);
  sfxExpl(big);
}

function addShake(a) { shake = Math.min(shake + a, 1.1); }
function shakeFrom(pos, base) {
  if (!playerBody) return;
  const d = pos.distanceTo(playerBody.pos);
  addShake(base * Math.max(0, 1 - d / 32));
}

    let x, z, tries = 0;
    do {
      x = (Math.random() - 0.5) * ARENA * 1.7;
      z = (Math.random() - 0.5) * ARENA * 1.7;
      tries++;
    } while ((Math.hypot(x, z) < 13 || Math.hypot(x, z - ARENA * 0.55) < 10 || Math.abs(x) > ARENA - 4 || Math.abs(z) > ARENA - 4) && tries < 60);
    const [sw, sh, sd] = sizes[i % sizes.length];
    const geo = new THREE.BoxGeometry(sw, sh, sd);
    const tex = texs[i % 3];
    const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
      map: tex, emissiveMap: tex, emissive: 0xffffff, emissiveIntensity: 0.55,
      color: 0x223344, roughness: 0.8, metalness: 0.15
    }));
    mesh.position.set(x, sh / 2, z);
    mesh.castShadow = true; mesh.receiveShadow = true; scene.add(mesh);
    edges(geo, mesh, i % 3 === 1 ? 0xffd277 : 0x00ffe5, 0.22);

    const b = new Body({ pos: new THREE.Vector3(x, sh / 2, z), mass: 0, isStatic: true, hw: sw / 2, hh: sh / 2, hd: sd / 2 });
    bodies.push(b);
    obstacles.push({ mesh, b });
  }
}

/* ══════════════════════════════════════════════════
   ENEMIES — 3 types
══════════════════════════════════════════════════ */
const ETYPES = {
  grunt: { hp: 55,  spd: 5.6, scale: 1,    col: 0xff2244, hull: 0x200606, dmg: 11, cd: [2.0, 4.0], bSpd: 42, bR: 0.22, score: 100, orbit: 18, acc: 0.05 },
  scout: { hp: 28,  spd: 9.6, scale: 0.72, col: 0xff9500, hull: 0x241404, dmg: 7,  cd: [1.1, 2.2], bSpd: 56, bR: 0.16, score: 150, orbit: 14, acc: 0.07 },
  heavy: { hp: 150, spd: 3.1, scale: 1.45, col: 0xc04dff, hull: 0x16041f, dmg: 20, cd: [2.8, 4.6], bSpd: 30, bR: 0.40, score: 300, orbit: 30, acc: 0.03 }
};

function spawnEnemy(type, ex, ez) {
  const T = ETYPES[type];
  const R = T.col;
  const grp = new THREE.Group();
  const hullMat = neon(T.hull, 0.12, 0.7); // per-enemy material → per-enemy hit flash
  const hull = new THREE.Mesh(new THREE.BoxGeometry(2, 0.88, 3.1), hullMat);
  hull.position.y = 0.44; hull.castShadow = true; grp.add(hull);
  edges(new THREE.BoxGeometry(2, 0.88, 3.1), hull, R, 0.3);
  for (const sx of [-0.98, 0.98]) {
    const t = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.88, 3.3), neon(0x120202, 0.05, 0.9));
    t.position.set(sx, 0.44, 0); grp.add(t);
    const st = new THREE.Mesh(new THREE.BoxGeometry(0.37, 0.05, 3.1),
      new THREE.MeshBasicMaterial({ color: R, transparent: true, opacity: 0.75 }));
    st.position.set(sx, 0.92, 0); grp.add(st);
  }
  const tg = new THREE.Group(); tg.position.y = 1.05; grp.add(tg);
  const tb = new THREE.Mesh(new THREE.BoxGeometry(1.15, 0.58, 1.65), hullMat);
  tb.castShadow = true; tg.add(tb);
  edges(new THREE.BoxGeometry(1.17, 0.6, 1.67), tg, R, 0.4);
  const bg = new THREE.Group(); bg.position.z = 0.62; tg.add(bg);
  const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.11, 2.0, 8), neon(0x180404, 0.12, 0.5));
  bar.rotation.x = Math.PI / 2; bar.position.z = 1.0; bg.add(bar);

  // HP bar sprites
  const barBg = new THREE.Sprite(new THREE.SpriteMaterial({ map: barTex, color: 0x220a0a, depthWrite: false }));
  barBg.scale.set(1.7, 0.16, 1); barBg.position.y = 2.5; grp.add(barBg);
  const barFill = new THREE.Sprite(new THREE.SpriteMaterial({ map: barTex, color: 0x44ff66, depthWrite: false }));
  barFill.scale.set(1.62, 0.1, 1); barFill.position.y = 2.5; grp.add(barFill);

  grp.scale.setScalar(T.scale);
  scene.add(grp);

  const ER = 1.3 * T.scale;
  const b = new Body({ pos: new THREE.Vector3(ex, ER, ez), mass: 4 * T.scale, r: ER });
  b.friction = 0.80; b.restitution = 0.02;
  bodies.push(b);

  const en = {
    type, T, grp, tg, bg, b, hullMat, barFill,
    hp: T.hp, maxHp: T.hp,
    fireCD: T.cd[0] + Math.random() * (T.cd[1] - T.cd[0]),
    sCD: 0, sDir: Math.random() < 0.5 ? 1 : -1,
    flashT: 0, stuckT: 0, lastX: ex, lastZ: ez, chkT: 0,
    spawnT: 0.45, alive: true,
    hitR: 1.9 * T.scale + 0.3
  };
  b._en = en;
  enemies.push(en);
  ringFx(b.pos, T.col, 5, 0.45);
}

function waveComp(n) {
  let g = Math.min(2 + Math.ceil(n * 0.8), 8);
  const s = n >= 2 ? Math.min(Math.floor(n / 2), 4) : 0;
  const h = n >= 3 ? Math.min(Math.floor((n - 1) / 2), 3) : 0;
  if (g + s + h > 12) g = Math.max(2, 12 - s - h);
  return { grunt: g, scout: s, heavy: h };
}

function spawnWave(n) {
  const comp = waveComp(n);
  const list = [];
  for (const t in comp) for (let i = 0; i < comp[t]; i++) list.push(t);
  for (const t of list) {
    let ex, ez, tries = 0, ok;
    do {
      ex = (Math.random() - 0.5) * ARENA * 1.8;
      ez = (Math.random() - 0.5) * ARENA * 1.8;
      tries++;
      ok = Math.hypot(ex - playerBody.pos.x, ez - playerBody.pos.z) > 20 &&
           Math.abs(ex) < ARENA - 3 && Math.abs(ez) < ARENA - 3;
      if (ok) for (const o of obstacles) {
        if (Math.abs(ex - o.b.pos.x) < o.b.hw + 2 && Math.abs(ez - o.b.pos.z) < o.b.hd + 2) { ok = false; break; }
      }
    } while (!ok && tries < 50);
    spawnEnemy(t, ex, ez);
  }
  updEC();
  waveBanner('الموجة ' + n, n >= 3 ? 'انتبه — دبابات ثقيلة!' : 'استعد!');
  sfxWave();
}

/* ══════════════════════════════════════════════════
   BULLETS
══════════════════════════════════════════════════ */
function fireBullet(origin, dir, isPlayer, opts = {}) {
  const pool = isPlayer ? bulletPoolP : bulletPoolE;
  const mesh = pool.pop() || makeBulletMesh(isPlayer);
  mesh.visible = true;
  scene.add(mesh);
  const r = opts.r || 0.22;
  const k = r / 0.22;
  mesh.scale.set(k, k, k * 2.4);
  const bp = origin.clone().addScaledVector(dir, 2.6);
  mesh.position.copy(bp);
  mesh.lookAt(_v1.copy(bp).add(dir));

  const speed = opts.spd || (isPlayer ? 68 : 42);
  const b = new Body({ pos: bp, vel: dir.clone().multiplyScalar(speed), mass: 0.05, r });
  b._isBullet = true;
  bodies.push(b);
  bullets.push({ mesh, b, isPlayer, dmg: opts.dmg || 12, life: isPlayer ? 2.6 : 3.5, alive: true });
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const bl = bullets[i];
    if (!bl.alive) { bullets.splice(i, 1); continue; }
    bl.life -= dt;
    bl.b.pos.addScaledVector(bl.b.vel, dt);
    bl.mesh.position.copy(bl.b.pos);

    let hit = false;
    for (const ob of obstacles) {
      const { pos: op, hw, hh, hd } = ob.b;
      if (Math.abs(bl.b.pos.x - op.x) < hw + 0.2 && bl.b.pos.y < op.y + hh + 0.2 && Math.abs(bl.b.pos.z - op.z) < hd + 0.2) { hit = true; break; }
    }
    if (hit || bl.b.pos.y < 0.08 || bl.life <= 0 ||
        Math.abs(bl.b.pos.x) > ARENA + 4 || Math.abs(bl.b.pos.z) > ARENA + 4) {
      destroyBullet(bl, hit || bl.b.pos.y < 0.08); continue;
    }

    if (bl.isPlayer) {
      for (const en of enemies) {
        if (!en.alive) continue;
        if (bl.b.pos.distanceTo(en.b.pos) < en.hitR) {
          hitEnemy(en, 28, bl.b.pos);
          destroyBullet(bl, true);
          break;
        }
      }
    } else {
      if (bl.b.pos.distanceTo(playerBody.pos) < 1.5 + bl.b.r) {
        takeDmg(bl.dmg);
        destroyBullet(bl, true);
      }
    }
  }
}

function destroyBullet(bl, impact) {
  if (!bl.alive) return;
  bl.alive = false;
  scene.remove(bl.mesh);
  bl.mesh.visible = false;
  (bl.isPlayer ? bulletPoolP : bulletPoolE).push(bl.mesh);
  const idx = bodies.indexOf(bl.b);
  if (idx >= 0) bodies.splice(idx, 1);
  if (impact) burst(bl.b.pos, bl.isPlayer ? 0x00ddbb : 0xff3322, 4, 7, { size: 0.7, life: 0.35 });
}

/* ══════════════════════════════════════════════════
   ENEMY AI
══════════════════════════════════════════════════ */
function updateEnemies(dt) {
  for (const en of enemies) {
    if (!en.alive) continue;
    const T = en.T;

    if (en.spawnT > 0) {
      en.spawnT -= dt;
      const s = T.scale * Math.min(1, 1 - en.spawnT / 0.45);
      en.grp.scale.setScalar(Math.max(0.05, s));
    }

    en.grp.position.set(en.b.pos.x, 0, en.b.pos.z);

    if (en.flashT > 0) {
      en.flashT -= dt;
      if (en.flashT <= 0) en.hullMat.emissiveIntensity = 0.12;
    }

    const dx = playerBody.pos.x - en.b.pos.x;
    const dz = playerBody.pos.z - en.b.pos.z;
    const dist = Math.sqrt(dx * dx + dz * dz) || 0.001;
    const toP = Math.atan2(dx, dz);

    en.tg.rotation.y = toP - en.grp.rotation.y;

    en.sCD -= dt;
    if (en.sCD < 0) { en.sCD = 1.6 + Math.random() * 2.2; en.sDir *= -1; }

    // stuck check — flip strafe if barely moving
    en.chkT += dt;
    if (en.chkT > 0.6) {
      const moved = Math.hypot(en.b.pos.x - en.lastX, en.b.pos.z - en.lastZ);
      if (moved < 0.5 && dist > 6) en.sDir *= -1;
      en.lastX = en.b.pos.x; en.lastZ = en.b.pos.z; en.chkT = 0;
    }

    let ma = toP;
    if (dist < T.orbit) ma = toP + en.sDir * Math.PI * 0.42;
    if (dist < 4.5 && en.type !== 'heavy') ma = toP + Math.PI;

    en.b.vel.x = en.b.vel.x * 0.35 + Math.sin(ma) * T.spd * 0.65;
    en.b.vel.z = en.b.vel.z * 0.35 + Math.cos(ma) * T.spd * 0.65;
    if (Math.abs(en.b.vel.x) + Math.abs(en.b.vel.z) > 0.1)
      en.grp.rotation.y = Math.atan2(en.b.vel.x, en.b.vel.z);

    const bd = ARENA - 1;
    if (Math.abs(en.b.pos.x) > bd) { en.b.pos.x = Math.sign(en.b.pos.x) * bd; en.b.vel.x *= -0.4; }
    if (Math.abs(en.b.pos.z) > bd) { en.b.pos.z = Math.sign(en.b.pos.z) * bd; en.b.vel.z *= -0.4; }

    // Ram damage — boosting into an enemy hurts it
    if (ramCD <= 0 && dist < en.b.r + 1.8 && curSpeed > 15) {
      ramCD = 0.6;
      hitEnemy(en, 50, en.b.pos);
      en.b.vel.x += dx / dist * 16; en.b.vel.z += dz / dist * 16;
      addShake(0.5); sfxRam(); vib(40);
      burst(en.b.pos, 0xffffff, 8, 12, { size: 0.9, life: 0.35 });
      if (!en.alive) continue; // ram kill — don't let a dead tank fire below
    }

    // Fire — leads the player slightly
    en.fireCD -= dt;
    if (en.fireCD <= 0 && dist < 44 && en.spawnT <= 0) {
      en.fireCD = T.cd[0] + Math.random() * (T.cd[1] - T.cd[0]);
      const lead = dist / T.bSpd * 0.5;
      const tx = playerBody.pos.x + playerVX * lead - en.b.pos.x;
      const tz = playerBody.pos.z + playerVZ * lead - en.b.pos.z;
      const td = Math.sqrt(tx * tx + tz * tz) || 0.001;
      const sp = T.acc + dist * 0.0015;
      const dir = _v1.set(
        tx / td + (Math.random() - 0.5) * sp,
        0.015 + (Math.random() - 0.5) * 0.02,
        tz / td + (Math.random() - 0.5) * sp
      ).normalize().clone();
      _v2.set(en.b.pos.x, 1.55 * T.scale, en.b.pos.z);
      fireBullet(_v2, dir, false, { spd: T.bSpd, r: T.bR, dmg: T.dmg });
      sfxEShoot();
    }
  }
}

function hitEnemy(en, dmg, atPos) {
  if (!en.alive) return;
  en.hp -= dmg;
  en.flashT = 0.09;
  en.hullMat.emissiveIntensity = 1.0;
  const frac = Math.max(0, en.hp / en.maxHp);
  en.barFill.scale.x = 1.62 * frac;
  en.barFill.material.color.setHex(frac > 0.5 ? 0x44ff66 : frac > 0.25 ? 0xffd000 : 0xff3344);
  hitMarker(); sfxHit();
  if (atPos) dmgNum(atPos, '-' + dmg, '#9ffff4');
  if (en.hp <= 0) killEnemy(en);
}

function killEnemy(en) {
  en.alive = false;
  const idx = bodies.indexOf(en.b);
  if (idx >= 0) bodies.splice(idx, 1);
  const p = en.b.pos.clone().setY(1);
  explodeFx(p, en.T.col, true);
  scene.remove(en.grp);
  kills++;
  vib(30);

  // combo
  streak++; comboT = 5;
  const mult = Math.min(streak, 5);
  const pts = en.T.score * mult;
  score += pts; updScore();
  dmgNum(p, '+' + pts, '#ffd000');
  if (mult > 1) {
    E.combo.style.display = 'inline-block';
    E.combo.textContent = 'سلسلة ×' + mult;
    sfxCombo(mult);
  }
  kfeed(en.type === 'heavy' ? 'دبابة ثقيلة دمرت! +' + pts : 'دبابة دمرت +' + pts);

  // drop powerup
  if (Math.random() < 0.38 && powerups.length < 5) spawnPowerup(en.b.pos.x, en.b.pos.z);

  const i = enemies.indexOf(en);
  if (i >= 0) enemies.splice(i, 1);
  updEC();
}

/* ══════════════════════════════════════════════════
   POWER-UPS
══════════════════════════════════════════════════ */
const PU = {
  heal:   { col: 0x22ff88, label: 'صحة +35' },
  rapid:  { col: 0xffd000, label: 'نيران سريعة!' },
  shield: { col: 0x33aaff, label: 'درع واقي!' }
};
let puGeo = null, puMats = null;

function spawnPowerup(x, z) {
  if (!puGeo) {
    puGeo = new THREE.OctahedronGeometry(0.55);
    puMats = {};
    for (const k in PU) puMats[k] = new THREE.MeshBasicMaterial({ color: PU[k].col });
  }
  const r = Math.random();
  const type = r < 0.4 ? 'heal' : r < 0.72 ? 'rapid' : 'shield';
  const grp = new THREE.Group();
  const m = new THREE.Mesh(puGeo, puMats[type]);
  m.position.y = 1.1; grp.add(m);
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: PU[type].col, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending, depthWrite: false }));
  s.scale.set(2.6, 2.6, 1); s.position.y = 1.1; grp.add(s);
  grp.position.set(x, 0, z);
  scene.add(grp);
  powerups.push({ type, grp, m, life: 12, phase: Math.random() * 6 });
}

function updatePowerups(dt, t) {
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.life -= dt;
    p.m.rotation.y += dt * 2.4;
    p.m.position.y = 1.1 + Math.sin(t * 2.5 + p.phase) * 0.22;
    if (p.life < 3) p.grp.visible = Math.sin(p.life * 12) > -0.4;
    if (p.life <= 0) { scene.remove(p.grp); powerups.splice(i, 1); continue; }
    const d = Math.hypot(p.grp.position.x - playerBody.pos.x, p.grp.position.z - playerBody.pos.z);
    if (d < 2.4) {
      applyPowerup(p.type);
      ringFx(p.grp.position, PU[p.type].col, 5, 0.4);
      scene.remove(p.grp);
      powerups.splice(i, 1);
    }
  }
}

function applyPowerup(type) {
  if (type === 'heal') { hp = Math.min(100, hp + 35); updHP(); }
  else if (type === 'rapid') rapidT = 7;
  else shieldT = 6;
  kfeed('✦ ' + PU[type].label);
  sfxPow(); vib(20);
}

/* ══════════════════════════════════════════════════
   HOMING MISSILE
══════════════════════════════════════════════════ */
let mslMesh = null;
function fireMissile() {
  if (!running || missileCD > 0 || missile) return;
  missileCD = MISSILE_MAX_CD;
  if (!mslMesh) {
    mslMesh = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.9, 8),
      new THREE.MeshBasicMaterial({ color: 0xffe9a0 }));
    body.rotation.x = Math.PI / 2; mslMesh.add(body);
    const nose = new THREE.Mesh(new THREE.ConeGeometry(0.13, 0.35, 8),
      new THREE.MeshBasicMaterial({ color: 0xff7700 }));
    nose.rotation.x = Math.PI / 2; nose.position.z = 0.62; mslMesh.add(nose);
    const gl = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: 0xffd000, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
    gl.scale.set(2.2, 2.2, 1); mslMesh.add(gl);
  }
  mslMesh.visible = true;
  scene.add(mslMesh);
  const dir = new THREE.Vector3(Math.sin(camYaw), 0.12, Math.cos(camYaw)).normalize();
  missile = {
    pos: new THREE.Vector3(playerBody.pos.x + dir.x * 2.5, 1.8, playerBody.pos.z + dir.z * 2.5),
    vel: dir.multiplyScalar(26),
    life: 6, smokeT: 0
  };
  sfxMissile(); vib(25);
  addShake(0.2); recoil = 1;
}

function updateMissile(dt) {
  if (!missile) return;
  missile.life -= dt;

  // home toward nearest enemy
  let tgt = null, td = 1e9;
  for (const en of enemies) {
    if (!en.alive) continue;
    const d = missile.pos.distanceTo(en.b.pos);
    if (d < td) { td = d; tgt = en; }
  }
  if (tgt) {
    _v1.set(tgt.b.pos.x, tgt.b.pos.y + 0.4, tgt.b.pos.z).sub(missile.pos).normalize();
    missile.vel.lerp(_v1.multiplyScalar(30), Math.min(1, 4.5 * dt));
    missile.vel.setLength(30);
  }
  missile.pos.addScaledVector(missile.vel, dt);
  mslMesh.position.copy(missile.pos);
  mslMesh.lookAt(_v1.copy(missile.pos).add(missile.vel));

  missile.smokeT -= dt;
  if (missile.smokeT <= 0) {
    missile.smokeT = 0.035;
    burst(missile.pos, 0xffaa33, 1, 1.5, { size: 0.7, life: 0.4, grav: -2 });
  }

  let boom = missile.life <= 0 || missile.pos.y < 0.1 || (tgt && td < 2.2);
  if (!boom) for (const ob of obstacles) {
    const { pos: op, hw, hh, hd } = ob.b;
    if (Math.abs(missile.pos.x - op.x) < hw + 0.3 && missile.pos.y < op.y + hh + 0.3 && Math.abs(missile.pos.z - op.z) < hd + 0.3) { boom = true; break; }
  }
  if (boom) {
    const p = missile.pos.clone();
    explodeFx(p, 0xffaa00, true);
    ringFx(p, 0xffd000, 13, 0.6);
    for (const en of [...enemies]) {
      if (!en.alive) continue;
      const d = p.distanceTo(en.b.pos);
      if (d < 8) hitEnemy(en, Math.round(95 * (1 - d / 10)), en.b.pos);
    }
    vib(60);
    scene.remove(mslMesh);
    missile = null;
  }
}

/* ══════════════════════════════════════════════════
   PLAYER UPDATE
══════════════════════════════════════════════════ */
function updatePlayer(dt) {
  if (!playerBody) return;

  const boosting = joyBoost || keys['shift'];
  const spd = boosting ? 19 : 13;
  let mvx = 0, mvz = 0;

  const fwdX = Math.sin(camYaw), fwdZ = Math.cos(camYaw);
  const rtX = Math.cos(camYaw), rtZ = -Math.sin(camYaw);

  if (joyActive) {
    mvx = rtX * joyDX + fwdX * joyDZ;
    mvz = rtZ * joyDX + fwdZ * joyDZ;
  } else {
    if (keys['w'] || keys['arrowup'])    { mvx += fwdX; mvz += fwdZ; }
    if (keys['s'] || keys['arrowdown'])  { mvx -= fwdX; mvz -= fwdZ; }
    if (keys['a'] || keys['arrowleft'])  { mvx -= rtX;  mvz -= rtZ;  }
    if (keys['d'] || keys['arrowright']) { mvx += rtX;  mvz += rtZ;  }
  }
  const ml = Math.sqrt(mvx * mvx + mvz * mvz);
  if (ml > 0.01) { mvx = mvx / ml * spd; mvz = mvz / ml * spd; }
  curSpeed = ml > 0.01 ? spd : 0;
  playerVX = mvx; playerVZ = mvz;

  playerBody.pos.x += mvx * dt;
  playerBody.pos.z += mvz * dt;

  const bd = ARENA - 1.5;
  playerBody.pos.x = Math.max(-bd, Math.min(bd, playerBody.pos.x));
  playerBody.pos.z = Math.max(-bd, Math.min(bd, playerBody.pos.z));

  playerGrp.position.set(playerBody.pos.x, 0, playerBody.pos.z);
  playerGrp.rotation.y = camYaw;
  groundRing.position.set(playerBody.pos.x, 0.03, playerBody.pos.z);

  // boost trail
  if (boosting && curSpeed > 0 && Math.random() < 0.5)
    burst(_v1.set(playerBody.pos.x - fwdX * 1.8, 0.3, playerBody.pos.z - fwdZ * 1.8), 0x00ffe5, 1, 2, { size: 0.6, life: 0.3, grav: -3 });

  // recoil
  if (recoil > 0) recoil = Math.max(0, recoil - dt * 9);
  barrelGrp.position.z = 0.8 - recoil * 0.3;

  // shield visual
  if (shieldT > 0) {
    shieldMesh.visible = true;
    shieldMesh.material.opacity = 0.1 + Math.sin(performance.now() * 0.008) * 0.05 + (shieldT < 1.5 ? Math.sin(shieldT * 18) * 0.05 : 0);
  } else shieldMesh.visible = false;

  // camera
  const CD = 9, CH = 5.5;
  const cx = playerBody.pos.x - fwdX * CD;
  const cz = playerBody.pos.z - fwdZ * CD;
  cam.position.x += (cx - cam.position.x) * 0.14;
  cam.position.y += (CH - cam.position.y) * 0.14;
  cam.position.z += (cz - cam.position.z) * 0.14;
  if (shake > 0.003) {
    cam.position.x += (Math.random() - 0.5) * shake;
    cam.position.y += (Math.random() - 0.5) * shake * 0.6;
    cam.position.z += (Math.random() - 0.5) * shake;
    shake *= Math.pow(0.002, dt);
  } else shake = 0;
  cam.lookAt(playerBody.pos.x + fwdX * 4, 1.2, playerBody.pos.z + fwdZ * 4);

  if (muzzleTimer > 0) {
    muzzleTimer -= dt;
    muzzleLight.intensity = 7 * Math.max(0, muzzleTimer / 0.09);
  } else muzzleLight.intensity = 0;

  ammo = Math.min(100, ammo + dt * 7);
  updAmmo();
}

/* ══════════════════════════════════════════════════
   SHOOT
══════════════════════════════════════════════════ */
function shoot() {
  if (!running || !playerBody || shotT > 0) return;
  const cost = rapidT > 0 ? 1 : 2;
  if (ammo < cost) return;
  ammo -= cost;
  shotT = rapidT > 0 ? 0.09 : 0.18;
  updAmmo();

  let yaw = camYaw;
  if (rapidT > 0) yaw += (Math.random() - 0.5) * 0.035;
  const dir = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
  const origin = _v2.set(
    playerBody.pos.x + dir.x * 2.2, 1.45, playerBody.pos.z + dir.z * 2.2
  );
  muzzleTimer = 0.09;
  muzzleLight.position.set(origin.x, 1.6, origin.z);
  muzzleLight.intensity = 7;
  muzzleLight.color.setHex(rapidT > 0 ? 0xffd000 : 0x00ffe5);
  recoil = 1;
  addShake(0.06);
  fireBullet(origin, dir, true);
  sfxShoot();
}

/* ══════════════════════════════════════════════════
   DAMAGE
══════════════════════════════════════════════════ */
function takeDmg(d) {
  if (!running) return;
  if (shieldT > 0) {
    E.svign.style.opacity = '1';
    setTimeout(() => E.svign.style.opacity = '0', 130);
    sfxShield();
    return;
  }
  hp = Math.max(0, hp - d);
  updHP();
  addShake(0.35);
  sfxDmg(); vib(60);
  E.dvign.style.opacity = '1';
  setTimeout(() => E.dvign.style.opacity = '0', 130);
  if (hp <= 0) endGame();
}

/* ══════════════════════════════════════════════════
   MINIMAP (drawn every 3rd frame)
══════════════════════════════════════════════════ */
function drawMM() {
  const S = 92, sc = S / (ARENA * 2), ctx = mmCtx;
  ctx.clearRect(0, 0, S, S);
  ctx.fillStyle = 'rgba(0,4,8,.85)'; ctx.fillRect(0, 0, S, S);
  const tx = p => p.x * sc + S / 2, tz = p => p.z * sc + S / 2;
  ctx.fillStyle = 'rgba(0,40,60,.7)';
  for (const o of obstacles)
    ctx.fillRect(tx(o.b.pos) - o.b.hw * sc, tz(o.b.pos) - o.b.hd * sc, o.b.hw * 2 * sc, o.b.hd * 2 * sc);
  for (const p of powerups) {
    ctx.fillStyle = '#' + PU[p.type].col.toString(16).padStart(6, '0');
    ctx.fillRect(tx(p.grp.position) - 1.5, tz(p.grp.position) - 1.5, 3, 3);
  }
  for (const en of enemies) {
    if (!en.alive) continue;
    ctx.fillStyle = '#' + en.T.col.toString(16).padStart(6, '0');
    ctx.beginPath(); ctx.arc(tx(en.b.pos), tz(en.b.pos), en.type === 'heavy' ? 3.6 : 2.6, 0, Math.PI * 2); ctx.fill();
  }
  ctx.fillStyle = '#00ffe5';
  ctx.beginPath(); ctx.arc(tx(playerBody.pos), tz(playerBody.pos), 3.6, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#00ffe5'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(tx(playerBody.pos), tz(playerBody.pos));
  ctx.lineTo(tx(playerBody.pos) + Math.sin(camYaw) * 8, tz(playerBody.pos) + Math.cos(camYaw) * 8);
  ctx.stroke();
}

/* ══════════════════════════════════════════════════
   UI
══════════════════════════════════════════════════ */
let _lhp = -1, _lam = -1, _lsc = -1;
function updHP() {
  const h = Math.ceil(hp);
  if (h === _lhp) return; _lhp = h;
  const p = hp / 100;
  E.hfhp.style.width = (p * 100) + '%';
  E.hfhp.style.background = p > 0.5 ? 'linear-gradient(90deg,#00ffe5,#00b0a0)' :
    p > 0.25 ? 'linear-gradient(90deg,#ffe500,#ff7700)' : 'linear-gradient(90deg,#ff2244,#ff6644)';
  E.hpv.textContent = h;
  E.hpv.style.color = p > 0.25 ? '' : '#ff3355';
}
function updAmmo() {
  const a = Math.round(ammo);
  if (a === _lam) return; _lam = a;
  E.hfam.style.width = a + '%';
}
function updScore() {
  if (score === _lsc) return; _lsc = score;
  E.sc.textContent = String(score).padStart(4, '0');
}
function updEC() { E.ecn.textContent = enemies.length; }
function updWave() { E.wvn.textContent = waveN; }

function kfeed(msg) {
  if (E.kf.children.length > 3) E.kf.firstChild.remove();
  const el = document.createElement('div');
  el.className = 'kfi'; el.textContent = msg;
  E.kf.appendChild(el);
  setTimeout(() => el.remove(), 2700);
}

let wbandT = null;
function waveBanner(t1, t2) {
  E.wb1.textContent = t1; E.wb2.textContent = t2;
  E.wband.style.display = 'block';
  // retrigger animation
  E.wb1.style.animation = 'none'; E.wb1.offsetHeight; E.wb1.style.animation = '';
  clearTimeout(wbandT);
  wbandT = setTimeout(() => E.wband.style.display = 'none', 2000);
}

function hitMarker() {
  E.hm.style.opacity = '1';
  setTimeout(() => E.hm.style.opacity = '0', 90);
}

function dmgNum(worldPos, text, color) {
  if (E.fxl.children.length > 13) return;
  _v1.copy(worldPos).project(cam);
  if (_v1.z > 1) return;
  const x = (_v1.x * 0.5 + 0.5) * innerWidth;

let buffsEl = null;
function updBuffs() {
  if (!buffsEl) {
    buffsEl = document.createElement('div');
    buffsEl.id = 'buffs';
    document.getElementById('hud-bottom').prepend(buffsEl);
  }
  let html = '';
  if (rapidT > 0) html += '<span class="buff buff-r">⚡ ' + Math.ceil(rapidT) + '</span>';
  if (shieldT > 0) html += '<span class="buff buff-s">🛡 ' + Math.ceil(shieldT) + '</span>';
  if (html !== buffsEl._h) { buffsEl._h = html; buffsEl.innerHTML = html; }
}

let _mslShown = -1;
function updMissileBtn() {
  const cd = Math.ceil(Math.max(0, missileCD));
  if (cd === _mslShown) return; _mslShown = cd;
  if (cd > 0) {
    E.mslBtn.classList.add('cd');
    E.mslCd.style.display = 'flex';
    E.mslCd.textContent = cd;
  } else {
    E.mslBtn.classList.remove('cd');
    E.mslCd.style.display = 'none';
  }
}

/* ══════════════════════════════════════════════════
   GAME FLOW
══════════════════════════════════════════════════ */
function startGame() {
  AU.init(); AU.resume();
  for (const e of enemies) scene.remove(e.grp);
  for (const b of bullets) { scene.remove(b.mesh); }
  for (const o of obstacles) scene.remove(o.mesh);
  for (const p of powerups) scene.remove(p.grp);
  if (missile && mslMesh) { scene.remove(mslMesh); missile = null; }
  if (playerGrp) scene.remove(playerGrp);
  for (const p of parts) { p.active = false; p.m.visible = false; }
  for (const r of rings) { r.active = false; r.m.visible = false; }
  bodies = []; enemies = []; bullets = []; obstacles = []; powerups = [];
  hp = 100; ammo = 100; score = 0; kills = 0;
  camYaw = Math.PI; waveN = 1; waveT = 0; waveClearing = false;
  shotT = 0; recoil = 0; rapidT = 0; shieldT = 0; missileCD = 0; ramCD = 0;
  streak = 0; comboT = 0; shake = 0; muzzleTimer = 0; warmup = 0;
  _lhp = _lam = _lsc = _mslShown = -1;
  muzzleLight.intensity = 0;
  E.combo.style.display = 'none';
  E.fxl.innerHTML = '';
  E.kf.innerHTML = '';

  buildPlayer();
  groundRing.visible = true;
  buildObstacles();
  spawnWave(1);
  updHP(); updAmmo(); updScore(); updEC(); updWave(); updMissileBtn();

  E.xhair.style.display = 'block';
  E.start.style.display = 'none';
  E.gover.style.display = 'none';
  running = true;
  clock.start();
  requestAnimationFrame(loop);
}

function endGame() {
  running = false;
  E.xhair.style.display = 'none';
  explodeFx(playerBody.pos.clone().setY(1), 0x00ffe5, true);
  playerGrp.visible = false;
  groundRing.visible = false;
  const isRecord = score > best;
  if (isRecord) { best = score; lsSet('wg_best', String(best)); }
  $('got').textContent = 'دمرت!';
  $('got').style.color = '#ff2244';
  $('got').style.textShadow = '0 0 40px #ff2244';
  $('gsc').textContent = score;
  $('gbest').textContent = best;
  $('gwv').textContent = waveN;
  $('gkl').textContent = kills;
  $('gnew').style.display = isRecord ? 'block' : 'none';
  vib([80, 50, 120]);
  setTimeout(() => { E.gover.style.display = 'flex'; }, 650);
  // render a few more frames so the death explosion is visible
  let n = 40;
  (function deathCam() {
    if (n-- <= 0) return;
    const dt = Math.min(clock.getDelta(), 0.05);
    updateFx(dt); updateBullets(dt);
    if (shake > 0.003) {
      cam.position.x += (Math.random() - 0.5) * shake;
      cam.position.y += (Math.random() - 0.5) * shake * 0.6;
      shake *= 0.88;
    }
    renderer.render(scene, cam);
    requestAnimationFrame(deathCam);
  })();
}

/* ══════════════════════════════════════════════════
   ADAPTIVE QUALITY — keeps WebView smooth
══════════════════════════════════════════════════ */
let perfAcc = 0, perfN = 0, prTier = 0;
const PR_STEPS = [Math.min(devicePixelRatio, 2), Math.min(devicePixelRatio, 1.5), 1];
function perfSample(dt) {
  warmup += dt;
  if (warmup < 4) return; // skip shader-compile hitches at start
  perfAcc += dt; perfN++;
  if (perfN >= 90) {
    const avg = perfAcc / perfN;
    perfAcc = 0; perfN = 0;
    if (avg > 0.0238 && prTier < PR_STEPS.length - 1) {
      prTier++;
      renderer.setPixelRatio(PR_STEPS[prTier]);
      renderer.setSize(innerWidth, innerHeight);
    }
  }
}

/* ══════════════════════════════════════════════════
   MAIN LOOP
══════════════════════════════════════════════════ */
let mmFrame = 0;
function loop() {
  if (!running) return;
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (dt <= 0) return;
  const t = clock.elapsedTime;

  perfSample(dt);

  shotT -= dt; ramCD -= dt;
  if (rapidT > 0) rapidT -= dt;
  if (shieldT > 0) shieldT -= dt;
  if (missileCD > 0) missileCD -= dt;
  if (comboT > 0) {
    comboT -= dt;
    if (comboT <= 0) { streak = 0; E.combo.style.display = 'none'; }
  }

  // physics for tanks only (bullets/missile integrate themselves)
  let nDyn = 0;
  for (let i = 0; i < bodies.length; i++) if (!bodies[i]._isBullet) _physList[nDyn++] = bodies[i];
  _physList.length = nDyn;
  physStep(_physList, dt);

  updatePlayer(dt);
  updateEnemies(dt);
  updateBullets(dt);
  updateMissile(dt);
  updatePowerups(dt, t);
  updateFx(dt);
  updateDust(dt);

  if (fireHeld) shoot();

  if (mmFrame++ % 3 === 0) drawMM();
  updBuffs();
  updMissileBtn();

  // wave flow
  if (enemies.length === 0) {
    if (!waveClearing) {
      waveClearing = true;
      waveT = 0;
      const bonus = 100 + waveN * 50;
      score += bonus; updScore();
      kfeed('الموجة اكتملت! +' + bonus);
      hp = Math.min(100, hp + 15); updHP();
    }
    waveT += dt;
    if (waveT > 3.2) {
      waveClearing = false;
      waveN++; updWave();
      spawnWave(waveN);
    }
  }

  renderer.render(scene, cam);
}
const _physList = [];

/* ══════════════════════════════════════════════════
   INPUT
══════════════════════════════════════════════════ */
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ' && running) { e.preventDefault(); shoot(); }
  if ((e.key === 'e' || e.key === 'E') && running) fireMissile();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Desktop mouse: pointer lock when available, drag-look fallback (WebView has no pointer lock)
let dragLook = false, dragX = 0;
document.addEventListener('mousemove', e => {
  if (!running) return;
  if (document.pointerLockElement) camYaw -= e.movementX * 0.002;
  else if (dragLook) { camYaw -= (e.clientX - dragX) * 0.004; dragX = e.clientX; }
});
document.addEventListener('mousedown', e => {
  if (e.button !== 0 || IS_TOUCH) return;
  if (!running) return;
  if (!document.pointerLockElement) {
    try { renderer.domElement.requestPointerLock && renderer.domElement.requestPointerLock(); } catch (err) {}
    dragLook = true; dragX = e.clientX;
    shoot();
    return;
  }
  shoot();
});
document.addEventListener('mouseup', () => { dragLook = false; });

function bindBtn(el, fn) {
  el.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, { passive: false });
  el.addEventListener('mousedown', e => { e.preventDefault(); fn(); });
}
bindBtn($('btn-start'), startGame);
bindBtn($('btn-restart'), startGame);

/* ── Joystick ── */
let joyActive = false, joyId = null;
let joyDX = 0, joyDZ = 0, joyBoost = false;
const joyWrap = $('joy-wrap'), joyKnob = $('joy-knob');
const JR = 40;

function joyReset() {
  joyActive = false; joyId = null; joyDX = 0; joyDZ = 0; joyBoost = false;
  joyKnob.style.transform = 'translate(-50%,-50%)';
}
joyWrap.addEventListener('touchstart', e => {
  e.preventDefault();
  const tch = e.changedTouches[0];
  joyActive = true; joyId = tch.identifier;
  const r = joyWrap.getBoundingClientRect();
  handleJoy(tch.clientX - (r.left + r.width / 2), tch.clientY - (r.top + r.height / 2));
}, { passive: false });
joyWrap.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const tch of e.changedTouches) {
    if (tch.identifier !== joyId) continue;
    const r = joyWrap.getBoundingClientRect();
    handleJoy(tch.clientX - (r.left + r.width / 2), tch.clientY - (r.top + r.height / 2));
  }
}, { passive: false });
const joyEnd = e => {
  e.preventDefault();
  for (const tch of e.changedTouches) if (tch.identifier === joyId) joyReset();
};
joyWrap.addEventListener('touchend', joyEnd, { passive: false });
joyWrap.addEventListener('touchcancel', joyEnd, { passive: false });

function handleJoy(dx, dy) {
  const d = Math.sqrt(dx * dx + dy * dy);
  const mx = Math.min(d, JR);
  const nx = dx / Math.max(d, 0.001), ny = dy / Math.max(d, 0.001);
  joyKnob.style.transform = `translate(calc(-50% + ${nx * mx}px), calc(-50% + ${ny * mx}px))`;
  joyDX = -nx; joyDZ = -ny;
  joyBoost = d > JR * 0.88;
}

/* ── Look pad ── */
const lookPad = $('look-pad');
let lookId = null, lookLastX = 0;
lookPad.addEventListener('touchstart', e => {
  e.preventDefault();
  const tch = e.changedTouches[0];
  lookId = tch.identifier; lookLastX = tch.clientX;
}, { passive: false });
lookPad.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const tch of e.changedTouches) {
    if (tch.identifier !== lookId) continue;
    camYaw -= (tch.clientX - lookLastX) * 0.0042;
    lookLastX = tch.clientX;
  }
}, { passive: false });
const lookEnd = e => { for (const tch of e.changedTouches) if (tch.identifier === lookId) lookId = null; };
lookPad.addEventListener('touchend', lookEnd, { passive: false });
lookPad.addEventListener('touchcancel', lookEnd, { passive: false });

/* ── Fire / missile buttons ── */
let fireHeld = false;
E.fireBtn.addEventListener('touchstart', e => {
  e.preventDefault(); fireHeld = true; shoot(); E.fireBtn.classList.add('firing');
}, { passive: false });
const fireEnd = e => { e.preventDefault(); fireHeld = false; E.fireBtn.classList.remove('firing'); };
E.fireBtn.addEventListener('touchend', fireEnd, { passive: false });
E.fireBtn.addEventListener('touchcancel', fireEnd, { passive: false });

E.mslBtn.addEventListener('touchstart', e => { e.preventDefault(); fireMissile(); }, { passive: false });
E.mslBtn.addEventListener('mousedown', e => { e.preventDefault(); fireMissile(); });

/* ── Visibility — avoid time jumps when app backgrounds the WebView ── */
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && running) clock.getDelta();
});

   INIT
══════════════════════════════════════════════════ */
$('sctrl').innerHTML = IS_TOUCH
  ? '<b>عصا التحكم يسار</b> · تحريك الدبابة<br><b>اسحب يمين الشاشة</b> · توجيه المدفع<br><b>🔥 إطلاق نار</b> · <b>🚀 صاروخ موجه</b><br>ادفع العصا للحافة للاندفاع — الصدم يدمر الأعداء!'
  : '<b>WASD</b> تحرك · <b>الماوس</b> توجيه · <b>مسافة / نقرة</b> إطلاق<br><b>E</b> صاروخ موجه · <b>Shift</b> اندفاع (الصدم يدمر الأعداء!)';
if (best > 0) {
  $('sbest').style.display = 'block';
  $('sbest').textContent = '🏆 أفضل نتيجة: ' + best;
}
if (!IS_TOUCH) {
  $('mctrl').style.display = 'none';
  $('look-pad').style.display = 'none';
}

initThree();
renderer.render(scene, cam);
</script>
