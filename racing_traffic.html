<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>سباق الزحام</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    touch-action: none; position: fixed; inset: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    background: radial-gradient(circle at 50% 20%, #16263b 0%, #0d1b2a 60%, #07101b 100%);
    color: #fff;
  }
  .num { font-variant-numeric: lining-nums; font-feature-settings: "lnum" 1; }

  #grain {
    position: fixed; inset: 0; z-index: 50; pointer-events: none; opacity: 0.04;
  }

  #container { position: fixed; inset: 0; overflow: hidden; }

  #road { position: absolute; inset: 0; display: block; z-index: 1; }

  .screen {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    opacity: 0; pointer-events: none;
    transform: translateY(12px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }

  .glass {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 30px 26px;
    max-width: 340px; width: 100%;
    position: relative;
  }
  .glass::before {
    content: ""; position: absolute; inset: 0; border-radius: 20px;
    box-shadow: 0 0 80px 30px rgba(245,200,66,0.10);
    z-index: -1; pointer-events: none;
  }

  .title {
    font-size: 38px; font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(180deg,#fff 0%, #f5c842 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 40px rgba(245,200,66,0.5);
    margin-bottom: 6px;
  }
  .subtitle { font-size: 15px; color: #cfd8e3; line-height: 1.8; margin: 14px 0 24px; }
  .emoji-big { font-size: 60px; margin-bottom: 4px; filter: drop-shadow(0 0 18px rgba(245,200,66,0.4)); }

  .btn {
    cursor: pointer; border: none; outline: none;
    font-family: inherit; font-weight: 700; font-size: 20px; color: #0d1b2a;
    background: linear-gradient(180deg,#ffe07a,#f5c842);
    border-radius: 999px; padding: 16px 44px;
    box-shadow: 0 6px 0 #b8901f, 0 0 24px rgba(245,200,66,0.45);
    transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #b8901f, 0 0 18px rgba(245,200,66,0.35); }

  .hint { font-size: 13px; color: #93a3b5; margin-top: 18px; line-height: 1.7; }

  #hud {
    position: absolute; top: 0; left: 0; right: 0; z-index: 15;
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; pointer-events: none;
    opacity: 0; transition: opacity 0.3s ease;
  }
  #hud.active { opacity: 1; }
  .pill {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 999px; padding: 7px 16px;
    font-size: 17px; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .pill.score { color: #f5c842; text-shadow: 0 0 14px rgba(245,200,66,0.7); }
  .pill.lives { color: #ff6b6b; text-shadow: 0 0 14px rgba(255,107,107,0.7); }

  #levelup {
    position: absolute; top: 50%; left: 50%; z-index: 16;
    transform: translate(-50%,-50%) scale(0.6);
    font-size: 30px; font-weight: 800; color: #00e5b0;
    text-shadow: 0 0 24px rgba(0,229,176,0.8);
    opacity: 0; pointer-events: none;
  }
  #levelup.show { animation: lvl 1.1s ease forwards; }
  @keyframes lvl {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(0.6); }
    25% { opacity: 1; transform: translate(-50%,-50%) scale(1.05); }
    75% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-60%) scale(1); }
  }

  #flash {
    position: absolute; inset: 0; z-index: 14; pointer-events: none;
    background: radial-gradient(circle, rgba(0,229,176,0.25), transparent 70%);
    opacity: 0;
  }
  #flash.show { animation: fl 0.5s ease; }
  @keyframes fl { 0% { opacity: 0; } 40% { opacity: 1; } 100% { opacity: 0; } }

  .stars { display: flex; justify-content: center; gap: 10px; margin: 8px 0 4px; }
  .star {
    width: 42px; height: 42px; position: relative; opacity: 0.25;
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .star.on { opacity: 1; transform: scale(1.1); }
  .star svg { width: 100%; height: 100%; filter: drop-shadow(0 0 10px rgba(245,200,66,0.7)); }

  .finalscore { font-size: 56px; font-weight: 800; color: #f5c842; text-shadow: 0 0 30px rgba(245,200,66,0.6); margin: 6px 0; }
  .finallabel { font-size: 15px; color: #cfd8e3; }

  .particle { position: absolute; width: 9px; height: 9px; border-radius: 50%; z-index: 13; pointer-events: none; }
</style>
</head>
<body>
<div id="container">
  <canvas id="road"></canvas>

  <svg id="grain" xmlns="http://www.w3.org/2000/svg">
    <filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
  </svg>

  <div id="flash"></div>
  <div id="levelup" class="num">مستوى جديد!</div>

  <div id="hud">
    <div class="pill score num">🏁 <span id="scoreVal">0</span></div>
    <div class="pill lives num">❤️ <span id="livesVal">3</span></div>
  </div>

  <div id="startScreen" class="screen active">
    <div class="glass">
      <div class="emoji-big">🏎️</div>
      <div class="title">سباق الزحام</div>
      <div class="subtitle">تجاوز السيارات وتفادى الاصطدام!<br>المس يمين الشاشة أو يسارها لتغيير المسار.</div>
      <button id="startBtn" class="btn">ابدأ اللعب</button>
      <div class="hint">كل سيارة تتجاوزها تزيد نقاطك.<br>السرعة ترتفع كلما تقدمت — ركّز جيداً!</div>
    </div>
  </div>

  <div id="endScreen" class="screen">
    <div class="glass">
      <div class="emoji-big">🏆</div>
      <div class="title" style="font-size:30px">انتهى السباق</div>
      <div class="stars">
        <div class="star" id="s1"><svg viewBox="0 0 24 24"><path fill="#f5c842" d="M12 2l3 6.5 7 .8-5.2 4.7 1.4 7L12 17.6 5.4 21l1.4-7L1.6 9.3l7-.8z"/></svg></div>
        <div class="star" id="s2"><svg viewBox="0 0 24 24"><path fill="#f5c842" d="M12 2l3 6.5 7 .8-5.2 4.7 1.4 7L12 17.6 5.4 21l1.4-7L1.6 9.3l7-.8z"/></svg></div>
        <div class="star" id="s3"><svg viewBox="0 0 24 24"><path fill="#f5c842" d="M12 2l3 6.5 7 .8-5.2 4.7 1.4 7L12 17.6 5.4 21l1.4-7L1.6 9.3l7-.8z"/></svg></div>
      </div>
      <div class="finallabel">نقاطك النهائية</div>
      <div class="finalscore num" id="finalScore">0</div>
      <div class="finallabel num" id="bestLabel">أفضل نتيجة: 0</div>
      <button id="replayBtn" class="btn" style="margin-top:20px">العب مرة أخرى</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var container = document.getElementById('container');
  var canvas = document.getElementById('road');
  var ctx = canvas.getContext('2d');
  var hud = document.getElementById('hud');
  var scoreVal = document.getElementById('scoreVal');
  var livesVal = document.getElementById('livesVal');
  var startScreen = document.getElementById('startScreen');
  var endScreen = document.getElementById('endScreen');
  var startBtn = document.getElementById('startBtn');
  var replayBtn = document.getElementById('replayBtn');
  var finalScore = document.getElementById('finalScore');
  var bestLabel = document.getElementById('bestLabel');
  var levelup = document.getElementById('levelup');
  var flash = document.getElementById('flash');

  var W = 0, H = 0, DPR = 1;
  function measure() {
    W = container.clientWidth;
    H = container.clientHeight;
    if (W <= 0) W = window.innerWidth;
    if (H <= 0) H = window.innerHeight;
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    computeLanes();
  }
  window.addEventListener('resize', measure);
  window.addEventListener('orientationchange', measure);
  measure();
  setTimeout(measure, 100);
  setTimeout(measure, 500);

  var LANES = 3;
  var laneX = [];
  var roadMargin = 0;
  function computeLanes() {
    roadMargin = Math.max(14, W * 0.06);
    var roadW = W - roadMargin * 2;
    var laneW = roadW / LANES;
    laneX = [];
    for (var i = 0; i < LANES; i++) {
      laneX.push(roadMargin + laneW * (i + 0.5));
    }
  }

  var actx = null;
  function ensureAudio() {
    try {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      if (actx && actx.state === 'suspended') actx.resume();
    } catch (e) { actx = null; }
  }
  function tone(opts) {
    try {
      if (!actx) return;
      var o = actx.createOscillator();
      var g = actx.createGain();
      o.type = opts.type || 'sine';
      o.frequency.setValueAtTime(opts.f0, actx.currentTime);
      if (opts.f1) o.frequency.exponentialRampToValueAtTime(Math.max(1, opts.f1), actx.currentTime + opts.dur);
      var vol = opts.vol == null ? 0.2 : opts.vol;
      g.gain.setValueAtTime(0.0001, actx.currentTime);
      g.gain.exponentialRampToValueAtTime(vol, actx.currentTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + opts.dur);
      o.connect(g); g.connect(actx.destination);
      o.start(); o.stop(actx.currentTime + opts.dur + 0.02);
    } catch (e) {}
  }
  function sfxPop()   { tone({ type:'sine', f0:660, f1:880, dur:0.12, vol:0.18 }); }
  function sfxWrong() {
    try { if (!actx) return;
      tone({ type:'sawtooth', f0:180, f1:90, dur:0.32, vol:0.22 });
    } catch(e){}
  }
  function sfxLevel() {
    try { if (!actx) return;
      var notes = [523, 659, 784, 1047];
      for (var i = 0; i < notes.length; i++) {
        (function(n,i){ setTimeout(function(){ tone({type:'triangle', f0:n, dur:0.16, vol:0.16}); }, i*70); })(notes[i], i);
      }
    } catch(e){}
  }
  function sfxOver() {
    try { if (!actx) return;
      var notes = [523, 392, 311, 196];
      for (var i = 0; i < notes.length; i++) {
        (function(n,i){ setTimeout(function(){ tone({type:'sine', f0:n, f1:n*0.9, dur:0.3, vol:0.2}); }, i*130); })(notes[i], i);
      }
    } catch(e){}
  }
  function sfxWhoosh() { tone({ type:'sine', f0:300, f1:520, dur:0.14, vol:0.10 }); }

  var STATE = 'start';
  var score = 0, lives = 3, best = 0;
  try { best = parseInt(localStorage.getItem('trafficBest') || '0', 10) || 0; } catch(e){}

  var player = { lane: 1, x: 0, targetX: 0, y: 0, w: 46, h: 80 };
  var enemies = [];
  var spawnTimer = 0;
  var roadOffset = 0;

  var baseSpeed = 0;
  var speed = 0;
  var spawnInterval = 0;
  var level = 1;
  var passedCount = 0;

  var COLORS = ['#ff6b6b', '#4fc3f7', '#00e5b0', '#ffb347', '#c792ea', '#ff8fab'];

  function resetGame() {
    score = 0; lives = 3; level = 1; passedCount = 0;
    enemies = [];
    spawnTimer = 0;
    roadOffset = 0;
    player.lane = 1;
    sizeCars();
    player.x = laneX[player.lane];
    player.targetX = player.x;
    player.y = H - player.h - Math.max(30, H * 0.08);
    baseSpeed = Math.max(260, H * 0.55);
    speed = baseSpeed;
    spawnInterval = 1.15;
    updateHUD();
  }

  function sizeCars() {
    var laneW = (W - roadMargin * 2) / LANES;
    player.w = Math.min(56, laneW * 0.62);
    player.h = player.w * 1.7;
  }

  function updateHUD() {
    scoreVal.textContent = '' + score;
    livesVal.textContent = '' + lives;
  }

  function spawnEnemy() {
    var lane = Math.floor(Math.random() * LANES);
    var laneW = (W - roadMargin * 2) / LANES;
    var w = Math.min(56, laneW * 0.62);
    var h = w * 1.7;
    enemies.push({
      lane: lane,
      x: laneX[lane],
      y: -h - 10,
      w: w, h: h,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      scored: false
    });
  }

  function bumpDifficulty() {
    level++;
    speed = Math.min(baseSpeed * 2.2, speed + baseSpeed * 0.16);
    spawnInterval = Math.max(0.55, spawnInterval - 0.09);
    showLevelUp();
    sfxLevel();
  }

  function showLevelUp() {
    levelup.classList.remove('show'); void levelup.offsetWidth; levelup.classList.add('show');
    flash.classList.remove('show'); void flash.offsetWidth; flash.classList.add('show');
  }

  function burst(x, y, color) {
    var n = 8;
    for (var i = 0; i < n; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.background = color;
      p.style.boxShadow = '0 0 8px ' + color;
      container.appendChild(p);
      var ang = (Math.PI * 2 * i) / n + Math.random() * 0.5;
      var dist = 30 + Math.random() * 40;
      var dx = Math.cos(ang) * dist;
      var dy = Math.sin(ang) * dist;
      (function(el, dx, dy) {
        el.animate([
          { transform: 'translate(0,0) scale(1)', opacity: 1 },
          { transform: 'translate(' + dx + 'px,' + dy + 'px) scale(0.2)', opacity: 0 }
        ], { duration: 600, easing: 'cubic-bezier(0.2,0.7,0.3,1)' });
        setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 620);
      })(p, dx, dy);
    }
  }

  function hit(a, b) {
    return Math.abs(a.x - b.x) < (a.w + b.w) * 0.42 &&
           Math.abs(a.y - b.y) < (a.h + b.h) * 0.46;
  }

  function drawCar(x, y, w, h, color, isPlayer) {
    var left = x - w / 2, top = y - h / 2;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    roundRect(left + 3, top + 5, w, h, 9); ctx.fill();
    ctx.fillStyle = color;
    roundRect(left, top, w, h, 9); ctx.fill();
    var grad = ctx.createLinearGradient(left, top, left, top + h);
    grad.addColorStop(0, 'rgba(255,255,255,0.35)');
    grad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
    grad.addColorStop(1, 'rgba(0,0,0,0.15)');
    ctx.fillStyle = grad;
    roundRect(left, top, w, h, 9); ctx.fill();
    ctx.fillStyle = 'rgba(13,27,42,0.85)';
    var ww = w * 0.62, wh = h * 0.22;
    roundRect(x - ww/2, top + h*0.16, ww, wh, 4); ctx.fill();
    roundRect(x - ww/2, top + h*0.62, ww, wh, 4); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1.5;
    roundRect(left, top, w, h, 9); ctx.stroke();
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawRoad() {
    var rx = roadMargin, rw = W - roadMargin * 2;
    ctx.fillStyle = '#10212f';
    ctx.fillRect(rx, 0, rw, H);
    ctx.fillStyle = 'rgba(245,200,66,0.5)';
    ctx.fillRect(rx - 4, 0, 4, H);
    ctx.fillRect(rx + rw, 0, 4, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.30)';
    ctx.lineWidth = 4;
    ctx.setLineDash([26, 30]);
    ctx.lineDashOffset = -roadOffset;
    for (var i = 1; i < LANES; i++) {
      var lx = rx + (rw / LANES) * i;
      ctx.beginPath();
      ctx.moveTo(lx, 0); ctx.lineTo(lx, H); ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  function moveLane(dir) {
    if (STATE !== 'play') return;
    var nl = player.lane + dir;
    if (nl < 0 || nl >= LANES) return;
    player.lane = nl;
    player.targetX = laneX[player.lane];
    sfxWhoosh();
  }

  function onTap(clientX) {
    var rect = container.getBoundingClientRect();
    var localX = clientX - rect.left;
    if (localX < W / 2) moveLane(-1);
    else moveLane(1);
  }

  function bindTap(el, fn) {
    el.addEventListener('touchstart', function(e){ e.preventDefault(); ensureAudio(); fn(e); }, { passive: false });
    el.addEventListener('mousedown', function(e){ ensureAudio(); fn(e); });
  }

  container.addEventListener('touchstart', function(e){
    if (STATE !== 'play') return;
    e.preventDefault();
    ensureAudio();
    var t = e.changedTouches[0];
    onTap(t.clientX);
  }, { passive: false });
  container.addEventListener('mousedown', function(e){
    if (STATE !== 'play') return;
    ensureAudio();
    onTap(e.clientX);
  });
  window.addEventListener('keydown', function(e){
    if (e.key === 'ArrowLeft') moveLane(-1);
    if (e.key === 'ArrowRight') moveLane(1);
  });

  bindTap(startBtn, function(){ startGame(); });
  bindTap(replayBtn, function(){ startGame(); });

  function showScreen(which) {
    startScreen.classList.toggle('active', which === 'start');
    endScreen.classList.toggle('active', which === 'end');
    hud.classList.toggle('active', which === 'play');
  }

  function startGame() {
    ensureAudio();
    measure();
    resetGame();
    STATE = 'play';
    showScreen('play');
    lastT = 0;
  }

  function gameOver() {
    STATE = 'end';
    sfxOver();
    if (score > best) { best = score; try { localStorage.setItem('trafficBest', '' + best); } catch(e){} }
    finalScore.textContent = '' + score;
    bestLabel.textContent = 'أفضل نتيجة: ' + best;
    var stars = 1;
    if (score >= 40) stars = 3; else if (score >= 18) stars = 2;
    setStar('s1', stars >= 1);
    setStar('s2', stars >= 2);
    setStar('s3', stars >= 3);
    showScreen('end');
  }
  function setStar(id, on) {
    var el = document.getElementById(id);
    el.classList.toggle('on', on);
  }

  function loseLife() {
    lives--;
    updateHUD();
    sfxWrong();
    container.animate([
      { transform: 'translateX(0)' },
      { transform: 'translateX(-8px)' },
      { transform: 'translateX(8px)' },
      { transform: 'translateX(0)' }
    ], { duration: 220 });
    if (lives <= 0) gameOver();
  }

  var lastT = 0;
  function loop(t) {
    requestAnimationFrame(loop);
    if (!lastT) lastT = t;
    var dt = (t - lastT) / 1000;
    lastT = t;
    if (dt > 0.05) dt = 0.05;

    ctx.clearRect(0, 0, W, H);
    drawRoad();

    if (STATE === 'play') {
      update(dt);
    }

    render();
  }

  function update(dt) {
    roadOffset += speed * dt;

    player.x += (player.targetX - player.x) * Math.min(1, dt * 14);
    player.y = H - player.h - Math.max(30, H * 0.08);

    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnEnemy();
      spawnTimer = spawnInterval * (0.75 + Math.random() * 0.5);
    }

    for (var i = enemies.length - 1; i >= 0; i--) {
      var en = enemies[i];
      en.y += speed * dt;
      en.x += (laneX[en.lane] - en.x) * Math.min(1, dt * 10);

      if (hit(player, en)) {
        burst(en.x, en.y, '#ff6b6b');
        enemies.splice(i, 1);
        loseLife();
        continue;
      }

      if (!en.scored && en.y - en.h / 2 > player.y + player.h / 2) {
        en.scored = true;
        score++;
        passedCount++;
        updateHUD();
        sfxPop();
        burst(player.x, player.y - player.h/2, '#00e5b0');
        if (passedCount % 6 === 0) bumpDifficulty();
      }

      if (en.y - en.h > H) enemies.splice(i, 1);
    }
  }

  function render() {
    for (var i = 0; i < enemies.length; i++) {
      var en = enemies[i];
      drawCar(en.x, en.y, en.w, en.h, en.color, false);
    }
    if (STATE === 'play' || STATE === 'end') {
      drawCar(player.x, player.y, player.w, player.h, '#f5c842', true);
    }
  }

  resetGame();
  player.y = H - player.h - Math.max(30, H * 0.08);

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
