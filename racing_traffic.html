<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>السرعة القصوى</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#1877F2; --blue-d:#0A5DC2; --navy:#0F1626; --navy2:#162038;
    --ink:#eaf1fb; --ink-soft:#8fa3c4; --line:rgba(24,119,242,.22);
    --gold:#ffc24b; --danger:#ff4d6d; --good:#3ee08f;
    --shadow:0 8px 24px rgba(0,0,0,.45);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden}
  body{margin:0;overflow:hidden;background:var(--navy);font-family:'Cairo',system-ui,sans-serif;color:var(--ink);height:100dvh;position:relative;touch-action:none}
  canvas{display:block}

  #ui{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;z-index:5}

  /* Top HUD */
  .hud{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px;gap:8px;
    background:linear-gradient(to bottom,rgba(15,22,38,.7),transparent)}
  .chip{background:rgba(22,32,56,.72);backdrop-filter:blur(8px);box-shadow:var(--shadow);border-radius:16px;padding:8px 16px;text-align:center;border:1px solid var(--line)}
  .chip .lbl{font-size:.56rem;font-weight:800;letter-spacing:.5px;color:var(--ink-soft)}
  .chip .val{font-family:'Cairo';font-weight:800;font-size:1.15rem;line-height:1.1;color:var(--ink)}
  #scoreChip .val{color:#5aa3ff}
  #multChip{display:flex;align-items:center;background:rgba(34,28,12,.72);border-color:rgba(255,194,75,.3)}
  #multChip .val{font-size:1.45rem;color:var(--gold);font-weight:900}
  #passChip .val{color:var(--good)}

  #speed{position:absolute;top:78px;left:16px;background:rgba(22,32,56,.72);backdrop-filter:blur(8px);box-shadow:var(--shadow);border:1px solid var(--line);
    border-radius:14px;padding:6px 14px;font-family:'Cairo';font-weight:800;font-size:1rem;color:#5aa3ff}
  #speed small{font-size:.6rem;color:var(--ink-soft);font-weight:700}

  /* Controls — left arrow at the left edge, right arrow at the right edge */
  #ctrls{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 22px calc(26px + env(safe-area-inset-bottom));pointer-events:none;direction:ltr}
  .key{width:78px;height:78px;border-radius:24px;background:rgba(22,32,56,.72);backdrop-filter:blur(8px);
    border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;color:#5aa3ff;box-shadow:var(--shadow);pointer-events:auto}
  .key svg{width:36px;height:36px}
  .key:active,.key.on{background:var(--blue);border-color:var(--blue);color:#fff;transform:scale(.93)}

  /* Screens */
  .screen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--navy2);
    border:1px solid var(--line);box-shadow:0 24px 60px rgba(0,0,0,.6);padding:34px 28px;text-align:center;
    border-radius:24px;pointer-events:auto;display:none;min-width:300px;max-width:340px;width:90%;z-index:10}
  .screen.active{display:block}
  .screen h1{font-size:2rem;font-weight:900;margin-bottom:6px;
    background:linear-gradient(90deg,#5aa3ff,#1877F2);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .screen .sub{font-size:.82rem;color:var(--gold);font-weight:900;margin-bottom:16px;letter-spacing:1px}
  .screen .how{font-size:.84rem;color:var(--ink-soft);line-height:2;margin-bottom:24px;text-align:right;
    background:rgba(15,22,38,.6);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .screen .how b{color:#fff}
  .btn{background:linear-gradient(180deg,var(--blue),var(--blue-d));color:#fff;border:none;padding:15px 44px;
    border-radius:16px;font-size:1.05rem;font-weight:900;font-family:'Cairo',sans-serif;box-shadow:0 8px 22px rgba(24,119,242,.4)}
  .btn:active{transform:translateY(2px)}
  #finalScore{color:var(--gold);font-weight:900}

  .float{position:absolute;font-weight:900;font-size:1.3rem;pointer-events:none;animation:fl 1s forwards;text-shadow:0 0 10px #000;white-space:nowrap;z-index:8}
  @keyframes fl{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}20%{transform:translate(-50%,-110%) scale(1.15);opacity:1}100%{transform:translate(-50%,-320%) scale(1);opacity:0}}
</style>
</head>
<body>

  <div id="ui">
    <div class="hud">
      <div class="chip" id="scoreChip"><div class="lbl">النقاط</div><div class="val" id="score">0</div></div>
      <div class="chip" id="multChip"><div class="val">×<span id="mult">1</span></div></div>
      <div class="chip" id="passChip"><div class="lbl">تجاوزت</div><div class="val" id="passed">0</div></div>
    </div>

    <div id="speed"><span id="spd">0</span> <small>كم/س</small></div>

    <div id="ctrls">
      <div class="key" id="left"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="key" id="right"><svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>

    <!-- Start -->
    <div id="startScreen" class="screen active">
      <h1>السرعة القصوى</h1>
      <div class="sub">3D // سباق نيون</div>
      <div class="how">
        تخطّى السيارات لتجمع <b>النقاط</b> — كل سيارة تتجاوزها تزيد رصيدك.<br>
        اجمع <b style="color:var(--gold)">العملات الذهبية</b> لنقاط إضافية.<br>
        تجاوز السيارات عن قرب لمكافأة <b>المرور الخطير</b>.<br>
        <b style="color:var(--danger)">احذر الاصطدام</b> — أي تصادم ينهي اللعبة!
      </div>
      <button class="btn" onclick="startGame()">انطلق 🚦</button>
    </div>

    <!-- Game over -->
    <div id="overScreen" class="screen">
      <h1>انتهت اللعبة</h1>
      <p class="sub" style="color:rgba(234,241,251,.7)">النقاط: <span id="finalScore">0</span></p>
      <button class="btn" onclick="resetGame()">العب مرة أخرى</button>
    </div>

  </div>

<script>
// ════════════ السرعة القصوى — neon endless racer (single player) ════════════
// InGames blue/navy style. Score from passing cars + gold coins + near-miss
// bonuses, rising score multiplier, day/night cycle. Any crash = game over.

// ── Scene ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0f1626, 0.005);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 5.6, 8);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x0f1626);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── Lights ──
const ambient = new THREE.AmbientLight(0xffffff, 0.4); scene.add(ambient);
const dir = new THREE.DirectionalLight(0xffffff, 0.6);
dir.position.set(20,40,-10); dir.castShadow=true;
dir.shadow.mapSize.width=1024; dir.shadow.mapSize.height=1024; scene.add(dir);

// ── Road texture (procedural) ──
function roadTex(){
  const c=document.createElement('canvas'); c.width=c.height=512; const g=c.getContext('2d');
  g.fillStyle='#0f1626'; g.fillRect(0,0,512,512);
  for(let i=0;i<8000;i++){ g.fillStyle=Math.random()>0.5?'#162038':'#0a0f1c'; g.fillRect(Math.random()*512,Math.random()*512,2,2); }
  g.fillStyle='#fff'; g.fillRect(245,0,5,512); g.fillRect(262,0,5,512);
  g.fillStyle='rgba(120,170,255,0.5)'; g.fillRect(128,0,4,512); g.fillRect(384,0,4,512);
  g.fillStyle='#0A5DC2'; g.fillRect(0,0,20,512); g.fillRect(492,0,20,512);
  g.fillStyle='#1877F2'; for(let i=0;i<10;i++){ g.fillRect(0,i*50,20,25); g.fillRect(492,i*50,20,25); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(1,10);
  t.anisotropy=renderer.capabilities.getMaxAnisotropy(); return t;
}
const rTex=roadTex();
const road=new THREE.Mesh(new THREE.PlaneGeometry(30,600),
  new THREE.MeshStandardMaterial({map:rTex,roughness:0.8,metalness:0.1}));
road.rotation.x=-Math.PI/2; road.position.z=-200; road.receiveShadow=true; scene.add(road);

const grid=new THREE.GridHelper(800,200,0x1877F2,0x0a0f1c);
grid.position.z=-200; grid.position.y=-0.2; scene.add(grid);

// ── Builders ──
function createCar(color, isPlayer=false){
  const g=new THREE.Group();
  const paint=new THREE.MeshStandardMaterial({color,roughness:0.25,metalness:0.85,transparent:isPlayer,opacity:1});
  const dark =new THREE.MeshStandardMaterial({color:0x10141f,roughness:0.3,metalness:0.6});

  // Low wedge chassis (lower, wider, longer than the old box) — built from two
  // stacked tapered slabs to give a sleek sports-car silhouette.
  const lower=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.34,4.2),paint);
  lower.position.y=0.42; lower.castShadow=true; lower.receiveShadow=true; g.add(lower);
  if(isPlayer) g.bodyMesh=lower;

  // sloped upper deck, narrower and pushed back (wedge profile)
  const upper=new THREE.Mesh(new THREE.BoxGeometry(1.45,0.3,2.6),paint);
  upper.position.set(0,0.72,-0.2); upper.castShadow=true; g.add(upper);

  // pointed nose cone
  const nose=new THREE.Mesh(new THREE.ConeGeometry(0.7,1.3,4),paint);
  nose.rotation.x=-Math.PI/2; nose.rotation.y=Math.PI/4; nose.position.set(0,0.45,2.4); nose.scale.set(1,0.45,1); g.add(nose);

  // glass canopy (tinted, low bubble)
  const glass=new THREE.Mesh(new THREE.BoxGeometry(1.15,0.34,1.5),
    new THREE.MeshStandardMaterial({color:0x2bd4ff,roughness:0.05,metalness:0.4,transparent:true,opacity:0.55}));
  glass.position.set(0,0.98,-0.1); g.add(glass);

  // side air intakes
  [-0.92,0.92].forEach(x=>{ const intake=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.22,1.4),dark);
    intake.position.set(x,0.52,-0.3); g.add(intake); });

  // rear wing / spoiler on two struts
  const wing=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.08,0.5),dark);
  wing.position.set(0,1.0,-2.1); g.add(wing);
  [-0.6,0.6].forEach(x=>{ const strut=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.4,0.1),dark);
    strut.position.set(x,0.78,-2.05); g.add(strut); });

  // low-profile wheels (slightly larger, exposed)
  const wheelGeo=new THREE.CylinderGeometry(0.42,0.42,0.34,18);
  const tyre=new THREE.MeshStandardMaterial({color:0x0c0c12,roughness:0.9});
  const rim =new THREE.MeshStandardMaterial({color:0x8fa3c4,metalness:0.9,roughness:0.2});
  [[-0.86,1.35],[0.86,1.35],[-0.86,-1.35],[0.86,-1.35]].forEach(([x,z])=>{
    const w=new THREE.Mesh(wheelGeo,tyre); w.rotation.z=Math.PI/2; w.position.set(x,0.42,z); g.add(w);
    const r=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,0.36,8),rim); r.rotation.z=Math.PI/2; r.position.set(x,0.42,z); g.add(r);
  });

  // headlight bar (front) + tail light bar (rear), glowing
  const head=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.08,0.08),new THREE.MeshBasicMaterial({color:0xbfe9ff}));
  head.position.set(0,0.5,2.95); g.add(head);
  const tail=new THREE.Mesh(new THREE.BoxGeometry(1.3,0.1,0.06),new THREE.MeshBasicMaterial({color:0xff3344}));
  tail.position.set(0,0.6,-2.3); g.add(tail);

  // neon underglow strip in the car's colour
  const glow=new THREE.Mesh(new THREE.PlaneGeometry(1.5,3.8),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.5,side:THREE.DoubleSide}));
  glow.rotation.x=-Math.PI/2; glow.position.y=0.06; g.add(glow);

  return g;
}
function createBuilding(){
  const h=15+Math.random()*50, w=8+Math.random()*15, d=8+Math.random()*15;
  const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:0x101522}));
  const n=Math.floor(Math.random()*3)+1;
  for(let i=0;i<n;i++){
    const col=Math.random()>0.5?0x1877F2:0x5aa3ff;
    const s=new THREE.Mesh(new THREE.PlaneGeometry(w*0.8,0.5),new THREE.MeshBasicMaterial({color:col}));
    s.position.z=d/2+0.05; s.position.y=(Math.random()-0.5)*h*0.7; b.add(s);
  }
  return b;
}
function createCollectible(){
  // a proper gold coin: a flat disc standing upright, with a raised inner face
  // and a glowing rim so it reads as a spinning coin.
  const coin=new THREE.Group();
  const disc=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.6,0.12,24),
    new THREE.MeshStandardMaterial({color:0xffc24b,metalness:0.9,roughness:0.25,emissive:0x5a3a00}));
  disc.rotation.x=Math.PI/2; coin.add(disc);          // face toward the player
  const inner=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.14,24),
    new THREE.MeshStandardMaterial({color:0xffe08a,metalness:0.8,roughness:0.2}));
  inner.rotation.x=Math.PI/2; coin.add(inner);
  // glowing rim ring
  const rim=new THREE.Mesh(new THREE.TorusGeometry(0.6,0.06,8,24),
    new THREE.MeshBasicMaterial({color:0xfff0c0})); coin.add(rim);
  return coin;
}
function createParticle(x,y,z,color){
  const m=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.15,0.15),new THREE.MeshBasicMaterial({color}));
  m.position.set(x,y,z); m.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,0);
  return { mesh:m, vx:(Math.random()-0.5)*0.8, vy:Math.random()*0.8, vz:(Math.random()-0.5)*0.8, life:1 };
}

// ── Player + headlight ──
const player=createCar(0x1877F2,true); scene.add(player);
const head=new THREE.SpotLight(0xffffff,2.5,80,0.6,0.5,1);
head.position.set(0,3,0); head.target.position.set(0,0,-20); player.add(head); player.add(head.target);

// ── State ──
let enemies=[], scenery=[], collectibles=[], particles=[];
let gameState='MENU', speed=0, score=0, multiplier=1, passedCars=0, playerX=0, baseFov=60, timeOfDay=0;
const LANE=4.0, MAX_SPEED=2.6;
const PASS_POINTS=100;   // points per car overtaken

// ── Input ──
const keys={left:false,right:false};
function bindKey(id,k){ const el=document.getElementById(id);
  const on=e=>{e.preventDefault();keys[k]=true;el.classList.add('on');};
  const off=e=>{e.preventDefault();keys[k]=false;el.classList.remove('on');};
  el.addEventListener('touchstart',on,{passive:false}); el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off); el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off);
}
bindKey('left','left'); bindKey('right','right');
addEventListener('keydown',e=>{ if(e.key==='ArrowLeft')keys.left=true; if(e.key==='ArrowRight')keys.right=true; });
addEventListener('keyup',e=>{ if(e.key==='ArrowLeft')keys.left=false; if(e.key==='ArrowRight')keys.right=false; });

// ── Flow ──
function startGame(){
  document.getElementById('startScreen').classList.remove('active');
  document.getElementById('overScreen').classList.remove('active');
  resetInternal(); gameState='PLAYING';
}
function resetGame(){ startGame(); }
window.startGame=startGame; window.resetGame=resetGame;

function resetInternal(){
  speed=0.7; score=0; multiplier=1; passedCars=0; playerX=0; updateUI();
  player.position.set(0,0,0); player.rotation.set(0,0,0);
  [...enemies,...scenery,...collectibles].forEach(o=>scene.remove(o.mesh||o));
  particles.forEach(p=>scene.remove(p.mesh));
  enemies=[]; scenery=[]; collectibles=[]; particles=[];
  for(let i=0;i<30;i++) spawnScenery(-i*20);
}

function floatText(text,x,color){
  const d=document.createElement('div'); d.className='float'; d.innerText=text; d.style.color=color||'#ffc24b';
  d.style.left=(innerWidth/2 + x*20)+'px'; d.style.top='42%';
  document.getElementById('ui').appendChild(d); setTimeout(()=>d.remove(),1000);
}
function updateUI(){
  document.getElementById('score').innerText=Math.floor(score);
  document.getElementById('mult').innerText=multiplier.toFixed(1);
  document.getElementById('passed').innerText=passedCars;
  document.getElementById('spd').innerText=Math.floor(speed*300);
}
function laneX(i){ return i*LANE; }

function spawnEnemy(z){
  const li=Math.floor(Math.random()*3)-1, lx=laneX(li);
  if(enemies.some(e=>Math.abs(e.mesh.position.z-z)<20 && Math.abs(e.mesh.position.x-lx)<2)) return;
  const col=[0xff4d6d,0xffc24b,0x9b5cff,0x3ee08f][Math.floor(Math.random()*4)];
  const mesh=createCar(col); mesh.position.set(lx,0,z); scene.add(mesh);
  enemies.push({mesh,speed:0.3+Math.random()*0.2,active:true});
}
function spawnCollectible(z){
  const li=Math.floor(Math.random()*3)-1, lx=laneX(li);
  const mesh=createCollectible();
  mesh.position.set(lx,1,z); scene.add(mesh);
  collectibles.push({mesh,active:true});
}
function spawnScenery(z){
  if(Math.random()>0.3){ const b=createBuilding(); b.position.set(-18-Math.random()*20,b.geometry.parameters.height/2,z); scene.add(b); scenery.push({mesh:b}); }
  if(Math.random()>0.3){ const b=createBuilding(); b.position.set(18+Math.random()*20,b.geometry.parameters.height/2,z); scene.add(b); scenery.push({mesh:b}); }
}
function explosion(x,y,z,color){ for(let i=0;i<12;i++){ const p=createParticle(x,y,z,color); scene.add(p.mesh); particles.push(p); } }

// ── Update ──
function update(){
  if(gameState!=='PLAYING') return;

  // keep the player car its blue colour (no nitro flash anymore)
  if(player.bodyMesh){ player.bodyMesh.material.opacity=1; player.bodyMesh.material.color.setHex(0x1877F2); }

  // speed gradually ramps up the longer you survive
  speed+=0.0015;
  if(speed>MAX_SPEED) speed=MAX_SPEED;

  // day/night cycle (night ↔ deep blue)
  timeOfDay+=0.0005;
  const cycle=Math.sin(timeOfDay)*0.5+0.5;
  const night=new THREE.Color(0x0f1626), day=new THREE.Color(0x16407a);
  const col=night.clone().lerp(day,cycle*0.5);
  scene.fog.color.copy(col); renderer.setClearColor(col); ambient.intensity=0.25+cycle*0.45;

  // steer
  if(keys.left) playerX-=0.25;
  if(keys.right) playerX+=0.25;
  playerX=Math.max(-10,Math.min(10,playerX));
  player.position.x+=(playerX-player.position.x)*0.2;
  const tilt=(player.position.x-playerX)*0.4; player.rotation.z=tilt; player.rotation.y=-(player.position.x-playerX)*0.15;

  rTex.offset.y-=speed*0.03;

  if(Math.random()<0.03+speed*0.01) spawnEnemy(-300);
  if(Math.random()<0.02) spawnCollectible(-300);
  if(Math.random()<0.1) spawnScenery(-300);

  // enemies
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i]; e.mesh.position.z+=speed;
    // near-miss bonus
    if(e.active&&!e.nearMissed&&e.mesh.position.z>player.position.z&&Math.abs(e.mesh.position.z-player.position.z)<2){
      const dx=Math.abs(player.position.x-e.mesh.position.x);
      if(dx>1.5&&dx<3.5){ e.nearMissed=true; score+=200*multiplier; multiplier+=0.2; floatText('مرور خطير!',player.position.x,'#fff'); }
    }
    // collision → instant game over
    const dx=Math.abs(player.position.x-e.mesh.position.x), dz=Math.abs(player.position.z-e.mesh.position.z);
    if(e.active&&dx<1.4&&dz<3.0){
      e.active=false; explosion(e.mesh.position.x,1,e.mesh.position.z,0xff4d6d); explosion(player.position.x,1,player.position.z,0xff4d6d);
      gameOver(); return;
    }
    // overtook a car → points for passing
    if(e.mesh.position.z>20){
      scene.remove(e.mesh); enemies.splice(i,1);
      if(e.active){ passedCars++; score+=PASS_POINTS*multiplier; multiplier+=0.1; floatText('+'+Math.round(PASS_POINTS*multiplier),player.position.x,'#5aa3ff'); }
    }
  }
  if(multiplier>10) multiplier=10;

  for(let i=scenery.length-1;i>=0;i--){ const s=scenery[i]; s.mesh.position.z+=speed; if(s.mesh.position.z>20){ scene.remove(s.mesh); scenery.splice(i,1); } }

  // coins → bonus points
  for(let i=collectibles.length-1;i>=0;i--){
    const c=collectibles[i]; c.mesh.position.z+=speed; c.mesh.rotation.z+=0.12;
    if(c.active&&player.position.distanceTo(c.mesh.position)<2.5){
      c.active=false; scene.remove(c.mesh); collectibles.splice(i,1);
      score+=300*multiplier; floatText('عملة +',c.mesh.position.x,'#ffc24b'); explosion(c.mesh.position.x,1,c.mesh.position.z,0xffc24b);
      continue;
    }
    if(c.mesh.position.z>10){ scene.remove(c.mesh); collectibles.splice(i,1); }
  }

  for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.mesh.position.add(new THREE.Vector3(p.vx,p.vy,p.vz)); p.life-=0.05; p.mesh.scale.setScalar(p.life); if(p.life<=0){ scene.remove(p.mesh); particles.splice(i,1); } }

  const targetFov=baseFov+speed*10;
  camera.fov+=(targetFov-camera.fov)*0.1; camera.updateProjectionMatrix();
  const tcx=player.position.x*0.5; camera.position.x+=(tcx-camera.position.x)*0.1;
  // higher rest height + aim down the road lifts the car up the screen, clear of the buttons
  if(Math.abs(camera.position.y-5.6)>0.01) camera.position.y+=(5.6-camera.position.y)*0.1;
  camera.lookAt(player.position.x*0.3, 0.5, -14);
  updateUI();
}

function gameOver(){
  gameState='GAMEOVER';
  document.getElementById('finalScore').innerText=Math.floor(score);
  document.getElementById('overScreen').classList.add('active');
  if(typeof FlutterBridge!=='undefined'){ try{ FlutterBridge.postMessage('gameOver'); }catch(e){} }
}

function animate(){ requestAnimationFrame(animate); update(); renderer.render(scene,camera); }
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
animate();
</script>
</body>
</html>
