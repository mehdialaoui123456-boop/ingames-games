<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>سباق الانجراف</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    background: #1a1a1a;
    color: #fff;
    touch-action: none;
    position: fixed;
    inset: 0;
  }
  #game { position: absolute; inset: 0; overflow: hidden; background: #1a1a1a; }
  canvas#scene { position: absolute; inset: 0; display: block; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 14px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 10;
    pointer-events: none;
  }
  .pill {
    background: rgba(0,0,0,0.65);
    color: #fff;
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 800;
    display: flex; align-items: center; gap: 5px;
  }

  /* Drift score banner */
  .drift {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #ff6b00, #ff3d00);
    color: #fff;
    padding: 6px 18px;
    border-radius: 999px;
    font-size: 17px;
    font-weight: 900;
    pointer-events: none;
    z-index: 9;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    box-shadow: 0 4px 12px rgba(255,61,0,0.5);
  }
  .drift.show { opacity: 1; transform: translateX(-50%) translateY(2px); }

  /* Steering controls */
  .controls {
    position: absolute;
    bottom: 20px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 24px;
    z-index: 8;
    pointer-events: none;
  }
  .steer {
    width: 76px; height: 76px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    pointer-events: auto;
    backdrop-filter: blur(4px);
    transition: background 80ms;
  }
  .steer.active { background: rgba(255,255,255,0.32); }
  .gas {
    width: 92px; height: 92px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff3d8b, #ff6b00);
    color: #fff;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    box-shadow: 0 5px 0 #aa1a4a, 0 8px 16px rgba(255,61,139,0.4);
    transition: transform 60ms, box-shadow 60ms;
  }
  .gas.active { transform: translateY(3px); box-shadow: 0 2px 0 #aa1a4a, 0 4px 8px rgba(255,61,139,0.4); }

  /* Overlays */
  .overlay {
    position: absolute; inset: 0;
    background: rgba(20,20,30,0.88);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100;
    text-align: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }
  .overlay h1 { font-size: 34px; margin-bottom: 12px; }
  .overlay p { font-size: 16px; margin-bottom: 22px; opacity: 0.85; line-height: 1.6; max-width: 280px; }
  .big-score { font-size: 64px; font-weight: 900; margin: 6px 0 18px; color: #ff6b00; text-shadow: 0 4px 14px rgba(255,107,0,0.5); }
  .stat-row { display: flex; gap: 22px; margin-bottom: 22px; }
  .stat { text-align: center; }
  .stat-label { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 800; color: #FFD93D; }
  .btn {
    background: linear-gradient(135deg, #ff3d8b, #ff6b00);
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 19px;
    font-weight: 900;
    padding: 14px 42px;
    border-radius: 999px;
    box-shadow: 0 6px 0 #aa1a4a, 0 8px 18px rgba(255,61,139,0.4);
    transition: transform 80ms, box-shadow 80ms;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #aa1a4a; }
  .hint { font-size: 13px; opacity: 0.7; margin-top: 14px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="game">
  <canvas id="scene" width="400" height="800"></canvas>

  <div id="hud">
    <div class="pill">⏱️ <span id="time">45</span></div>
    <div class="pill">🚦 <span id="cones">0</span></div>
    <div class="pill">⭐ <span id="score">0</span></div>
  </div>

  <div class="drift" id="driftBanner">انجراف! ×1</div>

  <div class="controls">
    <div class="steer" id="leftBtn">◀</div>
    <div class="gas" id="gasBtn">دعس</div>
    <div class="steer" id="rightBtn">▶</div>
  </div>

  <div id="start" class="overlay">
    <h1>🏎️ سباق الانجراف</h1>
    <p>اضغط على «دعس» للتسارع<br>استخدم الأزرار للانعطاف<br>انجرف حول المنعطفات واجمع المخاريط</p>
    <button class="btn" id="startBtn">ابدأ اللعب</button>
    <div class="hint">٤٥ ثانية — انجرف لتضاعف النقاط</div>
  </div>

  <div id="end" class="overlay hidden">
    <h1>انتهى الوقت!</h1>
    <div class="stat-row">
      <div class="stat">
        <div class="stat-label">المخاريط</div>
        <div class="stat-value" id="finalCones">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">أطول انجراف</div>
        <div class="stat-value" id="finalLongest">0م</div>
      </div>
    </div>
    <div class="big-score" id="finalScore">0</div>
    <button class="btn" id="restartBtn">العب مرة أخرى</button>
  </div>
</div>

<script>
(function () {
  const game       = document.getElementById('game');
  const canvas     = document.getElementById('scene');
  const ctx        = canvas.getContext('2d');
  const timeEl     = document.getElementById('time');
  const conesEl    = document.getElementById('cones');
  const scoreEl    = document.getElementById('score');
  const driftEl    = document.getElementById('driftBanner');
  const finalScore = document.getElementById('finalScore');
  const finalCones = document.getElementById('finalCones');
  const finalLong  = document.getElementById('finalLongest');
  const startView  = document.getElementById('start');
  const endView    = document.getElementById('end');
  const startBtn   = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const leftBtn    = document.getElementById('leftBtn');
  const rightBtn   = document.getElementById('rightBtn');
  const gasBtn     = document.getElementById('gasBtn');

  // ── State ──────────────────────────────────────────────────────────
  let W = 400, H = 800;
  let car = null;
  let trail = [];     // skid mark segments
  let cones = [];
  let smoke = [];
  let score = 0;
  let conesCollected = 0;
  let driftDistance = 0;       // current continuous drift length
  let longestDrift = 0;
  let timeLeft = 45;
  let running = false;
  let lastTime = 0;
  let rafId = null;
  let timerInterval = null;

  // Input flags
  let inputLeft = false, inputRight = false, inputGas = false;

  // ── Sizing ─────────────────────────────────────────────────────────
  function measure() {
    const rect = game.getBoundingClientRect();
    const w = Math.max(280, Math.floor(rect.width  || game.clientWidth  || window.innerWidth  || 360));
    const h = Math.max(420, Math.floor(rect.height || game.clientHeight || window.innerHeight || 640));
    if (w === W && h === H) return false;
    W = w; H = h;
    canvas.width  = W;
    canvas.height = H;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    return true;
  }
  if (window.ResizeObserver) {
    new ResizeObserver(() => { if (measure()) draw(); }).observe(game);
  }
  window.addEventListener('resize', measure);
  window.addEventListener('orientationchange', () => setTimeout(() => { measure(); draw(); }, 100));

  // ── Buttons ────────────────────────────────────────────────────────
  function bindButton(el, fn) {
    el.addEventListener('click', fn);
    el.addEventListener('touchend', (e) => { e.preventDefault(); fn(); }, { passive: false });
  }
  bindButton(startBtn, startGame);
  bindButton(restartBtn, startGame);

  // Hold-to-act for control buttons
  function bindHold(el, onPress, onRelease) {
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      el.classList.add('active');
      onPress();
    }, { passive: false });
    el.addEventListener('touchend', (e) => {
      e.preventDefault();
      el.classList.remove('active');
      onRelease();
    }, { passive: false });
    el.addEventListener('touchcancel', () => {
      el.classList.remove('active');
      onRelease();
    });
    el.addEventListener('mousedown', () => { el.classList.add('active'); onPress(); });
    el.addEventListener('mouseup',   () => { el.classList.remove('active'); onRelease(); });
    el.addEventListener('mouseleave',() => { el.classList.remove('active'); onRelease(); });
  }
  bindHold(leftBtn,  () => inputLeft  = true, () => inputLeft  = false);
  bindHold(rightBtn, () => inputRight = true, () => inputRight = false);
  bindHold(gasBtn,   () => inputGas   = true, () => inputGas   = false);

  // ── Cone management ────────────────────────────────────────────────
  function spawnCone() {
    // Spawn somewhere away from the car
    let x, y, ok = false, tries = 0;
    while (!ok && tries < 20) {
      x = 60 + Math.random() * (W - 120);
      y = 130 + Math.random() * (H - 280);
      const dx = x - car.x, dy = y - car.y;
      if (dx * dx + dy * dy > 120 * 120) ok = true;
      tries++;
    }
    cones.push({ x, y, r: 14 });
  }

  // ── Game flow ──────────────────────────────────────────────────────
  function startGame() {
    measure();
    car = {
      x: W / 2,
      y: H * 0.55,
      angle: -Math.PI / 2, // pointing up
      vx: 0,
      vy: 0,
      angularVel: 0,
      drifting: false,
    };
    trail = [];
    cones = [];
    smoke = [];
    score = 0;
    conesCollected = 0;
    driftDistance = 0;
    longestDrift = 0;
    timeLeft = 45;
    running = true;
    scoreEl.textContent = '0';
    conesEl.textContent = '0';
    timeEl.textContent  = '45';
    startView.classList.add('hidden');
    endView.classList.add('hidden');

    // Initial cones
    for (let i = 0; i < 3; i++) spawnCone();

    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      timeEl.textContent = timeLeft;
      if (timeLeft <= 0) endGame();
    }, 1000);

    lastTime = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function endGame() {
    running = false;
    clearInterval(timerInterval);
    timerInterval = null;
    finalScore.textContent = score;
    finalCones.textContent = conesCollected;
    finalLong.textContent  = Math.round(longestDrift) + 'م';
    endView.classList.remove('hidden');
    hideDriftBanner();
  }

  function loop(now) {
    if (!running) { rafId = null; return; }
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    draw();
    rafId = requestAnimationFrame(loop);
  }

  // ── Physics ────────────────────────────────────────────────────────
  function update(dt) {
    // Steering
    const steerInput = (inputLeft ? -1 : 0) + (inputRight ? 1 : 0);
    const speed = Math.sqrt(car.vx * car.vx + car.vy * car.vy);
    const steerStrength = 3.0 * (0.4 + Math.min(1, speed / 250));
    car.angularVel += steerInput * steerStrength * dt;
    car.angularVel *= Math.pow(0.001, dt); // angular damping
    car.angle += car.angularVel;

    // Throttle: apply force in the car's facing direction
    if (inputGas) {
      const accel = 380; // px/s²
      car.vx += Math.cos(car.angle) * accel * dt;
      car.vy += Math.sin(car.angle) * accel * dt;
    }

    // Decompose velocity into forward (along car facing) and lateral components
    const fx = Math.cos(car.angle), fy = Math.sin(car.angle);
    const rx = -fy, ry = fx; // lateral axis
    const fwdSpeed = car.vx * fx + car.vy * fy;
    let latSpeed   = car.vx * rx + car.vy * ry;

    // Tire grip: lateral velocity decays. Lower decay when steering hard +
    // moving fast = drifting (slip).
    const gripDecay = Math.abs(steerInput) > 0 && speed > 120 ? 0.05 : 0.85;
    latSpeed *= Math.pow(1 - gripDecay, dt);

    // Forward drag
    const drag = inputGas ? 0.4 : 1.6;
    const newFwd = fwdSpeed * Math.pow(1 - drag * 0.01, dt * 60);

    // Recompose
    car.vx = fx * newFwd + rx * latSpeed;
    car.vy = fy * newFwd + ry * latSpeed;

    // Move
    car.x += car.vx * dt;
    car.y += car.vy * dt;

    // World bounds (bounce gently inward)
    const m = 30;
    if (car.x < m)     { car.x = m;     car.vx = Math.abs(car.vx) * 0.4; }
    if (car.x > W - m) { car.x = W - m; car.vx = -Math.abs(car.vx) * 0.4; }
    if (car.y < m + 90){ car.y = m + 90; car.vy = Math.abs(car.vy) * 0.4; }
    if (car.y > H - m - 130) { car.y = H - m - 130; car.vy = -Math.abs(car.vy) * 0.4; }

    // Drift detection: significant lateral slip while moving
    const slipAmount = Math.abs(latSpeed);
    const isDrifting = slipAmount > 60 && speed > 100;
    car.drifting = isDrifting;

    if (isDrifting) {
      const dist = speed * dt;
      driftDistance += dist;
      if (driftDistance > longestDrift) longestDrift = driftDistance;
      // Score per second of drifting, scaled by drift length (combo)
      const driftScore = dist * 0.3 * (1 + Math.min(3, driftDistance / 60));
      score += driftScore;
      scoreEl.textContent = Math.floor(score);
      showDriftBanner();

      // Skid marks (two wheels)
      const offsetX = rx * 7, offsetY = ry * 7;
      const offsetFx = fx * 12, offsetFy = fy * 12;
      trail.push({ x: car.x - offsetX - offsetFx, y: car.y - offsetY - offsetFy, life: 4 });
      trail.push({ x: car.x + offsetX - offsetFx, y: car.y + offsetY - offsetFy, life: 4 });
      // Smoke particles
      if (Math.random() < 0.7) {
        smoke.push({
          x: car.x - fx * 18 + (Math.random() - 0.5) * 8,
          y: car.y - fy * 18 + (Math.random() - 0.5) * 8,
          vx: (Math.random() - 0.5) * 30,
          vy: (Math.random() - 0.5) * 30 - 20,
          life: 0.8,
          maxLife: 0.8,
          size: 6 + Math.random() * 4,
        });
      }
    } else {
      if (driftDistance > 0) {
        // Bonus when drift ends, scaled by length
        const bonus = Math.floor(driftDistance * 0.5);
        score += bonus;
        scoreEl.textContent = Math.floor(score);
      }
      driftDistance = 0;
      hideDriftBanner();
    }

    // Fade trail
    for (const t of trail) t.life -= dt;
    trail = trail.filter(t => t.life > 0);

    // Update smoke
    for (const s of smoke) {
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vx *= 0.95;
      s.vy *= 0.95;
      s.life -= dt;
    }
    smoke = smoke.filter(s => s.life > 0);

    // Cone collection
    for (let i = cones.length - 1; i >= 0; i--) {
      const c = cones[i];
      const dx = c.x - car.x, dy = c.y - car.y;
      if (dx * dx + dy * dy < (c.r + 18) * (c.r + 18)) {
        cones.splice(i, 1);
        conesCollected++;
        score += isDrifting ? 100 : 30;
        scoreEl.textContent = Math.floor(score);
        conesEl.textContent = conesCollected;
        spawnCone();
        // Pop particles
        for (let k = 0; k < 12; k++) {
          const a = Math.random() * Math.PI * 2;
          const sp = 80 + Math.random() * 100;
          smoke.push({
            x: c.x, y: c.y,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp,
            life: 0.5, maxLife: 0.5,
            size: 4 + Math.random() * 3,
            color: '#ff6b00',
          });
        }
      }
    }
  }

  function showDriftBanner() {
    const mult = (1 + Math.min(3, driftDistance / 60)).toFixed(1);
    driftEl.textContent = 'انجراف! ×' + mult;
    driftEl.classList.add('show');
  }
  function hideDriftBanner() {
    driftEl.classList.remove('show');
  }

  // ── Drawing ────────────────────────────────────────────────────────
  function draw() {
    // Asphalt background with grid pattern
    ctx.fillStyle = '#2a2a32';
    ctx.fillRect(0, 0, W, H);

    // Lane stripes (decorative)
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    const gridSize = 60;
    for (let x = 0; x < W; x += gridSize) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    // Skid marks
    for (const t of trail) {
      const a = Math.min(1, t.life / 4) * 0.6;
      ctx.fillStyle = `rgba(20,20,20,${a})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Cones
    for (const c of cones) {
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath();
      ctx.ellipse(c.x + 2, c.y + 6, c.r, c.r * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Cone body (triangle with white stripe)
      ctx.fillStyle = '#ff6b00';
      ctx.beginPath();
      ctx.moveTo(c.x, c.y - c.r);
      ctx.lineTo(c.x - c.r * 0.7, c.y + c.r * 0.8);
      ctx.lineTo(c.x + c.r * 0.7, c.y + c.r * 0.8);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(c.x - c.r * 0.55, c.y - 2, c.r * 1.1, 4);
      // Base
      ctx.fillStyle = '#444';
      ctx.fillRect(c.x - c.r * 0.8, c.y + c.r * 0.7, c.r * 1.6, 3);
    }

    // Smoke particles (behind car)
    for (const s of smoke) {
      const a = Math.max(0, s.life / s.maxLife);
      ctx.fillStyle = s.color || `rgba(220,220,225,${a * 0.6})`;
      if (s.color) ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * (1 + (1 - a) * 0.5), 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Car
    if (car) drawCar(car);
  }

  function drawCar(c) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.angle + Math.PI / 2); // canvas rotates 0 = +X, but our forward is also tied to angle; align sprite-up to driving direction

    const w = 24, h = 40;

    // Shadow under car
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-w / 2 + 2, -h / 2 + 3, w, h);

    // Body (gradient)
    const grad = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
    grad.addColorStop(0, '#ff3d8b');
    grad.addColorStop(1, '#c1185f');
    ctx.fillStyle = grad;
    roundRect(ctx, -w / 2, -h / 2, w, h, 5);
    ctx.fill();

    // Hood line
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-w / 2 + 2, -h / 4);
    ctx.lineTo(w / 2 - 2, -h / 4);
    ctx.stroke();

    // Windshield
    ctx.fillStyle = 'rgba(50,150,220,0.85)';
    roundRect(ctx, -w / 2 + 3, -h / 2 + 6, w - 6, 9, 2);
    ctx.fill();

    // Rear window
    ctx.fillStyle = 'rgba(30,30,50,0.7)';
    roundRect(ctx, -w / 2 + 3, h / 2 - 13, w - 6, 8, 2);
    ctx.fill();

    // Headlights
    ctx.fillStyle = '#FFEC8B';
    ctx.fillRect(-w / 2 + 2, -h / 2 + 1, 5, 3);
    ctx.fillRect(w / 2 - 7, -h / 2 + 1, 5, 3);

    // Taillights
    ctx.fillStyle = '#c00';
    ctx.fillRect(-w / 2 + 2, h / 2 - 4, 5, 3);
    ctx.fillRect(w / 2 - 7, h / 2 - 4, 5, 3);

    // Wheels
    ctx.fillStyle = '#111';
    ctx.fillRect(-w / 2 - 2, -h / 2 + 6, 3, 8);
    ctx.fillRect(w / 2 - 1,  -h / 2 + 6, 3, 8);
    ctx.fillRect(-w / 2 - 2, h / 2 - 14, 3, 8);
    ctx.fillRect(w / 2 - 1,  h / 2 - 14, 3, 8);

    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y,     x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x,     y + h, r);
    ctx.arcTo(x,     y + h, x,     y,     r);
    ctx.arcTo(x,     y,     x + w, y,     r);
    ctx.closePath();
  }

  // ── Init ───────────────────────────────────────────────────────────
  measure();
  // Show a static frame behind the start screen
  car = { x: W / 2, y: H * 0.55, angle: -Math.PI / 2, vx: 0, vy: 0, angularVel: 0, drifting: false };
  draw();
  car = null;
  [50, 200, 500, 1500].forEach(t => setTimeout(() => { measure(); }, t));
})();
</script>
</body>
</html>
