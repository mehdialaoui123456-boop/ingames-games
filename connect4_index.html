<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>أربعة على التوالي</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef3fb; --bg2:#e4ebf7; --panel:#ffffff;
    --ink:#27324a; --ink-soft:#5b6a85; --muted:#94a2bd;
    --r:#ff5d7e; --r-soft:rgba(255,93,126,.14); --r-glow:rgba(255,93,126,.45);
    --y:#f6b73c; --y-soft:rgba(246,183,60,.16); --y-glow:rgba(246,183,60,.5);
    --board:#2a6fb0; --board-d:#1f5a96;
    --board2:#2563a0;
    --hole:#dfe9f7;
    --line:rgba(60,90,150,.14);
    --shadow:0 8px 22px rgba(60,90,150,.16);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { height:100%; }
  body {
    font-family:'Cairo', system-ui, sans-serif; color:var(--ink); overflow:hidden;
    display:flex; flex-direction:column; height:100dvh;
    background:radial-gradient(120% 80% at 50% 0%, var(--bg2), var(--bg));
  }

  /* HUD */
  #hud { display:flex; align-items:stretch; justify-content:space-between; gap:10px; padding:16px 16px 6px; }
  .pcard { flex:1; position:relative; border-radius:18px; padding:10px 8px 11px; text-align:center;
    background:var(--panel); border:2px solid var(--line); box-shadow:var(--shadow); transition:.28s; }
  .pcard .disc { width:26px; height:26px; border-radius:50%; margin:0 auto 4px;
    box-shadow:inset 0 -3px 5px rgba(0,0,0,.18), inset 0 2px 4px rgba(255,255,255,.5); }
  .pcard.r .disc { background:radial-gradient(circle at 38% 32%, #ff8fa6, var(--r)); }
  .pcard.y .disc { background:radial-gradient(circle at 38% 32%, #ffd277, var(--y)); }
  .pcard .nm { font-size:.66rem; font-weight:800; color:var(--ink-soft); letter-spacing:.3px; }
  .pcard .sc { font-family:'Fredoka',sans-serif; font-size:1.3rem; font-weight:700; margin-top:1px; }
  .pcard.r.turn { border-color:var(--r); box-shadow:0 0 0 2px var(--r-soft),0 8px 22px var(--r-glow); transform:translateY(-2px); }
  .pcard.y.turn { border-color:var(--y); box-shadow:0 0 0 2px var(--y-soft),0 8px 22px var(--y-glow); transform:translateY(-2px); }
  #mid { display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:44px; }
  #mid .vs { font-family:'Fredoka',sans-serif; font-size:.85rem; font-weight:700; color:var(--muted); }
  #mid .rd { font-size:.56rem; font-weight:800; color:var(--muted); letter-spacing:1px; margin-top:2px; }

  #status { text-align:center; font-size:1rem; font-weight:800; padding:9px 16px 2px; min-height:26px; transition:.2s; }

  /* board */
  #wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:12px; }
  #boardBox {
    position:relative; width:min(92vw, 400px); background:linear-gradient(165deg,#2f78bd,#1f5a96);
    border-radius:22px; padding:10px;
    box-shadow:var(--shadow), inset 0 2px 4px rgba(255,255,255,.25), inset 0 -4px 8px rgba(0,0,0,.2);
  }
  #grid { position:relative; width:100%; display:grid; grid-template-columns:repeat(7,1fr); gap:6px; z-index:2; }
  .cell { aspect-ratio:1; border-radius:50%; background:var(--hole);
    box-shadow:inset 0 3px 5px rgba(0,0,0,.22), inset 0 -2px 3px rgba(255,255,255,.5); position:relative; }
  .cell .disc { position:absolute; inset:7%; border-radius:50%; transform:scale(0); }
  .cell.r .disc { background:radial-gradient(circle at 38% 30%, #ff8fa6, var(--r)); box-shadow:inset 0 -3px 6px rgba(0,0,0,.25); transform:scale(1); }
  .cell.y .disc { background:radial-gradient(circle at 38% 30%, #ffd277, var(--y)); box-shadow:inset 0 -3px 6px rgba(0,0,0,.25); transform:scale(1); }
  .cell.drop .disc { animation:drop .32s cubic-bezier(.45,.05,.55,.95); }
  @keyframes drop { 0%{ transform:translateY(-340%) scale(1) } 70%{ transform:translateY(0) scale(1) } 82%{ transform:translateY(-12%) scale(1.02) } 100%{ transform:translateY(0) scale(1) } }
  .cell.win { animation:pulse 1s ease-in-out infinite; }
  .cell.win .disc { box-shadow:0 0 0 3px #fff, 0 0 16px rgba(255,255,255,.9), inset 0 -3px 6px rgba(0,0,0,.25); }
  @keyframes pulse { 0%,100%{ transform:scale(1) } 50%{ transform:scale(1.08) } }
  /* column tap targets */
  #cols { position:absolute; inset:10px; display:grid; grid-template-columns:repeat(7,1fr); grid-template-rows:1fr; gap:6px; z-index:3; }
  .col { cursor:pointer; border-radius:14px; transition:background .15s; height:100%; width:100%; }
  .col.hot:active { background:rgba(255,255,255,.12); }

  #hint { text-align:center; font-size:.78rem; color:var(--muted); font-weight:700; padding:8px 16px 8px; min-height:18px; }
  #rules { margin:0 16px 14px; padding:11px 14px; background:var(--panel); border:1px solid var(--line);
    border-radius:16px; box-shadow:var(--shadow); font-size:.74rem; line-height:1.7; color:var(--ink-soft);
    text-align:center; }
  #rules .rt { display:block; font-weight:800; color:var(--board); font-size:.72rem; margin-bottom:3px; letter-spacing:.5px; }
  #rules b { color:var(--ink); font-weight:800; }

  /* overlay */
  #ov { position:fixed; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(40,55,85,.4); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); text-align:center; padding:30px; }
  #ov.hide { display:none; }
  .pop { background:var(--panel); border-radius:26px; padding:30px 26px; max-width:300px; width:100%;
    box-shadow:0 24px 60px rgba(40,55,85,.3); transform:scale(.92); transition:transform .35s cubic-bezier(.34,1.56,.64,1); }
  #ov:not(.hide) .pop { transform:scale(1); }
  .pop .emo { font-size:3.4rem; margin-bottom:8px; }
  .pop h1 { font-family:'Fredoka',sans-serif; font-size:1.7rem; font-weight:700; margin-bottom:6px; }
  .pop p { font-size:.9rem; color:var(--ink-soft); margin-bottom:18px; line-height:1.6; }
  .spinner { width:34px; height:34px; border:3px solid rgba(60,90,150,.18); border-top-color:var(--board); border-radius:50%; animation:sp 1s linear infinite; margin:0 auto 16px; }
  @keyframes sp { to{ transform:rotate(360deg) } }
  .btn { background:linear-gradient(180deg,#2a8fe0,#1f6fb8); color:#fff; border:none; padding:14px 42px;
    border-radius:16px; font-size:1.02rem; font-weight:900; font-family:'Cairo',sans-serif;
    box-shadow:0 8px 20px rgba(42,143,224,.4); }
  .btn:active { transform:translateY(2px); }
</style>
</head>
<body>

  <div id="hud">
    <div class="pcard r" id="cardR">
      <div class="disc"></div><div class="nm">لاعب 1</div><div class="sc" id="scR">0</div>
    </div>
    <div id="mid"><div class="vs">VS</div><div class="rd" id="rd">جولة 1</div></div>
    <div class="pcard y" id="cardY">
      <div class="disc"></div><div class="nm">لاعب 2</div><div class="sc" id="scY">0</div>
    </div>
  </div>

  <div id="status">…</div>

  <div id="wrap">
    <div id="boardBox">
      <div id="grid"></div>
      <div id="cols"></div>
    </div>
  </div>

  <div id="hint"></div>

  <div id="rules">
    <span class="rt">القواعد</span>
    <span>أسقط قرصك في أي عمود. أول من يصف <b>4 أقراص</b> بنفس اللون — أفقياً أو عمودياً أو قطرياً — يفوز بالجولة. إذا امتلأت الرقعة دون فائز فهي تعادل.</span>
  </div>

  <div id="ov">
    <div class="pop">
      <div class="spinner" id="ovSpin"></div>
      <div class="emo" id="ovEmo" style="display:none"></div>
      <h1 id="ovTitle">جارٍ الاتصال...</h1>
      <p id="ovMsg">بانتظار صديقك للانضمام...</p>
      <button class="btn" id="ovBtn" style="display:none">جولة جديدة</button>
    </div>
  </div>

<script>
(function(){
"use strict";

// ── URL params ──
const params  = new URLSearchParams(window.location.search);
const ROOM_ID = params.get('room');
const MY_IDX  = parseInt(params.get('player') || '0', 10); // 0 = Red, 1 = Yellow
const IS_MP   = !!ROOM_ID;
const MY_COL  = MY_IDX === 0 ? 'R' : 'Y';

// ── Firebase config (mandatory) ──
const _fbConfig = {
  apiKey:            "AIzaSyD3w3nzf89A7HYjtCsNkQjvVaCJqes0Jzs",
  authDomain:        "ingames-9c93b.firebaseapp.com",
  databaseURL:       "https://ingames-9c93b-default-rtdb.firebaseio.com",
  projectId:         "ingames-9c93b",
  storageBucket:     "ingames-9c93b.firebasestorage.app",
  messagingSenderId: "711825788462",
  appId:             "1:711825788462:web:bf1e4a59d4d18a543f59bf"
};

// ── Constants ──
const COLS = 7, ROWS = 6;

// ── State ──
// board: array length COLS*ROWS, indexed row*COLS+col, top row is 0.
// value: '' | 'R' | 'Y'
let board   = Array(COLS*ROWS).fill('');
let turn    = 'R';
let round   = 1;
let starter = 'R';
let scores  = { R:0, Y:0 };
let over    = false;
let winCells= null;
let busy    = false; // during a drop animation

// ── DOM ──
const grid    = document.getElementById('grid');
const colsEl  = document.getElementById('cols');
const statusEl= document.getElementById('status');
const hintEl  = document.getElementById('hint');
const cardR   = document.getElementById('cardR');
const cardY   = document.getElementById('cardY');
const ov      = document.getElementById('ov');
const cellEls = [];

for(let i=0;i<COLS*ROWS;i++){
  const c = document.createElement('div');
  c.className = 'cell';
  c.innerHTML = '<div class="disc"></div>';
  grid.appendChild(c);
  cellEls.push(c);
}
for(let col=0; col<COLS; col++){
  const t = document.createElement('div');
  t.className = 'col';
  t.addEventListener('click', ()=> onDrop(col));
  colsEl.appendChild(t);
}

function idx(r,c){ return r*COLS + c; }

// ── Render ──
function render(){
  for(let i=0;i<board.length;i++){
    const el = cellEls[i], v = board[i];
    el.classList.remove('r','y');
    if(v==='R') el.classList.add('r');
    else if(v==='Y') el.classList.add('y');
  }
  cellEls.forEach(el=> el.classList.remove('win'));
  if(winCells) winCells.forEach(i=> cellEls[i].classList.add('win'));

  cardR.classList.toggle('turn', !over && turn==='R');
  cardY.classList.toggle('turn', !over && turn==='Y');
  document.getElementById('scR').textContent = scores.R;
  document.getElementById('scY').textContent = scores.Y;
  document.getElementById('rd').textContent  = 'جولة ' + round;

  colsEl.querySelectorAll('.col').forEach((t,c)=>{
    const canPlay = !over && !busy && (!IS_MP || turn===MY_COL) && board[idx(0,c)]==='';
    t.classList.toggle('hot', canPlay);
  });

  if(over){ statusEl.textContent=''; hintEl.textContent=''; return; }
  if(IS_MP){
    const myTurn = turn===MY_COL;
    statusEl.style.color = turn==='R' ? 'var(--r)' : 'var(--y)';
    statusEl.textContent = myTurn ? 'دورك' : 'دور الخصم';
    hintEl.textContent   = myTurn ? 'اختر عموداً لإسقاط القرص' : 'انتظر حركة الخصم...';
  } else {
    statusEl.style.color = turn==='R' ? 'var(--r)' : 'var(--y)';
    statusEl.textContent = 'دور اللاعب ' + (turn==='R'?'1':'2');
    hintEl.textContent   = '';
  }
}

// ── Find the landing row of a column (lowest empty), or -1 if full ──
function landingRow(col){
  for(let r=ROWS-1; r>=0; r--){ if(board[idx(r,col)]==='') return r; }
  return -1;
}

// ── Drop ──
function onDrop(col){
  if(over || busy) return;
  if(IS_MP && turn!==MY_COL) return;
  const r = landingRow(col);
  if(r<0) return; // column full
  doDrop(col, r, turn, true);
  if(IS_MP) broadcastState(col, r);
}

function doDrop(col, r, color, animate){
  const i = idx(r,col);
  board[i] = color;
  if(animate){
    busy = true;
    const el = cellEls[i];
    el.classList.add(color==='R'?'r':'y','drop');
    setTimeout(()=>{ el.classList.remove('drop'); busy=false; resolveAfter(color); render(); }, 330);
    render();
  } else {
    render();
  }
}

function resolveAfter(color){
  const w = checkWin(color);
  if(w){
    over = true; winCells = w; scores[color]++;
    render();
    setTimeout(()=> showResult(color), 600);
    return;
  }
  if(board.every(x=>x)){ // draw
    over = true; render();
    setTimeout(()=> showResult('draw'), 300);
    return;
  }
  turn = (color==='R') ? 'Y' : 'R';
  render();
}

// ── Win check: 4 in a row in any direction ──
function checkWin(color){
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(board[idx(r,c)]!==color) continue;
      for(const [dr,dc] of dirs){
        const line=[idx(r,c)];
        let rr=r+dr, cc=c+dc;
        while(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS&&board[idx(rr,cc)]===color){
          line.push(idx(rr,cc)); rr+=dr; cc+=dc;
          if(line.length===4) return line;
        }
      }
    }
  }
  return null;
}

// ── Result ──
function showResult(result){
  let emo, title, msg;
  if(result==='draw'){ emo='🤝'; title='تعادل!'; }
  else if(IS_MP){
    const iWon = result===MY_COL;
    emo = iWon ? '🎉' : '😞';
    title = iWon ? 'فزت بالجولة!' : 'خسرت الجولة';
  } else {
    emo='🎉'; title='اللاعب '+(result==='R'?'1':'2')+' فاز!';
  }
  msg = 'النتيجة  ' + scores.R + ' — ' + scores.Y;
  showOverlay({ emo, title, msg, btn:'جولة جديدة', spin:false });
}

// ── New round ──
function newRound(){
  board = Array(COLS*ROWS).fill('');
  over=false; winCells=null; busy=false;
  starter = (starter==='R') ? 'Y' : 'R';
  turn = starter; round++;
  hideOverlay(); render();
}

document.getElementById('ovBtn').addEventListener('click', ()=>{
  if(IS_MP){
    if(MY_IDX===0){ newRound(); broadcastState(-1,-1,true); }
    else { showOverlay({ spin:true, title:'بانتظار جولة جديدة...' }); broadcast('rematchReq',{}); }
  } else newRound();
});

// ── Overlay helpers ──
function showOverlay(o){
  document.getElementById('ovSpin').style.display = o.spin?'block':'none';
  const e=document.getElementById('ovEmo'); e.style.display=o.emo?'block':'none'; e.textContent=o.emo||'';
  document.getElementById('ovTitle').textContent=o.title||'';
  document.getElementById('ovMsg').textContent=o.msg||'';
  const btn=document.getElementById('ovBtn'); btn.style.display=o.btn?'inline-block':'none'; btn.textContent=o.btn||'';
  ov.classList.remove('hide');
  if(over && IS_MP && typeof FlutterBridge!=='undefined' && o.btn){
    try{ FlutterBridge.postMessage('gameOver'); }catch(e){}
  }
}
function hideOverlay(){ ov.classList.add('hide'); }

// ── Firebase ──
let _db=null, _roomRef=null, _connectedAt=0, _started=false;

function broadcast(type, payload){
  if(!_roomRef) return;
  _roomRef.child('ev').set({ type, ...payload, from:MY_IDX, ts:Date.now() });
}

function broadcastState(lastCol, lastRow, isReset){
  if(!_roomRef) return;
  _roomRef.child('state').set({
    board: board.map(c=>c||'-').join(''),
    turn, round, starter, over,
    winCells: winCells || null,
    scoreR: scores.R, scoreY: scores.Y,
    lastCol, lastRow,
    reset: !!isReset,
    from: MY_IDX, ts: Date.now(),
  });
}

function applyState(s){
  if(!s) return;
  const incoming = (s.board||'').split('').map(ch=> ch==='-'?'':ch);
  // Detect the opponent's newly dropped disc so we can animate just that one.
  const lc = s.lastCol, lr = s.lastRow;
  turn    = s.turn   || 'R';
  round   = s.round  || 1;
  starter = s.starter|| 'R';
  scores.R= s.scoreR || 0;
  scores.Y= s.scoreY || 0;
  over    = !!s.over;
  winCells= s.winCells || null;

  if(s.reset){ board = incoming; busy=false; hideOverlay(); render(); return; }

  if(lc>=0 && lr>=0){
    // animate the single new disc
    const color = incoming[idx(lr,lc)];
    board = incoming.slice();
    board[idx(lr,lc)] = ''; // temporarily empty so doDrop animates it in
    busy = true;
    const el = cellEls[idx(lr,lc)];
    board[idx(lr,lc)] = color;
    el.classList.add(color==='R'?'r':'y','drop');
    render();
    setTimeout(()=>{ el.classList.remove('drop'); busy=false; render();
      if(over) finishFromState();
    }, 330);
  } else {
    board = incoming; render();
    if(over) finishFromState();
  }
}

function finishFromState(){
  // show the result overlay on this side based on synced state
  if(winCells){
    const color = board[winCells[0]];
    setTimeout(()=> showResult(color), 300);
  } else if(over){
    setTimeout(()=> showResult('draw'), 200);
  }
}

function handleEvent(ev){
  if(ev.type==='rematchReq' && MY_IDX===0){ newRound(); broadcastState(-1,-1,true); }
}

async function initFirebase(){
  if(!IS_MP){ hideOverlay(); render(); return; }
  try{
    const app = firebase.initializeApp(_fbConfig);
    await firebase.auth(app).signInAnonymously();
    _db = firebase.database(app);
    _roomRef = _db.ref('rooms/' + ROOM_ID + '/connect4');
    _connectedAt = Date.now();

    _roomRef.child('players/' + MY_IDX).set(true);
    try { _roomRef.child('players/' + MY_IDX).onDisconnect().remove(); } catch(e){}

    _roomRef.child('state').on('value', snap => {
      const s = snap.val();
      if(!s || s.from===MY_IDX) return;
      if(!s.ts || s.ts < _connectedAt) return;
      applyState(s);
    });
    _roomRef.child('ev').on('value', snap => {
      const ev = snap.val();
      if(!ev || ev.from===MY_IDX) return;
      if(!ev.ts || ev.ts < _connectedAt) return;
      handleEvent(ev);
    });

    _roomRef.child('players').on('value', snap => {
      const count = Object.keys(snap.val()||{}).length;
      if(count>=2 && !_started){
        _started = true;
        _roomRef.child('players').off('value');
        hideOverlay(); render();
        if(MY_IDX===0) broadcastState(-1,-1,true);
      }
    });
  }catch(e){
    console.error('Firebase error', e);
    showOverlay({ emo:'⚠️', title:'تعذّر الاتصال', msg:'حاول مرة أخرى', spin:false });
  }
}

// ── Boot ──
render();
initFirebase();

})();
</script>
</body>
</html>
