<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>المقلاع الذهبي</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    background: #87CEEB;
    color: #fff;
    touch-action: none;
    position: fixed;
    inset: 0;
  }
  #game { position: absolute; inset: 0; overflow: hidden; }
  canvas#scene { position: absolute; inset: 0; display: block; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: calc(10px + env(safe-area-inset-top)) 12px 10px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px;
    z-index: 10;
    pointer-events: none;
  }
  .pill {
    background: rgba(15,25,45,0.6);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 800;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  #ammoPill .dot {
    width: 13px; height: 13px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff5b3, #FFD93D 60%, #c98f00);
    box-shadow: 0 1px 2px rgba(0,0,0,0.4);
    transition: opacity 0.25s, transform 0.25s;
  }
  #ammoPill .dot.off { opacity: 0.18; transform: scale(0.7); }
  #muteBtn {
    pointer-events: auto;
    background: rgba(15,25,45,0.6);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    width: 38px; height: 38px;
    border-radius: 50%;
    font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  #muteBtn:active { transform: scale(0.9); }

  /* Level banner */
  .level-banner {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.4);
    background: linear-gradient(135deg, #FFD93D, #FF9F45);
    color: #2a1a00;
    padding: 14px 34px;
    border-radius: 16px;
    font-size: 23px;
    font-weight: 900;
    text-align: center;
    opacity: 0;
    transition: transform 0.45s cubic-bezier(.34,1.8,.5,1), opacity 0.3s;
    pointer-events: none;
    z-index: 50;
    box-shadow: 0 8px 26px rgba(180,120,0,0.45);
    line-height: 1.5;
  }
  .level-banner .stars { font-size: 28px; letter-spacing: 4px; display: block; }
  .level-banner.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* Overlays */
  .overlay {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 30%, rgba(40,60,110,0.92), rgba(12,18,38,0.95));
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100;
    text-align: center;
    padding: 24px;
  }
  .logo {
    font-size: 64px;
    margin-bottom: 8px;
    animation: floaty 2.4s ease-in-out infinite;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.4));
  }
  @keyframes floaty {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-12px) rotate(4deg); }
  }
  .overlay h1 {
    font-size: 34px; margin-bottom: 14px; font-weight: 900;
    background: linear-gradient(135deg, #FFE99A, #FFB03A);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
  }
  .howto {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 14px 20px;
    margin-bottom: 20px;
    font-size: 15px;
    line-height: 2;
    opacity: 0.95;
  }
  .best-row { font-size: 15px; color: #FFD93D; font-weight: 800; margin-bottom: 18px; }
  .stat-row { display: flex; gap: 30px; margin-bottom: 14px; }
  .stat { text-align: center; }
  .stat-label { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 800; color: #FFD93D; }
  .big-score { font-size: 62px; font-weight: 900; margin: 2px 0 6px; color: #FFD93D; text-shadow: 0 4px 14px rgba(0,0,0,0.5); }
  .record-badge {
    background: linear-gradient(135deg, #6BCB77, #3E9E4F);
    padding: 6px 18px; border-radius: 999px;
    font-size: 14px; font-weight: 900; margin-bottom: 16px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }
  .btn {
    background: linear-gradient(135deg, #FFD93D, #FF9F45);
    color: #2a1a00;
    border: none;
    font-family: inherit;
    font-size: 19px;
    font-weight: 900;
    padding: 14px 46px;
    border-radius: 999px;
    box-shadow: 0 6px 0 #b87f00, 0 10px 20px rgba(0,0,0,0.35);
    transition: transform 80ms, box-shadow 80ms;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b87f00; }
  .hint { font-size: 13px; opacity: 0.65; margin-top: 16px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="game">
  <canvas id="scene"></canvas>

  <div id="hud">
    <div class="pill">🎯 <span id="level">١</span></div>
    <div class="pill" id="ammoPill"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div class="pill">⭐ <span id="score">0</span></div>
    <button id="muteBtn">🔊</button>
  </div>

  <div class="level-banner" id="levelBanner">المرحلة ١</div>

  <div id="start" class="overlay">
    <div class="logo">🎯</div>
    <h1>المقلاع الذهبي</h1>
    <div class="howto">
      👆 اسحب في أي مكان لتصويب القذيفة<br>
      🚀 اترك إصبعك لإطلاقها<br>
      💥 حطّم الصناديق وأسقط جميع الوحوش!
    </div>
    <div class="best-row hidden" id="bestRow">🏆 أفضل نتيجة: <span id="bestScore">0</span></div>
    <button class="btn" id="startBtn">ابدأ اللعب</button>
    <div class="hint">٣ محاولات لكل مرحلة — احذر صناديق TNT!</div>
  </div>

  <div id="end" class="overlay hidden">
    <div class="logo" id="endEmoji">💥</div>
    <h1 id="endTitle">انتهت اللعبة!</h1>
    <div class="stat-row">
      <div class="stat">
        <div class="stat-label">المراحل</div>
        <div class="stat-value" id="finalLevel">١</div>
      </div>
      <div class="stat">
        <div class="stat-label">أهداف</div>
        <div class="stat-value" id="finalTargets">0</div>
      </div>
    </div>
    <div class="big-score" id="finalScore">0</div>
    <div class="record-badge hidden" id="recordBadge">🏆 رقم قياسي جديد!</div>
    <button class="btn" id="restartBtn">العب مرة أخرى</button>
  </div>
</div>

<script>
(function () {
  'use strict';
  // ── DOM ────────────────────────────────────────────────────────────
  const game        = document.getElementById('game');
  const canvas      = document.getElementById('scene');
  const ctx         = canvas.getContext('2d', { alpha: false, desynchronized: true });
  const levelEl     = document.getElementById('level');
  const scoreEl     = document.getElementById('score');
  const ammoPill    = document.getElementById('ammoPill');
  const ammoDots    = ammoPill.querySelectorAll('.dot');
  const muteBtn     = document.getElementById('muteBtn');
  const banner      = document.getElementById('levelBanner');
  const startView   = document.getElementById('start');
  const endView     = document.getElementById('end');
  const startBtn    = document.getElementById('startBtn');
  const restartBtn  = document.getElementById('restartBtn');
  const bestRow     = document.getElementById('bestRow');
  const bestScoreEl = document.getElementById('bestScore');
  const finalScore  = document.getElementById('finalScore');
  const finalLevel  = document.getElementById('finalLevel');
  const finalTargs  = document.getElementById('finalTargets');
  const endTitle    = document.getElementById('endTitle');
  const endEmoji    = document.getElementById('endEmoji');
  const recordBadge = document.getElementById('recordBadge');

  // ── Constants ──────────────────────────────────────────────────────
  const GRAVITY   = 1500;
  const BOUNCE    = 0.42;
  const MAX_AMMO  = 3;
  const POWER     = 9.4;
  const MAT = {
    W: { hp: 2, score: 15, push: 0.18, name: 'wood'  },
    S: { hp: 3, score: 25, push: 0.06, name: 'stone' },
    I: { hp: 1, score: 10, push: 0.25, name: 'ice'   },
    T: { hp: 1, score: 30, push: 0.15, name: 'tnt'   },
  };

  // ── State ──────────────────────────────────────────────────────────
  let W = 360, H = 640, DPR = 1;
  let groundY = 520, slingX = 60, slingY = 410, slingH = 110;
  let cell = 34, targetR = 14, projR = 14, maxPull = 130;

  let projectile = null;
  let crates = [];
  let targets = [];
  let particles = [];
  let popups = [];
  let rings = [];
  let trail = [];
  let clouds = [];
  let birds = [];

  let ammo = MAX_AMMO;
  let level = 1;
  let score = 0;
  let targetsKilled = 0;
  let totalTargets = 0;
  let totalKillsRun = 0;
  let best = 0;
  try { best = +localStorage.getItem('sling_best') || 0; } catch (e) {}

  let running = false;
  let clearing = false;
  let aiming = false;
  let aimStartX = 0, aimStartY = 0;
  let pullX = 0, pullY = 0;       // current ball offset from sling while aiming
  let bandSnap = 0;               // band release animation timer
  let bandSnapX = 0, bandSnapY = 0;
  let lastTime = 0;
  let rafId = null;
  let settleTimer = 0;
  let clearDelay = 0;
  let shake = 0;
  let slowmo = 0;
  let timeScale = 1;
  let worldT = 0;                 // accumulated game time, for idle animations

  // ── Audio (tiny WebAudio synth, safe in WebView) ───────────────────
  const SFX = (function () {
    let ac = null, noiseBuf = null;
    let muted = false;
    try { muted = localStorage.getItem('sling_mute') === '1'; } catch (e) {}
    function ctx() {
      try {
        if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
        if (ac && ac.state === 'suspended') ac.resume();
      } catch (e) { ac = null; }
      return ac;
    }
    function tone(f0, f1, dur, type, vol, delay) {
      const a = ctx(); if (!a || muted) return;
      try {
        const t = a.currentTime + (delay || 0);
        const o = a.createOscillator();
        const g = a.createGain();
        o.type = type || 'sine';
        o.frequency.setValueAtTime(f0, t);
        o.frequency.exponentialRampToValueAtTime(Math.max(20, f1), t + dur);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.connect(g); g.connect(a.destination);
        o.start(t); o.stop(t + dur + 0.02);
      } catch (e) {}
    }
    function noise(dur, vol, freq, delay) {
      const a = ctx(); if (!a || muted) return;
      try {
        if (!noiseBuf) {
          noiseBuf = a.createBuffer(1, a.sampleRate * 0.5, a.sampleRate);
          const d = noiseBuf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        }
        const t = a.currentTime + (delay || 0);
        const src = a.createBufferSource();
        src.buffer = noiseBuf;
        const f = a.createBiquadFilter();
        f.type = 'lowpass';
        f.frequency.value = freq;
        const g = a.createGain();
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        src.connect(f); f.connect(g); g.connect(a.destination);
        src.start(t); src.stop(t + dur + 0.02);
      } catch (e) {}
    }
    return {
      unlock() { ctx(); },
      get muted() { return muted; },
      toggle() {
        muted = !muted;
        try { localStorage.setItem('sling_mute', muted ? '1' : '0'); } catch (e) {}
        return muted;
      },
      shoot()  { noise(0.18, 0.25, 2200); tone(280, 720, 0.16, 'square', 0.12); },
      wood()   { tone(170, 70, 0.12, 'triangle', 0.3); noise(0.08, 0.2, 900); },
      stone()  { tone(110, 50, 0.14, 'square', 0.25); noise(0.1, 0.18, 400); },
      ice()    { tone(900, 1500, 0.1, 'sine', 0.2); noise(0.14, 0.3, 5000); },
      pop()    { tone(480, 900, 0.13, 'sine', 0.35); tone(720, 1200, 0.1, 'sine', 0.2, 0.05); },
      boom()   { noise(0.5, 0.6, 220); tone(90, 30, 0.45, 'sine', 0.55); },
      thud()   { tone(140, 60, 0.1, 'triangle', 0.18); },
      win()    { [523, 659, 784, 1047].forEach((f, i) => tone(f, f, 0.18, 'triangle', 0.25, i * 0.1)); },
      lose()   { tone(320, 140, 0.5, 'sawtooth', 0.2); tone(240, 100, 0.6, 'triangle', 0.18, 0.12); },
      click()  { tone(600, 400, 0.06, 'square', 0.1); },
    };
  })();
  muteBtn.textContent = SFX.muted ? '🔇' : '🔊';

  // ── Sizing (DPR-aware for crisp + smooth WebView rendering) ───────
  let bgCanvas = null;
  function measure() {
    const rect = game.getBoundingClientRect();
    const w = Math.max(280, Math.floor(rect.width  || game.clientWidth  || window.innerWidth  || 360));
    const h = Math.max(420, Math.floor(rect.height || game.clientHeight || window.innerHeight || 640));
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    if (w === W && h === H && dpr === DPR) return false;
    W = w; H = h; DPR = dpr;
    canvas.width  = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    groundY = Math.floor(H * 0.82);
    slingX  = Math.floor(W * 0.16);
    slingH  = Math.max(90, Math.min(130, Math.floor(H * 0.15)));
    slingY  = groundY - slingH;
    maxPull = Math.max(110, Math.min(150, Math.floor(H * 0.18)));
    cell    = Math.floor(Math.max(24, Math.min(40, (W - 12 - (slingX + 140)) / 5)));
    targetR = Math.round(cell * 0.42);
    projR   = Math.max(12, Math.min(17, Math.round(cell * 0.45)));

    renderBackground();
    buildSprites();
    initScenery();
    return true;
  }

  if (window.ResizeObserver) {
    new ResizeObserver(() => { if (measure()) { if (running) rebuildLevel(); draw(); } }).observe(game);
  }
  window.addEventListener('resize', () => { if (measure()) { if (running) rebuildLevel(); draw(); } });
  window.addEventListener('orientationchange', () => setTimeout(() => { if (measure()) { if (running) rebuildLevel(); } draw(); }, 120));

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) lastTime = performance.now();
  });
  document.addEventListener('contextmenu', e => e.preventDefault());

  // ── Pre-rendered background (no per-frame gradients = smooth) ─────
  // Deterministic pseudo-random so the scenery is stable across redraws.
  function prand(i) { return Math.abs(Math.sin(i * 127.31 + 311.7)) % 1; }

  function renderBackground() {
    bgCanvas = document.createElement('canvas');
    bgCanvas.width = Math.floor(W * DPR);
    bgCanvas.height = Math.floor(H * DPR);
    const b = bgCanvas.getContext('2d');
    b.setTransform(DPR, 0, 0, DPR, 0, 0);

    // Sky
    const sky = b.createLinearGradient(0, 0, 0, groundY);
    sky.addColorStop(0, '#5BB8E8');
    sky.addColorStop(0.55, '#9AD9F2');
    sky.addColorStop(1, '#E2F4FA');
    b.fillStyle = sky;
    b.fillRect(0, 0, W, groundY + 2);

    // Sun with soft glow
    const sx = W * 0.84, sy = H * 0.13;
    const glow = b.createRadialGradient(sx, sy, 6, sx, sy, 90);
    glow.addColorStop(0, 'rgba(255,236,150,0.95)');
    glow.addColorStop(0.35, 'rgba(255,220,110,0.45)');
    glow.addColorStop(1, 'rgba(255,220,110,0)');
    b.fillStyle = glow;
    b.fillRect(sx - 90, sy - 90, 180, 180);
    b.fillStyle = '#FFE066';
    b.beginPath(); b.arc(sx, sy, 26, 0, Math.PI * 2); b.fill();

    // Far hills
    b.fillStyle = '#9CCB7A';
    b.beginPath();
    b.moveTo(0, groundY);
    for (let x = 0; x <= W; x += 24) {
      b.lineTo(x, groundY - 78 - Math.sin(x * 0.013 + 2) * 26 - Math.cos(x * 0.007) * 16);
    }
    b.lineTo(W, groundY);
    b.closePath(); b.fill();

    // Near hills
    b.fillStyle = '#74AE58';
    b.beginPath();
    b.moveTo(0, groundY);
    for (let x = 0; x <= W; x += 24) {
      b.lineTo(x, groundY - 40 - Math.sin(x * 0.02 + 5) * 20 - Math.cos(x * 0.011 + 1) * 10);
    }
    b.lineTo(W, groundY);
    b.closePath(); b.fill();

    // Tiny trees on hills
    for (let i = 0; i < 6; i++) {
      const tx = (i + 0.5) / 6 * W + (prand(i) - 0.5) * 40;
      const ty = groundY - 44 - Math.sin(tx * 0.02 + 5) * 20 - Math.cos(tx * 0.011 + 1) * 10;
      b.fillStyle = '#4f7a3a';
      b.beginPath();
      b.moveTo(tx - 7, ty); b.lineTo(tx + 7, ty); b.lineTo(tx, ty - 16);
      b.closePath(); b.fill();
    }

    // Ground
    const gg = b.createLinearGradient(0, groundY, 0, H);
    gg.addColorStop(0, '#578b3f');
    gg.addColorStop(0.12, '#69513a');
    gg.addColorStop(1, '#3a2c1c');
    b.fillStyle = gg;
    b.fillRect(0, groundY, W, H - groundY);
    b.fillStyle = '#6CB04E';
    b.fillRect(0, groundY, W, 7);

    // Grass blades + pebbles (deterministic)
    for (let i = 0; i < 26; i++) {
      const gx = prand(i + 40) * W;
      b.strokeStyle = '#7BC25C';
      b.lineWidth = 2;
      b.beginPath();
      b.moveTo(gx, groundY + 4);
      b.lineTo(gx + (prand(i + 80) - 0.5) * 6, groundY - 5 - prand(i + 120) * 5);
      b.stroke();
    }
    for (let i = 0; i < 10; i++) {
      const px = prand(i + 200) * W;
      const py = groundY + 16 + prand(i + 240) * (H - groundY - 24);
      b.fillStyle = 'rgba(255,255,255,0.07)';
      b.beginPath();
      b.ellipse(px, py, 4 + prand(i + 300) * 5, 3, 0, 0, Math.PI * 2);
      b.fill();
    }
  }

  // ── Pre-rendered crate sprites ─────────────────────────────────────
  const sprites = {};
  function makeSprite(size, painter) {
    const c = document.createElement('canvas');
    c.width = c.height = Math.ceil(size * DPR);
    const s = c.getContext('2d');
    s.setTransform(DPR, 0, 0, DPR, 0, 0);
    painter(s, size);
    return c;
  }

  function buildSprites() {
    // Wood crate
    sprites.W = makeSprite(cell, (s, n) => {
      const g = s.createLinearGradient(0, 0, n, n);
      g.addColorStop(0, '#cfa172'); g.addColorStop(1, '#8b5a2b');
      s.fillStyle = g; s.fillRect(0, 0, n, n);
      s.strokeStyle = 'rgba(60,30,5,0.35)'; s.lineWidth = 1.5;
      s.beginPath();
      s.moveTo(0, n * 0.33); s.lineTo(n, n * 0.33);
      s.moveTo(0, n * 0.66); s.lineTo(n, n * 0.66);
      s.stroke();
      s.fillStyle = 'rgba(40,20,5,0.5)';
      [[n*0.15,n*0.15],[n*0.85,n*0.15],[n*0.15,n*0.85],[n*0.85,n*0.85]].forEach(([x,y]) => {
        s.beginPath(); s.arc(x, y, 1.6, 0, Math.PI * 2); s.fill();
      });
      s.strokeStyle = '#5a3a1f'; s.lineWidth = 2.5;
      s.strokeRect(1.2, 1.2, n - 2.4, n - 2.4);
    });
    // Stone block
    sprites.S = makeSprite(cell, (s, n) => {
      const g = s.createLinearGradient(0, 0, n, n);
      g.addColorStop(0, '#b8bec6'); g.addColorStop(1, '#6f7780');
      s.fillStyle = g; s.fillRect(0, 0, n, n);
      s.strokeStyle = 'rgba(255,255,255,0.35)'; s.lineWidth = 2;
      s.beginPath(); s.moveTo(2, n - 3); s.lineTo(2, 2); s.lineTo(n - 3, 2); s.stroke();
      s.strokeStyle = 'rgba(40,45,55,0.5)'; s.lineWidth = 1.5;
      s.beginPath();
      s.moveTo(n*0.2, n*0.55); s.lineTo(n*0.45, n*0.45); s.lineTo(n*0.6, n*0.62);
      s.stroke();
      s.strokeStyle = '#4d545c'; s.lineWidth = 2.5;
      s.strokeRect(1.2, 1.2, n - 2.4, n - 2.4);
    });
    // Ice block
    sprites.I = makeSprite(cell, (s, n) => {
      const g = s.createLinearGradient(0, 0, n, n);
      g.addColorStop(0, 'rgba(190,235,255,0.95)'); g.addColorStop(1, 'rgba(120,190,235,0.9)');
      s.fillStyle = g; s.fillRect(0, 0, n, n);
      s.strokeStyle = 'rgba(255,255,255,0.8)'; s.lineWidth = 2.5;
      s.beginPath();
      s.moveTo(n*0.6, n*0.1); s.lineTo(n*0.2, n*0.5);
      s.moveTo(n*0.75, n*0.3); s.lineTo(n*0.45, n*0.6);
      s.stroke();
      s.strokeStyle = 'rgba(80,150,200,0.9)'; s.lineWidth = 2.5;
      s.strokeRect(1.2, 1.2, n - 2.4, n - 2.4);
    });
    // TNT crate
    sprites.T = makeSprite(cell, (s, n) => {
      const g = s.createLinearGradient(0, 0, n, n);
      g.addColorStop(0, '#ff7b5c'); g.addColorStop(1, '#c0392b');
      s.fillStyle = g; s.fillRect(0, 0, n, n);
      s.fillStyle = 'rgba(120,15,5,0.55)';
      s.fillRect(0, n*0.36, n, n*0.28);
      s.fillStyle = '#fff';
      s.font = '900 ' + Math.floor(n * 0.32) + 'px Arial';
      s.textAlign = 'center'; s.textBaseline = 'middle';
      s.fillText('TNT', n / 2, n * 0.52);
      s.strokeStyle = '#7e150b'; s.lineWidth = 2.5;
      s.strokeRect(1.2, 1.2, n - 2.4, n - 2.4);
      s.strokeStyle = '#3a2a10'; s.lineWidth = 2;
      s.beginPath(); s.moveTo(n/2, 1); s.quadraticCurveTo(n*0.65, -2, n*0.7, 3); s.stroke();
    });
    // Projectile ball
    const pr = projR;
    sprites.ball = makeSprite(pr * 2 + 4, (s, n) => {
      const cx = n / 2, cy = n / 2;
      const g = s.createRadialGradient(cx - pr * 0.35, cy - pr * 0.35, 2, cx, cy, pr);
      g.addColorStop(0, '#fff7c0'); g.addColorStop(0.55, '#FFD93D'); g.addColorStop(1, '#e0a210');
      s.fillStyle = g;
      s.beginPath(); s.arc(cx, cy, pr, 0, Math.PI * 2); s.fill();
      s.strokeStyle = '#b87f00'; s.lineWidth = 2; s.stroke();
      s.fillStyle = 'rgba(255,255,255,0.75)';
      s.beginPath(); s.arc(cx - pr * 0.35, cy - pr * 0.4, pr * 0.26, 0, Math.PI * 2); s.fill();
      // a band so the spin is visible
      s.strokeStyle = 'rgba(180,120,0,0.5)'; s.lineWidth = 2;
      s.beginPath(); s.arc(cx, cy, pr * 0.62, 0.4, 2.2); s.stroke();
    });
  }

  // ── Scenery (clouds + birds, animated cheaply) ─────────────────────
  function initScenery() {
    clouds = [];
    for (let i = 0; i < 3; i++) {
      clouds.push({
        x: prand(i + 7) * W,
        y: 50 + prand(i + 17) * (H * 0.18),
        s: 0.7 + prand(i + 27) * 0.5,
        v: 6 + prand(i + 37) * 8,
      });
    }
    birds = [
      { x: W * 0.3, y: H * 0.12, v: 22, ph: 0 },
      { x: W * 0.6, y: H * 0.2,  v: 17, ph: 2 },
    ];
  }

  // ── Buttons ────────────────────────────────────────────────────────
  function bindButton(el, fn) {
    el.addEventListener('click', fn);
    el.addEventListener('touchend', (e) => { e.preventDefault(); fn(); }, { passive: false });
  }
  bindButton(startBtn, startGame);
  bindButton(restartBtn, startGame);
  bindButton(muteBtn, () => { muteBtn.textContent = SFX.toggle() ? '🔇' : '🔊'; SFX.click(); });

  // ── Input — drag anywhere to aim, release to launch ────────────────
  function getPoint(e) {
    const r = canvas.getBoundingClientRect();
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
    if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX - r.left, y: e.changedTouches[0].clientY - r.top };
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  function canAim() {
    return running && !clearing && projectile && !projectile.launched;
  }
  function applyPull(px, py) {
    const dist = Math.sqrt(px * px + py * py);
    const clamped = Math.min(maxPull, dist);
    if (dist > 0.001) {
      pullX = (px / dist) * clamped;
      pullY = (py / dist) * clamped;
    } else { pullX = 0; pullY = 0; }
    projectile.x = slingX + pullX;
    projectile.y = slingY + pullY;
  }
  function onDown(e) {
    if (!canAim() || aiming) return;
    e.preventDefault();
    aiming = true;
    const p = getPoint(e);
    aimStartX = p.x; aimStartY = p.y;
    pullX = 0; pullY = 0;
  }
  function onMove(e) {
    if (!aiming || !canAim()) return;
    e.preventDefault();
    const p = getPoint(e);
    applyPull(p.x - aimStartX, p.y - aimStartY);
  }
  function onUp(e) {
    if (!aiming) return;
    e.preventDefault();
    aiming = false;
    if (!canAim()) return;
    const dist = Math.sqrt(pullX * pullX + pullY * pullY);
    if (dist < 14) {
      projectile.x = slingX; projectile.y = slingY;
      pullX = 0; pullY = 0;
      return;
    }
    const power = Math.min(maxPull, dist) * POWER;
    projectile.vx = (-pullX / dist) * power;
    projectile.vy = (-pullY / dist) * power;
    projectile.launched = true;
    projectile.stretch = 1.35; // squash & stretch on launch
    ammo--;
    updateAmmo();
    trail.length = 0;
    bandSnap = 0.16;
    bandSnapX = projectile.x; bandSnapY = projectile.y;
    SFX.shoot();
  }
  function onCancel() {
    if (!aiming) return;
    aiming = false;
    if (canAim()) { projectile.x = slingX; projectile.y = slingY; }
    pullX = 0; pullY = 0;
  }
  canvas.addEventListener('touchstart',  onDown,   { passive: false });
  canvas.addEventListener('touchmove',   onMove,   { passive: false });
  canvas.addEventListener('touchend',    onUp,     { passive: false });
  canvas.addEventListener('touchcancel', onCancel, { passive: false });
  canvas.addEventListener('mousedown',  onDown);
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseup',    onUp);

  // ── Level layouts (ASCII grids, top row first) ─────────────────────
  // W wood · S stone · I ice · T TNT · o target · . empty
  // Rule: every crate/target must rest on a crate or the ground.
  const LAYOUTS = [
    [ '.o.',
      'WIW' ],
    [ 'o.o',
      'III',
      'WWW' ],
    [ '..o..',
      '..S..',
      'o.W.o',
      'S.W.S' ],
    [ '..o..',
      '.WWW.',
      '.ITI.',
      'oWWWo' ],
    [ 'o...o',
      'S...S',
      'W.o.W' ],
    [ '..o..',
      '.WTW.',
      '.WSW.',
      'oWSWo' ],
    [ 'o.o.o',
      'I.I.I',
      'I.I.I',
      'S.S.S' ],
    [ '.o.o.',
      '.S.S.',
      '.S.S.',
      'WWTWW' ],
  ];

  function buildLevel(n) {
    crates = [];
    targets = [];
    const grid = LAYOUTS[(n - 1) % LAYOUTS.length];
    const hpBoost = Math.min(2, Math.floor((n - 1) / LAYOUTS.length));
    const rows = grid.length;
    const cols = grid[0].length;
    const stageX = Math.max(slingX + 140, W - 12 - cols * cell);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const ch = grid[r][c];
        if (ch === '.') continue;
        const x = stageX + c * cell;
        const y = groundY - (rows - r) * cell;
        if (ch === 'o') {
          targets.push({
            x: x + cell / 2, y: y + cell - targetR, r: targetR,
            vx: 0, vy: 0, dead: false, settled: true,
            ph: Math.random() * 6.28, blink: 1 + Math.random() * 3,
          });
        } else {
          const m = MAT[ch];
          crates.push({
            x, y, w: cell, h: cell, type: ch,
            vx: 0, vy: 0, angle: 0, angVel: 0,
            destroyed: false, settled: true,
            hp: m.hp + (ch === 'T' ? 0 : hpBoost),
            maxHp: m.hp + (ch === 'T' ? 0 : hpBoost),
            fuse: -1,
          });
        }
      }
    }
    totalTargets = targets.length;
    targetsKilled = 0;
    clearDelay = 0;
    clearing = false;
  }

  function rebuildLevel() {
    if (running) { buildLevel(level); spawnProjectile(); }
  }

  function spawnProjectile() {
    projectile = {
      x: slingX, y: slingY,
      vx: 0, vy: 0, angle: 0, stretch: 1,
      launched: false, settled: false, age: 0,
    };
    pullX = 0; pullY = 0;
    trail.length = 0;
    settleTimer = 0;
    shotKills = 0;
  }

  // ── HUD helpers ────────────────────────────────────────────────────
  function updateScore() { scoreEl.textContent = score; }
  function updateAmmo() {
    ammoDots.forEach((d, i) => d.classList.toggle('off', i >= ammo));
  }
  function toArabicNum(n) {
    const digits = '٠١٢٣٤٥٦٧٨٩';
    return String(n).split('').map(c => digits[+c] !== undefined ? digits[+c] : c).join('');
  }
  let bannerTimer = null;
  function showBanner(html, dur) {
    banner.innerHTML = html;
    banner.classList.add('show');
    if (bannerTimer) clearTimeout(bannerTimer);
    bannerTimer = setTimeout(() => banner.classList.remove('show'), dur || 1300);
  }

  // ── Game flow ──────────────────────────────────────────────────────
  function startGame() {
    SFX.unlock();
    SFX.click();
    measure();
    level = 1; score = 0; ammo = MAX_AMMO; totalKillsRun = 0;
    particles = []; popups = []; rings = []; trail = [];
    shake = 0; slowmo = 0; timeScale = 1;
    running = true;
    updateScore(); updateAmmo();
    levelEl.textContent = toArabicNum(1);
    startView.classList.add('hidden');
    endView.classList.add('hidden');

    buildLevel(level);
    spawnProjectile();
    showBanner('المرحلة ' + toArabicNum(level));

    lastTime = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function endGame(win) {
    running = false;
    aiming = false;
    endTitle.textContent = 'انتهت الذخيرة!';
    endEmoji.textContent = win ? '🏆' : '💥';
    finalScore.textContent = score;
    finalLevel.textContent = toArabicNum(level);
    finalTargs.textContent = totalKillsRun;
    const isRecord = score > best;
    if (isRecord) {
      best = score;
      try { localStorage.setItem('sling_best', String(best)); } catch (e) {}
    }
    recordBadge.classList.toggle('hidden', !isRecord || score === 0);
    endView.classList.remove('hidden');
    SFX.lose();
  }

  function onLevelCleared() {
    clearing = true;
    const stars = ammo >= 2 ? 3 : ammo >= 1 ? 2 : 1;
    const bonus = 50 + ammo * 40;
    score += bonus;
    updateScore();
    addPopup(W / 2, H * 0.3, '+' + bonus, '#FFD93D', 24);
    confettiBurst();
    SFX.win();
    showBanner('<span class="stars">' + '⭐'.repeat(stars) + '</span>رائع!', 1500);
    setTimeout(() => {
      if (!running) return;
      level++;
      ammo = MAX_AMMO;
      updateAmmo();
      levelEl.textContent = toArabicNum(level);
      buildLevel(level);
      spawnProjectile();
      showBanner('المرحلة ' + toArabicNum(level));
    }, 1700);
  }

  // ── Effects ────────────────────────────────────────────────────────
  const PARTICLE_CAP = 220;
  function spawnParticles(x, y, color, count, speed) {
    for (let i = 0; i < count; i++) {
      if (particles.length >= PARTICLE_CAP) particles.shift();
      const a = Math.random() * Math.PI * 2;
      const sp = (speed || 160) * (0.4 + Math.random() * 0.9);
      particles.push({
        kind: 0, x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 70,
        life: 0.5 + Math.random() * 0.4,
        maxLife: 0.9,
        color,
        size: 3 + Math.random() * 4,
        rot: Math.random() * 3,
        rv: (Math.random() - 0.5) * 10,
      });
    }
  }
  function spawnSmoke(x, y, count) {
    for (let i = 0; i < count; i++) {
      if (particles.length >= PARTICLE_CAP) particles.shift();
      const a = Math.random() * Math.PI * 2;
      const sp = 50 + Math.random() * 110;
      particles.push({
        kind: 1, x: x + (Math.random() - 0.5) * 20, y: y + (Math.random() - 0.5) * 20,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40,
        life: 0.7 + Math.random() * 0.5, maxLife: 1.1,
        size: 8 + Math.random() * 12,
      });
    }
  }
  const CONFETTI_COLORS = ['#FFD93D', '#FF6B6B', '#6BCB77', '#4D96FF', '#C780FA', '#FF9F45'];
  function confettiBurst() {
    for (let i = 0; i < 50; i++) {
      if (particles.length >= PARTICLE_CAP) particles.shift();
      const a = -Math.PI / 2 + (Math.random() - 0.5) * 1.8;
      const sp = 250 + Math.random() * 350;
      particles.push({
        kind: 2,
        x: W / 2 + (Math.random() - 0.5) * 60,
        y: H * 0.55,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 1.1 + Math.random() * 0.7, maxLife: 1.8,
        color: CONFETTI_COLORS[i % CONFETTI_COLORS.length],
        size: 5 + Math.random() * 4,
        rot: Math.random() * 3, rv: (Math.random() - 0.5) * 14,
      });
    }
  }
  function addPopup(x, y, text, color, size) {
    popups.push({ x, y, text, color, size: size || 17, life: 0.9, maxLife: 0.9 });
    if (popups.length > 12) popups.shift();
  }
  function addRing(x, y, maxR, color) {
    rings.push({ x, y, r: 8, maxR, life: 0.35, maxLife: 0.35, color });
  }
  function addShake(amount) { shake = Math.min(14, shake + amount); }

  // ── Kills & destruction ────────────────────────────────────────────
  let shotKills = 0; // for combo within one shot
  function killTarget(t, kind) {
    if (t.dead) return;
    t.dead = true;
    targetsKilled++;
    totalKillsRun++;
    shotKills++;
    let pts = kind === 'hit' ? 100 : kind === 'crush' ? 80 : 60;
    pts = Math.round(pts * (1 + (shotKills - 1) * 0.5));
    score += pts;
    updateScore();
    addPopup(t.x, t.y - 24, '+' + pts, '#C780FA', 19);
    if (shotKills > 1) addPopup(t.x, t.y - 48, 'كومبو ×' + shotKills, '#FF6B6B', 17);
    spawnParticles(t.x, t.y, '#b06ae0', 18, 220);
    spawnParticles(t.x, t.y, '#FFD93D', 6, 160);
    addRing(t.x, t.y, 46, 'rgba(199,128,250,0.8)');
    SFX.pop();
    if (targetsKilled >= totalTargets) slowmo = 0.55; // dramatic final kill
  }

  function damageCrate(c, dmg, hitX, hitY) {
    if (c.destroyed || c.fuse >= 0) return;
    if (c.type === 'T') { c.fuse = 0.15; return; }
    c.hp -= dmg;
    score += 5;
    updateScore();
    const m = MAT[c.type];
    const col = c.type === 'S' ? '#9aa2ab' : c.type === 'I' ? '#bfe6f7' : '#a67c52';
    if (c.hp <= 0) {
      c.destroyed = true;
      score += m.score;
      updateScore();
      addPopup(c.x + c.w / 2, c.y, '+' + m.score, '#fff', 14);
      spawnParticles(c.x + c.w / 2, c.y + c.h / 2, col, 14, 230);
      addShake(2);
    } else {
      spawnParticles(hitX, hitY, col, 6, 150);
    }
    if (c.type === 'I') SFX.ice();
    else if (c.type === 'S') SFX.stone();
    else SFX.wood();
  }

  function explode(c) {
    c.destroyed = true;
    const ex = c.x + c.w / 2, ey = c.y + c.h / 2;
    const R = cell * 2.7;
    score += MAT.T.score;
    updateScore();
    spawnParticles(ex, ey, '#FF6B35', 22, 380);
    spawnParticles(ex, ey, '#FFD93D', 14, 300);
    spawnSmoke(ex, ey, 10);
    addRing(ex, ey, R, 'rgba(255,160,60,0.9)');
    addRing(ex, ey, R * 0.6, 'rgba(255,255,255,0.9)');
    addShake(10);
    SFX.boom();

    for (const o of crates) {
      if (o === c || o.destroyed) continue;
      const ox = o.x + o.w / 2, oy = o.y + o.h / 2;
      const dx = ox - ex, dy = oy - ey;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < R) {
        const f = 1 - d / R;
        if (o.type === 'T') { if (o.fuse < 0) o.fuse = 0.12 + Math.random() * 0.12; }
        else {
          o.hp -= 2;
          if (o.hp <= 0) {
            o.destroyed = true;
            score += MAT[o.type].score;
            const col = o.type === 'S' ? '#9aa2ab' : o.type === 'I' ? '#bfe6f7' : '#a67c52';
            spawnParticles(ox, oy, col, 10, 220);
          }
        }
        if (!o.destroyed) {
          o.settled = false;
          o.vx += (dx / (d || 1)) * 760 * f;
          o.vy += (dy / (d || 1)) * 760 * f - 160 * f;
          o.angVel += (Math.random() - 0.5) * 9 * f;
        }
      }
    }
    updateScore();
    for (const t of targets) {
      if (t.dead) continue;
      const dx = t.x - ex, dy = t.y - ey;
      if (dx * dx + dy * dy < R * R) killTarget(t, 'hit');
    }
    if (projectile && projectile.launched && !projectile.settled) {
      const dx = projectile.x - ex, dy = projectile.y - ey;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < R) {
        const f = 1 - d / R;
        projectile.vx += (dx / (d || 1)) * 700 * f;
        projectile.vy += (dy / (d || 1)) * 700 * f - 120 * f;
      }
    }
  }

  // ── Main loop ──────────────────────────────────────────────────────
  function loop(now) {
    if (!running && particles.length === 0 && popups.length === 0) { rafId = null; return; }
    const realDt = Math.min(0.04, (now - lastTime) / 1000);
    lastTime = now;
    // slow-motion on final kill
    if (slowmo > 0) slowmo -= realDt;
    const targetTs = slowmo > 0 ? 0.3 : 1;
    timeScale += (targetTs - timeScale) * Math.min(1, realDt * 10);
    update(realDt * timeScale, realDt);
    draw();
    rafId = requestAnimationFrame(loop);
  }

  // ── Physics & game update ──────────────────────────────────────────
  function update(dt, realDt) {
    worldT += dt;

    // Scenery
    for (const cl of clouds) {
      cl.x += cl.v * dt;
      if (cl.x - 70 * cl.s > W) cl.x = -80 * cl.s;
    }
    for (const bd of birds) {
      bd.x += bd.v * dt;
      bd.ph += dt * 9;
      if (bd.x - 16 > W) { bd.x = -20; bd.y = H * (0.08 + Math.random() * 0.15); }
    }

    if (shake > 0) shake = Math.max(0, shake - 26 * realDt);
    if (bandSnap > 0) bandSnap -= realDt;

    // Projectile
    const p = projectile;
    if (p) {
      if (p.stretch > 1) p.stretch = Math.max(1, p.stretch - 3 * realDt);
      if (p.launched && !p.settled) {
        p.age += dt;
        p.vy += GRAVITY * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.angle += (p.vx / projR) * dt;

        // trail
        trail.push({ x: p.x, y: p.y, life: 0.3 });
        if (trail.length > 14) trail.shift();

        // ground
        if (p.y + projR > groundY) {
          p.y = groundY - projR;
          if (Math.abs(p.vy) > 140) { spawnParticles(p.x, groundY, '#6CB04E', 5, 120); SFX.thud(); }
          p.vy = -p.vy * BOUNCE;
          p.vx *= 0.72;
          if (Math.abs(p.vy) < 60) p.vy = 0;
          if (Math.abs(p.vy) < 1 && Math.abs(p.vx) < 25) p.settled = true;
        }
        if (p.x - projR > W + 80 || p.x + projR < -80) p.settled = true;
        if (p.age > 7) p.settled = true;

        // crates
        for (const c of crates) {
          if (c.destroyed) continue;
          if (!circleRectOverlap(p.x, p.y, projR, c)) continue;
          const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
          const wasAlive = !c.destroyed && c.fuse < 0;
          if (speed > 230 && wasAlive) damageCrate(c, 1, p.x, p.y);

          if (c.destroyed) {
            // smashed straight through — keep most momentum (satisfying!)
            p.vx *= c.type === 'I' ? 0.9 : 0.65;
            p.vy *= c.type === 'I' ? 0.9 : 0.65;
          } else {
            // bounce off
            const cx = c.x + c.w / 2, cy = c.y + c.h / 2;
            const dx = p.x - cx, dy = p.y - cy;
            if (Math.abs(dx) / c.w > Math.abs(dy) / c.h) {
              p.vx *= -BOUNCE;
              p.x = dx > 0 ? c.x + c.w + projR : c.x - projR;
            } else {
              p.vy *= -BOUNCE;
              p.y = dy > 0 ? c.y + c.h + projR : c.y - projR;
            }
            const m = MAT[c.type];
            c.vx += p.vx * m.push * -2.2;
            c.vx += (dx > 0 ? -1 : 1) * Math.min(180, speed * m.push);
            c.vy -= Math.min(120, speed * m.push * 0.4);
            c.angVel += (Math.random() - 0.5) * 4;
            c.settled = false;
            addShake(speed > 600 ? 3 : 1);
          }
        }

        // targets
        for (const t of targets) {
          if (t.dead) continue;
          const dx = p.x - t.x, dy = p.y - t.y;
          if (dx * dx + dy * dy < (projR + t.r) * (projR + t.r)) {
            const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
            if (speed > 90) {
              killTarget(t, 'hit');
              p.vx *= 0.45;
              p.vy *= 0.45;
            }
          }
        }
      }
    }

    // Crates
    for (const c of crates) {
      if (c.destroyed) continue;

      // TNT fuse
      if (c.fuse >= 0) {
        c.fuse -= dt;
        if (c.fuse <= 0) { explode(c); continue; }
      }

      // support check — settled crates fall when support is destroyed
      if (c.settled) {
        let supported = c.y + c.h >= groundY - 2;
        if (!supported) {
          for (const o of crates) {
            if (o === c || o.destroyed) continue;
            if (Math.abs((c.x + c.w / 2) - (o.x + o.w / 2)) < (c.w + o.w) / 2 - 6 &&
                Math.abs((c.y + c.h) - o.y) < 8) { supported = true; break; }
          }
        }
        if (!supported) c.settled = false;
        else continue;
      }

      c.vy += GRAVITY * dt;
      c.vx *= 0.985;
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      c.angVel *= 0.96;
      c.angle += c.angVel * dt;

      // crush targets under fast crates
      const cspeed = Math.abs(c.vx) + Math.abs(c.vy);
      if (cspeed > 160) {
        for (const t of targets) {
          if (t.dead) continue;
          if (circleRectOverlap(t.x, t.y, t.r, c)) killTarget(t, 'crush');
        }
      }

      // ground
      if (c.y + c.h > groundY) {
        c.y = groundY - c.h;
        if (Math.abs(c.vy) > 200) { spawnParticles(c.x + c.w / 2, groundY, '#6CB04E', 4, 110); SFX.thud(); }
        c.vy = -c.vy * BOUNCE;
        c.vx *= 0.7;
        if (Math.abs(c.vy) < 40) {
          c.vy = 0;
          if (Math.abs(c.vx) < 10) { c.settled = true; c.vx = 0; }
        }
      }
      if (c.x < -60 || c.x > W + 60) c.destroyed = true;

      // land on other crates (vertical only)
      for (const o of crates) {
        if (o === c || o.destroyed) continue;
        if (Math.abs((c.x + c.w / 2) - (o.x + o.w / 2)) < (c.w + o.w) / 2 - 5) {
          if (c.y + c.h > o.y && c.y + c.h < o.y + 16 && c.vy >= 0) {
            c.y = o.y - c.h;
            c.vy = 0;
            if (Math.abs(c.vx) < 10) { c.settled = true; c.vx = 0; }
          }
        }
      }
      // ease rotation back when resting
      if (c.settled && Math.abs(c.angle) > 0.01) c.angle *= 0.8;
    }

    // Targets — fall when their support is gone
    for (const t of targets) {
      if (t.dead) continue;
      let supported = t.y + t.r >= groundY - 2;
      if (!supported) {
        for (const c of crates) {
          if (c.destroyed) continue;
          if (t.x > c.x - 5 && t.x < c.x + c.w + 5 && Math.abs((t.y + t.r) - c.y) < 7) {
            supported = true; break;
          }
        }
      }
      if (!supported) {
        t.settled = false;
        t.vy += GRAVITY * dt;
        t.y += t.vy * dt;
        t.x += t.vx * dt;
        if (t.y + t.r > groundY) {
          t.y = groundY - t.r;
          if (t.vy > 300) { killTarget(t, 'fall'); continue; }
          t.vy = -t.vy * 0.4;
          t.vx *= 0.7;
          if (Math.abs(t.vy) < 40) { t.vy = 0; t.settled = true; }
        }
      }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      const g = pt.kind === 1 ? -60 : pt.kind === 2 ? 520 : GRAVITY * 0.6;
      pt.vy += g * dt;
      if (pt.kind === 2) pt.vx *= 0.985;
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      if (pt.rv) pt.rot += pt.rv * dt;
      pt.life -= dt;
      if (pt.life <= 0) particles.splice(i, 1);
    }
    // Popups & rings & trail
    for (let i = popups.length - 1; i >= 0; i--) {
      const pp = popups[i];
      pp.y -= 46 * dt;
      pp.life -= realDt;
      if (pp.life <= 0) popups.splice(i, 1);
    }
    for (let i = rings.length - 1; i >= 0; i--) {
      const rg = rings[i];
      rg.life -= realDt;
      rg.r = rg.maxR * (1 - rg.life / rg.maxLife);
      if (rg.life <= 0) rings.splice(i, 1);
    }
    for (let i = trail.length - 1; i >= 0; i--) {
      trail[i].life -= realDt;
      if (trail[i].life <= 0) trail.splice(i, 1);
    }

    if (!running) return;

    // Level cleared?
    if (!clearing && totalTargets > 0 && targetsKilled >= totalTargets) {
      clearDelay += dt;
      if (clearDelay > 0.7) onLevelCleared();
      return;
    }

    // End-of-shot handling
    if (!clearing && p && p.launched && p.settled) {
      const anyMoving = crates.some(c => !c.destroyed && (!c.settled || c.fuse >= 0)) ||
                        targets.some(t => !t.dead && !t.settled);
      settleTimer += dt;
      if (anyMoving && settleTimer < 3) return;
      if (settleTimer > 0.9) {
        settleTimer = 0;
        if (ammo > 0) {
          spawnProjectile();
        } else {
          endGame(false);
        }
      }
    }
  }

  function circleRectOverlap(cx, cy, cr, rect) {
    const rx = Math.max(rect.x, Math.min(cx, rect.x + rect.w));
    const ry = Math.max(rect.y, Math.min(cy, rect.y + rect.h));
    const dx = cx - rx, dy = cy - ry;
    return dx * dx + dy * dy < cr * cr;
  }

  // ── Drawing ────────────────────────────────────────────────────────
  function draw() {
    // static pre-rendered background
    ctx.drawImage(bgCanvas, 0, 0, W, H);

    ctx.save();
    if (shake > 0.2) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }

    drawScenery();
    drawSlingshot(true);   // back arm + back band

    // aim guide
    if (aiming && projectile && !projectile.launched) drawAimGuide();

    // trail
    for (const tr of trail) {
      const a = tr.life / 0.3;
      ctx.globalAlpha = a * 0.45;
      ctx.fillStyle = '#FFD93D';
      ctx.beginPath();
      ctx.arc(tr.x, tr.y, projR * 0.55 * a + 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // crates
    for (const c of crates) {
      if (c.destroyed) continue;
      drawCrate(c);
    }
    // targets
    for (const t of targets) {
      if (t.dead) continue;
      drawTarget(t);
    }
    // projectile
    if (projectile) drawProjectile(projectile);

    drawSlingshot(false);  // front arm + front band (over the ball)

    // rings (explosions / pops)
    for (const rg of rings) {
      const a = rg.life / rg.maxLife;
      ctx.globalAlpha = a;
      ctx.strokeStyle = rg.color;
      ctx.lineWidth = 3 + 5 * a;
      ctx.beginPath();
      ctx.arc(rg.x, rg.y, rg.r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // particles
    for (const pt of particles) {
      const a = Math.max(0, pt.life / pt.maxLife);
      if (pt.kind === 1) { // smoke
        ctx.globalAlpha = a * 0.35;
        ctx.fillStyle = '#555';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, pt.size * (1.6 - a * 0.6), 0, Math.PI * 2);
        ctx.fill();
      } else if (pt.kind === 2) { // confetti
        ctx.globalAlpha = Math.min(1, a * 1.6);
        ctx.fillStyle = pt.color;
        ctx.save();
        ctx.translate(pt.x, pt.y);
        ctx.rotate(pt.rot);
        ctx.fillRect(-pt.size / 2, -pt.size / 4, pt.size, pt.size / 2);
        ctx.restore();
      } else { // shards
        ctx.globalAlpha = a;
        ctx.fillStyle = pt.color;
        ctx.fillRect(pt.x - pt.size / 2, pt.y - pt.size / 2, pt.size, pt.size);
      }
    }
    ctx.globalAlpha = 1;

    // score popups
    if (popups.length) {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (const pp of popups) {
        const a = Math.min(1, pp.life / pp.maxLife * 2);
        ctx.globalAlpha = a;
        ctx.font = '900 ' + pp.size + 'px system-ui, Arial';
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 3;
        ctx.strokeText(pp.text, pp.x, pp.y);
        ctx.fillStyle = pp.color;
        ctx.fillText(pp.text, pp.x, pp.y);
      }
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  function drawScenery() {
    // clouds
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    for (const cl of clouds) {
      const s = cl.s;
      ctx.beginPath();
      ctx.arc(cl.x, cl.y, 20 * s, 0, Math.PI * 2);
      ctx.arc(cl.x + 20 * s, cl.y + 2 * s, 16 * s, 0, Math.PI * 2);
      ctx.arc(cl.x + 38 * s, cl.y + 6 * s, 13 * s, 0, Math.PI * 2);
      ctx.arc(cl.x + 14 * s, cl.y - 9 * s, 15 * s, 0, Math.PI * 2);
      ctx.fill();
    }
    // birds
    ctx.strokeStyle = 'rgba(40,60,80,0.6)';
    ctx.lineWidth = 2;
    for (const bd of birds) {
      const f = Math.sin(bd.ph) * 4;
      ctx.beginPath();
      ctx.moveTo(bd.x - 7, bd.y - f);
      ctx.quadraticCurveTo(bd.x - 3, bd.y + 2, bd.x, bd.y);
      ctx.quadraticCurveTo(bd.x + 3, bd.y + 2, bd.x + 7, bd.y - f);
      ctx.stroke();
    }
  }

  function bandAnchor(front) {
    return { x: slingX + (front ? 13 : -13), y: slingY - 12 };
  }

  function drawSlingshot(back) {
    ctx.lineCap = 'round';
    if (back) {
      // base post
      const g = ctx.createLinearGradient(slingX - 7, 0, slingX + 7, 0);
      g.addColorStop(0, '#7a4f2a'); g.addColorStop(0.5, '#9c6b3d'); g.addColorStop(1, '#5a3a1f');
      ctx.fillStyle = g;
      ctx.fillRect(slingX - 6, slingY + 6, 12, slingH - 6);
      // arms
      ctx.lineWidth = 10;
      ctx.strokeStyle = '#6b4423';
      ctx.beginPath();
      ctx.moveTo(slingX, slingY + 12);
      ctx.quadraticCurveTo(slingX - 13, slingY - 2, slingX - 14, slingY - 13);
      ctx.moveTo(slingX, slingY + 12);
      ctx.quadraticCurveTo(slingX + 13, slingY - 2, slingX + 14, slingY - 13);
      ctx.stroke();
    }

    // bands
    const p = projectile;
    let bx = null, by = null;
    if (p && !p.launched) { bx = p.x; by = p.y; }
    else if (bandSnap > 0) {
      // springy snap-back animation after release
      const k = 1 - bandSnap / 0.16;
      const ox = bandSnapX + (slingX - bandSnapX) * k;
      const oy = bandSnapY + (slingY - bandSnapY) * k;
      const wob = Math.sin(k * Math.PI * 3) * 8 * (1 - k);
      bx = ox + wob; by = oy;
    }
    if (bx !== null) {
      const a = bandAnchor(!back);
      const stretch = Math.sqrt((bx - slingX) * (bx - slingX) + (by - slingY) * (by - slingY)) / maxPull;
      ctx.strokeStyle = back ? '#3d2410' : '#54331a';
      ctx.lineWidth = Math.max(2.5, 6 - stretch * 3.2);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(bx, by);
      ctx.stroke();
      // pouch
      if (!back && p && !p.launched) {
        ctx.fillStyle = '#54331a';
        ctx.beginPath();
        ctx.ellipse(bx, by, projR * 0.9, projR * 0.55, Math.atan2(by - slingY, bx - slingX), 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawAimGuide() {
    const dist = Math.sqrt(pullX * pullX + pullY * pullY);
    if (dist < 14) return;
    const power = Math.min(maxPull, dist) * POWER;
    let px = projectile.x, py = projectile.y;
    let vx = (-pullX / dist) * power;
    let vy = (-pullY / dist) * power;
    const step = 1 / 60;
    const pct = Math.min(1, dist / maxPull);
    for (let i = 0; i < 26; i++) {
      vy += GRAVITY * step;
      px += vx * step;
      py += vy * step;
      if (py > groundY) break;
      if (i % 2) continue;
      ctx.globalAlpha = 0.85 - i * 0.028;
      ctx.fillStyle = pct > 0.85 ? '#FFD93D' : '#ffffff';
      ctx.beginPath();
      ctx.arc(px, py, 4.2 - i * 0.09, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // power arc around sling
    ctx.strokeStyle = pct > 0.85 ? 'rgba(255,217,61,0.9)' : 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.arc(slingX, slingY, maxPull * 0.32, -Math.PI / 2, -Math.PI / 2 + pct * Math.PI * 2);
    ctx.stroke();
  }

  function drawCrate(c) {
    const spr = sprites[c.type];
    ctx.save();
    ctx.translate(c.x + c.w / 2, c.y + c.h / 2);
    if (c.angle) ctx.rotate(c.angle);
    ctx.drawImage(spr, -c.w / 2, -c.h / 2, c.w, c.h);
    // TNT fuse flash
    if (c.fuse >= 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + (0.35 + 0.45 * Math.sin(worldT * 40)) + ')';
      ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    }
    // damage cracks
    if (c.hp < c.maxHp) {
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-c.w / 3, -c.h / 3);
      ctx.lineTo(-c.w / 12, -c.h / 12);
      ctx.lineTo(c.w / 5, c.h / 3);
      ctx.moveTo(c.w / 3, -c.h / 4);
      ctx.lineTo(c.w / 8, c.h / 10);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawTarget(t) {
    const wob = t.settled ? Math.sin(worldT * 3 + t.ph) * 0.06 : 0;
    // scared when the ball flies close
    let scared = false;
    let lookX = 0, lookY = 0;
    const p = projectile;
    if (p && p.launched && !p.settled) {
      const dx = p.x - t.x, dy = p.y - t.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < 150 * 150) scared = true;
      const d = Math.sqrt(d2) || 1;
      lookX = (dx / d) * 2; lookY = (dy / d) * 1.5;
    }
    // blink cycle
    t.blink -= 0.016;
    if (t.blink < -0.12) t.blink = 1.6 + Math.random() * 2.4;
    const eyesClosed = t.blink < 0 && !scared;

    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.scale(1 + wob, 1 - wob);

    // body
    const r = t.r;
    const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 2, 0, 0, r);
    grad.addColorStop(0, '#c780fa');
    grad.addColorStop(1, '#7b3eaa');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(40,5,70,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // ears
    ctx.fillStyle = '#9b5de5';
    ctx.beginPath();
    ctx.arc(-r * 0.62, -r * 0.75, r * 0.28, 0, Math.PI * 2);
    ctx.arc(r * 0.62, -r * 0.75, r * 0.28, 0, Math.PI * 2);
    ctx.fill();
    // cheeks
    ctx.fillStyle = 'rgba(255,130,170,0.5)';
    ctx.beginPath();
    ctx.arc(-r * 0.55, r * 0.25, r * 0.2, 0, Math.PI * 2);
    ctx.arc(r * 0.55, r * 0.25, r * 0.2, 0, Math.PI * 2);
    ctx.fill();
    // eyes
    const ew = r * 0.27;
    if (eyesClosed) {
      ctx.strokeStyle = '#2a0a40';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-r * 0.45, -r * 0.1); ctx.lineTo(-r * 0.15, -r * 0.1);
      ctx.moveTo(r * 0.15, -r * 0.1); ctx.lineTo(r * 0.45, -r * 0.1);
      ctx.stroke();
    } else {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-r * 0.32, -r * 0.12, ew * (scared ? 1.25 : 1), 0, Math.PI * 2);
      ctx.arc(r * 0.32, -r * 0.12, ew * (scared ? 1.25 : 1), 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a0530';
      ctx.beginPath();
      ctx.arc(-r * 0.32 + lookX, -r * 0.12 + lookY, ew * 0.5, 0, Math.PI * 2);
      ctx.arc(r * 0.32 + lookX, -r * 0.12 + lookY, ew * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    // mouth
    ctx.strokeStyle = '#2a0a40';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    if (scared) {
      ctx.arc(0, r * 0.4, r * 0.22, 0, Math.PI * 2);
      ctx.fillStyle = '#2a0a40';
      ctx.fill();
    } else {
      ctx.arc(0, r * 0.25, r * 0.32, 0.25, Math.PI - 0.25);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawProjectile(p) {
    const spr = sprites.ball;
    const sz = projR * 2 + 4;
    // glow when fully pulled
    if (!p.launched) {
      const pct = Math.sqrt(pullX * pullX + pullY * pullY) / maxPull;
      if (pct > 0.1) {
        ctx.globalAlpha = 0.25 + pct * 0.3;
        ctx.fillStyle = '#FFD93D';
        ctx.beginPath();
        ctx.arc(p.x, p.y, projR + 6 + pct * 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
    ctx.save();
    ctx.translate(p.x, p.y);
    if (p.launched) {
      // squash & stretch along velocity
      if (p.stretch > 1.01) {
        ctx.rotate(Math.atan2(p.vy, p.vx));
        ctx.scale(p.stretch, 2 - p.stretch);
        ctx.rotate(-Math.atan2(p.vy, p.vx));
      }
      ctx.rotate(p.angle);
    }
    ctx.drawImage(spr, -sz / 2, -sz / 2, sz, sz);
    ctx.restore();
  }

  // ── Init ───────────────────────────────────────────────────────────
  if (best > 0) {
    bestRow.classList.remove('hidden');
    bestScoreEl.textContent = best;
  }
  measure();
  // idle animation behind the start overlay
  spawnProjectile();
  running = false;
  draw();
  // WebView sometimes reports 0×0 on first paint — re-measure a few times
  [60, 250, 600, 1500].forEach(t => setTimeout(() => { measure(); if (!running) draw(); }, t));
})();
</script>
</body>
</html>
