<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>المقلاع الذهبي</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    background: linear-gradient(180deg, #87CEEB 0%, #B4E0F5 60%, #D4ECF8 100%);
    color: #fff;
    touch-action: none;
    position: fixed;
    inset: 0;
  }
  #game { position: absolute; inset: 0; overflow: hidden; }
  canvas#scene { position: absolute; inset: 0; display: block; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 10;
    pointer-events: none;
  }
  .pill {
    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 17px;
    font-weight: 800;
    display: flex; align-items: center; gap: 6px;
  }

  .level-banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    background: linear-gradient(135deg, #FFD93D, #FF9F45);
    color: #2a1a00;
    padding: 14px 32px;
    border-radius: 14px;
    font-size: 24px;
    font-weight: 900;
    opacity: 0;
    transition: transform 0.4s cubic-bezier(.5,1.6,.6,1), opacity 0.3s;
    pointer-events: none;
    z-index: 50;
    box-shadow: 0 6px 20px rgba(255,217,61,0.5);
  }
  .level-banner.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* Overlays */
  .overlay {
    position: absolute; inset: 0;
    background: rgba(20,30,55,0.85);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100;
    text-align: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }
  .overlay h1 { font-size: 36px; margin-bottom: 12px; }
  .overlay p { font-size: 16px; margin-bottom: 22px; opacity: 0.85; line-height: 1.6; max-width: 280px; }
  .stat-row { display: flex; gap: 26px; margin-bottom: 20px; }
  .stat { text-align: center; }
  .stat-label { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 800; color: #FFD93D; }
  .big-score { font-size: 64px; font-weight: 900; margin: 6px 0 22px; color: #FFD93D; text-shadow: 0 4px 14px rgba(0,0,0,0.5); }
  .btn {
    background: linear-gradient(135deg, #FFD93D, #FF9F45);
    color: #2a1a00;
    border: none;
    font-family: inherit;
    font-size: 19px;
    font-weight: 900;
    padding: 14px 42px;
    border-radius: 999px;
    box-shadow: 0 6px 0 #b87f00, 0 8px 16px rgba(0,0,0,0.3);
    transition: transform 80ms, box-shadow 80ms;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #b87f00; }
  .hint { font-size: 13px; opacity: 0.7; margin-top: 14px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="game">
  <canvas id="scene" width="400" height="800"></canvas>

  <div id="hud">
    <div class="pill">🎯 المرحلة <span id="level">١</span></div>
    <div class="pill">🔫 <span id="ammo">3</span></div>
    <div class="pill">⭐ <span id="score">0</span></div>
  </div>

  <div class="level-banner" id="levelBanner">المرحلة ١</div>

  <div id="start" class="overlay">
    <h1>🎯 المقلاع الذهبي</h1>
    <p>اسحب من الكرة لتصويب القذيفة<br>اترك إصبعك لإطلاقها<br>أسقط جميع الأهداف بأقل عدد محاولات!</p>
    <button class="btn" id="startBtn">ابدأ اللعب</button>
    <div class="hint">٣ محاولات لكل مرحلة</div>
  </div>

  <div id="end" class="overlay hidden">
    <h1 id="endTitle">انتهت اللعبة!</h1>
    <div class="stat-row">
      <div class="stat">
        <div class="stat-label">المراحل</div>
        <div class="stat-value" id="finalLevel">١</div>
      </div>
      <div class="stat">
        <div class="stat-label">أهداف</div>
        <div class="stat-value" id="finalTargets">0</div>
      </div>
    </div>
    <div class="big-score" id="finalScore">0</div>
    <button class="btn" id="restartBtn">العب مرة أخرى</button>
  </div>
</div>

<script>
(function () {
  // ── DOM ────────────────────────────────────────────────────────────
  const game        = document.getElementById('game');
  const canvas      = document.getElementById('scene');
  const ctx         = canvas.getContext('2d');
  const levelEl     = document.getElementById('level');
  const ammoEl      = document.getElementById('ammo');
  const scoreEl     = document.getElementById('score');
  const banner      = document.getElementById('levelBanner');
  const startView   = document.getElementById('start');
  const endView     = document.getElementById('end');
  const startBtn    = document.getElementById('startBtn');
  const restartBtn  = document.getElementById('restartBtn');
  const finalScore  = document.getElementById('finalScore');
  const finalLevel  = document.getElementById('finalLevel');
  const finalTargs  = document.getElementById('finalTargets');
  const endTitle    = document.getElementById('endTitle');

  // ── State ──────────────────────────────────────────────────────────
  let W = 400, H = 800;
  let groundY = 700;
  let slingX = 80, slingY = 0;
  const slingHeight = 100;
  const projR = 16;

  let projectile = null;    // {x,y,vx,vy,launched,settled}
  let crates = [];          // {x,y,w,h,vx,vy,angle,angVel,destroyed,hp}
  let targets = [];         // {x,y,r,vx,vy,dead,settled}
  let particles = [];
  let ammo = 3;
  let level = 1;
  let score = 0;
  let totalTargets = 0;
  let targetsKilled = 0;
  let running = false;
  let aiming = false;
  let aimX = 0, aimY = 0;
  let lastTime = 0;
  let rafId = null;
  let nextShotTimer = 0;

  // Physics constants
  const GRAVITY = 1400;
  const FRICTION = 0.985;
  const BOUNCE = 0.45;
  const MAX_PULL = 130;

  // ── Sizing ─────────────────────────────────────────────────────────
  function measure() {
    const rect = game.getBoundingClientRect();
    const w = Math.max(280, Math.floor(rect.width  || game.clientWidth  || window.innerWidth  || 360));
    const h = Math.max(420, Math.floor(rect.height || game.clientHeight || window.innerHeight || 640));
    if (w === W && h === H) return false;
    W = w; H = h;
    canvas.width  = W;
    canvas.height = H;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    groundY = Math.floor(H * 0.86);
    slingX = Math.floor(W * 0.18);
    slingY = groundY - slingHeight;
    return true;
  }
  if (window.ResizeObserver) {
    new ResizeObserver(() => { if (measure()) { rebuildLevel(); draw(); } }).observe(game);
  }
  window.addEventListener('resize', measure);
  window.addEventListener('orientationchange', () => setTimeout(() => { measure(); draw(); }, 100));

  // ── Buttons ────────────────────────────────────────────────────────
  function bindButton(el, fn) {
    el.addEventListener('click', fn);
    el.addEventListener('touchend', (e) => { e.preventDefault(); fn(); }, { passive: false });
  }
  bindButton(startBtn, startGame);
  bindButton(restartBtn, startGame);

  // ── Input — drag from sling, release to launch ─────────────────────
  function getPoint(e) {
    const r = canvas.getBoundingClientRect();
    if (e.touches && e.touches.length) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
    if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX - r.left, y: e.changedTouches[0].clientY - r.top };
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  function canAim() {
    return running && projectile && !projectile.launched;
  }
  function onDown(e) {
    if (!canAim()) return;
    e.preventDefault();
    aiming = true;
    const p = getPoint(e);
    aimX = p.x; aimY = p.y;
  }
  function onMove(e) {
    if (!aiming) return;
    e.preventDefault();
    const p = getPoint(e);
    aimX = p.x; aimY = p.y;
    // Drag the projectile visually with the finger, clamped to a radius around the sling
    let dx = p.x - slingX;
    let dy = p.y - slingY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const clamped = Math.min(MAX_PULL, dist);
    if (dist > 0) {
      projectile.x = slingX + (dx / dist) * clamped;
      projectile.y = slingY + (dy / dist) * clamped;
    }
  }
  function onUp(e) {
    if (!aiming) return;
    e.preventDefault();
    aiming = false;
    // Launch direction = from current ball position back toward sling, then beyond
    const dx = slingX - projectile.x;
    const dy = slingY - projectile.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 12) {
      // Too short — snap back
      projectile.x = slingX;
      projectile.y = slingY;
      return;
    }
    const power = Math.min(MAX_PULL, dist) * 9; // tune launch strength
    projectile.vx = (dx / dist) * power;
    projectile.vy = (dy / dist) * power;
    projectile.launched = true;
  }
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove',  onMove, { passive: false });
  canvas.addEventListener('touchend',   onUp,   { passive: false });
  canvas.addEventListener('mousedown',  onDown);
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseup',    onUp);

  // ── Level building ─────────────────────────────────────────────────
  function buildLevel(n) {
    crates = [];
    targets = [];

    // Base stage shifts position with level, but always to the right of the sling
    const stageX = Math.max(W * 0.55, slingX + 220);
    const stageWAvailable = W - stageX - 30;

    // Crate sizes
    const cw = 36, ch = 36;

    // Layouts grow more complex with level
    const layouts = [
      // 1 — single short stack with one target on top
      {
        crates: [
          [stageX,        groundY - ch],
          [stageX + cw,   groundY - ch],
          [stageX,        groundY - ch * 2],
        ],
        targets: [
          [stageX + cw / 2, groundY - ch * 2 - 18],
        ],
      },
      // 2 — small tower
      {
        crates: [
          [stageX,        groundY - ch],
          [stageX + cw,   groundY - ch],
          [stageX + cw * 2, groundY - ch],
          [stageX + cw / 2,     groundY - ch * 2],
          [stageX + cw * 1.5,   groundY - ch * 2],
        ],
        targets: [
          [stageX + cw * 0.5 + cw / 2, groundY - ch * 2 - 18],
          [stageX + cw * 2 + cw / 2,   groundY - ch - 18],
        ],
      },
      // 3 — two-column tower
      {
        crates: [
          [stageX,        groundY - ch],
          [stageX + cw,   groundY - ch],
          [stageX + cw * 2, groundY - ch],
          [stageX,        groundY - ch * 2],
          [stageX + cw * 2, groundY - ch * 2],
          [stageX + cw,   groundY - ch * 3],
        ],
        targets: [
          [stageX + cw / 2,     groundY - ch * 2 - 18],
          [stageX + cw * 2.5,   groundY - ch * 2 - 18],
          [stageX + cw * 1.5,   groundY - ch * 3 - 18],
        ],
      },
      // 4 — pyramid + floor target
      {
        crates: [
          [stageX,         groundY - ch],
          [stageX + cw,    groundY - ch],
          [stageX + cw*2,  groundY - ch],
          [stageX + cw*3,  groundY - ch],
          [stageX + cw*0.5,groundY - ch * 2],
          [stageX + cw*1.5,groundY - ch * 2],
          [stageX + cw*2.5,groundY - ch * 2],
          [stageX + cw,    groundY - ch * 3],
          [stageX + cw*2,  groundY - ch * 3],
        ],
        targets: [
          [stageX + cw * 1.5, groundY - ch * 3 - 18],
          [stageX + cw * 2.5, groundY - ch * 3 - 18],
          [stageX + cw * 3 + cw / 2, groundY - 18],
        ],
      },
    ];

    const layout = layouts[Math.min(n - 1, layouts.length - 1)];

    // Scale layout horizontally if stage is too narrow
    let shift = 0;
    const minX = layout.crates.reduce((m, [x]) => Math.min(m, x), Infinity);
    const maxX = layout.crates.reduce((m, [x]) => Math.max(m, x + cw), -Infinity);
    const layoutW = maxX - minX;
    if (layoutW > stageWAvailable) {
      shift = -(layoutW - stageWAvailable);
    }

    for (const [x, y] of layout.crates) {
      crates.push({
        x: x + shift, y, w: cw, h: ch,
        vx: 0, vy: 0, angle: 0, angVel: 0,
        destroyed: false, hp: 2, settled: true,
      });
    }
    for (const [x, y] of layout.targets) {
      targets.push({
        x: x + shift, y, r: 16,
        vx: 0, vy: 0, dead: false, settled: true,
      });
    }
    totalTargets = targets.length;
    targetsKilled = 0;
  }

  function rebuildLevel() {
    if (running) buildLevel(level);
  }

  function spawnProjectile() {
    projectile = {
      x: slingX, y: slingY,
      vx: 0, vy: 0,
      launched: false, settled: false, age: 0,
    };
  }

  // ── Game flow ──────────────────────────────────────────────────────
  function startGame() {
    measure();
    level = 1; score = 0; ammo = 3;
    particles = [];
    running = true;
    scoreEl.textContent = '0';
    ammoEl.textContent  = ammo;
    levelEl.textContent = toArabicNum(1);
    startView.classList.add('hidden');
    endView.classList.add('hidden');

    buildLevel(level);
    spawnProjectile();
    showBanner('المرحلة ' + toArabicNum(level));

    lastTime = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function endGame(title) {
    running = false;
    endTitle.textContent = title;
    finalScore.textContent = score;
    finalLevel.textContent = toArabicNum(level);
    finalTargs.textContent = (targetsKilled).toString();
    endView.classList.remove('hidden');
  }

  function nextLevel() {
    level++;
    score += 50 + ammo * 25; // remaining ammo bonus
    scoreEl.textContent = score;
    ammo = 3;
    ammoEl.textContent  = ammo;
    levelEl.textContent = toArabicNum(level);
    showBanner('المرحلة ' + toArabicNum(level));
    buildLevel(level);
    spawnProjectile();
  }

  function showBanner(text) {
    banner.textContent = text;
    banner.classList.add('show');
    setTimeout(() => banner.classList.remove('show'), 1400);
  }

  function toArabicNum(n) {
    const digits = '٠١٢٣٤٥٦٧٨٩';
    return String(n).split('').map(c => digits[+c] ?? c).join('');
  }

  function loop(now) {
    if (!running && particles.length === 0) { rafId = null; return; }
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    draw();
    rafId = requestAnimationFrame(loop);
  }

  // ── Physics ────────────────────────────────────────────────────────
  function update(dt) {
    // Projectile
    if (projectile && projectile.launched && !projectile.settled) {
      projectile.age += dt;
      projectile.vy += GRAVITY * dt;
      projectile.x += projectile.vx * dt;
      projectile.y += projectile.vy * dt;

      // Ground
      if (projectile.y + projR > groundY) {
        projectile.y = groundY - projR;
        projectile.vy = -projectile.vy * BOUNCE;
        projectile.vx *= 0.7;
        if (Math.abs(projectile.vy) < 60) {
          projectile.vy = 0;
          projectile.settled = true;
        }
      }
      // Off-screen (right side)
      if (projectile.x - projR > W + 100) projectile.settled = true;
      if (projectile.age > 6) projectile.settled = true;

      // Hit crates
      for (const c of crates) {
        if (c.destroyed) continue;
        if (circleRectOverlap(projectile.x, projectile.y, projR, c)) {
          // Damage crate
          const speed = Math.sqrt(projectile.vx*projectile.vx + projectile.vy*projectile.vy);
          if (speed > 250) {
            c.hp -= 1;
            score += 5;
            scoreEl.textContent = score;
            spawnParticles(projectile.x, projectile.y, '#a67c52', 8);
            if (c.hp <= 0) {
              c.destroyed = true;
              score += 15;
              scoreEl.textContent = score;
              spawnParticles(c.x + c.w/2, c.y + c.h/2, '#a67c52', 16);
            }
          }
          // Bounce projectile
          const cx = c.x + c.w / 2;
          const cy = c.y + c.h / 2;
          const dx = projectile.x - cx;
          const dy = projectile.y - cy;
          if (Math.abs(dx)/c.w > Math.abs(dy)/c.h) {
            projectile.vx *= -BOUNCE;
            projectile.x = dx > 0 ? c.x + c.w + projR : c.x - projR;
          } else {
            projectile.vy *= -BOUNCE;
            projectile.y = dy > 0 ? c.y + c.h + projR : c.y - projR;
          }
          // Push the crate slightly
          if (!c.destroyed) {
            c.vx += projectile.vx * 0.15;
            c.vy += projectile.vy * 0.10;
            c.settled = false;
          }
        }
      }

      // Hit targets
      for (const t of targets) {
        if (t.dead) continue;
        const dx = projectile.x - t.x;
        const dy = projectile.y - t.y;
        if (dx*dx + dy*dy < (projR + t.r) * (projR + t.r)) {
          const speed = Math.sqrt(projectile.vx*projectile.vx + projectile.vy*projectile.vy);
          if (speed > 100) {
            t.dead = true;
            targetsKilled++;
            score += 100;
            scoreEl.textContent = score;
            spawnParticles(t.x, t.y, '#9b5de5', 20);
            // Slow projectile
            projectile.vx *= 0.4;
            projectile.vy *= 0.4;
          }
        }
      }
    }

    // Crates physics
    for (const c of crates) {
      if (c.destroyed) continue;
      if (c.settled) continue;
      c.vy += GRAVITY * dt;
      c.vx *= FRICTION;
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      c.angVel *= 0.96;
      c.angle += c.angVel * dt;

      // Ground
      if (c.y + c.h > groundY) {
        c.y = groundY - c.h;
        c.vy = -c.vy * BOUNCE;
        c.vx *= 0.7;
        if (Math.abs(c.vy) < 30) { c.vy = 0; c.settled = Math.abs(c.vx) < 8; }
      }
      // Off-screen
      if (c.x < -50 || c.x > W + 50) c.destroyed = true;

      // Crate-crate stacking (very simple — check vertical only)
      for (const o of crates) {
        if (o === c || o.destroyed) continue;
        if (Math.abs((c.x + c.w/2) - (o.x + o.w/2)) < (c.w + o.w) / 2 - 4) {
          // Sitting on top?
          if (c.y + c.h > o.y && c.y + c.h < o.y + 14 && c.vy >= 0) {
            c.y = o.y - c.h;
            c.vy = 0;
            if (Math.abs(c.vx) < 8) { c.settled = true; c.vx = 0; }
          }
        }
      }
    }

    // Targets physics — fall when their crate disappears
    for (const t of targets) {
      if (t.dead) continue;
      // Is there support directly under?
      let supported = false;
      for (const c of crates) {
        if (c.destroyed) continue;
        if (t.x > c.x - 4 && t.x < c.x + c.w + 4 && Math.abs((t.y + t.r) - c.y) < 6) {
          supported = true; break;
        }
      }
      if (!supported && t.y + t.r < groundY) {
        t.settled = false;
        t.vy += GRAVITY * dt;
        t.y += t.vy * dt;
        t.x += t.vx * dt;
        if (t.y + t.r > groundY) {
          t.y = groundY - t.r;
          t.vy = -t.vy * 0.4;
          t.vx *= 0.7;
          // Killed by fall
          if (Math.abs(t.vy) < 30 && t.fallen) {
            t.dead = true;
            targetsKilled++;
            score += 60; // fall kill bonus (less than direct hit)
            scoreEl.textContent = score;
            spawnParticles(t.x, t.y, '#9b5de5', 16);
          }
          t.fallen = true;
        }
      }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.vy += GRAVITY * 0.6 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Check end-of-shot
    if (projectile && projectile.launched && projectile.settled) {
      nextShotTimer += dt;
      if (nextShotTimer > 1.2) {
        nextShotTimer = 0;
        if (targetsKilled >= totalTargets) {
          // Level cleared
          setTimeout(() => { if (running) nextLevel(); }, 200);
          projectile = null;
        } else if (ammo > 1) {
          ammo--;
          ammoEl.textContent = ammo;
          spawnProjectile();
        } else {
          ammo = 0;
          ammoEl.textContent = ammo;
          if (targetsKilled >= totalTargets) {
            setTimeout(() => { if (running) nextLevel(); }, 200);
          } else {
            endGame('انتهت الذخيرة!');
          }
          projectile = null;
        }
      }
    }
  }

  function circleRectOverlap(cx, cy, cr, rect) {
    const rx = Math.max(rect.x, Math.min(cx, rect.x + rect.w));
    const ry = Math.max(rect.y, Math.min(cy, rect.y + rect.h));
    const dx = cx - rx, dy = cy - ry;
    return dx*dx + dy*dy < cr*cr;
  }

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 80 + Math.random() * 200;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 60,
        life: 0.6 + Math.random() * 0.3,
        maxLife: 0.9,
        color,
        size: 3 + Math.random() * 3,
      });
    }
  }

  // ── Drawing ────────────────────────────────────────────────────────
  function draw() {
    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, groundY);
    sky.addColorStop(0, '#87CEEB');
    sky.addColorStop(1, '#D4ECF8');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, groundY);

    // Clouds
    drawCloud(W * 0.2, 90, 0.9);
    drawCloud(W * 0.7, 60, 1.1);
    drawCloud(W * 0.4, 140, 0.7);

    // Hills (distant)
    ctx.fillStyle = '#6db053';
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    for (let x = 0; x <= W; x += 30) {
      const y = groundY - 50 - Math.sin(x * 0.018) * 22 - Math.cos(x * 0.012) * 14;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, groundY);
    ctx.closePath();
    ctx.fill();

    // Ground
    const groundGrad = ctx.createLinearGradient(0, groundY, 0, H);
    groundGrad.addColorStop(0, '#4a7c3a');
    groundGrad.addColorStop(0.15, '#5a3a1f');
    groundGrad.addColorStop(1, '#3a2510');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, groundY, W, H - groundY);
    // Grass strip
    ctx.fillStyle = '#5d9846';
    ctx.fillRect(0, groundY, W, 6);

    // Slingshot (Y-shape)
    drawSlingshot();

    // Trajectory dots when aiming
    if (aiming && projectile && !projectile.launched) {
      drawAimGuide();
    }

    // Crates
    for (const c of crates) {
      if (c.destroyed) continue;
      drawCrate(c);
    }

    // Targets
    for (const t of targets) {
      if (t.dead) continue;
      drawTarget(t);
    }

    // Projectile
    if (projectile) {
      drawProjectile(projectile);
    }

    // Particles
    for (const p of particles) {
      const a = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  function drawCloud(x, y, scale) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.arc(x, y, 22 * scale, 0, Math.PI * 2);
    ctx.arc(x + 22 * scale, y, 18 * scale, 0, Math.PI * 2);
    ctx.arc(x + 42 * scale, y + 6 * scale, 16 * scale, 0, Math.PI * 2);
    ctx.arc(x + 16 * scale, y - 10 * scale, 18 * scale, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawSlingshot() {
    // Posts
    ctx.fillStyle = '#5a3a1f';
    ctx.fillRect(slingX - 5, slingY + 5, 10, slingHeight - 5);
    // Y arms
    ctx.lineWidth = 9;
    ctx.strokeStyle = '#5a3a1f';
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(slingX, slingY + 10);
    ctx.lineTo(slingX - 14, slingY - 12);
    ctx.moveTo(slingX, slingY + 10);
    ctx.lineTo(slingX + 14, slingY - 12);
    ctx.stroke();
    // Rubber bands going to the projectile (only show when projectile present)
    if (projectile && !projectile.launched) {
      ctx.strokeStyle = '#2a1505';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(slingX - 14, slingY - 12);
      ctx.lineTo(projectile.x, projectile.y);
      ctx.lineTo(slingX + 14, slingY - 12);
      ctx.stroke();
    }
  }

  function drawAimGuide() {
    // Show a trajectory preview using simulated short arc
    const dx = slingX - projectile.x;
    const dy = slingY - projectile.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 12) return;
    const power = Math.min(MAX_PULL, dist) * 9;
    let px = projectile.x, py = projectile.y;
    let vx = (dx / dist) * power;
    let vy = (dy / dist) * power;
    const step = 1 / 60;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    for (let i = 0; i < 24; i++) {
      vy += GRAVITY * step;
      px += vx * step;
      py += vy * step;
      if (py > groundY) break;
      ctx.globalAlpha = 0.7 - i * 0.025;
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawCrate(c) {
    ctx.save();
    ctx.translate(c.x + c.w / 2, c.y + c.h / 2);
    ctx.rotate(c.angle);
    // Body
    const grad = ctx.createLinearGradient(-c.w/2, -c.h/2, c.w/2, c.h/2);
    grad.addColorStop(0, '#c69875');
    grad.addColorStop(1, '#8b5a2b');
    ctx.fillStyle = grad;
    ctx.fillRect(-c.w/2, -c.h/2, c.w, c.h);
    // Plank lines
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-c.w/2, -c.h/6);
    ctx.lineTo(c.w/2, -c.h/6);
    ctx.moveTo(-c.w/2, c.h/6);
    ctx.lineTo(c.w/2, c.h/6);
    ctx.stroke();
    // Border
    ctx.strokeStyle = '#5a3a1f';
    ctx.lineWidth = 2;
    ctx.strokeRect(-c.w/2, -c.h/2, c.w, c.h);
    // Damage cracks if hp low
    if (c.hp <= 1) {
      ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath();
      ctx.moveTo(-c.w/3, -c.h/3);
      ctx.lineTo(0, 0);
      ctx.lineTo(c.w/4, c.h/3);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawTarget(t) {
    // Body (purple blob with eyes)
    const grad = ctx.createRadialGradient(t.x - 4, t.y - 4, 2, t.x, t.y, t.r);
    grad.addColorStop(0, '#c780fa');
    grad.addColorStop(1, '#7b3eaa');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
    ctx.fill();
    // Outline
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(t.x - 5, t.y - 2, 4, 0, Math.PI * 2);
    ctx.arc(t.x + 5, t.y - 2, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(t.x - 4, t.y - 1, 2, 0, Math.PI * 2);
    ctx.arc(t.x + 6, t.y - 1, 2, 0, Math.PI * 2);
    ctx.fill();
    // Mouth
    ctx.strokeStyle = '#2a0a40';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(t.x, t.y + 4, 5, 0.2, Math.PI - 0.2);
    ctx.stroke();
  }

  function drawProjectile(p) {
    // Glow
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, projR + 8);
    g.addColorStop(0, 'rgba(255,217,61,0.55)');
    g.addColorStop(1, 'rgba(255,217,61,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(p.x, p.y, projR + 8, 0, Math.PI * 2);
    ctx.fill();
    // Body
    const grad = ctx.createRadialGradient(p.x - 5, p.y - 5, 2, p.x, p.y, projR);
    grad.addColorStop(0, '#fff5b3');
    grad.addColorStop(1, '#FFD93D');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, projR, 0, Math.PI * 2);
    ctx.fill();
    // Outline
    ctx.strokeStyle = '#b87f00';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(p.x - 5, p.y - 6, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Init ───────────────────────────────────────────────────────────
  measure();
  draw();
  [50, 200, 500, 1500].forEach(t => setTimeout(() => { measure(); draw(); }, t));
})();
</script>
</body>
</html>
