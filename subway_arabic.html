<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>جري السكة</title>
<style>
* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
  -webkit-touch-callout: none;
}
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  touch-action: none; position: fixed; inset: 0;
  font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
  background: #1a1a2e;
}
.hidden { display: none !important; }

#gameCanvas {
  position: absolute; top: 0; left: 0;
  display: block;
}

/* HUD */
#hud {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 10px 12px; pointer-events: none; z-index: 10;
}
.hud-pill {
  background: rgba(0,0,0,0.6);
  color: #fff; font-size: 15px; font-weight: 700;
  padding: 6px 14px; border-radius: 999px;
  display: flex; align-items: center; gap: 5px;
}
.lives-pill { color: #ff6b6b; }

/* START SCREEN */
#startScreen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(160deg, #0f3460 0%, #16213e 50%, #0f3460 100%);
  z-index: 20; padding: 24px;
}
.game-title {
  font-size: 48px; font-weight: 900; color: #fff;
  text-shadow: 0 4px 20px rgba(255,200,0,0.6);
  margin-bottom: 6px; letter-spacing: -1px;
}
.game-subtitle {
  font-size: 20px; color: #ffd700;
  margin-bottom: 30px; font-weight: 600;
}
.train-emoji {
  font-size: 80px; margin-bottom: 20px;
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
  animation: none;
}
.how-to-play {
  background: rgba(255,255,255,0.1);
  border-radius: 20px; padding: 16px 20px;
  margin-bottom: 28px; max-width: 320px; width: 100%;
}
.how-to-play p {
  color: #e0e0ff; font-size: 14px; line-height: 1.8;
  text-align: center;
}
.how-to-play strong { color: #ffd700; }

.btn-start {
  background: #ffd700; color: #1a1a2e;
  font-size: 22px; font-weight: 900;
  padding: 16px 48px; border-radius: 999px;
  border: none; cursor: pointer;
  box-shadow: 0 6px 0 #b8960c;
  transition: transform 0.1s, box-shadow 0.1s;
  font-family: inherit; min-width: 200px;
}
.btn-start:active { transform: translateY(3px); box-shadow: 0 3px 0 #b8960c; }

/* END SCREEN */
#endScreen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85);
  z-index: 20; padding: 24px;
}
.end-card {
  background: linear-gradient(160deg, #1a1a4e, #0f3460);
  border-radius: 28px; padding: 32px 28px;
  max-width: 340px; width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  border: 2px solid rgba(255,215,0,0.3);
}
.end-title { font-size: 32px; font-weight: 900; color: #ffd700; margin-bottom: 8px; }
.end-emoji { font-size: 64px; margin: 12px 0; }
.score-label { color: #aaa; font-size: 14px; margin-bottom: 4px; }
.score-big { font-size: 52px; font-weight: 900; color: #fff; margin-bottom: 4px; }
.score-meters { font-size: 18px; color: #80d8ff; margin-bottom: 24px; }
.btn-replay {
  background: #ff6b6b; color: #fff;
  font-size: 20px; font-weight: 900;
  padding: 15px 40px; border-radius: 999px;
  border: none; cursor: pointer;
  box-shadow: 0 6px 0 #c0392b;
  transition: transform 0.1s, box-shadow 0.1s;
  font-family: inherit; min-width: 200px;
}
.btn-replay:active { transform: translateY(3px); box-shadow: 0 3px 0 #c0392b; }

/* SWIPE HINT */
#swipeHint {
  position: absolute; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.5); color: #fff;
  font-size: 13px; padding: 6px 16px; border-radius: 999px;
  pointer-events: none; z-index: 9;
  opacity: 1; transition: opacity 0.5s;
}

/* COIN PARTICLE */
.coin-pop {
  position: absolute; pointer-events: none;
  font-size: 22px; z-index: 15;
  animation: none;
}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud" class="hidden">
  <div class="hud-pill">🏅 <span id="scoreDisplay">0</span></div>
  <div class="hud-pill">📏 <span id="metersDisplay">0</span>م</div>
  <div class="hud-pill lives-pill">❤️ <span id="livesDisplay">3</span></div>
</div>

<div id="swipeHint" class="hidden">← مرر يميناً أو يساراً للتغيير • اقفز للأعلى →</div>

<div id="startScreen">
  <div class="train-emoji">🚇</div>
  <div class="game-title">جري السكة</div>
  <div class="game-subtitle">الهروب من الحارس!</div>
  <div class="how-to-play">
    <p>
      <strong>↔️ مرر</strong> يميناً أو يساراً لتغيير المسار<br>
      <strong>⬆️ مرر</strong> للأعلى للقفز<br>
      <strong>⬇️ مرر</strong> للأسفل للانزلاق<br>
      <strong>🪙 اجمع</strong> العملات وتجنب العوائق!
    </p>
  </div>
  <button class="btn-start" id="btnStart">ابدأ اللعبة</button>
</div>

<div id="endScreen" class="hidden">
  <div class="end-card">
    <div class="end-title">انتهت اللعبة!</div>
    <div class="end-emoji" id="endEmoji">😵</div>
    <div class="score-label">النقاط</div>
    <div class="score-big" id="finalScore">0</div>
    <div class="score-meters" id="finalMeters">0 متر</div>
    <button class="btn-replay" id="btnReplay">العب مرة أخرى</button>
  </div>
</div>

<script>
(function () {
'use strict';

// ─── DOM refs ───────────────────────────────────────────────────────────────
const canvas      = document.getElementById('gameCanvas');
const ctx         = canvas.getContext('2d');
const hud         = document.getElementById('hud');
const startScreen = document.getElementById('startScreen');
const endScreen   = document.getElementById('endScreen');
const swipeHint   = document.getElementById('swipeHint');
const scoreDisp   = document.getElementById('scoreDisplay');
const metersDisp  = document.getElementById('metersDisplay');
const livesDisp   = document.getElementById('livesDisplay');
const finalScore  = document.getElementById('finalScore');
const finalMeters = document.getElementById('finalMeters');
const endEmoji    = document.getElementById('endEmoji');
const btnStart    = document.getElementById('btnStart');
const btnReplay   = document.getElementById('btnReplay');

// ─── Dimensions ─────────────────────────────────────────────────────────────
let W = 400, H = 700;
function resize() {
  W = document.documentElement.clientWidth  || window.innerWidth  || 400;
  H = document.documentElement.clientHeight || window.innerHeight || 700;
  canvas.width  = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize',            resize);
window.addEventListener('orientationchange', resize);
setTimeout(resize, 100);
setTimeout(resize, 500);

// ─── Constants ───────────────────────────────────────────────────────────────
const LANES      = 3;
const LANE_W     = () => W / LANES;
const LANE_X     = (l) => LANE_W() * l + LANE_W() / 2;
const GROUND_Y   = () => H * 0.82;
const PLAYER_W   = 40;
const PLAYER_H   = 56;
const COIN_R     = 14;

// Colors
const COLORS = {
  sky1: '#0f3460', sky2: '#16213e',
  track: '#2d2d4e',
  trackLine: '#3a3a5c',
  rail1: '#888', rail2: '#aaa',
  player: '#ffd700',
  playerOutline: '#b8960c',
  playerShoe: '#ff6b6b',
  playerEye: '#1a1a2e',
  obstacle: ['#ff6b6b','#ff8e53','#ff4757'],
  obstacleTop: ['#ff8e8e','#ffaa80','#ff7a8a'],
  coin: '#ffd700',
  coinShine: '#fff8dc',
  guard: '#e74c3c',
  guardBody: '#c0392b',
  lane: ['#1a1a4e','#1f1f5e','#1a1a4e'],
};

// ─── State ───────────────────────────────────────────────────────────────────
let state = 'start';
let score, meters, lives;
let playerLane, playerY, playerVY, isJumping, isCrouching;
let obstacles, coins, particles;
let speed, gameTime, lastTime;
let shakeAmt, shakeDur;
let hintTimer;
let guardX, guardY, guardAnim;
let bgOffset;
let laneChangeAnim; // {from, to, t}

// ─── Init Game ───────────────────────────────────────────────────────────────
function initGame() {
  score         = 0;
  meters        = 0;
  lives         = 3;
  playerLane    = 1;
  playerY       = GROUND_Y();
  playerVY      = 0;
  isJumping     = false;
  isCrouching   = false;
  obstacles     = [];
  coins         = [];
  particles     = [];
  speed         = H * 0.45;
  gameTime      = 0;
  lastTime      = null;
  shakeAmt      = 0;
  shakeDur      = 0;
  guardX        = W / 2;
  guardY        = GROUND_Y() - 20;
  guardAnim     = 0;
  bgOffset      = 0;
  laneChangeAnim = null;
  hintTimer     = 3000;
  updateHUD();
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  scoreDisp.textContent = score;
  metersDisp.textContent = Math.floor(meters);
  livesDisp.textContent  = lives;
}

// ─── Swipe detection ─────────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0, touchActive = false;

function onTouchStart(e) {
  e.preventDefault();
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchActive = true;
}
function onTouchEnd(e) {
  if (!touchActive) return;
  touchActive = false;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  handleSwipe(dx, dy);
}
function onMouseDown(e) {
  touchStartX = e.clientX;
  touchStartY = e.clientY;
  touchActive = true;
}
function onMouseUp(e) {
  if (!touchActive) return;
  touchActive = false;
  const dx = e.clientX - touchStartX;
  const dy = e.clientY - touchStartY;
  handleSwipe(dx, dy);
}

function handleSwipe(dx, dy) {
  if (state !== 'play') return;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (adx < 12 && ady < 12) return;
  if (adx > ady) {
    // horizontal
    const dir = dx > 0 ? 1 : -1; // RTL: right swipe = increase lane
    const newLane = Math.max(0, Math.min(2, playerLane + dir));
    if (newLane !== playerLane) {
      laneChangeAnim = { from: playerLane, to: newLane, t: 0 };
      playerLane = newLane;
    }
  } else {
    if (dy < -30) {
      // swipe up → jump
      if (!isJumping) {
        isJumping = true;
        isCrouching = false;
        playerVY = -H * 0.68;
      }
    } else if (dy > 30) {
      // swipe down → crouch
      if (!isCrouching) {
        isCrouching = true;
        setTimeout(() => { isCrouching = false; }, 500);
      }
    }
  }
}

document.addEventListener('touchstart', onTouchStart, { passive: false });
document.addEventListener('touchend',   onTouchEnd,   { passive: false });
document.addEventListener('mousedown',  onMouseDown);
document.addEventListener('mouseup',    onMouseUp);

// ─── Button handlers ─────────────────────────────────────────────────────────
function addBtn(el, fn) {
  el.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); }, { passive: false });
  el.addEventListener('touchend',   (e) => { e.preventDefault(); e.stopPropagation(); fn(); }, { passive: false });
  el.addEventListener('mousedown',  (e) => e.stopPropagation());
  el.addEventListener('mouseup',    (e) => { e.stopPropagation(); fn(); });
}
addBtn(btnStart,  startGame);
addBtn(btnReplay, startGame);

function startGame() {
  startScreen.classList.add('hidden');
  endScreen.classList.add('hidden');
  hud.classList.remove('hidden');
  swipeHint.classList.remove('hidden');
  swipeHint.style.opacity = '1';
  initGame();
  state = 'play';
  requestAnimationFrame(loop);
}

function endGame() {
  state = 'end';
  hud.classList.add('hidden');
  swipeHint.classList.add('hidden');
  finalScore.textContent  = score;
  finalMeters.textContent = Math.floor(meters) + ' متر';
  endEmoji.textContent    = score > 300 ? '🏆' : score > 100 ? '😎' : '😵';
  endScreen.classList.remove('hidden');
}

// ─── Spawning ─────────────────────────────────────────────────────────────────
let obstacleTimer = 0, coinTimer = 0;

function spawnObstacle() {
  const lane = Math.floor(Math.random() * 3);
  const type = Math.random() < 0.5 ? 'barrier' : 'train';
  const h = type === 'barrier' ? PLAYER_H * 0.7 : PLAYER_H * 1.3;
  obstacles.push({
    lane, type,
    x: LANE_X(lane),
    y: -60,
    w: 44, h,
    colorIdx: Math.floor(Math.random() * 3),
  });
}

function spawnCoin() {
  const lane = Math.floor(Math.random() * 3);
  const count = Math.floor(Math.random() * 4) + 2;
  for (let i = 0; i < count; i++) {
    coins.push({
      lane,
      x: LANE_X(lane),
      y: -60 - i * 55,
      r: COIN_R,
      collected: false,
      alpha: 1,
      scale: 1,
    });
  }
}

// ─── Collision ───────────────────────────────────────────────────────────────
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw/2 < bx + bw/2 &&
         ax + aw/2 > bx - bw/2 &&
         ay - ah   < by &&
         ay        > by - bh;
}

// ─── Shake ───────────────────────────────────────────────────────────────────
function triggerShake(amt, dur) {
  shakeAmt = amt; shakeDur = dur;
}

// ─── Particles ───────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 80 + Math.random() * 120;
    particles.push({
      x, y, color,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1, scale: 1 + Math.random(),
      life: 0.6 + Math.random() * 0.3,
      t: 0,
    });
  }
}

// ─── Main loop ───────────────────────────────────────────────────────────────
function loop(ts) {
  if (state !== 'play') return;
  if (!lastTime) lastTime = ts;
  let dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  gameTime += dt;

  // Speed ramp
  speed = H * 0.45 + gameTime * H * 0.008;
  meters += speed * dt * 0.1;

  // Hint fade
  if (hintTimer > 0) {
    hintTimer -= dt * 1000;
    if (hintTimer <= 0) {
      swipeHint.style.opacity = '0';
      setTimeout(() => swipeHint.classList.add('hidden'), 500);
    }
  }

  // Bg scroll
  bgOffset = (bgOffset + speed * dt * 0.3) % H;

  // Player physics
  const groundY = GROUND_Y();
  if (isJumping) {
    playerVY += H * 1.7 * dt;
    playerY += playerVY * dt;
    if (playerY >= groundY) {
      playerY = groundY;
      playerVY = 0;
      isJumping = false;
    }
  }

  // Lane anim
  if (laneChangeAnim) {
    laneChangeAnim.t += dt * 8;
    if (laneChangeAnim.t >= 1) laneChangeAnim = null;
  }

  // Current player X (animated)
  let playerX;
  if (laneChangeAnim) {
    const ease = 1 - Math.pow(1 - laneChangeAnim.t, 3);
    playerX = LANE_X(laneChangeAnim.from) + (LANE_X(laneChangeAnim.to) - LANE_X(laneChangeAnim.from)) * ease;
  } else {
    playerX = LANE_X(playerLane);
  }

  // Spawn timers
  obstacleTimer -= dt;
  coinTimer     -= dt;
  const spawnInterval = Math.max(0.9, 2.2 - gameTime * 0.04);
  if (obstacleTimer <= 0) {
    spawnObstacle();
    obstacleTimer = spawnInterval * (0.8 + Math.random() * 0.4);
  }
  if (coinTimer <= 0) {
    spawnCoin();
    coinTimer = 1.0 + Math.random() * 0.6;
  }

  // Move obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.y += speed * dt;
    o.x = LANE_X(o.lane);
    if (o.y > H + 100) { obstacles.splice(i, 1); continue; }

    // Collision
    const ph = isCrouching ? PLAYER_H * 0.5 : PLAYER_H;
    const pyAdj = isCrouching ? playerY - PLAYER_H * 0.25 : playerY;
    const jumpingOver = isJumping && playerY < groundY - PLAYER_H * 0.4;

    if (!jumpingOver && rectsOverlap(playerX, pyAdj, PLAYER_W, ph, o.x, o.y, o.w, o.h)) {
      obstacles.splice(i, 1);
      lives--;
      updateHUD();
      triggerShake(10, 0.3);
      spawnParticles(playerX, playerY - PLAYER_H / 2, '#ff6b6b', 8);
      if (lives <= 0) { endGame(); return; }
    }
  }

  // Move coins
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.y += speed * dt;
    c.x = LANE_X(c.lane);
    if (c.y > H + 40) { coins.splice(i, 1); continue; }
    if (!c.collected) {
      const dx = playerX - c.x, dy = (playerY - PLAYER_H / 2) - c.y;
      if (Math.sqrt(dx*dx + dy*dy) < PLAYER_W * 0.8) {
        c.collected = true;
        score += 10;
        updateHUD();
        spawnParticles(c.x, c.y, '#ffd700', 5);
      }
    }
    if (c.collected) {
      c.alpha -= dt * 4;
      c.scale += dt * 5;
      if (c.alpha <= 0) { coins.splice(i, 1); }
    }
  }

  // Guard
  guardAnim += dt * (3 + gameTime * 0.05);
  const targetGX = playerX;
  guardX += (targetGX - guardX - W * 0.35) * dt * 2;
  guardY = groundY + Math.sin(guardAnim) * 3;

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 400 * dt;
    p.alpha = Math.max(0, 1 - p.t / p.life);
    if (p.t >= p.life) { particles.splice(i, 1); }
  }

  // Shake
  let sx = 0, sy = 0;
  if (shakeDur > 0) {
    shakeDur -= dt;
    sx = (Math.random() - 0.5) * shakeAmt * 2;
    sy = (Math.random() - 0.5) * shakeAmt * 2;
  }

  // Score from distance
  score = Math.max(score, Math.floor(meters * 0.5));
  updateHUD();

  // ─── DRAW ─────────────────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(sx, sy);

  drawBackground();
  drawRails();
  drawCoins(coins);
  drawObstacles(obstacles);
  drawGuard(guardX, guardY);
  drawPlayer(playerX, playerY, isCrouching, isJumping);
  drawParticles(particles);

  ctx.restore();

  requestAnimationFrame(loop);
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────
function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   '#0f3460');
  grad.addColorStop(0.6, '#16213e');
  grad.addColorStop(1,   '#1a1a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  // static stars using seeded positions
  const stars = [[0.1,0.05],[0.3,0.12],[0.5,0.03],[0.7,0.08],[0.9,0.06],
                 [0.2,0.18],[0.6,0.15],[0.8,0.22],[0.15,0.28],[0.45,0.25],
                 [0.75,0.3],[0.05,0.35],[0.55,0.33],[0.85,0.38],[0.35,0.42]];
  for (const [fx, fy] of stars) {
    ctx.beginPath();
    ctx.arc(fx * W, fy * H, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Buildings silhouette
  ctx.fillStyle = '#0a0a2e';
  drawBuildings(0);
  drawBuildings(W * 0.5);

  // Ground
  const groundY = GROUND_Y();
  const gGrad = ctx.createLinearGradient(0, groundY, 0, H);
  gGrad.addColorStop(0, '#2d2d4e');
  gGrad.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Lane separators (scrolling)
  for (let l = 1; l < LANES; l++) {
    const lx = LANE_W() * l;
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([20, 20]);
    ctx.lineDashOffset = -bgOffset;
    ctx.beginPath();
    ctx.moveTo(lx, 0);
    ctx.lineTo(lx, groundY);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawBuildings(xOff) {
  const buildings = [
    {x:0.05, w:0.1, h:0.3}, {x:0.18, w:0.08, h:0.45},
    {x:0.28, w:0.12, h:0.25},{x:0.42, w:0.07, h:0.38},
    {x:0.52, w:0.1,  h:0.22},{x:0.65, w:0.09, h:0.4},
    {x:0.77, w:0.11, h:0.28},{x:0.9,  w:0.08, h:0.35},
  ];
  const groundY = GROUND_Y();
  for (const b of buildings) {
    const bx = xOff + b.x * W * 0.5;
    const bh = b.h * groundY;
    const bw = b.w * W * 0.5;
    ctx.fillRect(bx, groundY - bh, bw, bh);
    // Windows
    ctx.fillStyle = 'rgba(255,220,100,0.3)';
    for (let wy = groundY - bh + 8; wy < groundY - 10; wy += 14) {
      for (let wx = bx + 4; wx < bx + bw - 6; wx += 10) {
        if (Math.random() > 0.3) ctx.fillRect(wx, wy, 5, 6);
      }
    }
    ctx.fillStyle = '#0a0a2e';
  }
}

function drawRails() {
  const groundY = GROUND_Y();
  // Rail ties (scrolling)
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  for (let l = 0; l < LANES; l++) {
    const lx = LANE_W() * l;
    const spacing = 30;
    for (let y = (-bgOffset % spacing); y < groundY; y += spacing) {
      ctx.fillRect(lx + 4, groundY - 20 + y % (H * 0.3 + 20) - H * 0.3 + 10, LANE_W() - 8, 5);
    }
  }
  // Two rails per lane
  for (let l = 0; l < LANES; l++) {
    const lx = LANE_W() * l;
    ctx.fillStyle = '#666';
    ctx.fillRect(lx + LANE_W() * 0.2,  groundY - 8, 4, H * 0.3);
    ctx.fillRect(lx + LANE_W() * 0.75, groundY - 8, 4, H * 0.3);
  }
}

function drawObstacles(obs) {
  for (const o of obs) {
    const x = o.x, y = o.y;
    const c  = COLORS.obstacle[o.colorIdx];
    const ct = COLORS.obstacleTop[o.colorIdx];

    if (o.type === 'barrier') {
      // Barrier: red/orange striped block
      roundRect(ctx, x - o.w/2, y - o.h, o.w, o.h, 8, c);
      // Stripe
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(x - o.w/2 + 4, y - o.h + 6, o.w - 8, 6);
      ctx.fillRect(x - o.w/2 + 4, y - o.h + 18, o.w - 8, 6);
      // Top highlight
      ctx.fillStyle = ct;
      ctx.fillRect(x - o.w/2 + 2, y - o.h + 2, o.w - 4, 5);
      // Icon
      ctx.font = '18px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('🚧', x, y - o.h / 2 + 6);
    } else {
      // Train car
      roundRect(ctx, x - o.w/2 - 4, y - o.h, o.w + 8, o.h, 12, c);
      // Windows
      ctx.fillStyle = ct;
      ctx.fillRect(x - 14, y - o.h + 10, 12, 10);
      ctx.fillRect(x + 2,  y - o.h + 10, 12, 10);
      // Wheels
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(x - 14, y - 4, 7, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 14, y - 4, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#666';
      ctx.beginPath(); ctx.arc(x - 14, y - 4, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 14, y - 4, 3, 0, Math.PI*2); ctx.fill();
    }
  }
}

function drawCoins(cs) {
  for (const c of cs) {
    if (c.alpha <= 0) continue;
    ctx.save();
    ctx.globalAlpha = c.alpha;
    ctx.translate(c.x, c.y);
    ctx.scale(c.scale, c.scale);
    // Coin body
    ctx.beginPath();
    ctx.arc(0, 0, c.r, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.coin;
    ctx.fill();
    // Shine
    ctx.beginPath();
    ctx.arc(-3, -3, c.r * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.coinShine;
    ctx.fill();
    // Symbol
    ctx.font = `${c.r * 1.2}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#b8960c';
    ctx.fillText('$', 1, 1);
    ctx.restore();
  }
}

function drawPlayer(x, y, crouching, jumping) {
  const ph = crouching ? PLAYER_H * 0.55 : PLAYER_H;
  const pw = crouching ? PLAYER_W * 1.3  : PLAYER_W;
  const topY = y - ph;
  const bodyH = ph * 0.55;
  const headR = pw * 0.38;
  const legH  = ph * 0.35;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x, GROUND_Y() + 3, pw * 0.7, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  if (crouching) {
    // Crouching body (flat oval)
    roundRect(ctx, x - pw/2, y - ph, pw, ph, 14, COLORS.player);
    ctx.fillStyle = COLORS.playerOutline;
    ctx.font = '24px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('😤', x, y - ph / 2 + 8);
    ctx.restore && ctx.restore();
    return;
  }

  // Legs (animated run)
  const legAnim = Math.sin(performance.now() * 0.01) * (jumping ? 0 : 12);
  ctx.fillStyle = '#333';
  // Left leg
  roundRect(ctx, x - pw * 0.3, y - legH, pw * 0.22, legH + 4, 6, '#444');
  // Right leg
  roundRect(ctx, x + pw * 0.08, y - legH + legAnim * 0.3, pw * 0.22, legH - legAnim * 0.3 + 4, 6, '#555');
  // Shoes
  ctx.fillStyle = COLORS.playerShoe;
  roundRect(ctx, x - pw * 0.32, y - 8, pw * 0.28, 10, 5, COLORS.playerShoe);
  roundRect(ctx, x + pw * 0.04, y - 8, pw * 0.28, 10, 5, '#ff8e53');

  // Body
  roundRect(ctx, x - pw/2 + 2, topY + legH, pw - 4, bodyH, 10, COLORS.player);
  // Jacket stripe
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(x - 4, topY + legH + 6, 8, bodyH - 12);

  // Arms (running swing)
  const armSwing = Math.sin(performance.now() * 0.01) * (jumping ? 20 : 30);
  ctx.strokeStyle = COLORS.player;
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - pw * 0.3, topY + legH + 8);
  ctx.lineTo(x - pw * 0.48, topY + legH + 20 + armSwing * 0.4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + pw * 0.3, topY + legH + 8);
  ctx.lineTo(x + pw * 0.48, topY + legH + 20 - armSwing * 0.4);
  ctx.stroke();

  // Head
  ctx.fillStyle = '#FDBCB4';
  ctx.beginPath();
  ctx.arc(x, topY + legH - 2, headR, 0, Math.PI * 2);
  ctx.fill();
  // Helmet / hat
  ctx.fillStyle = COLORS.player;
  roundRect(ctx, x - headR, topY + legH - headR * 1.8, headR * 2, headR * 0.9, 4, COLORS.player);
  ctx.fillStyle = COLORS.playerOutline;
  ctx.fillRect(x - headR - 3, topY + legH - headR * 0.9, headR * 2 + 6, 5);
  // Eyes
  ctx.fillStyle = COLORS.playerEye;
  ctx.beginPath(); ctx.arc(x - 6, topY + legH, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 6, topY + legH, 3.5, 0, Math.PI * 2); ctx.fill();
  // Smile
  ctx.strokeStyle = '#7a3b2e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, topY + legH + 3, 5, 0, Math.PI);
  ctx.stroke();
}

function drawGuard(x, y) {
  const t = performance.now() * 0.008;
  const bobY = Math.sin(t) * 4;
  const bx = x - W * 0.35;

  // Guard body
  ctx.fillStyle = COLORS.guardBody;
  roundRect(ctx, bx - 18, y - 50 + bobY, 36, 36, 8, COLORS.guardBody);
  // Head
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.arc(bx, y - 58 + bobY, 14, 0, Math.PI * 2);
  ctx.fill();
  // Hat
  ctx.fillStyle = '#1a1a2e';
  roundRect(ctx, bx - 16, y - 74 + bobY, 32, 10, 4, '#1a1a2e');
  ctx.fillRect(bx - 12, y - 80 + bobY, 24, 12);
  // Eyes (angry)
  ctx.fillStyle = '#fff';
  ctx.fillRect(bx - 10, y - 62 + bobY, 7, 6);
  ctx.fillRect(bx + 3,  y - 62 + bobY, 7, 6);
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(bx - 8,  y - 61 + bobY, 4, 5);
  ctx.fillRect(bx + 4,  y - 61 + bobY, 4, 5);
  // Legs running
  ctx.strokeStyle = COLORS.guard;
  ctx.lineWidth = 9; ctx.lineCap = 'round';
  const lr = Math.sin(t * 3) * 14;
  ctx.beginPath(); ctx.moveTo(bx - 8, y - 16 + bobY); ctx.lineTo(bx - 12, y + lr + bobY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx + 8, y - 16 + bobY); ctx.lineTo(bx + 12, y - lr + bobY); ctx.stroke();
  // Whistle
  ctx.font = '16px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('📯', bx, y - 44 + bobY);
}

function drawParticles(ps) {
  for (const p of ps) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.scale(p.scale * 0.5, p.scale * 0.5);
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
}

})();
</script>
