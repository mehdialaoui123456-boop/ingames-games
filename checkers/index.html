<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  background:radial-gradient(125% 90% at 50% 0%,#1c1a26 0%,#0d0c11 55%,#070709 100%)}
body{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}

/* ── HUD ── */
#hud{width:100%;display:flex;justify-content:space-between;align-items:center;padding:10px 10px;
  background:linear-gradient(180deg,rgba(0,0,0,.42),rgba(0,0,0,.04));flex-shrink:0;gap:6px}
.pcard{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:15px;flex:1 1 0;min-width:0;max-width:150px;
  background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);
  transition:border-color .3s,box-shadow .3s,background .3s}
.pcard.r2{flex-direction:row-reverse;text-align:left}
.pcard.active{border-color:rgba(227,192,101,.5);background:rgba(227,192,101,.07);
  box-shadow:0 0 18px rgba(227,192,101,.15)}
.pc-ico{width:26px;height:26px;border-radius:50%;flex-shrink:0;position:relative;
  box-shadow:0 2px 5px rgba(0,0,0,.5),inset 0 2px 3px rgba(255,255,255,.3),inset 0 -3px 5px rgba(0,0,0,.45)}
.pc-ico::after{content:"";position:absolute;inset:5px;border-radius:50%;border:1.5px solid rgba(0,0,0,.18)}
.pc-ico.l{background:radial-gradient(circle at 34% 30%,#fff7e6 0%,#f1d79c 50%,#cf9f53 100%)}
.pc-ico.d{background:radial-gradient(circle at 34% 30%,#62626e 0%,#2b2b33 48%,#0a0a0e 100%)}
.pcard .meta{min-width:0}
.pcard .name{font-size:.76rem;color:rgba(255,255,255,.85);font-weight:800;letter-spacing:.3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard .cnt{font-size:.66rem;color:rgba(255,255,255,.42);font-weight:700;margin-top:1px}
#title{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding:0 2px}
#title .ico{font-size:1rem;letter-spacing:-2px;margin-bottom:1px}
#title .txt{font-size:.62rem;color:rgba(227,192,101,.85);letter-spacing:3px;font-weight:800;white-space:nowrap}

/* ── Board ── */
#board-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;padding:8px;min-height:0}
#board-outer{position:relative;padding:12px;border-radius:16px;
  background:linear-gradient(150deg,#6b4a27 0%,#4a3119 55%,#321f0e 100%);
  box-shadow:0 16px 40px rgba(0,0,0,.55),0 2px 0 rgba(255,255,255,.06) inset,
             0 -3px 8px rgba(0,0,0,.45) inset}
canvas#board{display:block;border-radius:6px;touch-action:none}

/* ── Bottom ── */
#bot{width:100%;flex-shrink:0;background:linear-gradient(0deg,rgba(0,0,0,.46),rgba(0,0,0,.08));
  border-top:1px solid rgba(227,192,101,.1);padding:11px 16px;min-height:52px;
  display:flex;align-items:center;justify-content:center;gap:12px;position:relative}
#msg{font-size:.82rem;color:rgba(255,255,255,.62);text-align:center;font-weight:700;letter-spacing:.3px}
#msg .live{display:inline-block;width:7px;height:7px;border-radius:50%;background:#e3c065;margin-inline-start:6px;
  vertical-align:middle;animation:blink 1.1s ease-in-out infinite}
#msg .eat{color:#ff7a6e}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}
#menu-btn{position:absolute;inset-inline-start:14px;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.6);font-size:1.05rem;display:none;align-items:center;justify-content:center;cursor:pointer}
#menu-btn:active{transform:translateY(-50%) scale(.9)}

/* ── Buttons ── */
.btn{background:linear-gradient(135deg,#e7c873,#bd932f);color:#1a1409;border:none;border-radius:999px;
  padding:13px 30px;font-size:.86rem;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:.6px;
  box-shadow:0 4px 0 #8a6918,0 7px 16px rgba(0,0,0,.4);transition:transform .1s,box-shadow .1s}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 #8a6918}
.btn.sec{background:rgba(255,255,255,.07);color:rgba(255,255,255,.72);box-shadow:none;
  border:1px solid rgba(255,255,255,.14);padding:12px 26px}

/* ── Overlays ── */
.overlay{position:fixed;inset:0;background:rgba(7,7,10,.74);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;z-index:50;padding:24px}
.overlay.hidden{display:none}
.card{background:linear-gradient(158deg,#221f2b,#14120d);border:1px solid rgba(227,192,101,.2);
  border-radius:26px;padding:30px 26px;max-width:340px;width:100%;text-align:center;
  box-shadow:0 22px 55px rgba(0,0,0,.6)}
.card h2{font-size:1.4rem;font-weight:900;color:#e7c873;margin-bottom:6px}
.card p{font-size:.82rem;color:rgba(255,255,255,.52);line-height:1.7;margin-bottom:22px}
.card-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* Solo menu */
#menu-ov .card{border-color:rgba(227,192,101,.24)}
.mode-row{display:flex;flex-direction:column;gap:11px;margin-bottom:20px}
.mode{display:flex;align-items:center;gap:13px;padding:14px 16px;border-radius:16px;cursor:pointer;
  background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);transition:.18s;text-align:start}
.mode:active{transform:scale(.97)}
.mode.on{border-color:#e7c873;background:rgba(227,192,101,.1)}
.mode .em{font-size:1.7rem;line-height:1;flex-shrink:0}
.mode .mt{font-size:.92rem;font-weight:800;color:#fff}
.mode .ms{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:2px}
.diff-row{display:flex;gap:8px;justify-content:center;margin-bottom:22px}
.diff{flex:1;padding:9px 6px;border-radius:13px;font-size:.78rem;font-weight:800;cursor:pointer;
  background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);color:rgba(255,255,255,.6);transition:.16s}
.diff.on{border-color:#e7c873;background:rgba(227,192,101,.12);color:#e7c873}
.diff-wrap{overflow:hidden;transition:max-height .25s ease,opacity .2s;max-height:0;opacity:0}
.diff-wrap.show{max-height:90px;opacity:1}
.diff-lbl{font-size:.66rem;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:1px;margin-bottom:8px}

/* Waiting */
#wait-ov{background:rgba(9,9,13,.96)}
#wait-ov .card{border-color:rgba(77,155,255,.32)}
#wait-ov .card h2{color:#4d9bff}
.spinner{width:42px;height:42px;border:3px solid rgba(77,155,255,.2);border-top-color:#4d9bff;
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<script>
(function(){
"use strict";

// ══════════════════════════════════════════════════
// URL PARAMS  ?room=&player=0|1&token=&name=&oppName=
// ══════════════════════════════════════════════════
const params    = new URLSearchParams(location.search);
const ROOM_ID   = params.get('room');
const MY_IDX    = parseInt(params.get('player') || '0', 10);   // 0 = light (first), 1 = dark
const IS_MP     = !!ROOM_ID;
const _authToken = params.get('token');
const MY_NAME   = params.get('name')    || '';
const OPP_NAME  = params.get('oppName') || '';

const _fbConfig = {
  apiKey:            "AIzaSyD3w3nzf89A7HYjtCsNkQjvVaCJqes0Jzs",
  authDomain:        "ingames-9c93b.firebaseapp.com",
  databaseURL:       "https://ingames-9c93b-default-rtdb.firebaseio.com",
  projectId:         "ingames-9c93b",
  storageBucket:     "ingames-9c93b.firebasestorage.app",
  messagingSenderId: "711825788462",
  appId:             "1:711825788462:web:bf1e4a59d4d18a543f59bf"
};

// ══════════════════════════════════════════════════
// BOARD MODEL — flat Int8Array(64), idx = r*8+c
//   0 empty · 1 P0-man · 2 P0-king · 3 P1-man · 4 P1-king
//   P0 = light, starts bottom (rows 5-7), moves UP   (forward = -1), promotes on row 0
//   P1 = dark,  starts top    (rows 0-2), moves DOWN (forward = +1), promotes on row 7
// ══════════════════════════════════════════════════
const DIAG = [[-1,-1],[-1,1],[1,-1],[1,1]];
const inB   = (r,c)=> r>=0 && r<8 && c>=0 && c<8;
const clamp = (v,a,b)=> v<a?a : v>b?b : v;
const owner = v=> v===0?-1 : (v<3?0:1);
const isKing= v=> v===2||v===4;
const makeP = (pl,king)=> pl===0?(king?2:1):(king?4:3);
const fwdDir= pl=> pl===0?-1:1;
const promoRow = pl=> pl===0?0:7;

let bd = new Int8Array(64);
let turn = 0;                 // player index to move (0 first)
let selected = null;          // [r,c]
let curSteps = [];            // available next steps for selected: {to:[r,c],over:[r,c]|null,cap}
let lockPiece = null;         // [r,c] locked piece during a multi-jump
let curMove = null;           // accumulating local move {wps,caps,startKing}
let lastMove = null;          // wps of last move for highlight
let gameOver = false;
let winner = null;            // 0 | 1 | null(draw)
let noProgress = 0;           // plies since capture / man move (draw rule)
let started = false;

// modes
let soloMode = 'ai';          // 'ai' | 'hot'
let difficulty = 'medium';
let aiThinking = false;
let flip = false;             // render 180° so local player's pieces sit at bottom
const HUMAN = 0, AI = 1;

function newBoard(){
  bd = new Int8Array(64);
  for(let r=0;r<3;r++) for(let c=0;c<8;c++){ if((r+c)%2===1) bd[r*8+c]=makeP(1,false); }
  for(let r=5;r<8;r++) for(let c=0;c<8;c++){ if((r+c)%2===1) bd[r*8+c]=makeP(0,false); }
}
function resetGame(){
  newBoard(); turn=0; selected=null; curSteps=[]; lockPiece=null; curMove=null;
  lastMove=null; gameOver=false; winner=null; noProgress=0; aiThinking=false;
  anim=null; seqLock=false; hintUntil=0; hintCells=[];
}

// ══════════════════════════════════════════════════
// MOVE GENERATION  (shared by UI + AI)
// ══════════════════════════════════════════════════
function immediateJumps(board,r,c){
  const v=board[r*8+c]; if(!v) return [];
  const pl=owner(v), king=isKing(v), res=[];
  for(const [dr,dc] of DIAG){
    if(!king){
      const mr=r+dr, mc=c+dc, lr=r+2*dr, lc=c+2*dc;
      if(inB(lr,lc) && board[lr*8+lc]===0){
        const mv=board[mr*8+mc];
        if(mv!==0 && owner(mv)!==pl) res.push({to:[lr,lc],over:[mr,mc]});
      }
    } else {
      let rr=r+dr, cc=c+dc;
      while(inB(rr,cc) && board[rr*8+cc]===0){ rr+=dr; cc+=dc; }
      if(inB(rr,cc) && owner(board[rr*8+cc])!==pl){          // enemy piece (non-empty here)
        let lr=rr+dr, lc=cc+dc;
        while(inB(lr,lc) && board[lr*8+lc]===0){ res.push({to:[lr,lc],over:[rr,cc]}); lr+=dr; lc+=dc; }
      }
    }
  }
  return res;
}
function simpleMoves(board,r,c){
  const v=board[r*8+c]; if(!v) return [];
  const pl=owner(v), king=isKing(v), res=[];
  if(king){
    for(const [dr,dc] of DIAG){
      let rr=r+dr, cc=c+dc;
      while(inB(rr,cc) && board[rr*8+cc]===0){ res.push([rr,cc]); rr+=dr; cc+=dc; }
    }
  } else {
    const fd=fwdDir(pl);
    for(const dc of [-1,1]){ const rr=r+fd, cc=c+dc; if(inB(rr,cc) && board[rr*8+cc]===0) res.push([rr,cc]); }
  }
  return res;
}
function cloneJump(board,fr,fc,tr,tc,or_,oc){
  const nb=board.slice();
  const v=nb[fr*8+fc];
  nb[fr*8+fc]=0; nb[or_*8+oc]=0; nb[tr*8+tc]=v;    // keep type (no mid-sequence promotion)
  return nb;
}
function fullSequences(board,r,c){
  const jumps=immediateJumps(board,r,c);
  if(jumps.length===0) return [];
  const out=[];
  for(const j of jumps){
    const [tr,tc]=j.to, [or_,oc]=j.over;
    const cont=fullSequences(cloneJump(board,r,c,tr,tc,or_,oc),tr,tc);
    if(cont.length===0) out.push({wps:[[r,c],[tr,tc]], caps:[[or_,oc]]});
    else for(const s of cont) out.push({wps:[[r,c]].concat(s.wps), caps:[[or_,oc]].concat(s.caps)});
  }
  return out;
}
function sideHasCapture(board,pl){
  for(let i=0;i<64;i++){ const v=board[i]; if(v && owner(v)===pl && immediateJumps(board,(i/8)|0,i%8).length) return true; }
  return false;
}
// All legal full moves for a side (mandatory capture). Each: {wps,caps,promote}
function allMoves(board,pl){
  const caps=[];
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const v=board[r*8+c]; if(!v||owner(v)!==pl) continue;
    for(const s of fullSequences(board,r,c)) caps.push(s);
  }
  let list;
  if(caps.length) list=caps;
  else {
    list=[];
    for(let r=0;r<8;r++) for(let c=0;c<8;c++){
      const v=board[r*8+c]; if(!v||owner(v)!==pl) continue;
      for(const t of simpleMoves(board,r,c)) list.push({wps:[[r,c],t],caps:[]});
    }
  }
  for(const m of list){
    const s=m.wps[0], e=m.wps[m.wps.length-1];
    m.promote = !isKing(board[s[0]*8+s[1]]) && e[0]===promoRow(pl);
  }
  return list;
}
// Apply a full move object to a board (with promotion)
function applyMove(board,m){
  const [sr,sc]=m.wps[0];
  let v=board[sr*8+sc];
  board[sr*8+sc]=0;
  for(const [cr,cc] of m.caps) board[cr*8+cc]=0;
  const [er,ec]=m.wps[m.wps.length-1], pl=owner(v);
  if(!isKing(v) && er===promoRow(pl)) v=makeP(pl,true);
  board[er*8+ec]=v;
}

// ══════════════════════════════════════════════════
// CANVAS RENDERING
// ══════════════════════════════════════════════════
const cv = document.getElementById('board');
const cx = cv.getContext('2d');
let BS=0, cell=0, DPR=1, boardBG=null, pieceSprite={};
let anim=null;                // {wps,caps:[{cell,v}|null],t0}
let seqLock=false;            // block input while AI/remote sequence animates
let hintUntil=0, hintCells=[];
let rafId=0;
const HOP_MS=165;
const easeIO = t=> t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;

function cellRect(r,c){ const sr=flip?7-r:r, sc=flip?7-c:c; return {x:sc*cell,y:sr*cell}; }
function center(r,c){ const o=cellRect(r,c); return {x:o.x+cell/2,y:o.y+cell/2}; }

function resize(){
  const wrap=document.getElementById('board-wrap');
  const cs=getComputedStyle(wrap);
  const padX=parseFloat(cs.paddingLeft)+parseFloat(cs.paddingRight);
  const padY=parseFloat(cs.paddingTop)+parseFloat(cs.paddingBottom);
  const FRAME=24;                                              // board-outer padding (12*2)
  const availW=Math.min(wrap.clientWidth-padX, (window.innerWidth||wrap.clientWidth)-16);
  const availH=wrap.clientHeight-padY;
  const avail=Math.min(availW,availH)-FRAME-4;
  BS=Math.max(160, Math.floor(avail/8)*8);                    // multiple of 8 → crisp squares
  cell=BS/8;
  DPR=Math.min(window.devicePixelRatio||1, 2);
  cv.style.width=BS+'px'; cv.style.height=BS+'px';
  cv.width=Math.round(BS*DPR); cv.height=Math.round(BS*DPR);
  cx.setTransform(DPR,0,0,DPR,0,0);
  buildBoardBG(); buildPieces(); render();
}

function buildBoardBG(){
  const px=Math.round(BS*DPR), sc=px/BS;
  boardBG=document.createElement('canvas'); boardBG.width=boardBG.height=px;
  const g=boardBG.getContext('2d');
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const dark=(r+c)%2===1, x=c*cell*sc, y=r*cell*sc, s=cell*sc;
    const grad=g.createLinearGradient(x,y,x,y+s);
    if(dark){ grad.addColorStop(0,'#6f4a2a'); grad.addColorStop(1,'#492c15'); }
    else    { grad.addColorStop(0,'#f4dcb0'); grad.addColorStop(1,'#e6c489'); }
    g.fillStyle=grad; g.fillRect(x,y,s,s);
  }
  // baked grain on dark squares
  g.save();
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    if((r+c)%2!==1) continue;
    const x=c*cell*sc, y=r*cell*sc, s=cell*sc;
    g.strokeStyle='rgba(40,22,8,.10)'; g.lineWidth=Math.max(0.6,sc);
    for(let i=1;i<4;i++){ g.beginPath(); g.moveTo(x, y+s*i/4 + Math.sin(i+r)*s*0.02); g.lineTo(x+s, y+s*i/4 + Math.sin(i+c)*s*0.02); g.stroke(); }
  }
  g.restore();
  // soft warm sheen
  const sh=g.createRadialGradient(px*0.4,px*0.32,px*0.05,px*0.5,px*0.5,px*0.78);
  sh.addColorStop(0,'rgba(255,240,210,.14)'); sh.addColorStop(1,'rgba(60,35,12,.12)');
  g.fillStyle=sh; g.fillRect(0,0,px,px);
  // inner edge shading
  g.strokeStyle='rgba(0,0,0,.28)'; g.lineWidth=Math.max(1,2*sc);
  g.strokeRect(g.lineWidth/2,g.lineWidth/2,px-g.lineWidth,px-g.lineWidth);
}

function buildPieces(){
  pieceSprite={};
  const d=Math.max(14, Math.round(cell*0.82*DPR));
  for(const col of ['l','d']){
    const cnv=document.createElement('canvas'); cnv.width=cnv.height=d;
    const g=cnv.getContext('2d');
    const cc=d/2, R=d*0.46;
    // outer rim
    const rim=g.createLinearGradient(0,0,0,d);
    if(col==='l'){ rim.addColorStop(0,'#edc170'); rim.addColorStop(1,'#9e6e20'); }
    else         { rim.addColorStop(0,'#3c3c46'); rim.addColorStop(1,'#08080c'); }
    g.beginPath(); g.arc(cc,cc,R,0,7); g.fillStyle=rim; g.fill();
    // groove ring
    g.beginPath(); g.arc(cc,cc,R*0.84,0,7);
    g.strokeStyle = col==='l'?'rgba(110,72,18,.55)':'rgba(0,0,0,.6)';
    g.lineWidth=Math.max(1,d*0.028); g.stroke();
    // top face
    const fR=R*0.74;
    const fg=g.createRadialGradient(cc-fR*0.36,cc-fR*0.42,fR*0.1,cc,cc,fR);
    if(col==='l'){ fg.addColorStop(0,'#fff8ea'); fg.addColorStop(.6,'#f2dba4'); fg.addColorStop(1,'#d9b269'); }
    else         { fg.addColorStop(0,'#5c5c68'); fg.addColorStop(.5,'#2b2b33'); fg.addColorStop(1,'#101016'); }
    g.beginPath(); g.arc(cc,cc,fR,0,7); g.fillStyle=fg; g.fill();
    // specular
    const sp=g.createRadialGradient(cc-fR*0.4,cc-fR*0.46,0,cc-fR*0.4,cc-fR*0.46,fR*0.95);
    sp.addColorStop(0, col==='l'?'rgba(255,255,255,.9)':'rgba(255,255,255,.42)');
    sp.addColorStop(.4,'rgba(255,255,255,.06)'); sp.addColorStop(1,'rgba(255,255,255,0)');
    g.beginPath(); g.arc(cc,cc,fR,0,7); g.fillStyle=sp; g.fill();
    pieceSprite[col]=cnv;
  }
}

function drawCrown(x,y,s){
  cx.save();
  const w=s, h=s*0.66, L=x-w/2, Rr=x+w/2, T=y-h/2, B=y+h/2;
  cx.beginPath();
  cx.moveTo(L,B);
  cx.lineTo(L,T+h*0.32);
  cx.lineTo(L+w*0.26,T+h*0.62);
  cx.lineTo(x,T);
  cx.lineTo(Rr-w*0.26,T+h*0.62);
  cx.lineTo(Rr,T+h*0.32);
  cx.lineTo(Rr,B);
  cx.closePath();
  cx.fillStyle='#f6d877'; cx.fill();
  cx.lineWidth=Math.max(1,s*0.07); cx.strokeStyle='#8a5e0e'; cx.stroke();
  cx.restore();
}
function drawPiece(r,c,v,opt){
  opt=opt||{};
  const pos=opt.pos||center(r,c);
  const scale=opt.scale==null?1:opt.scale, alpha=opt.alpha==null?1:opt.alpha;
  const col=owner(v)===0?'l':'d', d=cell*0.82*scale;
  cx.save(); cx.globalAlpha=alpha;
  cx.beginPath(); cx.ellipse(pos.x,pos.y+d*0.17,d*0.46,d*0.32,0,0,7); cx.fillStyle='rgba(0,0,0,.32)'; cx.fill();
  const sp=pieceSprite[col]; if(sp) cx.drawImage(sp,pos.x-d/2,pos.y-d/2,d,d);
  if(isKing(v)) drawCrown(pos.x,pos.y,d*0.46);
  cx.restore();
}
function hlSquare(r,c,color){ const o=cellRect(r,c); cx.fillStyle=color; cx.fillRect(o.x,o.y,cell,cell); }
function markTarget(r,c,isCap){
  const p=center(r,c);
  if(isCap){ cx.beginPath(); cx.arc(p.x,p.y,cell*0.36,0,7); cx.strokeStyle='rgba(255,96,84,.95)'; cx.lineWidth=Math.max(2,cell*0.05); cx.stroke(); }
  else      { cx.beginPath(); cx.arc(p.x,p.y,cell*0.15,0,7); cx.fillStyle='rgba(70,190,100,.9)'; cx.fill(); }
}

function render(){
  if(!BS) return;
  const now=performance.now();
  cx.clearRect(0,0,BS,BS);
  if(boardBG) cx.drawImage(boardBG,0,0,BS,BS);

  // last-move squares
  if(lastMove){ hlSquare(lastMove[0][0],lastMove[0][1],'rgba(231,200,115,.18)');
                hlSquare(lastMove[lastMove.length-1][0],lastMove[lastMove.length-1][1],'rgba(231,200,115,.24)'); }
  // selected square
  if(selected && !seqLock) hlSquare(selected[0],selected[1],'rgba(231,200,115,.34)');
  // must-eat hint pulse
  if(now<hintUntil){ const a=0.25+0.35*Math.sin(now/120); for(const [r,c] of hintCells){ const p=center(r,c); cx.beginPath(); cx.arc(p.x,p.y,cell*0.46,0,7); cx.strokeStyle='rgba(255,96,84,'+a.toFixed(3)+')'; cx.lineWidth=Math.max(2,cell*0.05); cx.stroke(); } }
  // target markers
  if(selected && curSteps.length && !seqLock) for(const s of curSteps) markTarget(s.to[0],s.to[1],s.cap);

  // animation state
  let movingCell=-1, movePos=null, movingV=0, fades=[];
  if(anim){
    const hops=anim.wps.length-1;
    let t=(now-anim.t0)/HOP_MS, hop=Math.floor(t); if(hop>=hops)hop=hops-1; if(hop<0)hop=0;
    const lt=clamp(t-hop,0,1), e=easeIO(lt);
    const a=center(anim.wps[hop][0],anim.wps[hop][1]), b=center(anim.wps[hop+1][0],anim.wps[hop+1][1]);
    movePos={x:a.x+(b.x-a.x)*e, y:a.y+(b.y-a.y)*e};
    const fin=anim.wps[anim.wps.length-1]; movingCell=fin[0]*8+fin[1]; movingV=anim.v;
    for(let h=0;h<anim.caps.length;h++){
      const cap=anim.caps[h]; if(!cap) continue;
      if(h<hop) continue;
      if(h===hop) fades.push({pos:center(cap.cell[0],cap.cell[1]),v:cap.v,alpha:1-lt,scale:1-0.45*lt});
      else        fades.push({pos:center(cap.cell[0],cap.cell[1]),v:cap.v,alpha:1,scale:1});
    }
  }

  // pieces
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const v=bd[r*8+c]; if(!v) continue;
    if(r*8+c===movingCell) continue;
    drawPiece(r,c,v);
  }
  for(const f of fades) drawPiece(0,0,f.v,{pos:f.pos,alpha:f.alpha,scale:f.scale});
  if(anim && movePos) drawPiece(0,0,movingV,{pos:movePos});
}

function animDone(){ if(!anim) return true; return performance.now()-anim.t0 >= (anim.wps.length-1)*HOP_MS+10; }
function loopActive(){ return (anim && !animDone()) || performance.now()<hintUntil; }
function loop(){ render(); if(loopActive()){ rafId=requestAnimationFrame(loop); } else { if(anim&&animDone()){ anim=null; seqLock=false; } rafId=0; render(); } }
function kick(){ if(!rafId) loop(); }
function startSeqAnim(wps,caps,v){ anim={wps:wps.map(p=>p.slice()),caps:caps.slice(),v}; anim.t0=performance.now(); kick(); }

// ══════════════════════════════════════════════════
// INPUT  (tap piece → tap destination; forced multi-jump)
// ══════════════════════════════════════════════════
function canPlay(){
  if(!started || gameOver || aiThinking || seqLock) return false;
  if(IS_MP) return turn===MY_IDX;
  if(soloMode==='ai') return turn===HUMAN;
  return true;
}
function evtCell(e){
  const rect=cv.getBoundingClientRect();
  const t=(e.touches&&e.touches[0])||(e.changedTouches&&e.changedTouches[0])||e;
  const x=(t.clientX-rect.left)/rect.width*BS, y=(t.clientY-rect.top)/rect.height*BS;
  let sc=clamp(Math.floor(x/cell),0,7), sr=clamp(Math.floor(y/cell),0,7);
  return flip?[7-sr,7-sc]:[sr,sc];
}
function stepsFor(r,c){
  if(sideHasCapture(bd,turn)){
    const j=immediateJumps(bd,r,c);
    return j.map(x=>({to:x.to,over:x.over,cap:true}));
  }
  return simpleMoves(bd,r,c).map(t=>({to:t,over:null,cap:false}));
}
function showEatHint(){
  hintCells=[];
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){ const v=bd[r*8+c]; if(v&&owner(v)===turn&&immediateJumps(bd,r,c).length) hintCells.push([r,c]); }
  hintUntil=performance.now()+700; kick();
}
function onTap(e){
  if(!canPlay()) return;
  const [r,c]=evtCell(e);

  if(lockPiece){                                   // mid multi-jump: only continuations
    const s=curSteps.find(s=>s.to[0]===r&&s.to[1]===c);
    if(s) doStep(lockPiece[0],lockPiece[1],s);
    return;
  }
  const v=bd[r*8+c];
  if(v!==0 && owner(v)===turn){                    // (re)select own piece
    const steps=stepsFor(r,c);
    if(steps.length){ selected=[r,c]; curSteps=steps; render(); }
    else { selected=null; curSteps=[]; if(sideHasCapture(bd,turn)) showEatHint(); render(); }
    return;
  }
  if(selected){
    const s=curSteps.find(s=>s.to[0]===r&&s.to[1]===c);
    if(s){ doStep(selected[0],selected[1],s); return; }
  }
  selected=null; curSteps=[]; render();
}
function doStep(fr,fc,step){
  const [tr,tc]=step.to, v=bd[fr*8+fc];
  if(!curMove) curMove={wps:[[fr,fc]],caps:[],startKing:isKing(v)};
  // capture value (snapshot before removal, for fade anim)
  let capInfo=null;
  if(step.cap){ const [or_,oc]=step.over; capInfo={cell:[or_,oc],v:bd[or_*8+oc]}; bd[or_*8+oc]=0; curMove.caps.push([or_,oc]); }
  bd[fr*8+fc]=0; bd[tr*8+tc]=v;
  curMove.wps.push([tr,tc]);
  startSeqAnim([[fr,fc],[tr,tc]],[capInfo],v);
  const cont = step.cap ? immediateJumps(bd,tr,tc) : [];
  if(cont.length){
    lockPiece=[tr,tc]; selected=[tr,tc];
    curSteps=cont.map(j=>({to:j.to,over:j.over,cap:true}));
    render();
  } else finishLocalMove();
}
function finishLocalMove(){
  const end=curMove.wps[curMove.wps.length-1];
  let v=bd[end[0]*8+end[1]]; const pl=owner(v);
  let promoted=false;
  if(!isKing(v) && end[0]===promoRow(pl)){ v=makeP(pl,true); bd[end[0]*8+end[1]]=v; promoted=true; }
  curMove.promote=promoted;
  lastMove=curMove.wps.map(p=>p.slice());
  noProgress = (curMove.caps.length>0 || !curMove.startKing) ? 0 : noProgress+1;
  if(IS_MP) pushMove(curMove);
  selected=null; curSteps=[]; lockPiece=null; curMove=null;
  turn = pl===0?1:0;
  afterMove();
}
function afterMove(){
  checkGameEnd(); updateHUD(); render();
  if(!gameOver && !IS_MP && soloMode==='ai' && turn===AI) scheduleAI();
}
function checkGameEnd(){
  if(allMoves(bd,turn).length===0){ gameOver=true; winner = turn===0?1:0; onEnd(); return; }
  if(noProgress>=80){ gameOver=true; winner=null; onEnd(); }
}

cv.addEventListener('touchstart',e=>{ e.preventDefault(); onTap(e); },{passive:false});
cv.addEventListener('mousedown', e=>{ onTap(e); });

// ══════════════════════════════════════════════════
// AI  (alpha-beta minimax with forced-capture extension)
// ══════════════════════════════════════════════════
function evalBoard(board){            // + favours player 0 (light)
  let s=0;
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const v=board[r*8+c]; if(!v) continue;
    const pl=owner(v), king=isKing(v);
    let val=king?285:100;
    if(!king){
      const adv = pl===0 ? (7-r) : r;            // progress toward promotion
      val += adv*7;
      if((pl===0&&r===7)||(pl===1&&r===0)) val+=16;   // back-row guard
    }
    val += (3.5-Math.abs(3.5-c))*2 + (3.5-Math.abs(3.5-r))*1.2;  // central control
    s += pl===0?val:-val;
  }
  return s;
}
let searchNodes=0; const NODE_CAP=140000;
function search(board,pl,depth,alpha,beta){
  if(++searchNodes>NODE_CAP) return evalBoard(board);
  const moves=allMoves(board,pl);
  if(moves.length===0) return pl===0 ? -1e6-depth*100 : 1e6+depth*100;
  const isCap = moves[0].caps.length>0;
  if(depth<=0 && !isCap) return evalBoard(board);
  if(depth<=-4) return evalBoard(board);
  const nd = isCap ? depth : depth-1;
  if(pl===0){
    let best=-Infinity;
    for(const m of moves){ const nb=board.slice(); applyMove(nb,m); const sc=search(nb,1,nd,alpha,beta); if(sc>best)best=sc; if(best>alpha)alpha=best; if(alpha>=beta)break; }
    return best;
  } else {
    let best=Infinity;
    for(const m of moves){ const nb=board.slice(); applyMove(nb,m); const sc=search(nb,0,nd,alpha,beta); if(sc<best)best=sc; if(best<beta)beta=best; if(alpha>=beta)break; }
    return best;
  }
}
function aiPickMove(){
  const moves=allMoves(bd,AI);
  if(!moves.length) return null;
  if(difficulty==='easy' && Math.random()<0.32) return moves[(Math.random()*moves.length)|0];
  const depth = difficulty==='hard'?6 : difficulty==='easy'?2 : 5;
  const jitter = difficulty==='hard'?0.01 : difficulty==='easy'?45 : 7;
  searchNodes=0;
  let best=[], bv=Infinity;                  // AI = player 1 → minimise eval
  for(const m of moves){
    const nb=bd.slice(); applyMove(nb,m);
    let sc=search(nb,0,depth-1,-Infinity,Infinity) + (Math.random()-0.5)*jitter;
    if(sc<bv-1e-9){ bv=sc; best=[m]; }
    else if(Math.abs(sc-bv)<1e-9) best.push(m);
  }
  return best[(Math.random()*best.length)|0] || moves[0];
}
function scheduleAI(){
  aiThinking=true; updateHUD();
  setTimeout(()=>{
    const m=aiPickMove(); aiThinking=false;
    if(m) commitFullMove(m,false); else { checkGameEnd(); updateHUD(); render(); }
  }, 380);
}

// Apply an entire move object locally with a flowing animation (AI / remote)
function commitFullMove(m, broadcast){
  const s=m.wps[0], startKing=isKing(bd[s[0]*8+s[1]]);
  const caps=[]; for(let i=0;i<m.wps.length-1;i++){ const cp=m.caps[i]; caps.push(cp?{cell:[cp[0],cp[1]],v:bd[cp[0]*8+cp[1]]}:null); }
  applyMove(bd,m);
  const end=m.wps[m.wps.length-1], pl=owner(bd[end[0]*8+end[1]]);
  lastMove=m.wps.map(p=>p.slice());
  noProgress = (m.caps.length>0 || !startKing) ? 0 : noProgress+1;
  if(broadcast && IS_MP) pushMove(m);
  seqLock=true; startSeqAnim(m.wps, caps, bd[end[0]*8+end[1]]);
  selected=null; curSteps=[]; lockPiece=null; curMove=null;
  turn = pl===0?1:0;
  afterMove();
}

// ══════════════════════════════════════════════════
// HUD / OVERLAYS
// ══════════════════════════════════════════════════
function counts(){ let l=0,d=0; for(let i=0;i<64;i++){ const v=bd[i]; if(v===1||v===2)l++; else if(v===3||v===4)d++; } return [l,d]; }
function applyNames(){
  let nl='الفاتح', nd='الداكن';
  if(IS_MP){ if(MY_IDX===0){ nl=MY_NAME||'أنت'; nd=OPP_NAME||'الخصم'; } else { nl=OPP_NAME||'الخصم'; nd=MY_NAME||'أنت'; } }
  else if(soloMode==='ai'){ nl='أنت'; nd='الكمبيوتر'; }
  else { nl='اللاعب الأول'; nd='اللاعب الثاني'; }
  document.getElementById('nameLight').textContent=nl;
  document.getElementById('nameDark').textContent=nd;
}
function updateHUD(){
  const [l,d]=counts();
  document.getElementById('cntLight').textContent=l+' قطعة';
  document.getElementById('cntDark').textContent=d+' قطعة';
  document.getElementById('cardLight').classList.toggle('active', !gameOver && turn===0);
  document.getElementById('cardDark').classList.toggle('active', !gameOver && turn===1);
  const msg=document.getElementById('msg');
  if(gameOver){ msg.textContent = winner==null?'تعادل' : (winner===0?'فاز الفاتح':'فاز الداكن'); return; }
  if(!started){ msg.textContent='ابدأ اللعب'; return; }
  const mustEat = sideHasCapture(bd,turn);
  const eat = mustEat ? ' <span class="eat">(عليك الأكل)</span>' : '';
  if(IS_MP){ msg.innerHTML = turn===MY_IDX ? ('دورك'+eat+'<span class="live"></span>') : 'انتظر دور خصمك…'; }
  else if(soloMode==='ai'){ msg.innerHTML = aiThinking ? 'الكمبيوتر يفكّر…' : ('دورك'+eat); }
  else { msg.innerHTML = (turn===0?'دور اللاعب الأول':'دور اللاعب الثاني')+eat; }
}
function onEnd(){
  let icon='🤝', title='تعادل!', sub='لم يتبقَّ تقدّم';
  if(winner!=null){
    const meWon = IS_MP ? (winner===MY_IDX) : soloMode==='ai' ? (winner===HUMAN) : true;
    if(IS_MP||soloMode==='ai'){ icon=meWon?'🏆':'😔'; title=meWon?'لقد فزت! 🎉':'حظاً أوفر!'; }
    else { icon='🏆'; title = winner===0?'فاز اللاعب الأول!':'فاز اللاعب الثاني!'; }
    sub='لعبة الدامة';
  }
  setTimeout(()=>{
    document.getElementById('end-icon').textContent=icon;
    document.getElementById('end-title').textContent=title;
    document.getElementById('end-sub').textContent=sub;
    document.getElementById('end-ov').classList.remove('hidden');
  }, 650);
  if(IS_MP && typeof FlutterBridge!=='undefined') FlutterBridge.postMessage('gameOver');
}

document.getElementById('btn-restart').addEventListener('click',()=>{

// ══════════════════════════════════════════════════
// FIREBASE MULTIPLAYER  (mirrors chess / gomoku contract)
// ══════════════════════════════════════════════════
let _db=null, _roomRef=null, _connectedAt=0, _lastRemoteTs=0;

async function initFirebase(){
  if(!IS_MP) return;
  try{
    const app=firebase.initializeApp(_fbConfig);
    const auth=firebase.auth(app);
    try{ auth.setPersistence(firebase.auth.Auth.Persistence.NONE); }catch(_){}
    await Promise.race([ auth.signInAnonymously(), new Promise(res=>setTimeout(res,4000)) ]);

    _db=firebase.database(app);
    _roomRef=_db.ref('rooms/'+ROOM_ID+'/checkers');
    _connectedAt=Date.now();

    _roomRef.child('move').on('value',snap=>{
      const mv=snap.val();
      if(!mv || mv.from===MY_IDX) return;
      if(!mv.ts || mv.ts<_connectedAt || mv.ts<=_lastRemoteTs) return;
      _lastRemoteTs=mv.ts; applyRemoteMove(mv);
    });
    _roomRef.child('state').on('value',snap=>{
      const st=snap.val();
      if(!st || st.from===MY_IDX) return;
      if(!st.ts || st.ts<_connectedAt) return;
      applyRemoteState(st);
    });

    _roomRef.child('players/'+MY_IDX).set(true);
    _roomRef.child('players/'+MY_IDX).onDisconnect().remove();
    _roomRef.child('players').on('value',snap=>{
      const pl=snap.val()||{};
      if(Object.keys(pl).length>=2){ hideWait(); _roomRef.child('players').off('value'); }
      else { document.getElementById('wait-title').textContent='بانتظار خصمك…';
             document.getElementById('wait-msg').textContent='شارك الرابط أو ابدأ من المحادثة'; }
    });
  }catch(e){ console.error('Firebase error',e); hideWait(); }
}
function pushMove(m){
  if(!_roomRef) return;
  _roomRef.child('move').set({ board:Array.from(bd), turn, wps:m.wps, caps:m.caps, from:MY_IDX, ts:Date.now() });
}
function pushState(){
  if(!_roomRef) return;
  _roomRef.child('state').set({ board:Array.from(bd), turn, from:MY_IDX, ts:Date.now() });
}
function applyRemoteMove(mv){
  const wps=mv.wps||[], rcaps=mv.caps||[];
  const caps=[]; for(let i=0;i<wps.length-1;i++){ const cp=rcaps[i]; caps.push(cp?{cell:[cp[0],cp[1]],v:bd[cp[0]*8+cp[1]]}:null); }
  bd.set(mv.board);
  lastMove=wps.map(p=>p.slice());
  const end=wps[wps.length-1];
  selected=null; curSteps=[]; lockPiece=null; curMove=null;
  seqLock=true; startSeqAnim(wps, caps, bd[end[0]*8+end[1]]);
  turn=mv.turn;
  checkGameEnd(); updateHUD(); render();
}
function applyRemoteState(st){
  bd.set(st.board); turn=st.turn||0;
  selected=null; curSteps=[]; lockPiece=null; curMove=null; lastMove=null;
  gameOver=false; winner=null; noProgress=0; anim=null; seqLock=false;
  document.getElementById('end-ov').classList.add('hidden');
  updateHUD(); render();
}
function hideWait(){ document.getElementById('wait-ov').classList.add('hidden'); }
document.getElementById('btn-cancel').addEventListener('click',()=>{
  if(typeof FlutterBridge!=='undefined') FlutterBridge.postMessage('gameOver');
  history.back();
});

function init(){
  resetGame();
  window.addEventListener('resize',resize);
  window.addEventListener('orientationchange',resize);
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) render(); });
  resize();

  if(IS_MP){
    started=true; flip=(MY_IDX===1);
    document.getElementById('menu-btn').style.display='none';
    applyNames(); updateHUD();
    document.getElementById('wait-ov').classList.remove('hidden');
    initFirebase();
  } else if(params.get('demo')==='1'){
    // QA-only: jump straight into a hot-seat game (gated, harmless in production)
    soloMode='hot'; started=true; flip=false;
    document.getElementById('menu-btn').style.display='flex';
    resetGame(); applyNames(); updateHUD(); render();
  } else {
    document.getElementById('menu-btn').style.display='flex';
    menuOv.classList.remove('hidden');
    applyNames(); updateHUD();
  }
}
init();

})();
</script>
</body>
</html>
