<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>القفز السريع</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    background: #0a0e27;
    color: #fff;
    touch-action: none;
    position: fixed;
    inset: 0;
  }

  #game { position: absolute; inset: 0; overflow: hidden; background: #0a0e27; }
  canvas#scene { position: absolute; inset: 0; display: block; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 14px 18px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 10;
    pointer-events: none;
  }
  .pill {
    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 18px;
    font-weight: 800;
    display: flex; align-items: center; gap: 6px;
  }

  /* Tap-anywhere hint that pulses on the gameplay screen */
  .tap-hint {
    position: absolute;
    bottom: 30%;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.55);
    font-size: 16px;
    font-weight: 700;
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.3s;
  }
  .tap-hint.hidden { opacity: 0; }

  /* Overlays */
  .overlay {
    position: absolute; inset: 0;
    background: rgba(10,14,39,0.85);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100;
    text-align: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }
  .overlay h1 { font-size: 38px; margin-bottom: 12px; }
  .overlay p { font-size: 16px; margin-bottom: 24px; opacity: 0.85; line-height: 1.6; max-width: 280px; }
  .big-score { font-size: 72px; font-weight: 900; margin: 8px 0 22px; color: #00f7ff; text-shadow: 0 4px 14px rgba(0,247,255,0.5); }
  .best { font-size: 14px; opacity: 0.7; margin-bottom: 18px; }
  .btn {
    background: linear-gradient(135deg, #ff3d8b, #ff6b6b);
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 20px;
    font-weight: 900;
    padding: 16px 44px;
    border-radius: 999px;
    box-shadow: 0 6px 0 #b32a5e, 0 8px 20px rgba(255,61,139,0.4);
    transition: transform 80ms, box-shadow 80ms;
    letter-spacing: 0.5px;
  }
  .btn:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 #b32a5e, 0 4px 10px rgba(255,61,139,0.3);
  }
  .hint { font-size: 13px; opacity: 0.65; margin-top: 16px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="game">
  <canvas id="scene" width="400" height="800"></canvas>

  <div id="hud">
    <div class="pill">⚡ <span id="score">0</span></div>
    <div class="pill">🏆 <span id="best">0</span></div>
  </div>

  <div class="tap-hint hidden" id="tapHint">انقر للقفز</div>

  <!-- Start screen -->
  <div id="start" class="overlay">
    <h1>⚡ القفز السريع</h1>
    <p>انقر في أي مكان للقفز<br>تجنّب الأشواك واجمع النقاط</p>
    <button class="btn" id="startBtn">ابدأ اللعب</button>
    <div class="hint">السرعة تزداد مع الوقت!</div>
  </div>

  <!-- End screen -->
  <div id="end" class="overlay hidden">
    <h1>اصطدمت!</h1>
    <p>نقاطك:</p>
    <div class="big-score" id="finalScore">0</div>
    <div class="best" id="finalBest">أعلى نتيجة: 0</div>
    <button class="btn" id="restartBtn">حاول مرة أخرى</button>
  </div>
</div>

<script>
(function () {
  // ── DOM ────────────────────────────────────────────────────────────
  const game       = document.getElementById('game');
  const canvas     = document.getElementById('scene');
  const ctx        = canvas.getContext('2d');
  const scoreEl    = document.getElementById('score');
  const bestEl     = document.getElementById('best');
  const finalEl    = document.getElementById('finalScore');
  const finalBest  = document.getElementById('finalBest');
  const tapHint    = document.getElementById('tapHint');
  const startView  = document.getElementById('start');
  const endView    = document.getElementById('end');
  const startBtn   = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');

  // ── State ──────────────────────────────────────────────────────────
  let W = 400, H = 800;
  let groundY = 600;          // computed from H
  const playerSize = 36;
  const gravity = 2200;       // px/s²
  const jumpVel = -900;       // px/s
  const baseSpeed = 280;      // px/s scroll
  let speed = baseSpeed;
  let player = { x: 80, y: 0, vy: 0, onGround: true, rotation: 0 };
  let obstacles = [];         // {x, type: 'spike'|'block', w, h}
  let coins = [];             // {x, y, collected}
  let particles = [];
  let bgStars = [];
  let score = 0;
  let best = parseInt(localStorage.getItem('rapidJumpBest') || '0', 10);
  let running = false;
  let lastTime = 0;
  let spawnDistance = 0;
  let nextSpawnAt = 0;
  let rafId = null;
  let hintTimeout = null;

  // ── Sizing ─────────────────────────────────────────────────────────
  function measure() {
    const rect = game.getBoundingClientRect();
    const w = Math.max(240, Math.floor(rect.width  || game.clientWidth  || window.innerWidth  || 360));
    const h = Math.max(360, Math.floor(rect.height || game.clientHeight || window.innerHeight || 640));
    if (w === W && h === H) return;
    W = w; H = h;
    canvas.width  = W;
    canvas.height = H;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    groundY = Math.floor(H * 0.78);
    if (player.onGround) player.y = groundY - playerSize;
    initBackground();
  }
  if (window.ResizeObserver) {
    new ResizeObserver(() => measure()).observe(game);
  }
  window.addEventListener('resize', measure);
  window.addEventListener('orientationchange', () => setTimeout(measure, 100));

  // ── Background stars ───────────────────────────────────────────────
  function initBackground() {
    bgStars = [];
    for (let i = 0; i < 50; i++) {
      bgStars.push({
        x: Math.random() * W,
        y: Math.random() * groundY,
        size: 0.5 + Math.random() * 2,
        speed: 20 + Math.random() * 60, // parallax
        twinkle: Math.random(),
      });
    }
  }

  // ── Buttons ────────────────────────────────────────────────────────
  function bindButton(el, fn) {
    el.addEventListener('click', fn);
    el.addEventListener('touchend', (e) => { e.preventDefault(); fn(); }, { passive: false });
  }
  bindButton(startBtn,   startGame);
  bindButton(restartBtn, startGame);

  // ── Tap-to-jump input on the game area ─────────────────────────────
  function jump() {
    if (!running) return;
    if (player.onGround) {
      player.vy = jumpVel;
      player.onGround = false;
      spawnJumpParticles();
    }
  }
  game.addEventListener('touchstart', (e) => {
    // Don't jump if tapping the start/end screen buttons
    if (e.target.tagName === 'BUTTON') return;
    e.preventDefault();
    jump();
    hideTapHint();
  }, { passive: false });
  game.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    jump();
    hideTapHint();
  });

  // ── Spawning ───────────────────────────────────────────────────────
  function maybeSpawn() {
    // Distance-based spawning so spacing stays fair as speed increases
    if (spawnDistance < nextSpawnAt) return;
    spawnDistance = 0;
    // Tightens as score grows
    const minGap = Math.max(180, 380 - score * 1.5);
    const maxGap = Math.max(260, 520 - score * 1.5);
    nextSpawnAt = minGap + Math.random() * (maxGap - minGap);

    const r = Math.random();
    if (r < 0.55) {
      // Single spike
      obstacles.push({
        x: W + 50,
        type: 'spike',
        w: 30, h: 36,
      });
    } else if (r < 0.80) {
      // Triple spikes
      for (let i = 0; i < 3; i++) {
        obstacles.push({ x: W + 50 + i * 32, type: 'spike', w: 30, h: 36 });
      }
    } else {
      // Tall block — must jump over
      obstacles.push({ x: W + 50, type: 'block', w: 40, h: 60 });
    }

    // Sometimes float a coin to collect
    if (Math.random() < 0.4) {
      coins.push({
        x: W + 200,
        y: groundY - playerSize - 60 - Math.random() * 40,
        collected: false,
      });
    }
  }

  // ── Particles ──────────────────────────────────────────────────────
  function spawnJumpParticles() {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: player.x + playerSize / 2,
        y: groundY,
        vx: (Math.random() - 0.5) * 200,
        vy: -80 - Math.random() * 80,
        life: 0.4,
        maxLife: 0.4,
        color: '#00f7ff',
        size: 2 + Math.random() * 2,
      });
    }
  }
  function spawnCrashParticles() {
    for (let i = 0; i < 25; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 100 + Math.random() * 250;
      particles.push({
        x: player.x + playerSize / 2,
        y: player.y + playerSize / 2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.8,
        maxLife: 0.8,
        color: ['#ff3d8b', '#00f7ff', '#fff'][Math.floor(Math.random() * 3)],
        size: 3 + Math.random() * 3,
      });
    }
  }
  function spawnCoinParticles(x, y) {
    for (let i = 0; i < 10; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 80 + Math.random() * 100;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.5,
        maxLife: 0.5,
        color: '#FFD93D',
        size: 2 + Math.random() * 2,
      });
    }
  }

  // ── Game flow ──────────────────────────────────────────────────────
  function startGame() {
    measure();
    initBackground();
    player = { x: Math.floor(W * 0.2), y: groundY - playerSize, vy: 0, onGround: true, rotation: 0 };
    obstacles = [];
    coins = [];
    particles = [];
    score = 0;
    speed = baseSpeed;
    spawnDistance = 0;
    nextSpawnAt = 250;
    running = true;
    scoreEl.textContent = '0';
    bestEl.textContent  = best;
    startView.classList.add('hidden');
    endView.classList.add('hidden');

    // Show tap hint briefly at the start of each round
    tapHint.classList.remove('hidden');
    if (hintTimeout) clearTimeout(hintTimeout);
    hintTimeout = setTimeout(hideTapHint, 2500);

    lastTime = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function hideTapHint() {
    tapHint.classList.add('hidden');
  }

  function endGame() {
    running = false;
    spawnCrashParticles();
    if (score > best) {
      best = score;
      localStorage.setItem('rapidJumpBest', String(best));
    }
    finalEl.textContent  = score;
    finalBest.textContent = 'أعلى نتيجة: ' + best;
    // Brief delay so player sees the crash explosion before the overlay
    setTimeout(() => {
      endView.classList.remove('hidden');
    }, 700);

    // Keep drawing particles even after end
    const drawAfter = (now) => {
      const dt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;
      updateParticles(dt);
      draw();
      if (particles.length > 0) requestAnimationFrame(drawAfter);
    };
    requestAnimationFrame(drawAfter);
  }

  function loop(now) {
    if (!running) { rafId = null; return; }
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function update(dt) {
    // Speed ramps slowly
    speed = baseSpeed + Math.min(220, score * 1.2);
    const dx = speed * dt;
    spawnDistance += dx;
    maybeSpawn();

    // Score: 1 point per ~30px traveled
    score = Math.floor((score * 30 + dx) / 30);
    scoreEl.textContent = score;

    // Player physics
    if (!player.onGround) {
      player.vy += gravity * dt;
      player.y += player.vy * dt;
      // Spinning cube while in the air
      player.rotation += dt * 6;
      if (player.y >= groundY - playerSize) {
        player.y = groundY - playerSize;
        player.vy = 0;
        player.onGround = true;
        // Snap rotation to nearest right angle on landing
        const q = Math.PI / 2;
        player.rotation = Math.round(player.rotation / q) * q;
      }
    }

    // Background stars (parallax)
    for (const s of bgStars) {
      s.x -= s.speed * dt;
      if (s.x < -2) { s.x = W + 2; s.y = Math.random() * groundY; }
      s.twinkle += dt * 2;
    }

    // Move obstacles left and cull
    for (const o of obstacles) o.x -= dx;
    obstacles = obstacles.filter(o => o.x + o.w > -5);

    // Coins
    for (const c of coins) c.x -= dx;
    coins = coins.filter(c => !c.collected && c.x > -20);

    // Collisions
    const pHit = {
      x: player.x + 4,
      y: player.y + 4,
      w: playerSize - 8,
      h: playerSize - 8,
    };
    for (const o of obstacles) {
      if (o.type === 'spike') {
        // Triangle approximated as rect with reduced hit area
        const ox = o.x + 4, oy = groundY - o.h + 6, ow = o.w - 8, oh = o.h - 8;
        if (rectOverlap(pHit, { x: ox, y: oy, w: ow, h: oh })) {
          endGame();
          return;
        }
      } else if (o.type === 'block') {
        const ox = o.x, oy = groundY - o.h, ow = o.w, oh = o.h;
        if (rectOverlap(pHit, { x: ox, y: oy, w: ow, h: oh })) {
          endGame();
          return;
        }
      }
    }
    for (const c of coins) {
      if (c.collected) continue;
      const dxc = (player.x + playerSize / 2) - c.x;
      const dyc = (player.y + playerSize / 2) - c.y;
      if (dxc * dxc + dyc * dyc < 30 * 30) {
        c.collected = true;
        score += 10;
        spawnCoinParticles(c.x, c.y);
      }
    }

    updateParticles(dt);
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 600 * dt; // gravity on particles too
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function rectOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function draw() {
    // Sky gradient
    const g = ctx.createLinearGradient(0, 0, 0, groundY);
    g.addColorStop(0, '#0a0e27');
    g.addColorStop(1, '#1a1f4a');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, groundY);

    // Stars
    for (const s of bgStars) {
      const a = 0.4 + Math.sin(s.twinkle) * 0.3;
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fillRect(s.x, s.y, s.size, s.size);
    }

    // Ground area (darker)
    ctx.fillStyle = '#1a0a2e';
    ctx.fillRect(0, groundY, W, H - groundY);

    // Ground glow line
    ctx.fillStyle = '#ff3d8b';
    ctx.fillRect(0, groundY - 2, W, 2);
    // Soft glow above ground
    const glow = ctx.createLinearGradient(0, groundY - 30, 0, groundY);
    glow.addColorStop(0, 'rgba(255,61,139,0)');
    glow.addColorStop(1, 'rgba(255,61,139,0.25)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, groundY - 30, W, 30);

    // Obstacles
    for (const o of obstacles) {
      if (o.type === 'spike') drawSpike(o);
      else if (o.type === 'block') drawBlock(o);
    }

    // Coins
    for (const c of coins) {
      if (c.collected) continue;
      ctx.fillStyle = '#FFD93D';
      ctx.beginPath();
      ctx.arc(c.x, c.y, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFEC8B';
      ctx.beginPath();
      ctx.arc(c.x - 2, c.y - 2, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Particles
    for (const p of particles) {
      const alpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // Player (rotating cube)
    if (running || particles.length > 0) {
      ctx.save();
      ctx.translate(player.x + playerSize / 2, player.y + playerSize / 2);
      ctx.rotate(player.rotation);
      // Outer glow
      ctx.fillStyle = 'rgba(0,247,255,0.3)';
      ctx.fillRect(-playerSize / 2 - 3, -playerSize / 2 - 3, playerSize + 6, playerSize + 6);
      // Main cube
      const grad = ctx.createLinearGradient(-playerSize / 2, -playerSize / 2, playerSize / 2, playerSize / 2);
      grad.addColorStop(0, '#00f7ff');
      grad.addColorStop(1, '#0077ff');
      ctx.fillStyle = grad;
      ctx.fillRect(-playerSize / 2, -playerSize / 2, playerSize, playerSize);
      // Inner highlight
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(-playerSize / 2 + 4, -playerSize / 2 + 4, playerSize - 8, 4);
      ctx.restore();
    }
  }

  function drawSpike(o) {
    // Triangle pointing up
    const grad = ctx.createLinearGradient(o.x, groundY - o.h, o.x, groundY);
    grad.addColorStop(0, '#ff3d8b');
    grad.addColorStop(1, '#b32a5e');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(o.x, groundY);
    ctx.lineTo(o.x + o.w / 2, groundY - o.h);
    ctx.lineTo(o.x + o.w, groundY);
    ctx.closePath();
    ctx.fill();
    // Highlight stripe
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(o.x + o.w / 2 - 2, groundY - o.h + 8);
    ctx.lineTo(o.x + o.w / 2, groundY - o.h);
    ctx.lineTo(o.x + o.w / 2 + 2, groundY - o.h + 8);
    ctx.closePath();
    ctx.fill();
  }

  function drawBlock(o) {
    const grad = ctx.createLinearGradient(o.x, groundY - o.h, o.x, groundY);
    grad.addColorStop(0, '#9b5de5');
    grad.addColorStop(1, '#4a1f99');
    ctx.fillStyle = grad;
    ctx.fillRect(o.x, groundY - o.h, o.w, o.h);
    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(o.x, groundY - o.h, o.w, 3);
  }

  // ── Init ───────────────────────────────────────────────────────────
  measure();
  initBackground();
  bestEl.textContent = best;
  // Render an idle frame so the background shows behind the start screen
  draw();
  [50, 200, 500, 1500].forEach(t => setTimeout(() => { measure(); draw(); }, t));
})();
</script>
</body>
</html>
